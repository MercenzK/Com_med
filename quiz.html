<script>
const DATA = [{"topic": "Intro to Occ Med", "q": "According to ILO and WHO, which statement best defines 'occupational health'?", "choices": ["An area of public health promoting and maintaining the highest degree of physical, mental and social well-being of workers in all occupations", "A clinical specialty that diagnoses and treats injuries occurring inside factory premises", "A legal framework that determines compensation entitlement for injured employees", "An engineering discipline that designs ventilation and noise control systems for industry", "A government inspection service that enforces national workplace safety standards"], "ans": 0, "exp": "ILO/WHO นิยาม occupational health เป็นงานด้าน public health ที่มุ่ง **ส่งเสริมและธำรงรักษา** สุขภาพกาย จิต และสังคม ของคนทำงานใน **ทุกอาชีพ** ให้อยู่ในระดับสูงสุด — เน้นคำว่า 'all occupations' และ 'promote and maintain'\n\nตัวเลือกอื่นแคบเกินไป: การวินิจฉัยรักษาคือขอบเขตของ occupational medicine (วิชาชีพย่อยหนึ่งในงานอาชีวอนามัย) ไม่ใช่ occupational health ทั้งหมด ส่วนกฎหมายชดเชย วิศวกรรมความปลอดภัย และการตรวจสอบของภาครัฐ เป็นเพียงองค์ประกอบหนึ่งเท่านั้น"}, {"topic": "Intro to Occ Med", "q": "Which of the following is NOT one of the five standard categories of workplace health hazards?", "choices": ["Physical hazard", "Financial hazard", "Chemical hazard", "Ergonomic hazard", "Psychosocial hazard"], "ans": 1, "exp": "สิ่งคุกคามสุขภาพ (health hazards) มาตรฐานมี **5 กลุ่ม**: Physical, Chemical, Biological, Ergonomic, Psychosocial (บางตำราเพิ่ม Accident เป็นกลุ่มที่ 6)\n\n'Financial hazard' ไม่ใช่หมวดสิ่งคุกคามสุขภาพ — แม้ภาระทางการเงินจะเป็นปัญหาจริงของผู้ป่วย แต่จัดอยู่ในมิติ social ของ holistic care ไม่ใช่ occupational hazard classification"}, {"topic": "Intro to Occ Med", "q": "A factory replaces crystalline silica with a less hazardous abrasive in its sandblasting process. This intervention belongs to which level of control?", "choices": ["Administrative rotation of the exposed workers", "Provision of respirators to the exposed workers", "Substitution at the source", "Dilution ventilation along the pathway", "Biological monitoring of the exposed workers"], "ans": 2, "exp": "การเปลี่ยนวัตถุดิบเป็นสารที่อันตรายน้อยกว่า = **Substitution** ซึ่งเป็น **การควบคุมที่แหล่งกำเนิด (source control)** — เป็นวิธีที่มี **ประสิทธิภาพสูงสุด** และควรเลือกใช้เป็นลำดับแรก เพราะจัดการที่ต้นเหตุของปัญหา\n\nDilution ventilation และ isolation เป็นการควบคุมที่ทางผ่าน ส่วน PPE และ job rotation เป็นการควบคุมที่ตัวคนงาน ซึ่งเป็นมาตรการลำดับสุดท้าย"}, {"topic": "Intro to Occ Med", "q": "Why is personal protective equipment (PPE) regarded as the LAST-RESORT control measure in occupational hygiene?", "choices": ["It is consistently more expensive than engineering controls across all industries", "Thai occupational health law permits its use only during declared emergencies", "It cannot be fitted correctly to the majority of adult workers", "It does not reduce the actual amount of hazard present and depends on worker compliance", "It interferes with the accuracy of environmental monitoring equipment"], "ans": 3, "exp": "PPE เป็นมาตรการลำดับสุดท้ายเพราะ (1) **ไม่ได้ลดปริมาณสิ่งคุกคามในสถานที่ทำงานจริง** — สิ่งคุกคามยังอยู่เท่าเดิม เพียงแต่กั้นไม่ให้ถึงตัวคน และ (2) **ต้องพึ่งพาความร่วมมือของพนักงาน** ในการสวมใส่อย่างสม่ำเสมอ ซึ่งมักมีปัญหาเรื่องความร้อนและความอึดอัด\n\nข้ออื่นไม่จริง: PPE มักถูกกว่า engineering control ในระยะสั้น กฎหมายไทยไม่ได้ห้ามใช้ และ PPE สามารถทำ fit test ให้เหมาะกับคนงานได้"}, {"topic": "Intro to Occ Med", "q": "A worker returns to duty after a prolonged illness. Which occupational health examination is indicated?", "choices": ["Pre-placement examination", "Exit examination", "Periodic examination", "Environmental monitoring survey", "Return-to-work examination"], "ans": 4, "exp": "**การตรวจสุขภาพก่อนกลับเข้าทำงาน (Return-to-work examination)** ทำหลังเจ็บป่วยหรือหยุดงานไปนาน เพื่อประเมิน **ความพร้อมในการกลับมาทำงาน** และ **ป้องกันการเป็นซ้ำ**\n\nแยกจาก: Pre-placement = ก่อนเข้าทำงานครั้งแรก (ประเมิน fitness for work + เก็บ baseline), Periodic = ตรวจเป็นระยะตามความเสี่ยงและระยะฟักตัวของโรค, Exit = ก่อนออกจากงาน (เก็บข้อมูลเปรียบเทียบผลที่อาจเกิดในอนาคต)"}, {"topic": "Intro to Occ Med", "q": "Screening for early disease among exposed but asymptomatic workers exemplifies which level of prevention?", "choices": ["Secondary prevention", "Primary prevention", "Tertiary prevention", "Quaternary prevention", "Primordial prevention"], "ans": 0, "exp": "**Secondary prevention** = การตรวจค้นหาโรคในระยะเริ่มแรก (early detection) ในคนที่สัมผัสแล้วแต่ยังไม่มีอาการ เพื่อลดการสัมผัสเพิ่มเติมและรักษาแต่เนิ่นๆ — ครอบคลุมการตรวจสุขภาพทั้ง 4 ประเภท (pre-placement, periodic, return-to-work, exit)\n\nPrimary = กำจัด/ลดการสัมผัสก่อนเกิดโรค, Tertiary = วินิจฉัยรักษาผู้ที่เป็นโรคแล้ว + ฟื้นฟูสมรรถภาพร่างกายและฝึกอาชีพ"}, {"topic": "Intro to Occ Med", "q": "Which feature best distinguishes an occupational DISEASE from an occupational INJURY?", "choices": ["Disease affects internal organs, whereas injury affects skin and musculoskeletal system only", "Disease develops gradually over a latency period, whereas injury follows an acute event", "Disease is compensable under Thai law, whereas injury is settled by the employer directly", "Disease requires laboratory confirmation, whereas injury requires clinical examination only", "Disease occurs in older workers, whereas injury occurs predominantly in younger workers"], "ans": 1, "exp": "จุดแยกหลักคือ **ปัจจัยด้านเวลาและกลไก**:\n• **โรค (Disease)** — ค่อยเป็นค่อยไป สะสมเป็นสัปดาห์/ปี มี **latency period** ยาว กลไกคือการสะสมทางพิษวิทยา กระตุ้นภูมิคุ้มกัน หรือกลายพันธุ์ของเซลล์ **พิสูจน์ความเชื่อมโยงกับงานได้ยาก** ต้องอาศัยประวัติการทำงานและ lab\n• **การบาดเจ็บ (Injury)** — เกิดทันทีทันใด (acute event) กลไกคือการถ่ายเทพลังงานเกินขีดจำกัดของเนื้อเยื่อ **พิสูจน์ง่าย ชัดเจน** เพราะมีประวัติอุบัติเหตุและสถานที่เกิดเหตุ"}, {"topic": "Intro to Occ Med", "q": "Which ICD-10 code designates a 'work-related condition'?", "choices": ["Y97", "Z58.1", "Y96", "Z57.0", "T75.2"], "ans": 2, "exp": "รหัส ICD-10 กลุ่ม external causes ที่ต้องจำ:\n• **Y96 = Work-related condition** (โรค/ปัญหาสุขภาพที่เกี่ยวเนื่องจากการทำงาน)\n• Y97 = Environmental-pollution-related condition (เกี่ยวเนื่องจากมลพิษสิ่งแวดล้อม)\n• Z58.1 = Exposure to air pollution (การสัมผัสมลพิษทางอากาศ)"}, {"topic": "Intro to Occ Med", "q": "Which ICD-10 code is used for a health problem related to environmental pollution?", "choices": ["Y96", "Z58.1", "Z56.0", "Y97", "Y98"], "ans": 3, "exp": "**Y97 = Environmental-pollution-related condition** — โรคหรือปัญหาสุขภาพที่เกี่ยวเนื่องจาก **มลพิษในสิ่งแวดล้อม**\n\nแยกกับ Y96 (work-related condition — เกี่ยวเนื่องจากการทำงาน) และ Z58.1 (exposure to air pollution — ระบุการสัมผัสมลพิษทางอากาศโดยเฉพาะ)"}, {"topic": "Intro to Occ Med", "q": "Which sequence correctly represents the disease causation model in occupational medicine?", "choices": ["Disease → exposure → latency period → at-risk state with other factors", "At-risk state → disease → exposure → latency period with other factors", "Other factors → disease → exposure → at-risk state with latency period", "Latency period → exposure → disease → at-risk state with other factors", "Exposure → latency period → at-risk state with other factors → disease"], "ans": 4, "exp": "โมเดลการเกิดโรคจากการทำงาน: **exposure** (สัมผัส) → ผ่าน **incubation/latency period** → เข้าสู่ภาวะ **at risk** ร่วมกับ **other factors** (ปัจจัยเสริม เช่น พันธุกรรม การสูบบุหรี่) → จึงเกิด **disease**\n\nหลักสำคัญคือ **การสัมผัสต้องมาก่อนอาการเสมอ** (temporal relationship) ซึ่งตรงกับข้อ 4 ใน NSODD"}, {"topic": "Intro to Occ Med", "q": "A disease in which work is only ONE of several contributing causes, alongside non-occupational factors, is classified as:", "choices": ["Work-related disease", "Occupational disease", "General disease unrelated to work", "Notifiable communicable disease", "Compensable occupational injury"], "ans": 0, "exp": "การจำแนก 3 กลุ่ม:\n• **โรคทั่วไป (General diseases)** — ไม่เกี่ยวกับงาน\n• **โรคเกี่ยวเนื่องจากงาน (Work-related diseases)** — งานเป็น **ปัจจัยร่วมหนึ่ง** ในหลายปัจจัย (multifactorial) เช่น ปวดหลัง โรคหัวใจ\n• **โรคจากการทำงาน (Occupational diseases)** — งานเป็น **สาเหตุหลัก/จำเป็น** เช่น silicosis, asbestosis"}, {"topic": "Intro to Occ Med", "q": "Environmental monitoring shows an airborne concentration below the published exposure limit. Which conclusion is MOST appropriate?", "choices": ["No worker can develop disease at this level, so health surveillance may be discontinued", "Some workers may still develop disease, because the standard does not guarantee safety for everyone", "The measurement is likely erroneous and should be repeated with calibrated equipment", "Respiratory protection can be withdrawn from all workers in that production area", "The exposure limit should be formally lowered for this particular workplace"], "ans": 1, "exp": "หลักสำคัญที่อาจารย์เน้น: **ค่าที่ต่ำกว่ามาตรฐานไม่ได้การันตีว่าทุกคนจะไม่เป็นโรค** เพราะ (1) มาตรฐานตั้งจากค่าเฉลี่ยประชากร ยังมีคนที่ไวผิดปกติ (susceptible individuals) และ (2) **มาตรฐานต่างประเทศอาจไม่เหมาะกับสรีระคนไทย**\n\nจึงต้องทำ health surveillance ต่อเนื่อง ไม่ใช่ยกเลิกการเฝ้าระวังหรือถอด PPE"}, {"topic": "Intro to Occ Med", "q": "In hazard surveillance, which activity identifies and evaluates hazards in the working environment?", "choices": ["Annual audiometric testing of all noise-exposed employees", "Review of sick-leave certificates submitted to human resources", "Walkthrough survey combined with environmental monitoring", "Analysis of workers' compensation claims from the previous year", "Pre-placement physical examination of newly hired employees"], "ans": 2, "exp": "การเฝ้าระวังสิ่งแวดล้อมในสถานที่ทำงาน (hazard/environmental surveillance) ทำโดย **Walkthrough survey + Environmental monitoring** — ขอบเขตคือ ค้นหาและประเมินสิ่งคุกคาม ประเมินลักษณะงานที่เพิ่มความเสี่ยง ประเมินระดับการสัมผัส ประเมินมาตรการควบคุม และประเมินการใช้ PPE\n\nส่วน audiometry และ pre-placement exam เป็น **health surveillance ทางตรง**; สถิติการลาป่วยและ compensation claim เป็น **health surveillance ทางอ้อม**"}, {"topic": "Intro to Occ Med", "q": "After confirming a case of occupational silicosis, which action regarding the workplace should the physician take FIRST?", "choices": ["Recommend closure of the production line pending official inspection", "Advise the patient to resign in order to avoid further silica exposure", "Report the employer to the labour inspectorate for legal prosecution", "Search for the same disease among the patient's co-workers", "Repeat the chest radiograph in six months to document progression"], "ans": 3, "exp": "เมื่อวินิจฉัยโรคจากการทำงานได้ 1 ราย ต้องคิดเสมอว่าเป็น **sentinel case** — เพื่อนร่วมงานที่สัมผัสแบบเดียวกันอาจเป็นโรคด้วย จึงต้อง **ค้นหาโรคเดียวกันในกลุ่มเพื่อนร่วมงาน** (รวมถึงคนใกล้ชิด) เป็นอันดับแรก\n\nจากนั้นจึง (2) **ส่งเสริมให้ผู้ป่วยเข้าสู่ระบบค่าชดเชย** — สิทธิประกันสังคมให้ยื่นเรื่องต่อ **กองทุนเงินทดแทน** และ (3) แนะนำมาตรการป้องกันและการใช้ PPE อย่างเคร่งครัด การให้ผู้ป่วยลาออกไม่ได้แก้ปัญหาของคนงานที่เหลือ"}, {"topic": "Physical Hazard - Noise", "q": "A 45-year-old machine operator has bilateral high-frequency hearing loss. At which frequency is the characteristic audiometric notch expected?", "choices": ["500 Hz", "1000 Hz", "2000 Hz", "8000 Hz", "4000 Hz"], "ans": 4, "exp": "**Noise-Induced Hearing Loss (NIHL)** ให้ภาพ audiogram ที่มี **notch ชัดเจนที่ความถี่ 4000 Hz ทั้งสองข้าง** — เป็นลักษณะเฉพาะที่ออกสอบบ่อยมาก\n\nกลไก: เสียงดังเกิน 85 dB นานๆ ทำลาย **เซลล์ขนใน Organ of Corti** ของหูชั้นใน → เป็น **sensorineural hearing loss** (ไม่ใช่ conductive) โดยความถี่ 4000 Hz ไวต่อความเสียหายที่สุดจากลักษณะกายวิภาคของ cochlea"}, {"topic": "Physical Hazard - Noise", "q": "Above which 8-hour time-weighted average noise level does Thai law require an employer to establish a hearing conservation programme?", "choices": ["85 dB(A)", "70 dB(A)", "75 dB(A)", "90 dB(A)", "100 dB(A)"], "ans": 0, "exp": "**ประกาศกรมสวัสดิการและคุ้มครองแรงงาน พ.ศ. 2561** เรื่องหลักเกณฑ์และวิธีการจัดทำ **มาตรการอนุรักษ์การได้ยิน** กำหนดว่าต้องจัดทำเมื่อระดับเสียงที่ลูกจ้างได้รับเฉลี่ยตลอดระยะเวลาการทำงาน **8 ชั่วโมง ตั้งแต่ 85 เดซิเบลเอขึ้นไป**\n\nเลข 85 dB(A) เป็นเกณฑ์เดียวกับที่ใช้กำหนดว่าลูกจ้างใหม่ต้องตรวจการได้ยินเป็น baseline ก่อนเข้างาน"}, {"topic": "Physical Hazard - Noise", "q": "Before audiometric screening, for how long must the worker avoid all loud noise exposure?", "choices": ["At least 1 hour", "At least 12 hours", "At least 4 hours", "At least 24 hours", "At least 72 hours"], "ans": 1, "exp": "การเตรียมผู้รับการตรวจคัดกรองสมรรถภาพการได้ยิน: **งดการสัมผัสเสียงดังทุกชนิดอย่างน้อย 12 ชั่วโมง** ก่อนตรวจ\n\nเหตุผล: ถ้าเพิ่งสัมผัสเสียงดังมา จะมี **Temporary Threshold Shift (TTS)** ทำให้ผลตรวจแย่กว่าความเป็นจริง แยกไม่ออกจาก **Permanent Threshold Shift (PTS)** ที่เป็นความเสียหายถาวร\n\nนอกจากนี้ควรตรวจสภาพหูด้วย **Otoscope** ก่อนทดสอบ โดยเฉพาะรายที่มีอาการผิดปกติของหู"}, {"topic": "Physical Hazard - Noise", "q": "Which examination should be performed before audiometry to exclude a conductive cause of hearing loss?", "choices": ["Tuning-fork Rinne test performed in a soundproof booth", "Tympanometry measured immediately after the shift ends", "Otoscopic examination of the external canal and tympanic membrane", "Nasopharyngoscopy to assess eustachian tube patency", "High-resolution CT scan of the temporal bones"], "ans": 2, "exp": "แนวทางการตรวจสมรรถภาพการได้ยินระบุว่าควรตรวจสภาพหูด้วย **Otoscope** ก่อนทำการทดสอบ — เพื่อดู **cerumen impaction, otitis media, TM perforation** ซึ่งเป็นสาเหตุของ conductive hearing loss ที่จะทำให้แปลผล audiogram ผิด\n\nโดยเฉพาะในรายที่ซักประวัติแล้วมีอาการผิดปกติของหู CT temporal bone ไม่ใช่การตรวจคัดกรองประจำ"}, {"topic": "Physical Hazard - Noise", "q": "Which type of hearing loss results from chronic occupational noise exposure?", "choices": ["Conductive hearing loss", "Mixed hearing loss", "Central auditory processing disorder", "Sensorineural hearing loss", "Functional (non-organic) hearing loss"], "ans": 3, "exp": "NIHL เป็น **sensorineural hearing loss** เพราะพยาธิสภาพอยู่ที่ **cochlear hair cells (Organ of Corti)** ซึ่งเป็นส่วนของ inner ear/neural pathway ไม่ใช่ระบบนำเสียง\n\nConductive hearing loss เกิดจากปัญหาที่ external/middle ear เช่น ขี้หูอุดตัน แก้วหูทะลุ otosclerosis — ไม่ใช่กลไกของเสียงดังในที่ทำงาน"}, {"topic": "Physical Hazard - Noise", "q": "Which solvent is recognised as ototoxic and can potentiate noise-induced hearing loss?", "choices": ["Acetic acid", "Sodium hypochlorite", "Ethylene glycol", "Isopropyl alcohol", "Toluene"], "ans": 4, "exp": "ตัวทำละลายที่มี **พิษต่อหู (ototoxic solvents)** และเสริมฤทธิ์กับเสียงดัง ได้แก่ **Styrene, Methylstyrene, Toluene, Xylene, Carbon disulfide, Ethylbenzene, n-Propyl benzene, n-Hexane, Trichloroethylene**\n\nนอกจากตัวทำละลายแล้ว **การสูบบุหรี่** และ **การทำงานสัมผัสแรงสั่นสะเทือน** ก็เป็นปัจจัยส่งเสริมการเกิด NIHL ด้วย"}, {"topic": "Physical Hazard - Noise", "q": "Which is the CORRECT technique for inserting a foam earplug?", "choices": ["Roll the plug down, pull the pinna, insert, then hold and count to 30", "Insert the plug dry, then press firmly against the tragus for 5 seconds", "Moisten the plug, insert half its length, and rotate it clockwise once", "Compress the plug, tilt the head forward, and insert without touching the pinna", "Warm the plug in the hand, insert fully, then chew to seat it in place"], "ans": 0, "exp": "วิธีใส่ปลั๊กอุดหูชนิดโฟม 3 ขั้นตอน:\n1. **ปั้น (Roll)** ให้เรียวเล็ก\n2. **ดึงใบหู (Pull)** ขึ้นและไปด้านหลัง เพื่อยืดช่องหูให้ตรง\n3. **นับรอ 1–30 (Hold)** ให้โฟมขยายตัวเต็มที่ในช่องหู\n\nถ้าไม่รอให้โฟมขยาย จะได้ค่าลดทอนเสียง (attenuation) ต่ำกว่าที่ระบุบนฉลากมาก"}, {"topic": "Physical Hazard - Noise", "q": "Which control approach reduces noise exposure MOST effectively and should be attempted first?", "choices": ["Issuing earmuffs to all exposed workers", "Enclosing the noisy machine at its source", "Rotating workers out of the noisy area every two hours", "Posting mandatory hearing-protection signage", "Increasing the frequency of audiometric testing"], "ans": 1, "exp": "ตามหลัก **Hierarchy of Controls** การควบคุมที่ **แหล่งกำเนิด (source)** มีประสิทธิภาพสูงสุด — การปิดครอบเครื่องจักร (enclosure) ลดเสียงที่ออกมาสู่สิ่งแวดล้อมจริง\n\nEarmuffs = PPE (ควบคุมที่ตัวคนงาน, ลำดับสุดท้าย), job rotation และป้ายเตือน = administrative control, ส่วนการตรวจการได้ยินบ่อยขึ้นเป็น secondary prevention ไม่ได้ลดการสัมผัสเลย"}, {"topic": "Physical Hazard - Noise", "q": "At which three occasions should occupational audiometry be performed?", "choices": ["On the first day of work, after any acute acoustic trauma, and at retirement age", "During pre-employment interview, after six months, and only when symptoms appear", "Before starting work, periodically during employment, and before leaving or changing job", "At hiring, after every reported incident, and whenever the worker requests it", "Only when the measured workplace noise level exceeds 90 dB(A)"], "ans": 2, "exp": "การตรวจการได้ยินทางอาชีวเวชกรรมทำ 3 จังหวะ:\n1. **ก่อนเข้างาน** — เป็น baseline (สำหรับลูกจ้างใหม่ที่จะทำงานในบริเวณเสียงดัง ≥ 85 dB(A))\n2. **การตรวจเฝ้าระวัง/ติดตาม/ประจำปี** — เพื่อดู threshold shift\n3. **ก่อนลาออกหรือเปลี่ยนงาน** — เป็นข้อมูลเปรียบเทียบ\n\nการมี baseline สำคัญมาก เพราะถ้าไม่มี จะพิสูจน์ไม่ได้ว่าการสูญเสียการได้ยินเกิดจากงานนี้หรือมีมาก่อน"}, {"topic": "Physical Hazard - Noise", "q": "Which sequence correctly describes the hearing conservation programme cycle?", "choices": ["Train workers → assess noise risk → audiometric surveillance → control → review measures", "Audiometric surveillance → assess noise risk → train workers → review measures → control", "Control → review measures → assess noise risk → train workers → audiometric surveillance", "Assess noise risk → control → train workers → audiometric surveillance → review measures", "Review measures → train workers → control → assess noise risk → audiometric surveillance"], "ans": 3, "exp": "วงจร **โครงการอนุรักษ์การได้ยิน (Hearing Conservation Program)**:\n**ประเมินความเสี่ยงจากเสียง → ลดความเสี่ยง/มีการควบคุม → จัดการป้องกันเสียง → ให้ความรู้และฝึกผู้ปฏิบัติงาน → เฝ้าระวังโดยการตรวจการได้ยิน → ทบทวนมาตรการและประเมินความเสี่ยง → วนกลับ**\n\nเป็นวงจร PDCA — ต้องเริ่มจากการประเมินความเสี่ยงก่อนเสมอ จึงจะรู้ว่าควบคุมอะไร"}, {"topic": "Physical Hazard - Heat", "q": "A construction worker collapses with core temperature 41.2°C, confusion and seizures. What is the diagnosis?", "choices": ["Heat exhaustion", "Heat syncope", "Heat cramps", "Heat rash", "Heat stroke"], "ans": 4, "exp": "**Heat stroke** วินิจฉัยจาก 2 องค์ประกอบ: **core temperature > 40°C** ร่วมกับ **CNS dysfunction (สับสน ชัก หมดสติ)** — เหงื่ออาจมีหรือไม่มีก็ได้ (+/−)\n\nแยกจาก **Heat exhaustion** ที่อุณหภูมิ < 40–40.5°C และ **ความรู้สึกตัวปกติ** ยังมีเหงื่อออก — จุดแยกสำคัญคือระดับความรู้สึกตัว ไม่ใช่การมีเหงื่อ"}, {"topic": "Physical Hazard - Heat", "q": "Which finding distinguishes heat exhaustion from heat stroke?", "choices": ["Consciousness remains normal in heat exhaustion", "Sweating is absent in heat exhaustion", "Core temperature exceeds 40°C in heat exhaustion", "Muscle cramping occurs only in heat exhaustion", "Blood pressure is elevated in heat exhaustion"], "ans": 0, "exp": "จุดแยกสำคัญ:\n• **Heat exhaustion** — core temp **< 40–40.5°C**, มีเหงื่อ (+), **ความรู้สึกตัวปกติ**\n• **Heat stroke** — core temp **> 40°C**, เหงื่อ +/−, **สับสน ชัก หมดสติ**\n\nข้อผิดที่พบบ่อยคือคิดว่า heat stroke ต้องไม่มีเหงื่อ (anhidrosis) — จริงๆ ใน exertional heat stroke ผู้ป่วยมักยังมีเหงื่ออยู่"}, {"topic": "Physical Hazard - Heat", "q": "Which cooling method is MOST effective for exertional heat stroke?", "choices": ["Intravenous administration of chilled normal saline", "Cold water immersion", "Application of ice packs to the forehead only", "Oral antipyretic such as paracetamol", "Gastric lavage with iced fluid"], "ans": 1, "exp": "**Cold water immersion เป็นวิธีที่ดีที่สุดสำหรับ Exertional Heat Stroke** เพราะลดอุณหภูมิแกนกลางได้เร็วที่สุด\n\nวิธีอื่นที่ใช้ได้: evaporative cooling, ice packs บริเวณ **คอ รักแร้ ขาหนีบ** (ตำแหน่งหลอดเลือดใหญ่ ไม่ใช่หน้าผาก), whole-body rotating ice-wet towel\n\n**Antipyretic ไม่มีประโยชน์** เพราะ heat stroke ไม่ได้เกิดจาก hypothalamic set point ที่สูงขึ้นเหมือนไข้ติดเชื้อ"}, {"topic": "Physical Hazard - Heat", "q": "Which four parameters are combined in the Wet Bulb Globe Temperature (WBGT) index?", "choices": ["Air temperature, barometric pressure, altitude and wind chill", "Humidity, dew point, cloud cover and ultraviolet index", "Air temperature, humidity, air velocity and radiation", "Air temperature, humidity, workload and clothing insulation", "Radiation, air velocity, particulate load and ozone concentration"], "ans": 2, "exp": "**WBGT (Wet Bulb Globe Temperature)** ประกอบด้วย 4 องค์ประกอบ:\n1. **Air temperature** (อุณหภูมิอากาศ)\n2. **Humidity** (ความชื้น)\n3. **Air velocity** (ความเร็วลม)\n4. **Radiation** (การแผ่รังสีความร้อน)\n\nใช้ร่วมกับ **WBGT Work-Rest chart** เพื่อกำหนดสัดส่วนเวลาทำงาน-พัก โดยงานที่ออกแรงหนักต้องพักมากขึ้นที่ WBGT เดียวกัน"}, {"topic": "Physical Hazard - Heat", "q": "How long does heat acclimatization typically require?", "choices": ["1-2 days", "3-5 days", "4-6 weeks", "10-14 days", "3 months"], "ans": 3, "exp": "**Heat acclimatization ใช้เวลา 10–14 วัน** — เป็นส่วนหนึ่งของแนวทางการบริหารจัดการความร้อน ร่วมกับตารางเวลาพัก สวัสดิการน้ำดื่ม การให้ความรู้ การติดตามเฝ้าระวังอาการ (buddy system + supervisor) และแผนฉุกเฉิน\n\n**Poor acclimatization** เป็นหนึ่งใน non-environmental risk factors ที่สำคัญของ heat-related illness"}, {"topic": "Physical Hazard - Heat", "q": "Which medication class increases the risk of heat-related illness by impairing sweating?", "choices": ["Proton pump inhibitors", "Oral hypoglycaemic agents", "Inhaled corticosteroids", "Statins", "Anticholinergic antidepressants"], "ans": 4, "exp": "ยาที่เพิ่มความเสี่ยง heat-related illness ที่ต้องจำ: **diuretics** (ทำให้ขาดน้ำ), **antihistamines** และ **anticholinergic antidepressants** (ลดการขับเหงื่อผ่านฤทธิ์ anticholinergic), **beta-blockers** และ **calcium channel blockers** (ลดการตอบสนองของหัวใจและหลอดเลือด)\n\nAnticholinergic ยับยั้ง muscarinic receptor ที่ sweat gland โดยตรง → ขับเหงื่อไม่ได้ → ระบายความร้อนล้มเหลว"}, {"topic": "Physical Hazard - Heat", "q": "Which is NOT one of the body's three main mechanisms for maintaining core temperature at 37°C?", "choices": ["Shivering thermogenesis", "Cutaneous vasodilation", "Sweating", "Evaporation of sweat", "Increased skin blood flow"], "ans": 0, "exp": "กลไกรักษาอุณหภูมิแกนกลาง 37°C ในภาวะร้อนมี 3 อย่าง: **cutaneous vasodilation** (ขยายหลอดเลือดที่ผิวหนัง = เพิ่ม skin blood flow), **sweating** (ขับเหงื่อ), **evaporation** (การระเหยของเหงื่อ)\n\n**Shivering thermogenesis** เป็นกลไก **สร้างความร้อน** ในภาวะเย็น — ตรงกันข้ามกับการระบายความร้อน จึงไม่ใช่คำตอบ"}, {"topic": "Physical Hazard - Heat", "q": "Which complication of heat stroke results from skeletal muscle breakdown?", "choices": ["Disseminated intravascular coagulation", "Rhabdomyolysis", "Acute lung injury", "Cerebral oedema", "Hepatic failure"], "ans": 1, "exp": "**Rhabdomyolysis** คือการสลายของกล้ามเนื้อลาย ปล่อย myoglobin เข้ากระแสเลือด → อุดตัน renal tubule → **Acute kidney injury**\n\nภาวะแทรกซ้อนอื่นของ heat stroke: brain edema, seizure, AKI, liver failure, **DIC**, arrhythmia, acute lung injury และท้ายสุด **multi-organ failure** — แต่ที่เกิดจากการสลายกล้ามเนื้อโดยตรงคือ rhabdomyolysis"}, {"topic": "Physical Hazard - Cold", "q": "Which condition is associated with occupational cold exposure and presents with episodic finger blanching?", "choices": ["Erythema nodosum", "Acanthosis nigricans", "Raynaud's phenomenon", "Palmar erythema", "Livedo reticularis"], "ans": 2, "exp": "**Raynaud's phenomenon** — นิ้วซีดขาวเป็นครั้งคราวเมื่อเจอความเย็น เป็นผลกระทบต่อ **peripheral circulation** จากการทำงานในที่เย็น\n\nกลุ่มโรคจากความเย็นอื่นๆ: peripheral circulation (Raynaud's, **hand-arm vibration syndrome**), musculoskeletal (carpal tunnel, tension neck syndrome, tenosynovitis), dermatological (**cold urticaria, pernio/chilblains**), และการบาดเจ็บ (**frostbite, trench foot, hypothermia**, falls)"}, {"topic": "Physical Hazard - Cold", "q": "Which is a recognised cold-related injury in outdoor workers?", "choices": ["Miliaria rubra", "Photokeratitis", "Chloracne", "Trench foot", "Silicosis"], "ans": 3, "exp": "**Trench foot** (immersion foot) เกิดจากเท้าเปียกและเย็นเป็นเวลานาน — เป็นการบาดเจ็บจากความเย็นร่วมกับ **frostbite** และ **hypothermia**\n\nตัวเลือกอื่นเป็นโรคจากสิ่งคุกคามอื่น: miliaria rubra (ผดร้อน) จากความร้อน, photokeratitis จาก UV (welder's flash), chloracne จาก halogenated hydrocarbon, silicosis จากฝุ่นซิลิกา"}, {"topic": "Physical Hazard - Pressure", "q": "A commercial diver develops joint pain and paraesthesia 30 minutes after a rapid ascent. What is the mechanism?", "choices": ["Oxygen toxicity causes free-radical damage to peripheral nerves", "Carbon dioxide retention produces respiratory acidosis and cramping", "Hypothermia induces peripheral vasoconstriction and ischaemic pain", "Rapid dehydration causes electrolyte-driven muscle spasm", "Dissolved nitrogen forms gas bubbles as ambient pressure falls"], "ans": 4, "exp": "**Decompression Sickness (DCS)** — ที่ความลึก ไนโตรเจนละลายในเลือดและเนื้อเยื่อมากขึ้นตามความดัน เมื่อขึ้นสู่ผิวน้ำเร็วเกินไป ความดันลดลงอย่างรวดเร็ว → **ไนโตรเจนกลายเป็นฟองก๊าซ (bubble formation)** → อุดหลอดเลือดและกดเนื้อเยื่อ\n\nเป็นไปตาม **Boyle's law** ที่ปริมาตรก๊าซขยายตัวเมื่อความดันลดลงระหว่าง ascent"}, {"topic": "Physical Hazard - Pressure", "q": "What is the definitive treatment for decompression sickness?", "choices": ["Recompression in a hyperbaric chamber", "High-flow oxygen by non-rebreather mask alone", "Intravenous corticosteroid and mannitol", "Immediate re-immersion to the original depth", "Therapeutic anticoagulation with low molecular weight heparin"], "ans": 0, "exp": "**การรักษา DCS คือ Hyperbaric chamber (recompression therapy)** — เพิ่มความดันเพื่อบีบฟองก๊าซให้เล็กลงและละลายกลับ แล้วค่อยๆ ลดความดันอย่างช้าๆ ตามตาราง\n\nการให้ออกซิเจนความเข้มข้นสูงเป็นการรักษาเสริมระหว่างรอส่งต่อ แต่ไม่ใช่การรักษาหลัก และห้ามให้ผู้ป่วยกลับลงน้ำเองเด็ดขาด (in-water recompression) เพราะอันตราย"}, {"topic": "Physical Hazard - Pressure", "q": "Historically, decompression sickness among caisson workers building bridges was known as:", "choices": ["Miner's cramp", "Caisson disease", "Chimney sweep's disease", "Grinder's rot", "Brass founder's ague"], "ans": 1, "exp": "**Caisson disease** เป็นชื่อทางประวัติศาสตร์ของ DCS ที่เกิดในคนงานสร้างฐานรากสะพานใน caisson (ห้องอัดความดัน) — ตัวอย่างที่อ้างในสไลด์คือการสร้าง **Eads Bridge** ข้ามแม่น้ำ Mississippi ที่ St. Louis ซึ่งมีคนงานบาดเจ็บ **42 คน**\n\nชื่ออื่นๆ ที่พบคือ 'the bends' จากท่าทางงอตัวเพราะปวดข้อ"}, {"topic": "Physical Hazard - Altitude", "q": "At what altitude does acclimatization generally become necessary?", "choices": ["500 metres or above", "1,000 metres or above", "2,500 metres or above", "5,000 metres or above", "8,000 metres or above"], "ans": 2, "exp": "**Acclimatization จำเป็นที่ระดับ 2,500 เมตรขึ้นไป**\n\nข้อมูลความดันบรรยากาศที่ต้องจำ: **760 mmHg ที่ระดับน้ำทะเล** และ **ลดลง 1 mmHg ทุกความสูง 11 เมตร** — เมื่อความดันบรรยากาศลดลง ความดันย่อยของออกซิเจนก็ลดลงตาม ทำให้เกิด hypobaric hypoxia"}, {"topic": "Physical Hazard - Altitude", "q": "A trekker develops headache, nausea and fatigue 8 hours after arriving at high altitude. Which condition is MOST likely?", "choices": ["High altitude cerebral oedema", "High altitude pulmonary oedema", "Hypobaric decompression sickness", "Acute mountain sickness", "Carbon monoxide poisoning"], "ans": 3, "exp": "**Acute Mountain Sickness (AMS)** — **ปวดศีรษะเป็น cardinal symptom** เกิด **2–12 ชั่วโมง** หลังขึ้นที่สูง (มักระหว่างหรือหลังคืนแรก) ร่วมกับอ่อนเพลีย เบื่ออาหาร คลื่นไส้ และอาจอาเจียน — **หายเองใน 12–48 ชั่วโมง** เมื่อร่างกาย acclimatize\n\nต่างจาก **HACE** ที่มี lethargy, drowsiness, confusion และ **ataxia จาก tandem gait test** ซึ่งต้องลงจากที่สูงทันที"}, {"topic": "Physical Hazard - Altitude", "q": "Which clinical sign indicates high altitude cerebral oedema (HACE) rather than simple acute mountain sickness?", "choices": ["Headache worsening on bending forward", "Nausea relieved by rest and oral fluids", "Loss of appetite during the first evening", "Peripheral oedema of the hands and face", "Ataxia on tandem gait testing"], "ans": 4, "exp": "**Ataxia จาก tandem gait test** เป็นสัญญาณสำคัญที่บ่งชี้ **HACE** ร่วมกับ lethargy, drowsiness และ confusion\n\n**HACE ต้องลงจากที่สูงทันที (immediate descent required)** — เป็นภาวะฉุกเฉินที่เสียชีวิตได้ ต่างจาก AMS ที่มีเพียงปวดศีรษะ คลื่นไส้ เบื่ออาหาร และหายเองได้"}, {"topic": "Physical Hazard - Radiation", "q": "Which is an example of IONIZING radiation encountered occupationally?", "choices": ["Radon gas in underground mines", "Ultraviolet light in outdoor agricultural work", "Infrared radiation from glass furnaces", "Microwave radiation from telecommunication masts", "Visible laser light in printing operations"], "ans": 0, "exp": "**Ionizing radiation** ได้แก่ **เอกซเรย์ แกมมา และแก๊สเรดอน** — พบในบุคลากรทางการแพทย์แผนกรังสีและ **เหมืองแร่ยูเรเนียม** กลไกคือ **ทำลาย DNA โดยตรง** ก่อ **ต้อกระจก ผิวหนังตาย และมะเร็ง** (มะเร็งเม็ดเลือดขาว มะเร็งปอด)\n\n**Non-ionizing radiation** เช่น **UV** พบในเกษตรกร ไลฟ์การ์ด ช่างเชื่อมโลหะ — UV-B ทำลายผิวหนังจนนำไปสู่มะเร็งผิวหนัง"}, {"topic": "Physical Hazard - Radiation", "q": "A welder presents with severe eye pain and photophobia hours after work. What is the diagnosis?", "choices": ["Acute angle-closure glaucoma", "Photokeratitis (welder's flash)", "Bacterial conjunctivitis", "Retinal detachment", "Chemical alkali burn of the cornea"], "ans": 1, "exp": "**Photokeratitis หรือ Welder's flash** — กระจกตาอักเสบจากรังสี **UV** ที่เกิดจากการเชื่อมโลหะโดยไม่สวมหน้ากากกรองแสง\n\nลักษณะเด่นคือ **อาการเกิดหลังสัมผัสหลายชั่วโมง (delayed onset)** ปวดตารุนแรง น้ำตาไหล กลัวแสง รู้สึกเหมือนมีทรายในตา — โดยทั่วไปหายเองใน 24–48 ชั่วโมง เป็นตัวอย่างของ non-ionizing radiation injury"}, {"topic": "Physical Hazard - Radiation", "q": "According to the inverse square law, doubling the distance from a radiation source changes the exposure to:", "choices": ["One half of the original", "One eighth of the original", "One quarter of the original", "Twice the original", "Unchanged from the original"], "ans": 2, "exp": "**Inverse Square Law** — ความเข้มของรังสีแปรผกผันกับกำลังสองของระยะทาง (I ∝ 1/d²)\n\nถ้าเพิ่มระยะห่างเป็น 2 เท่า → ความเข้มลดเหลือ 1/2² = **1/4** ของเดิม\n\nเป็นหนึ่งใน 3 หลักการป้องกันรังสี: **Time** (ลดเวลา), **Distance** (เพิ่มระยะห่าง), **Shielding** (ใช้ฉากกำบัง) — พร้อมระวัง scatter radiation และตำแหน่งที่ยืนทำงาน"}, {"topic": "Physical Hazard - Vibration", "q": "A chainsaw operator reports finger blanching and pain on cold exposure. What is the diagnosis?", "choices": ["Carpal tunnel syndrome", "Thoracic outlet syndrome", "Cervical radiculopathy", "Hand-arm vibration syndrome", "De Quervain tenosynovitis"], "ans": 3, "exp": "**Hand-Arm Vibration Syndrome (HAVS) / Vibration White Finger** — พบในคนงานที่ใช้ **เครื่องเจาะถนน (jackhammer), เลื่อยยนต์ (chainsaw), เครื่องเจียรผิวโลหะ** เป็นประจำ\n\nกลไก: ความสั่นสะเทือนสะสมทำลาย **เส้นเลือดและเส้นประสาทที่นิ้วมือ** → หลอดเลือดยืดหดตัวผิดปกติคล้าย **Raynaud's phenomenon** → **นิ้วมือซีดขาว ซ่า และปวดเมื่อเจออากาศเย็น**\n\nจำเพิ่ม: vibration ยังเป็นปัจจัยส่งเสริม NIHL ด้วย"}, {"topic": "Toxicology", "q": "Which principle is attributed to Paracelsus and forms the foundation of toxicology?", "choices": ["Every synthetic chemical is inherently more toxic than a natural one", "Toxicity is determined solely by the route of exposure", "Chronic exposure is always more dangerous than acute exposure", "Susceptibility to poisons is identical across all individuals", "The dose determines whether a substance is a poison"], "ans": 4, "exp": "คำคมของ **Paracelsus (1493–1541)** บิดาแห่งพิษวิทยา:\n> *'All things are poison and nothing is without poison. Solely, the **dose** determines that a thing is not a poison.'*\n\nใจความคือ **ขนาด (dose) เป็นตัวกำหนดความเป็นพิษ** — สารทุกชนิดเป็นพิษได้ถ้าได้รับมากพอ และสารที่เป็นพิษก็อาจปลอดภัยได้ถ้าขนาดต่ำพอ"}, {"topic": "Toxicology", "q": "Which four processes constitute toxicokinetics?", "choices": ["Absorption, distribution, biotransformation and elimination", "Ingestion, inhalation, dermal contact and injection", "Damage, repair, adaptation and response", "Initiation, promotion, progression and metastasis", "Sensitization, elicitation, resolution and tolerance"], "ans": 0, "exp": "**Toxicokinetics** = สิ่งที่ **ร่างกายทำกับสาร** ประกอบด้วย 4 ขั้น (ADME):\n1. **Absorption** การดูดซึม\n2. **Distribution** การกระจาย\n3. **Biotransformation** การเปลี่ยนโครงสร้างทางเคมี\n4. **Elimination** การกำจัด\n\nต่างจาก **Toxicodynamics** = สิ่งที่ **สารทำกับร่างกาย** (การทำลาย การซ่อมแซม และการตอบสนอง) ส่วน ingestion/inhalation/dermal คือ routes of exposure"}, {"topic": "Toxicology", "q": "Carbon tetrachloride causes hepatic necrosis through which mechanism?", "choices": ["Direct precipitation of hepatocyte membrane proteins on contact", "Hepatic biotransformation generates a more toxic free radical", "Immune-mediated destruction via IgE-dependent mast cell activation", "Competitive inhibition of hepatic glycogen synthesis pathways", "Obstruction of the biliary tree by insoluble crystal deposits"], "ans": 1, "exp": "**Biotransformation** ของ Carbon tetrachloride ที่ตับเปลี่ยนสารให้กลายเป็น **อนุมูลอิสระคลอรีน (chlorine free radical)** ที่ **อันตรายยิ่งกว่าสารตั้งต้น** → เข้าทำลายเยื่อหุ้มเซลล์ → ตับอักเสบและเกิดเนื้อตาย\n\nนี่เป็นตัวอย่างคลาสสิกว่า metabolism ไม่ได้ทำให้สารปลอดภัยเสมอไป — บางครั้ง **bioactivation** ทำให้พิษมากขึ้น"}, {"topic": "Toxicology", "q": "Occupational benzene exposure is most strongly associated with which malignancy?", "choices": ["Hepatocellular carcinoma", "Malignant mesothelioma", "Acute myeloid leukaemia", "Transitional cell carcinoma of the bladder", "Papillary thyroid carcinoma"], "ans": 2, "exp": "**Benzene** เป็น **genotoxic carcinogen** ที่เข้าไปทำลายโครงสร้าง **DNA โดยตรง** ทำให้เกิด mutation → ถ้ากลไกซ่อมแซมล้มเหลว เซลล์แบ่งตัวควบคุมไม่ได้ → **มะเร็งเม็ดเลือดขาว AML (Acute Myeloid Leukaemia)**\n\nแยกกับ **Asbestos** ที่เป็น non-genotoxic — ทำให้เกิดการอักเสบเรื้อรังจากการทิ่มแทงเยื่อหุ้มปอด → **Mesothelioma**"}, {"topic": "Toxicology", "q": "Which statement about the dose-response relationship for genotoxic carcinogens is CORRECT?", "choices": ["A clear threshold exists below which no risk is present", "Risk decreases as cumulative lifetime exposure increases", "The relationship follows a U-shaped curve with a protective low-dose range", "There is no threshold, so risk exists at every level of exposure", "Risk appears only once exposure exceeds the published occupational limit"], "ans": 3, "exp": "**สารก่อมะเร็งชนิด genotoxic ไม่มี threshold** — จึง **มีความเสี่ยงในทุกระดับการสัมผัส (no safe level)** เพราะโมเลกุลเดียวก็อาจทำให้เกิด mutation ที่นำไปสู่มะเร็งได้\n\nต่างจากสารพิษทั่วไปที่มี threshold (NOAEL/LOAEL) ซึ่งต่ำกว่านั้นถือว่าไม่เกิดผลเสีย — นี่เป็นเหตุผลว่าทำไมสารก่อมะเร็งจึงใช้หลัก ALARA (As Low As Reasonably Achievable)"}, {"topic": "Toxicology", "q": "What does LD50 represent?", "choices": ["The dose producing detectable toxicity in 50 percent of the test animals", "The concentration at which 50 percent of the substance is eliminated", "The time required for 50 percent of exposed workers to develop symptoms", "The proportion of a dose absorbed through intact skin", "The dose lethal to 50 percent of the test animals"], "ans": 4, "exp": "**LD50 (Lethal Dose 50)** = ขนาดของสารที่ทำให้สัตว์ทดลอง **ตาย 50%** ใช้เปรียบเทียบความเป็นพิษเฉียบพลันระหว่างสาร\n\nหลักการตีความ: **LD50 ยิ่งต่ำ = ยิ่งเป็นพิษมาก** (ใช้สารน้อยก็ตายแล้ว) — ใช้จัดทำ toxicity rating ลำดับความเป็นพิษจากผลการทดลอง"}, {"topic": "Toxicology", "q": "Which is an example of a biomarker of EXPOSURE?", "choices": ["Blood lead concentration in a battery plant worker", "Zinc protoporphyrin elevation reflecting impaired haem synthesis", "A glutathione S-transferase polymorphism altering individual risk", "Reduced FEV1 on spirometry after years of dust inhalation", "Chest radiograph profusion score in a stone carver"], "ans": 0, "exp": "**Biomarker of exposure** วัดสารหรือ metabolite ที่ **เข้าสู่ร่างกายแล้ว** — **blood lead level** เป็นตัวอย่างคลาสสิก\n\nแยกกับ:\n• **Biomarker of effect** — วัดการเปลี่ยนแปลงทางชีวเคมี/สรีรวิทยาที่เกิดตามมา เช่น **ZPP (zinc protoporphyrin)**, FEV1 ที่ลดลง, profusion score\n• **Biomarker of susceptibility** — บ่งชี้ความไวที่ต่างกันในแต่ละบุคคล เช่น **genetic polymorphism**"}, {"topic": "Toxicology", "q": "A genetic polymorphism that makes one worker more likely than another to develop disease at the same exposure is a biomarker of:", "choices": ["Exposure", "Susceptibility", "Effect", "Elimination", "Compliance"], "ans": 1, "exp": "**Biomarker of susceptibility** บ่งชี้ว่า **การเกิดโรคต่างกันไปในแต่ละบุคคล** แม้ได้รับการสัมผัสเท่ากัน — ตัวอย่างคือ genetic polymorphism ของเอนไซม์ที่ metabolize สารพิษ\n\nนี่คือเหตุผลว่าทำไมค่าที่ต่ำกว่ามาตรฐานจึงไม่การันตีว่าทุกคนจะปลอดภัย เพราะมี susceptible individuals อยู่เสมอ"}, {"topic": "Toxicology", "q": "Which biological specimen is considered EASY and non-invasive to collect for biomonitoring?", "choices": ["Lung tissue", "Bone marrow", "Urine", "Amniotic fluid", "Bronchoalveolar lavage fluid"], "ans": 2, "exp": "ตัวอย่างสิ่งส่งตรวจแบ่งเป็น 2 กลุ่ม:\n• **เก็บง่าย ไม่ซับซ้อน** — ลมหายใจ, **ปัสสาวะ**, อุจจาระ, การป้ายจมูก, การป้ายกระพุ้งแก้ม, น้ำลาย, เสมหะ, น้ำนม, อสุจิ, **ผม**, **เล็บ**\n• **เก็บยาก/เจ็บ** — เลือด, เนื้อปอด, เนื้อตับ, เนื้อเยื่อไขมัน, กระดูก, ไขกระดูก, น้ำคร่ำ, น้ำล้างปอด (BAL)\n\nปัสสาวะเป็นสิ่งส่งตรวจที่ใช้บ่อยที่สุดใน biomonitoring ทางอาชีวเวชศาสตร์"}, {"topic": "Toxicology", "q": "Which factor should be considered when selecting a biomarker for occupational surveillance?", "choices": ["Whether the biomarker appears in the most recent international guideline", "The number of laboratories in the country able to perform the assay", "Whether the employer prefers blood over urine specimens", "Acceptability of the test to the workers being examined", "The seasonal variation in workplace production volume"], "ans": 3, "exp": "ปัจจัยที่ควรคำนึงในการใช้ biomarkers (Mayeux, NeuroRx 2004) มี 5 ข้อ:\n1. **ความคลาดเคลื่อนของการวัด** (measurement error)\n2. **อคติ** (bias)\n3. **ปัจจัยที่รบกวนผลตรวจ** (confounders)\n4. **ค่าใช้จ่าย** (cost)\n5. **การยอมรับจากผู้รับการตรวจ** (acceptability)\n\nถ้าคนงานไม่ยอมรับการตรวจ โปรแกรมเฝ้าระวังก็ล้มเหลวไม่ว่า biomarker จะดีแค่ไหน"}, {"topic": "Toxicology", "q": "Which is the FIRST step in an occupational health surveillance programme?", "choices": ["Select a standardised method for recording collected data", "Determine the fitness-for-work status of each employee", "Interpret the measurements against reference values", "Record all findings in the individual medical file", "Assess the health hazards present in the workplace"], "ans": 4, "exp": "ขั้นตอน **Occupational Health Surveillance** เริ่มจาก:\n1. **ประเมินสิ่งคุกคามสุขภาพในที่ทำงาน** ← ขั้นแรก\n2. บันทึกอวัยวะที่ได้รับผลกระทบจากสิ่งคุกคามแต่ละชนิด\n3. เลือกการทดสอบที่คัดกรองผลต่ออวัยวะนั้น\n4. สร้างข้อกำหนดเลือกกลุ่มผู้ที่ต้องมารับการคัดกรอง\n5. เลือกการเก็บข้อมูลแบบมีมาตรฐาน\n\nต้องรู้ก่อนว่ามีสิ่งคุกคามอะไร จึงจะเลือกการตรวจที่เหมาะสมได้"}, {"topic": "Toxicology", "q": "Which route of exposure is generally MOST important for chemical hazards in the workplace?", "choices": ["Inhalation", "Ingestion", "Dermal absorption", "Direct injection", "Transplacental transfer"], "ans": 0, "exp": "**Routes of exposure** มี 4 ทาง: ผิวหนัง (dermal), **การหายใจ (inhalation)**, การรับประทาน (ingestion), การเข้าสู่เลือดโดยตรง (injection)\n\n**การหายใจสำคัญที่สุดในงานอาชีวอนามัย** เพราะ (1) พื้นที่ผิวถุงลมกว้างมาก (~70 m²) (2) มีหลอดเลือดหนาแน่น ดูดซึมเร็ว และ (3) เลี่ยง first-pass metabolism ที่ตับ ทำให้สารเข้าสู่กระแสเลือดโดยตรง"}, {"topic": "Toxicology", "q": "Strong ALKALI burns penetrate deeper than acid burns because they cause:", "choices": ["Coagulative necrosis", "Liquefactive necrosis", "Caseous necrosis", "Fat necrosis", "Fibrinoid necrosis"], "ans": 1, "exp": "• **กรดรุนแรง** → **Coagulative necrosis** — เนื้อเยื่อจับตัวเป็นก้อนแข็ง เกิดเป็น eschar ที่ **จำกัดการซึมลึก** ของสาร\n• **ด่างรุนแรง** → **Liquefactive necrosis** — เนื้อเยื่อละลายเปื่อย (saponification ของไขมันและ denaturation ของโปรตีน) ทำให้ **สารซึมลึกและทำลายได้รุนแรงกว่ากรด**\n\nนี่คือเหตุผลว่าทำไม alkali burn ของตาและหลอดอาหารจึงร้ายแรงกว่า acid burn"}, {"topic": "Toxicology", "q": "Which system uses a four-coloured diamond to convey chemical hazard information?", "choices": ["GHS pictograms", "ILO chemical classification", "NFPA 704", "REACH registration codes", "ACGIH threshold limit values"], "ans": 2, "exp": "**NFPA 704** ใช้สัญลักษณ์ **เพชร 4 สี**: แดง = ความไวไฟ (flammability), น้ำเงิน = อันตรายต่อสุขภาพ (health), เหลือง = ความไวปฏิกิริยา (reactivity), ขาว = อันตรายพิเศษ (special)\n\n**GHS (Globally Harmonized System)** ใช้สัญลักษณ์รูป **ข้าวหลามตัดขอบแดง** (diamond-shaped pictograms) เป็นระบบสากลสำหรับฉลากสารเคมี"}, {"topic": "Ergonomics", "q": "The word 'ergonomics' derives from Greek roots meaning:", "choices": ["Body and motion", "Hand and tool", "Muscle and force", "Work and laws", "Human and machine"], "ans": 3, "exp": "**Ergonomics** มาจากภาษากรีก: **Ergon = work** (งาน) + **nomos = laws** (กฎ) = ศาสตร์ว่าด้วยการทำงาน\n\nนิยาม: การเรียนรู้ **ความสามารถและข้อจำกัดของมนุษย์** เพื่อออกแบบลักษณะและวิธีการทำงาน รวมถึงเครื่องมือ เครื่องจักร อาคาร ผลิตภัณฑ์ สภาพแวดล้อม ให้เหมาะสมกับมนุษย์ทั้งกายและใจ เพื่อให้ทำงาน **ดีขึ้น เร็วขึ้น และปลอดภัยมากขึ้น** — อีกชื่อคือ Human Factor Engineering"}, {"topic": "Ergonomics", "q": "Which set represents the three principal biomechanical risk factors for musculoskeletal disorders?", "choices": ["Force, temperature and duration", "Posture, illumination and noise", "Repetition, humidity and workload", "Vibration, ventilation and shift length", "Force, posture and repetition"], "ans": 4, "exp": "**Biomechanical risk factors 3 ข้อหลัก** ที่ต้องท่องได้:\n1. **Force** — แรงที่ใช้\n2. **Posture** — ท่าทาง (โดยเฉพาะ awkward posture)\n3. **Repetition** — ความถี่/การทำซ้ำ\n\nปัจจัยเสริมที่มักถูกกล่าวถึงเพิ่ม: Duration, Vibration, Contact stress, Static loading"}, {"topic": "Ergonomics", "q": "A data-entry clerk develops nocturnal numbness in the thumb, index and middle fingers. What is the MOST likely diagnosis?", "choices": ["Carpal tunnel syndrome", "Cubital tunnel syndrome", "De Quervain tenosynovitis", "Trigger finger", "Cervical radiculopathy at C5"], "ans": 0, "exp": "**Carpal Tunnel Syndrome** — median nerve ถูกกดใน carpal tunnel ทำให้ชาบริเวณ **นิ้วโป้ง นิ้วชี้ นิ้วกลาง** (median distribution) และมักเป็นมากตอนกลางคืน\n\nกลไก: **Cumulative micro-trauma** จาก repetitive strain และ awkward posture → เนื้อเยื่อขาดเลือด (ischemia) และฉีกขาดระดับโมเลกุลซ้ำๆ จนซ่อมแซมไม่ทัน\n\nผลลัพธ์อื่นในกลุ่มเดียวกัน: Tendonitis, Trigger finger"}, {"topic": "Ergonomics", "q": "Which mechanism explains cumulative trauma disorders from repetitive work?", "choices": ["A single overwhelming force exceeds the ultimate tensile strength of the tendon", "Repeated small forces cause tissue ischaemia and microscopic tearing faster than repair", "Circulating inflammatory cytokines directly dissolve the tendon sheath", "Autoantibodies form against synovial membrane antigens after chronic use", "Repetitive motion accelerates age-related calcium loss from adjacent bone"], "ans": 1, "exp": "**Cumulative Micro-trauma** ไม่ได้เกิดจากแรงกระแทกครั้งเดียว แต่เกิดจาก **แรงกลขนาดเล็กที่กระทำซ้ำๆ (Repetitive Strain)** หรือทำงานในท่าที่ฝืนธรรมชาติ (Awkward Posture) เป็นเวลานาน\n\nแรงกดหรือความเครียดสะสมนี้ทำให้เนื้อเยื่อ **ขาดเลือดไปเลี้ยง (Ischemia)** และเกิดการ **ฉีกขาดระดับโมเลกุลซ้ำๆ จนซ่อมแซมไม่ทัน** → Tendonitis, Trigger finger, Carpal tunnel syndrome"}, {"topic": "Ergonomics", "q": "Which tool is designed specifically to assess upper-limb ergonomic risk?", "choices": ["WBGT heat stress index", "ILO radiograph classification", "RULA (Rapid Upper Limb Assessment)", "Bristol Stool Chart", "Zarit Burden Interview"], "ans": 2, "exp": "**RULA (Rapid Upper Limb Assessment)** ประเมินความเสี่ยงทางการยศาสตร์ของ **รยางค์บน** โดยเฉพาะ\n\nเครื่องมือประเมินทางการยศาสตร์อื่น: **REBA** (Rapid Entire Body Assessment — ทั้งร่างกาย), **NIOSH Lifting Equation** (งานยกของ), **OWAS**, **Strain Index**\n\nหลักการเลือก: ต้องเลือกเครื่องมือให้เหมาะกับลักษณะงาน เปรียบเหมือนเลือกไขควงให้ตรงกับสกรู"}, {"topic": "Ergonomics", "q": "Which assessment tool is most appropriate for evaluating a manual lifting task?", "choices": ["RULA", "Audiometric threshold testing", "Palliative Performance Scale", "NIOSH Lifting Equation", "Bristol Stool Chart"], "ans": 3, "exp": "**NIOSH Lifting Equation** ออกแบบมาเพื่อประเมินงานยกของโดยเฉพาะ โดยคำนวณ Recommended Weight Limit (RWL) จากปัจจัยต่างๆ เช่น ระยะทางแนวราบ ความสูงที่ยก ระยะทางแนวดิ่ง ความถี่ การบิดตัว และคุณภาพการจับ\n\n**RULA** เหมาะกับงานรยางค์บนที่นั่งทำ ส่วน **REBA** เหมาะกับงานที่ใช้ทั้งร่างกาย"}, {"topic": "Ergonomics", "q": "Which is a fundamental ergonomic design principle?", "choices": ["Maximise the range of joint motion used per cycle", "Increase task variety by adding more repetitions", "Position frequently used items beyond arm's reach", "Encourage prolonged static holding to build endurance", "Keep the worker in a neutral posture"], "ans": 4, "exp": "หลักการทางการยศาสตร์พื้นฐาน: **ทำงานในท่าที่เป็นกลาง (neutral posture)**, ลดแรงที่มากเกินไป, ให้ของอยู่ในระยะเอื้อมถึงสะดวก, ทำงานที่ระดับความสูงที่เหมาะสม, **ลดการเคลื่อนไหวซ้ำซาก**, ลดการกดทับโดยตรง (contact stress), จัดที่ว่างให้เพียงพอ, **ให้เคลื่อนไหว/ยืดเหยียด/พักเป็นระยะ**, จัดสภาพแวดล้อมให้เหมาะ\n\nตัวเลือกอื่นเป็นสิ่งที่ควรหลีกเลี่ยงทั้งหมด โดยเฉพาะ static loading ที่ทำให้เลือดไปเลี้ยงกล้ามเนื้อลดลง"}, {"topic": "Ergonomics", "q": "Which is generally preferable when moving a heavy load with a handcart?", "choices": ["Pushing the cart rather than pulling it", "Pulling the cart rather than pushing it", "Lifting and carrying the load without the cart", "Dragging the load along the floor surface", "Rotating the trunk while pulling the cart sideways"], "ans": 0, "exp": "**การเข็น (pushing) ดีกว่าการดึง (pulling)** เพราะ:\n• ใช้กล้ามเนื้อขาและน้ำหนักตัวช่วยได้ แทนที่จะใช้แค่หลังและแขน\n• ลดแรงกดที่กระดูกสันหลังส่วนล่าง (lumbar compression)\n• ทำให้อยู่ในท่า neutral posture ได้ง่ายกว่า และมองเห็นทางข้างหน้า\n\nการดึงมักทำให้ต้องบิดตัว (trunk rotation) ซึ่งเป็นท่าเสี่ยงต่อการบาดเจ็บของหลัง"}, {"topic": "Biological Hazard", "q": "Which occupational group is at highest risk of anthrax as an occupational infection?", "choices": ["Office data-entry clerks", "Livestock and animal-hide handlers", "Underground coal miners", "Airport ground crew", "Textile dye mixers"], "ans": 1, "exp": "**Anthrax** เป็น occupational skin infection ที่พบในอาชีพ **เกี่ยวกับปศุสัตว์** — จากการสัมผัสสัตว์ ขนสัตว์ หนังสัตว์ที่ติดเชื้อ *Bacillus anthracis*\n\nการจับคู่โรค-อาชีพที่ต้องจำ:\n• **Anthrax** → ปศุสัตว์\n• **Atypical mycobacterium** → เลี้ยงสัตว์น้ำ\n• **Sporotrichosis** → ทำสวน\n• **Candida infection** → อาชีพที่ต้องอยู่ในที่ชื้น"}, {"topic": "Biological Hazard", "q": "A gardener develops a nodular lesion ascending along lymphatics after a thorn prick. Which infection is MOST likely?", "choices": ["Cutaneous anthrax", "Erysipeloid", "Sporotrichosis", "Tularaemia", "Cat-scratch disease"], "ans": 2, "exp": "**Sporotrichosis** (*Sporothrix schenckii*) เป็นเชื้อราที่พบในดินและพืช เข้าสู่ผิวหนังผ่านบาดแผลจากหนามหรือเศษไม้ — เป็น occupational skin infection คลาสสิกของ **อาชีพทำสวน**\n\nลักษณะเด่นคือ **lymphocutaneous pattern** — ตุ่มนูนไล่ขึ้นตามแนวท่อน้ำเหลือง (sporotrichoid spread) จากตำแหน่งที่เชื้อเข้า"}, {"topic": "Biological Hazard", "q": "Which infection is an occupational risk for aquaculture and fish-tank workers?", "choices": ["Histoplasmosis", "Legionellosis", "Q fever", "Atypical mycobacterial infection", "Brucellosis"], "ans": 3, "exp": "**Atypical mycobacterium infection** (เช่น *Mycobacterium marinum*) พบในอาชีพ **เลี้ยงสัตว์น้ำ** — เชื้อเข้าทางบาดแผลขณะสัมผัสน้ำหรือปลา ทำให้เกิดตุ่มนูนเรื้อรังที่มือและแขน (fish tank granuloma)\n\nเป็นหนึ่งใน occupational skin infection ที่ต้องจับคู่กับอาชีพให้ได้"}, {"topic": "Biological Hazard", "q": "Which biological exposure is a specific occupational hazard for healthcare and laboratory personnel?", "choices": ["Silica dust from stone cutting", "Isocyanate vapour from spray painting", "Whole-body vibration from heavy machinery", "Hexavalent chromium from electroplating", "Blood-borne pathogens from needlestick injury"], "ans": 4, "exp": "**สิ่งคุกคามทางชีวภาพ (Biological hazard)** ในการซักประวัติอาชีวเวชศาสตร์ระบุชัดว่าครอบคลุม **การสัมผัสเชื้อโรค เลือด และสัตว์ทดลอง** — สำหรับบุคลากรทางการแพทย์หรือห้องปฏิบัติการ\n\nตัวเลือกอื่นเป็นสิ่งคุกคามคนละหมวด: silica และ chromium = chemical, isocyanate = chemical (ก่อ occupational asthma), vibration = physical"}, {"topic": "Biological Hazard", "q": "Which occupational skin infection is associated with persistently wet or humid working conditions?", "choices": ["Candida infection", "Cutaneous anthrax", "Sporotrichosis", "Atypical mycobacterial infection", "Erythrasma"], "ans": 0, "exp": "**Candida infection** พบในอาชีพที่ต้อง **อยู่ในที่ชื้น** หรือมือเปียกน้ำตลอดเวลา เช่น พ่อครัว แม่บ้าน พนักงานล้างจาน คนงานแปรรูปอาหาร\n\nความชื้นเรื้อรังทำลาย skin barrier และสร้างสภาวะที่เหมาะกับการเจริญของยีสต์ มักเกิดที่ซอกนิ้วและรอบเล็บ (chronic paronychia)"}, {"topic": "Psychosocial Hazard", "q": "In Karasek's Job Strain Model, which combination produces the HIGHEST strain?", "choices": ["High job demand with high job control", "High job demand with low job control", "Low job demand with low job control", "Low job demand with high job control", "Moderate job demand with moderate job control"], "ans": 1, "exp": "**Karasek's Job Strain Model (1979)** แบ่งตาม 2 แกน: **Job Demand** × **Job Control (decision latitude)**\n\n| | Control ต่ำ | Control สูง |\n|---|---|---|\n| **Demand สูง** | **High Strain Job** ⚠️ | Active Job |\n| **Demand ต่ำ** | Passive Job | Low Strain Job |\n\n**High Strain Job (demand สูง + control ต่ำ)** เครียดที่สุด เสี่ยงโรคหัวใจและซึมเศร้า — ส่วน social support เป็นตัวแปรที่ 3 ที่ช่วยลด strain (ถ้าขาดด้วยจะเป็น **iso-strain**)"}, {"topic": "Psychosocial Hazard", "q": "In Karasek's model, a job with high demand AND high control is classified as:", "choices": ["High strain job", "Passive job", "Active job", "Low strain job", "Iso-strain job"], "ans": 2, "exp": "**Active Job** = demand สูง + control สูง — เป็นงานที่ **ท้าทายและเรียนรู้ได้ดี** เพราะแม้จะมีภาระงานมาก แต่ผู้ทำงานมีอำนาจตัดสินใจว่าจะจัดการอย่างไร จึงไม่เกิด strain\n\nต่างจาก **Passive Job** (demand ต่ำ + control ต่ำ) ที่ทำให้เฉื่อยชาและทักษะถดถอย และ **High Strain Job** (demand สูง + control ต่ำ) ที่เครียดที่สุด"}, {"topic": "Psychosocial Hazard", "q": "A worker deliberately feigns illness to obtain compensation. This behaviour is termed:", "choices": ["Factitious disorder", "Somatoform disorder", "Conversion disorder", "Malingering", "Hypochondriasis"], "ans": 3, "exp": "**Malingering** = **แกล้งป่วยโดยเจตนา เพื่อผลประโยชน์ภายนอก** (เงินชดเชย ลางาน หลีกเลี่ยงงาน) — สำคัญมากในงานอาชีวเวชศาสตร์เพราะเกี่ยวกับการเรียกร้องค่าทดแทน\n\nแยกจาก:\n• **Factitious disorder** — แกล้งป่วยโดยเจตนาแต่ **ไม่มีผลประโยชน์ภายนอก** (ต้องการบทบาทผู้ป่วย)\n• **Somatoform disorder** — มีอาการทางกายจริงโดยไม่มีพยาธิสภาพ **ผู้ป่วยไม่ได้แกล้ง**"}, {"topic": "Psychosocial Hazard", "q": "Which condition involves genuine physical symptoms WITHOUT intentional deception and WITHOUT demonstrable pathology?", "choices": ["Malingering", "Factitious disorder", "Substance-induced disorder", "Antisocial personality disorder", "Somatoform disorder"], "ans": 4, "exp": "**Somatoform disorder** — ผู้ป่วยมีอาการทางกายจริงและ **ทุกข์ทรมานจริง** แต่ตรวจไม่พบพยาธิสภาพที่อธิบายได้ และ **ผู้ป่วยไม่ได้แกล้งหรือจงใจหลอก**\n\nนี่คือจุดแยกสำคัญจาก malingering และ factitious disorder ซึ่งทั้งคู่เป็นการ **จงใจ** สร้างอาการ — ต่างกันแค่ว่ามีผลประโยชน์ภายนอกหรือไม่"}, {"topic": "Psychosocial Hazard", "q": "Which is an OSHA-recognised risk factor for external workplace violence?", "choices": ["Handling cash during the exchange of money", "Working in a climate-controlled office", "Sharing a workstation with a colleague", "Attending mandatory annual safety training", "Using standardised written work procedures"], "ans": 0, "exp": "**External Workplace Violence risk factors (OSHA)** ที่ต้องจำ: **contact with the public**, **exchange of money / cash handling**, delivery of passengers, goods or services, **mobile workplace** (แท็กซี่ รถตำรวจ), working with unstable or volatile persons (งานสาธารณสุข สังคมสงเคราะห์ กระบวนการยุติธรรม), **working alone**, **working late at night or early morning**, **working in high-crime areas**, **guarding valuable property** (รปภ.), working in community-based settings\n\nการรับ-จ่ายเงินสดเป็นปัจจัยคลาสสิกเพราะดึงดูดการปล้น"}, {"topic": "Psychosocial Hazard", "q": "Internal workplace violence is influenced by which three groups of factors?", "choices": ["Cash handling, mobile workplace, and night-shift scheduling", "Personal factors, the work environment, and ineffective management", "Job demand, job control, and social support at work", "Predisposing factors, precipitating factors, and noxious insult", "Force, posture, and repetition during the work cycle"], "ans": 1, "exp": "**Internal Workplace Violence** (ความรุนแรงจากภายในหน่วยงาน เช่น เพื่อนร่วมงาน หัวหน้า) มีปัจจัย 3 กลุ่ม:\n1. **Personal factors**\n2. **The work environment**\n3. **Ineffective management in an organization**\n\nต่างจาก **External workplace violence** ที่มาจากบุคคลภายนอก (ผู้รับบริการ โจร/ผู้ก่อการร้าย) ซึ่งใช้ชุด risk factors ของ OSHA"}, {"topic": "Psychosocial Hazard", "q": "Which psychiatric disorder is commonly encountered in the workplace setting?", "choices": ["Huntington disease", "Wilson disease", "Major depressive disorder", "Creutzfeldt-Jakob disease", "Normal pressure hydrocephalus"], "ans": 2, "exp": "โรคทางจิตเวชที่พบบ่อยในที่ทำงาน: **Major depressive disorder**, **Bipolar disorder**, **Generalized anxiety disorder (GAD)**, **Post-traumatic stress disorder (PTSD)**\n\nผลกระทบต่อการทำงานเกิดผ่านวงจร: ยา (drugs) → ผลข้างเคียง (side effects) → **ลดประสิทธิภาพการทำงาน (performance)** — จึงต้องพิจารณาทั้งตัวโรคและผลของการรักษา"}, {"topic": "Psychosocial Hazard", "q": "Which service is designed to provide confidential counselling and support to employees?", "choices": ["Hearing Conservation Program", "Incident Command System", "Hazard Communication Standard", "Employee Assistance Program (EAP)", "Return-to-Work Certification"], "ans": 3, "exp": "**EAP (Employee Assistance Program)** เป็นระบบช่วยเหลือพนักงาน ให้คำปรึกษาด้านสุขภาพจิต ความเครียด ปัญหาครอบครัว และการใช้สารเสพติด โดยรักษาความลับ\n\nตัวเลือกอื่นเป็นระบบคนละด้าน: Hearing Conservation Program = อนุรักษ์การได้ยิน, ICS = บัญชาการเหตุฉุกเฉิน, HazCom = การสื่อสารข้อมูลสารเคมี"}, {"topic": "Occupational Lung Disease", "q": "Particles of which size range are able to reach the alveoli?", "choices": ["10 to 20 micrometres", "20 to 50 micrometres", "50 to 100 micrometres", "Greater than 100 micrometres", "Less than 5 micrometres"], "ans": 4, "exp": "**ฝุ่นขนาด < 5 ไมครอน (respirable fraction)** จึงจะหลุดรอดลงถึง **ถุงลม (alveoli)** และก่อ pneumoconiosis ได้\n\nตารางการตกของอนุภาค: ≥ 10 µm ตกที่ทางเดินหายใจส่วนบน, 5.8–10 µm หลอดลมใหญ่, 3.3–4.7 µm หลอดลมเล็ก, 1.1–2.1 µm terminal bronchiole, **0.43–1.1 µm ถึงถุงลม**\n\nเมื่อถึงถุงลมแล้ว macrophage จะมากินแต่ทำลายไม่ได้ → หลั่ง cytokines → fibrosis"}, {"topic": "Occupational Lung Disease", "q": "Which zonal distribution is characteristic of silicosis on chest radiograph?", "choices": ["Upper zone predominant nodules", "Lower zone predominant reticulation", "Diffuse uniform ground-glass opacification", "Perihilar bat-wing consolidation", "Peripheral subpleural honeycombing at the bases"], "ans": 0, "exp": "**Silicosis (และ CWP) = Upper zone predominant nodules** — พบ well-defined nodules ขนาดเล็กที่ปอดส่วนบนทั้งสองข้าง\n\nตรงข้ามกับ **Asbestosis = Lower zone (basilar) predominant reticulation** ซึ่งเป็นจุดแยกที่ออกสอบบ่อยมาก\n\nจำ: **หิน/ถ่านหิน = บน, ใยหิน = ล่าง**"}, {"topic": "Occupational Lung Disease", "q": "Which distribution is characteristic of asbestosis?", "choices": ["Upper zone predominant well-defined nodules", "Lower zone predominant reticulation with subpleural involvement", "Unilateral apical cavitary consolidation", "Perihilar nodular infiltration sparing the periphery", "Diffuse miliary nodules of uniform size throughout"], "ans": 1, "exp": "**Asbestosis = basilar (lower zone) predominant reticulation** — CT พบ **peripheral subpleural reticulation + architectural distortion + traction bronchiectasis** โดย **honeycombing พบเป็นส่วนน้อยของ cases**\n\nนี่คือจุดแยกจาก silicosis/CWP ที่เป็น upper zone และเป็น nodular pattern"}, {"topic": "Occupational Lung Disease", "q": "According to Thai diagnostic criteria for silicosis, at least how many of the three criteria must be met?", "choices": ["One of three", "All three", "Two of three", "Three of five", "Four of five"], "ans": 2, "exp": "**เกณฑ์วินิจฉัย Silicosis ของไทยใช้ 2 ใน 3 ข้อ**:\n1. มีประวัติทำงานอาชีพเสี่ยงสัมผัสฝุ่นหิน **อย่างน้อย 2 ปี**\n2. ภาพรังสีทรวงอกผิดปกติตั้งแต่ **profusion 1/1 ขึ้นไป** ตามเกณฑ์ **ILO Classification of Radiographs of Pneumoconioses 2000**\n3. มีลักษณะทางพยาธิวิทยาของเนื้อปอดเข้าได้กับโรค **หรือ** มีข้อมูลระบาดวิทยาสนับสนุน"}, {"topic": "Occupational Lung Disease", "q": "What is the minimum ILO profusion grade required for the radiographic criterion of silicosis in Thailand?", "choices": ["0/0", "0/1", "2/2", "1/1", "3/3"], "ans": 3, "exp": "เกณฑ์ภาพรังสีของไทยกำหนดว่าต้องผิดปกติตั้งแต่ **profusion 1/1 ขึ้นไป** ตาม **ILO Classification of Radiographs of Pneumoconioses 2000**\n\nระบบ ILO ใช้ **ILO Reading Sheet** มาตรฐาน แบ่งเป็น **small opacities** และ **large opacities** โดย profusion บอกความหนาแน่นของ opacity ในปอด"}, {"topic": "Occupational Lung Disease", "q": "A stone carver with known silicosis develops cavitation within a large opacity. What must be excluded FIRST?", "choices": ["Progression to simple silicosis of higher profusion grade", "Development of chronic obstructive pulmonary disease", "Onset of hypersensitivity pneumonitis from organic dust", "Acute toxic inhalation injury from a solvent exposure", "Superimposed mycobacterial infection or malignancy"], "ans": 4, "exp": "**Cavitation ใน large opacities ต้องสงสัยการติดเชื้อหรือมะเร็งเสมอ** แม้ว่า PMF (progressive massive fibrosis) เองก็ cavitate ได้\n\nภาวะแทรกซ้อนสำคัญของ silicosis:\n1. **การติดเชื้อ — TB (silicotuberculosis) และ Nontuberculous mycobacteria (NTM)** เช่น culture ขึ้น *M. avium* complex\n2. **Lung cancer** — โดยเฉพาะ mass ที่เกิดกลางเนื้อปอดและไม่มี architectural distortion (PMF มักเกิดที่ขอบปอดและมี distortion)"}, {"topic": "Occupational Lung Disease", "q": "Which statement about coal workers' pneumoconiosis (CWP) is CORRECT?", "choices": ["It is radiographically indistinguishable from simple silicosis", "It characteristically produces lower zone honeycombing on CT", "It is caused by a hypersensitivity reaction to organic dust antigens", "It reverses completely once the worker leaves the mining industry", "It presents with pleural plaques as the earliest radiographic sign"], "ans": 0, "exp": "**CWP แยกจาก simple silicosis ทางภาพรังสีไม่ได้ (radiographically indistinguishable)** — ทั้งคู่เป็น **upper-zone predominant centrilobular และ perilymphatic nodules**\n\nแม้ตำราจะบรรยายว่า nodule ของ CWP **less well-defined** กว่า simple silicosis แต่ในทางปฏิบัติแยกไม่ได้ ต้องอาศัยประวัติการทำงาน\n\nและเมื่อเกิดพังผืดแล้ว **มักไม่กลับคืนสู่สภาพปกติ (irreversible)**"}, {"topic": "Occupational Lung Disease", "q": "Which malignancy is specifically associated with asbestos through chronic inflammation rather than direct DNA damage?", "choices": ["Acute myeloid leukaemia", "Malignant mesothelioma", "Renal cell carcinoma", "Papillary thyroid carcinoma", "Hepatocellular carcinoma"], "ans": 1, "exp": "**Mesothelioma (มะเร็งเยื่อหุ้มปอด)** เกิดจากกลไก **Non-genotoxic / Chronic Inflammation** — แร่ใยหิน (asbestos) ทิ่มแทงเยื่อหุ้มปอด ทำให้เกิดการระคายเคืองและอักเสบเรื้อรังรุนแรง นำไปสู่การกระตุ้นสารเร่งการเจริญเติบโตของเซลล์\n\nต่างจาก **Benzene** ที่เป็น **genotoxic** — ทำลาย DNA โดยตรงจนเกิด mutation → **AML**"}, {"topic": "Occupational Lung Disease", "q": "Which is the MOST common occupational respiratory disease in industrialised countries?", "choices": ["Silicosis", "Asbestosis", "Occupational asthma", "Coal workers' pneumoconiosis", "Chronic beryllium disease"], "ans": 2, "exp": "**Occupational asthma เป็นโรคทางเดินหายใจจากการทำงานที่พบบ่อยที่สุดในประเทศอุตสาหกรรม**\n\nสาเหตุ: สัมผัสสารก่อภูมิแพ้หรือสารระคายเคือง เช่น **isocyanates, latex, แป้งสาลี, ฝุ่นไม้, เอนไซม์อุตสาหกรรม, สัตว์ทดลอง**\n\nลักษณะเด่น: **อาการดีขึ้นในวันหยุด/เมื่อหยุดงาน และกำเริบเมื่อกลับเข้าสู่สภาพแวดล้อมเดิม**"}, {"topic": "Occupational Lung Disease", "q": "Why is early detection of occupational asthma particularly important?", "choices": ["The condition is invariably fatal within five years if untreated", "Diagnosis becomes impossible once symptoms persist beyond one year", "Inhaled corticosteroids lose all effectiveness after the first year", "Early removal from exposure can reverse the disease", "The disease becomes transmissible to co-workers over time"], "ans": 3, "exp": "**Surveillance และ early detection สำคัญมาก เพราะการนำออกจากการสัมผัสตั้งแต่เนิ่นๆ สามารถทำให้โรคหายได้ (reversible)**\n\nนี่ต่างจาก pneumoconiosis ที่เมื่อเกิดพังผืดแล้วมักกลับคืนไม่ได้ — จึงเป็นเหตุผลว่าทำไม occupational asthma จึงคุ้มค่าที่จะทำ surveillance เชิงรุก\n\nการวินิจฉัยใช้ **spirometry** ส่วน imaging ไม่จำเพาะ (อาจพบ bronchial wall thickening, mosaic attenuation, expiratory air trapping)"}, {"topic": "Occupational Lung Disease", "q": "Hypersensitivity pneumonitis is MOST commonly caused by which category of antigen?", "choices": ["Crystalline mineral dusts such as silica and asbestos", "Heavy metal fumes such as lead and cadmium", "Ionizing radiation from radon daughter products", "Physical particulates larger than 20 micrometres", "Organic antigens such as bacteria, fungi and bird proteins"], "ans": 4, "exp": "**Hypersensitivity Pneumonitis (Extrinsic Allergic Alveolitis)** เกิดจากการสูดดม antigen ในผู้ที่ถูก sensitize แล้ว\n\nสาเหตุ:\n• **Organic antigens — พบบ่อยที่สุด**: **แบคทีเรีย ยีสต์ เชื้อรา และโปรตีนจากนก**\n• **Low molecular weight chemicals**: zinc, inks, dyes, isocyanates\n\nตัวอย่างคลาสสิก: Farmer's lung, Bird fancier's lung, Humidifier lung, Bagassosis"}, {"topic": "Occupational Lung Disease", "q": "A welder develops fever, chills, myalgia and cough that resolve within 48 hours of leaving work. What is the diagnosis?", "choices": ["Metal fume fever", "Silicosis", "Occupational asthma", "Hypersensitivity pneumonitis", "Acute respiratory distress syndrome"], "ans": 0, "exp": "**Metal fume fever** อยู่ในกลุ่ม **Inhalation Fever Syndromes** ซึ่งได้แก่ metal fume fever (จากงานเชื่อมโลหะ — zinc oxide), **polymer fume fever** (จาก PTFE/Teflon), และ **organic dust toxic syndrome (ODTS)**\n\nอาการสำคัญ: **ไข้ หนาวสั่น ปวดกล้ามเนื้อ และไอ** และ **มักหายเองภายใน 24–48 ชั่วโมงหลังหยุดสัมผัส (self-limited)** — จุดนี้แยกจาก HP และ occupational asthma ที่ไม่หายเร็วขนาดนี้"}, {"topic": "Occupational Lung Disease", "q": "How does smoking interact with occupational carcinogen exposure in lung cancer risk?", "choices": ["The combined risk is additive, equalling the sum of individual risks", "The combined risk is synergistic, exceeding the sum of individual risks", "Smoking has no measurable effect on occupational carcinogen risk", "Smoking reduces risk by increasing mucociliary clearance of particles", "The two risks are mutually exclusive and cannot coexist"], "ans": 1, "exp": "**การสูบบุหรี่ร่วมกับการสัมผัสสารก่อมะเร็งจากการทำงานเพิ่มความเสี่ยงแบบ SYNERGISTIC EFFECT (เสริมฤทธิ์)** — ไม่ใช่แค่บวกกัน แต่คูณกัน\n\nตัวอย่างคลาสสิกคือ **asbestos + smoking** ที่เพิ่มความเสี่ยง lung cancer หลายสิบเท่า\n\nสารก่อมะเร็งปอดจากการทำงานที่ต้องจำ: **asbestos, crystalline silica, arsenic, hexavalent chromium Cr(VI), nickel, ควันไอเสียดีเซล, รังสี radon**"}, {"topic": "Occupational Skin Disease", "q": "Which test is used to diagnose ALLERGIC CONTACT DERMATITIS (type IV hypersensitivity)?", "choices": ["Skin prick test", "Radioallergosorbent test", "Patch test", "Serum total IgE measurement", "Complete blood count with differential"], "ans": 2, "exp": "**Patch test** ใช้วินิจฉัย **allergic contact dermatitis (Type IV, delayed hypersensitivity)**\n\nวิธีทำ: แปะ standard allergens + allergen ที่สงสัยที่ **ด้านหลัง** นาน **48 ชั่วโมง** แล้ว **อ่านผลที่ 48 และ 72 ชั่วโมง** — ผลบวกจะมีผื่น **erythematous papule, vesicle หรือ bullae**\n\nต่างจาก **skin prick test** ที่ใช้กับ Type I (contact urticaria, protein contact dermatitis) และอ่านผลที่ 15–20 นาที"}, {"topic": "Occupational Skin Disease", "q": "At which time points should a patch test be read?", "choices": ["15 and 20 minutes", "6 and 12 hours", "24 hours only", "48 and 72 hours", "7 and 14 days"], "ans": 3, "exp": "**Patch test อ่านผลที่ 48 และ 72 ชั่วโมง** (แปะไว้ 48 ชั่วโมงก่อน แล้วอ่านสองครั้ง)\n\nเหตุผลที่ต้องอ่านสองครั้ง: ปฏิกิริยา Type IV เป็นแบบ **delayed** บาง allergen ให้ผลบวกช้า ถ้าอ่านครั้งเดียวที่ 48 ชั่วโมงอาจพลาด และการอ่านที่ 72 ชั่วโมงยังช่วยแยก irritant reaction (ซึ่งมักจางลง) ออกจาก allergic reaction (ซึ่งมักคงอยู่หรือเพิ่มขึ้น)"}, {"topic": "Occupational Skin Disease", "q": "Which precaution is essential when performing a skin prick test?", "choices": ["The patient must fast for at least eight hours beforehand", "The test must be performed only on the upper back", "Results must not be read until 48 hours have elapsed", "The patient must discontinue topical emollients for two weeks", "Resuscitation drugs and equipment must be immediately available"], "ans": 4, "exp": "**Skin prick test ทดสอบ immediate-type (Type I) hypersensitivity ซึ่งทำให้เกิด anaphylaxis ได้** จึงต้องมี **ยาและอุปกรณ์ช่วยชีวิตอยู่ในที่ที่นำมาใช้ได้ทันท่วงที**\n\nและ **ไม่ทำ prick test ในรายที่เคยมีอาการ systemic มาก่อน**\n\nวิธีทำ: หยด allergen ที่ **ท้องแขน** ใช้ **NSS เป็น negative control** และ **histamine เป็น positive control** สะกิดด้วย lancet อ่านผล **15–20 นาที** — ผลบวกคือ **wheal** ขนาดใกล้เคียงหรือใหญ่กว่า positive control"}, {"topic": "Occupational Skin Disease", "q": "Which test is the SAFEST method for detecting immediate-type hypersensitivity, and is preferred in suspected latex allergy?", "choices": ["Radioallergosorbent test (RAST)", "Skin prick test", "Patch test", "Use test", "Intradermal provocation test"], "ans": 0, "exp": "**RAST (Radioallergosorbent test)** เป็นการทดสอบ immediate-type hypersensitivity ที่ **ปลอดภัยที่สุด** เพราะทำนอกร่างกาย — เอา **serum** ไปตรวจหา **specific IgE** จึงไม่เสี่ยง anaphylaxis\n\n**นิยมตรวจในคนที่สงสัย latex allergy**\n\n**ข้อเสียคือความไวต่ำ** — หากให้ผลลบแต่ประวัติบ่งชี้ ควรทดสอบ use test และ prick test ต่อไป"}, {"topic": "Occupational Skin Disease", "q": "Which finding is characteristic of CHLORACNE?", "choices": ["Painful pustules confined to the palms and soles with surrounding erythema", "Lesions at the malar area, behind the ears, axillae and scrotum without surrounding inflammation", "Symmetrical scaling plaques over the extensor surfaces with silvery scale", "Annular lesions with central clearing spreading centrifugally from the trunk", "Vesicles along a single dermatome preceded by burning pain"], "ans": 1, "exp": "**Chloracne** จากการสัมผัส **halogenated hydrocarbon** ในยาฆ่าแมลงและน้ำยาฆ่าเชื้อ มีลักษณะเฉพาะ 5 ข้อ:\n1. ประวัติสัมผัสสาร **2–8 สัปดาห์** ก่อนมีอาการ\n2. **ไม่มี inflammation รอบผื่น**\n3. **lesion บริเวณหางตา หลังหู รักแร้ ลูกอัณฑะ**\n4. เกิดในทุกกลุ่มอายุ\n5. **Meibomian gland involvement**, comedone ขนาดใหญ่ และ **straw-color cyst**\n\nตัวอย่างประวัติศาสตร์: อดีตประธานาธิบดียูเครน Viktor Yushchenko"}, {"topic": "Occupational Skin Disease", "q": "Which allergen in cement is a common cause of allergic contact dermatitis in construction workers?", "choices": ["Latex protein", "Para-phenylenediamine", "Chromate", "Glyceryl monothioglycolate", "Coconut diethanolamide"], "ans": 2, "exp": "**Chromate** เป็นสารก่อภูมิแพ้ที่พบใน **ปูนซีเมนต์และการฟอกหนัง** — ทำให้เกิด allergic contact dermatitis ในคนงานก่อสร้าง\n\nกลไกคือ **Type IV Hypersensitivity (Cell-mediated)** ซึ่งเป็นปฏิกิริยาแบบช้า เกิดหลังสัมผัสสาร **24–48 ชั่วโมง** — เช่นเดียวกับ **นิกเกิล** ในปูนซีเมนต์\n\nสารก่อภูมิแพ้อื่น: PPD (ยาย้อมผม), thiurams (ยาง), epoxy resin (กาว), glyceryl monothioglycolate (น้ำยาดัดผม)"}, {"topic": "Occupational Skin Disease", "q": "Which criterion supports a diagnosis of occupational dermatosis (Mathias criteria)?", "choices": ["The rash appears only during annual leave periods", "The rash is distributed symmetrically over covered body sites", "The rash first appeared several years before employment began", "The rash improves when the worker is away from work", "Patch testing to all standard allergens is negative"], "ans": 3, "exp": "**เกณฑ์วินิจฉัย Occupational Dermatoses (Mathias)** 7 ข้อ:\n1. อาการแสดงเข้าได้กับ contact dermatitis\n2. มีประวัติสัมผัสสารก่อภูมิแพ้หรือสารระคายเคืองระหว่างทำงาน\n3. **ผื่นเกิดที่ตำแหน่งที่สัมผัสสาร**\n4. ผื่นเกิดภายหลังเริ่มทำงานในระยะเวลาที่เหมาะสม\n5. ไม่พบสาเหตุอื่นนอกเหนือจากการทำงาน\n6. **อาการดีขึ้นเมื่อหยุดงานหรือไม่ได้สัมผัสสาร** ← ข้อนี้\n7. Patch test หรือ provocative test ให้ผลบวก"}, {"topic": "Occupational Skin Disease", "q": "Chronic occupational arsenic exposure predisposes to which skin condition?", "choices": ["Chloracne with straw-coloured cysts", "Acute urticarial wheals on exposed skin", "Vibration-induced digital blanching", "Candidal intertrigo of the finger webs", "Bowen disease (squamous cell carcinoma in situ)"], "ans": 4, "exp": "**Chronic arsenic toxicity** ทำให้เกิด hyperpigmentation, hyperkeratosis, **Bowen's disease (SCC in situ)** และ **skin cancer**\n\nสารเคมีก่อมะเร็งผิวหนังจากการทำงานที่ต้องจำคือ **coal tar และ arsenic** — ส่วนคนผิวขาวที่ทำงานกลางแจ้งถูกแดดนานเสี่ยงต่อ **BCC และ SCC** จาก UV\n\nChloracne เกิดจาก halogenated hydrocarbon ไม่ใช่ arsenic"}, {"topic": "Walkthrough Survey", "q": "A walkthrough survey should be conducted under which condition?", "choices": ["While production is running and workers are actually at their tasks", "During the scheduled maintenance shutdown when machinery is stopped", "Immediately after the end of the shift when the area has been cleared", "On a public holiday when the plant is empty and access is unrestricted", "Before the plant is commissioned and any workers are recruited"], "ans": 0, "exp": "การเดินสำรวจสถานประกอบการต้องทำ **ขณะกำลังดำเนินการผลิต** และ **มีผู้ปฏิบัติงานทำงานอยู่จริง**\n\nเหตุผล: ถ้าเครื่องจักรหยุดหรือไม่มีคนงาน จะไม่เห็นสิ่งคุกคามที่เกิดขึ้นจริง เช่น ระดับเสียง ฝุ่นที่ฟุ้งกระจาย ท่าทางการทำงาน และการใช้ PPE จริงของคนงาน"}, {"topic": "Walkthrough Survey", "q": "Which is a recognised benefit of the workplace walkthrough survey?", "choices": ["It replaces the need for individual health examinations", "It assists in the diagnosis of occupational disease", "It certifies the factory as compliant with international standards", "It determines the compensation amount payable to injured workers", "It establishes the legal liability of the employer for past exposures"], "ans": 1, "exp": "ประโยชน์ของการเดินสำรวจ 6 ข้อ:\n1. **ช่วยวินิจฉัยโรคจากการทำงาน**\n2. ประเมินความสำเร็จในการควบคุมสิ่งคุกคาม\n3. เป็นข้อมูลพื้นฐานในการดำเนินงานควบคุมสิ่งคุกคาม\n4. วิเคราะห์หาสาเหตุของโรค/อุบัติเหตุ\n5. ใช้บริหารจัดการความเสี่ยง\n6. ตรวจสอบการปฏิบัติตามกฎหมาย\n\nการเดินสำรวจ **เสริม** ไม่ใช่ **แทนที่** การตรวจสุขภาพรายบุคคล"}, {"topic": "Walkthrough Survey", "q": "In which situation is a survey of ALL departments (rather than a focused survey) indicated?", "choices": ["When a new machine is installed on one production line", "When investigating a single reported case of injury", "When a physician is newly assigned to that workplace", "When assessing readiness of one worker to return to duty", "When one production process has recently been modified"], "ans": 2, "exp": "**สำรวจทุกแผนก** เมื่อ: **เข้าประจำสถานประกอบการนั้นครั้งแรก**, สถานประกอบการเปิดใหม่, ออกแบบการตรวจสุขภาพ\n\n**สำรวจเฉพาะจุด** เมื่อ: เครื่องจักรใหม่/เปลี่ยนกระบวนการผลิต, เกิดการเจ็บป่วยหรือบาดเจ็บ (สอบสวนโรค/อุบัติเหตุ), ประเมินความพร้อมก่อนกลับเข้างาน (return to work)\n\nหลักคิด: ถ้าต้องการภาพรวมทั้งโรงงาน → ทุกแผนก; ถ้ามีประเด็นเฉพาะ → เฉพาะจุด"}, {"topic": "Walkthrough Survey", "q": "Which preparation is recommended before entering a factory for a walkthrough survey?", "choices": ["Wear loose flowing clothing to remain comfortable in the heat", "Carry a camera and photograph freely to save survey time", "Separate from the group to cover more area independently", "Wear closed-toe shoes and remove jewellery including watches", "Wear open sandals to allow rapid removal if chemicals spill"], "ans": 3, "exp": "การเตรียมตัวก่อนเข้าสถานประกอบการ: ศึกษาข้อมูลพื้นฐาน (สถานประกอบการ + กระบวนการผลิต), เตรียมร่างกายและจิตใจ, **แต่งกายรัดกุมและรวบมัดผม**, **งดเครื่องประดับ (อาจรวมถึงนาฬิกา)**, **ใส่รองเท้าหุ้มส้น ไม่ใส่ส้นสูง**\n\nเหตุผล: เสื้อผ้าหลวมและเครื่องประดับอาจถูกเครื่องจักรเกี่ยวดึง ส่วนรองเท้าเปิดไม่ป้องกันของหล่นหรือสารเคมีหก"}, {"topic": "Walkthrough Survey", "q": "What must be done BEFORE photographing or interviewing workers during a survey?", "choices": ["Notify the Ministry of Labour in writing", "Complete the closing meeting with management", "Submit a written report to the safety officer", "Obtain individual written consent from every employee present", "Obtain permission from the establishment"], "ans": 4, "exp": "ข้อควรปฏิบัติระบุชัดว่าต้อง **ขออนุญาตก่อนถ่ายรูป/วิดีโอ หรือการซักถามคนงาน**\n\nข้อควรปฏิบัติอื่น: แสดงทัศนคติที่ดีต่อสถานประกอบการ (**ไม่วิพากษ์/ตำหนิติเตียน**), สำรวมกิริยาวาจา ไม่พูดคุยหยอกล้อหรือรวมกลุ่มคุยกันเอง, ถามเหตุผลและให้ความเห็นเชิงวิชาการ, และ **กรณีไม่แน่ใจต้องไม่รีบด่วนสรุป**"}, {"topic": "Walkthrough Survey", "q": "During the survey, the surveyor is uncertain about a potential hazard. What is the APPROPRIATE action?", "choices": ["Ask further questions and request detailed measurement", "Record the observation as a confirmed hazard in the report", "Advise the workers immediately to stop that operation", "Note it as normal since no worker has complained so far", "Consult the internet on site and issue an opinion at once"], "ans": 0, "exp": "ข้อควรปฏิบัติระบุว่า **กรณีไม่แน่ใจต้องไม่รีบด่วนสรุป** ให้ **ซักถามเพิ่มเติม** และ **ขอตรวจวัดโดยละเอียด**\n\nการด่วนสรุปว่าเป็นอันตรายหรือไม่เป็นอันตราย ทั้งสองอย่างล้วนผิด — อย่างแรกทำลายความสัมพันธ์กับสถานประกอบการโดยไม่มีหลักฐาน อย่างหลังปล่อยให้คนงานเสี่ยงต่อไป"}, {"topic": "Walkthrough Survey", "q": "The walkthrough survey consists of which three stages?", "choices": ["Sampling, laboratory analysis, and statistical reporting", "Opening meeting, the walk itself, and closing meeting", "Screening, diagnosis, and rehabilitation of affected workers", "Notification, inspection, and prosecution of the employer", "Hazard identification, dose-response, and risk characterisation"], "ans": 1, "exp": "ขั้นตอนการสำรวจสถานประกอบการมี 3 ระยะ:\n1. **ประชุมก่อนเดินสำรวจ (opening meeting)** — ชี้แจงวัตถุประสงค์ ขอบเขต และขออนุญาต\n2. **เดินสำรวจ**\n3. **ประชุมปิดการเดินสำรวจ (closing meeting)** — สรุปสิ่งที่พบเบื้องต้นและแนวทางถัดไป\n\nส่วน Hazard identification → dose-response → risk characterisation เป็นขั้นตอนของ **health risk assessment** ไม่ใช่ขั้นตอนการเดินสำรวจ"}, {"topic": "Walkthrough Survey", "q": "Which safety practice applies when entering a hazardous zone during a survey?", "choices": ["Move ahead of the group to observe the process before it changes", "Ignore posted signage as it applies only to permanent employees", "Stay with the group following the establishment's representative", "Remove protective equipment to obtain clearer photographs", "Split into pairs to complete the survey more efficiently"], "ans": 2, "exp": "ขณะเข้าเขตเสี่ยงต่ออันตราย: ปฏิบัติตามกฎความปลอดภัยอย่างเคร่งครัด, รับฟังขั้นตอนปฏิบัติเมื่อมีเหตุฉุกเฉิน, สังเกตป้าย (เครื่องหมายห้าม/เตือน/บังคับ/สารนิเทศ), **รวมกลุ่มเดินตามตัวแทนสถานประกอบการ**, และ **ควรรอกันและไม่แยกออกจากกลุ่ม**\n\nการแยกกลุ่มเป็นสิ่งอันตรายที่สุด เพราะตัวแทนสถานประกอบการรู้จุดเสี่ยงในพื้นที่ดีที่สุด"}, {"topic": "Walkthrough Survey", "q": "Which is one of the three main objectives of a walkthrough survey?", "choices": ["Determining the insurance premium payable by the establishment", "Certifying individual workers as fit for their assigned duties", "Measuring the annual productivity of each production line", "Understanding raw materials, production process and work practices", "Auditing the financial records of the safety department"], "ans": 3, "exp": "วัตถุประสงค์ของการเดินสำรวจ 3 ข้อ:\n1. **ทำความเข้าใจเรื่อง วัตถุดิบ → กระบวนการผลิต → วิธีปฏิบัติงาน**\n2. **ค้นหาและประเมินสิ่งคุกคามสุขภาพของผู้ปฏิบัติงาน**\n3. **นำเสนอแนวทางแก้ไขป้องกัน**\n\nต้องเข้าใจกระบวนการผลิตก่อน จึงจะระบุได้ว่าสิ่งคุกคามเกิดขึ้นที่ขั้นตอนใด"}, {"topic": "Walkthrough Survey", "q": "Which sign type indicates a PROHIBITED action in the workplace?", "choices": ["A yellow triangle enclosing a black pictogram", "A blue circle containing a white pictogram", "A green rectangle containing a white pictogram", "A white square outlined in black with plain text", "A red circle with a diagonal bar across a pictogram"], "ans": 4, "exp": "เครื่องหมายความปลอดภัยที่ต้องสังเกตระหว่างเดินสำรวจ:\n• **เครื่องหมายห้าม (Prohibition)** — วงกลมแดง มีแถบทแยงพาดทับ\n• **เครื่องหมายเตือน (Warning)** — สามเหลี่ยมเหลือง ขอบดำ\

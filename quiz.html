n• **เครื่องหมายบังคับ (Mandatory)** — วงกลมน้ำเงิน ภาพสีขาว เช่น บังคับสวม PPE\n• **เครื่องหมายสารนิเทศเกี่ยวกับความปลอดภัย** — สี่เหลี่ยมเขียว เช่น ทางหนีไฟ จุดปฐมพยาบาล"}, {"topic": "Walkthrough Survey", "q": "Which is the CORRECT order of the four steps in health risk assessment?", "choices": ["Hazard identification, exposure assessment, dose-response assessment, risk characterisation", "Exposure assessment, hazard identification, risk characterisation, dose-response assessment", "Risk characterisation, dose-response assessment, exposure assessment, hazard identification", "Dose-response assessment, risk characterisation, hazard identification, exposure assessment", "Hazard identification, risk characterisation, exposure assessment, dose-response assessment"], "ans": 0, "exp": "กระบวนการ **Health Risk Assessment** 4 ขั้น:\n1. **Hazard identification** — บ่งชี้สิ่งคุกคาม\n2. **Exposure assessment** — ประเมินการสัมผัส\n3. **Dose-response assessment** — ประเมินขนาดสัมผัสกับผลกระทบที่เกิดขึ้น\n4. **Risk characterisation** — อธิบายลักษณะของความเสี่ยง\n\nต้องรู้ก่อนว่ามีสิ่งคุกคามอะไร (1) แล้วจึงดูว่าคนสัมผัสเท่าไร (2) และขนาดนั้นก่อผลอย่างไร (3) จึงสรุปความเสี่ยงได้ (4)"}, {"topic": "Risk Assessment", "q": "Health risk depends principally on which two determinants?", "choices": ["The worker's age and total years of service", "The hazard itself and the extent of exposure", "The size of the establishment and its annual revenue", "The availability of PPE and the safety budget allocated", "The distance from the workplace to the nearest hospital"], "ans": 1, "exp": "**ความเสี่ยงต่อสุขภาพ = (1) Hazard [อันตรายเพียงใด] × (2) Exposure [โอกาสเกิดมากน้อยเพียงใด]**\n\nสมการพื้นฐาน: Hazard + Host + Working environment → ผ่าน incubation period → **Harm** (physical injury / damage to health)\n\nนี่เป็นหลักการที่ใช้สร้าง risk matrix โดยแกนหนึ่งคือระดับความเป็นอันตราย อีกแกนคือโอกาสที่จะเกิด"}, {"topic": "Risk Assessment", "q": "Which are the three steps of the risk assessment process?", "choices": ["Screening, diagnosis, and rehabilitation of the affected worker", "Notification, investigation, and compensation of the claim", "Hazard identification, risk analysis and evaluation, risk control", "Sampling, analysis, and reporting of environmental specimens", "Prevention, mitigation, and recovery from the incident"], "ans": 2, "exp": "กระบวนการประเมินความเสี่ยง (Risk assessment) 3 ขั้น:\n1. **Hazard identification** — ค้นหาสิ่งคุกคามและปัจจัยเสี่ยงที่ทำให้เกิดอันตรายได้\n2. **Risk analysis and risk evaluation** — วิเคราะห์และประเมินความเสี่ยงจากสิ่งคุกคามนั้น\n3. **Risk control** — หาแนวทางที่เหมาะสมในการกำจัดสิ่งคุกคาม หรือควบคุมความเสี่ยงกรณีที่ตัดสิ่งคุกคามออกไปไม่ได้"}, {"topic": "Risk Assessment", "q": "Under the TIS 18001 severity scale, which outcome is graded as severity level 3 (major)?", "choices": ["A minor cut requiring only first aid", "Temporary headache from a nuisance odour", "A severe sprain requiring physiotherapy", "Loss of a limb or death", "Occupational asthma requiring inhaled medication"], "ans": 3, "exp": "ระดับความรุนแรงตาม **มอก.18001**:\n• **เล็กน้อย (1)** — ไม่มีการบาดเจ็บ หรือบาดเจ็บที่ต้องการเพียงปฐมพยาบาล (แผลมีดบาด แผลถลอก ระคายเคือง เคล็ดขัดยอก), สิ่งรบกวนที่ทำให้รำคาญ\n• **ปานกลาง (2)** — บาดแผลฉีกขาด แผลไฟไหม้ กระดูกร้าวเล็กน้อย ข้อเคล็ดรุนแรง, **การอักเสบ หูหนวก โรคหืด อาการผิดปกติของมือและแขน**\n• **มาก (3)** — **สูญเสียอวัยวะ กระดูกแตกหัก เสียชีวิต บาดเจ็บรุนแรง**, ได้รับพิษหรือเกิดโรคที่ทำให้อายุสั้นลง (รวม **มะเร็งจากการทำงาน**)"}, {"topic": "Risk Assessment", "q": "Under TIS 18001, occupational cancer is classified at which severity level?", "choices": ["Minor (level 1)", "Moderate (level 2)", "Negligible (level 0)", "Catastrophic (level 4)", "Major (level 3)"], "ans": 4, "exp": "**มะเร็งที่เกิดจากการทำงาน** จัดอยู่ในระดับความรุนแรง **มาก (3)** ตาม มอก.18001 — อยู่ในกลุ่ม 'การได้รับพิษหรือเกิดโรคที่เป็นแล้วทำให้อายุสั้นลง' ร่วมกับโรคร้ายแรงที่ทำให้เสียชีวิตเฉียบพลัน\n\nสังเกตว่า **โรคหืดและหูหนวก** อยู่ระดับ **ปานกลาง (2)** ไม่ใช่ระดับ 3 — เป็นจุดที่มักสับสน"}, {"topic": "Risk Assessment", "q": "In the TIS 18001 exposure scoring, exposure for more than 48 hours per week scores:", "choices": ["3 points", "1 point", "2 points", "4 points", "0 points"], "ans": 0, "exp": "เกณฑ์ประเมินโอกาสเกิด หัวข้อ **ความถี่และระยะเวลาที่สัมผัส**:\n• **สัมผัสมากกว่า 48 ชม./สัปดาห์ = 3 คะแนน**\n• สัมผัส 30–48 ชม./สัปดาห์ = 2 คะแนน\n• สัมผัสน้อยกว่า 30 ชม./สัปดาห์ = 1 คะแนน\n\nในระบบนี้ **คะแนน 3 = แย่ที่สุด, 1 = ดีที่สุด** เสมอในทุกหัวข้อทั้ง 8 หัวข้อ"}, {"topic": "Risk Assessment", "q": "In the TIS 18001 exposure scoring, exposing more than 10 workers to a hazard scores:", "choices": ["1 point", "3 points", "2 points", "5 points", "10 points"], "ans": 1, "exp": "เกณฑ์หัวข้อ **จำนวนคนที่สัมผัสหรือจำนวนคนที่ปฏิบัติงานนั้น**:\n• **มากกว่า 10 คน = 3 คะแนน**\n• 6–10 คน = 2 คะแนน\n• 1–5 คน = 1 คะแนน\n\nยิ่งมีคนสัมผัสมาก โอกาสที่จะเกิดอันตรายกับใครสักคนก็ยิ่งสูง จึงได้คะแนนความเสี่ยงสูงกว่า"}, {"topic": "Risk Assessment", "q": "A hazard with high likelihood (score 3) and major severity (score 3) falls into which risk category?", "choices": ["High risk", "Moderate risk", "Unacceptable risk", "Acceptable risk", "Trivial risk"], "ans": 2, "exp": "**Risk Matrix (มอก.18001)** — โอกาสเกิด (A) × ระดับความเป็นอันตราย (B):\n\n| A ↓ \\ B → | มาก (3) | ปานกลาง (2) | น้อย (1) |\n|---|---|---|---|\n| **มีโอกาสเกิด (3)** | **ไม่อาจยอมรับได้ (9)** | สูง (6) | ปานกลาง (3) |\n| **เกิดยาก (2)** | สูง (6) | ปานกลาง (4) | ยอมรับได้ (2) |\n| **ไม่น่าจะเกิด (1)** | ปานกลาง (3) | ยอมรับได้ (2) | เล็กน้อย (1) |\n\n3 × 3 = 9 = **ความเสี่ยงที่ไม่อาจยอมรับได้** ต้องแก้ไขทันที"}, {"topic": "Risk Assessment", "q": "In the TIS 18001 risk matrix, a score of 6 corresponds to which risk level?", "choices": ["Unacceptable risk", "Moderate risk", "Acceptable risk", "High risk", "Trivial risk"], "ans": 3, "exp": "คะแนน **6** = **ความเสี่ยงสูง (High risk)** — เกิดได้ 2 ทาง คือ โอกาส 3 × ความรุนแรง 2 หรือ โอกาส 2 × ความรุนแรง 3\n\nสเกลทั้งหมด: 9 = ไม่อาจยอมรับได้, **6 = สูง**, 3–4 = ปานกลาง, 2 = ยอมรับได้, 1 = เล็กน้อย"}, {"topic": "Risk Assessment", "q": "Which sequence describes the systematic risk management cycle?", "choices": ["Control risks, identify hazards, record findings, assess risks, review controls", "Record findings, review controls, identify hazards, control risks, assess risks", "Assess risks, record findings, identify hazards, review controls, control risks", "Review controls, control risks, assess risks, identify hazards, record findings", "Identify hazards, assess risks, control risks, record findings, review controls"], "ans": 4, "exp": "วงจรการจัดการความเสี่ยงอย่างเป็นระบบ (PDCA):\n**Identify hazards (วางแผน) → Assess the risks (ลงมือทำ) → Control the risks → Record your findings (ตรวจสอบ) → Review the controls (ปรับปรุง) → วนกลับ**\n\nโดย **hazard surveillance** เน้นที่ช่วง Identify/Assess ส่วน **health surveillance** เน้นที่ช่วง Record findings/Review controls"}, {"topic": "Risk Assessment", "q": "Which item is assessed in the TIS 18001 likelihood criteria?", "choices": ["Whether written safe work procedures exist and suit the risk", "The annual turnover of the establishment in Thai baht", "The age distribution of the workforce in the department", "The distance from the plant to the nearest referral hospital", "The number of years since the plant was first commissioned"], "ans": 0, "exp": "เกณฑ์ประเมินโอกาสเกิดตาม มอก.18001 มี 8 หัวข้อ: (1) จำนวนคนที่สัมผัส (2) ความถี่และระยะเวลาสัมผัส (3) การสัมผัสกับสิ่งที่เป็นอันตราย (4) **มีขั้นตอน/วิธีการปฏิบัติ/กฎระเบียบด้านความปลอดภัยที่เป็นมาตรฐาน** (5) การฝึกอบรม (6) การตรวจสอบหรือสังเกตการปฏิบัติตามขั้นตอน (7) **PPE หรืออัตราการใช้** (8) การออกแบบให้มีอุปกรณ์ความปลอดภัยสำหรับเครื่องมือ/เครื่องจักร/อาคาร"}, {"topic": "Risk Assessment", "q": "Under TIS 18001, PPE that is available and appropriate but NOT actually used scores:", "choices": ["1 point", "3 points", "2 points", "0 points", "4 points"], "ans": 1, "exp": "หัวข้อ **อุปกรณ์ป้องกันส่วนบุคคลหรืออัตราการใช้**:\n• **ไม่มี / มีการใช้แต่ไม่เหมาะสม / มีอย่างเหมาะสมแต่ไม่ใช้ = 3 คะแนน**\n• มีอย่างเหมาะสมและใช้งาน = 1 คะแนน\n\nสังเกตว่าหัวข้อนี้ (และหัวข้อที่ 8 เรื่องอุปกรณ์ความปลอดภัยของเครื่องจักร) มีแค่ 2 ระดับคือ 3 กับ 1 ไม่มี 2 — และการ **มี PPE แต่ไม่ใช้ ถือว่าแย่เท่ากับไม่มีเลย**"}, {"topic": "Health Surveillance", "q": "Which evidence is required to link a disease to work?", "choices": ["A written admission of negligence from the employer", "A court judgment establishing occupational causation", "Epidemiological data showing association between the hazard and the disease", "Unanimous agreement among the patient's co-workers", "Absence of the disease in any non-exposed population"], "ans": 2, "exp": "หลักฐานเชื่อมโยงโรคกับงานมี 3 เสา:\n1. **โรค** — สอดคล้องและวินิจฉัยได้ว่าเป็นโรคนั้นจริง\n2. **ระบาดวิทยา** — แสดงความเชื่อมโยงระหว่างสิ่งคุกคามและการเกิดโรค\n3. **สิ่งคุกคามในงาน** — สิ่งคุกคามปรากฏในงาน และผู้ป่วยสัมผัสในระยะเวลาที่ก่อโรคได้\n\nจากนั้นพิจารณา **ความน่าเชื่อถือ** และ **ปัจจัยที่เกี่ยวข้อง** เพื่อประเมินและสรุปผล"}, {"topic": "Health Surveillance", "q": "Which is an example of INDIRECT health surveillance?", "choices": ["Annual audiometric testing of noise-exposed workers", "Spirometry performed on dust-exposed workers", "Blood lead measurement in battery plant workers", "Analysis of sickness absence statistics", "Pre-placement physical examination of new recruits"], "ans": 3, "exp": "การเฝ้าระวังสุขภาพแบ่งเป็น:\n• **ทางตรง** — จากการตรวจสุขภาพ (audiometry, spirometry, biomarkers, pre-placement exam)\n• **ทางอ้อม** — จาก **สถิติการเจ็บป่วย** ระบบการเก็บรวบรวม วิเคราะห์ และแปลผลข้อมูลสุขภาพและการเจ็บป่วย\n\nสถิติการลาป่วยเป็นข้อมูลทางอ้อมที่หาได้ง่ายและช่วยบ่งชี้ปัญหาในแผนกใดแผนกหนึ่งได้"}, {"topic": "Health Surveillance", "q": "Which of the following is a component of the scope of environmental surveillance?", "choices": ["Determining the disability percentage for compensation purposes", "Certifying that the establishment complies with ISO 9001", "Calculating the return on investment of safety expenditure", "Assessing the mental health status of individual employees", "Evaluating whether personal protective equipment is being used"], "ans": 4, "exp": "ขอบเขตของการเฝ้าระวังสิ่งแวดล้อมในสถานที่ทำงาน: **ค้นหาและประเมินสิ่งคุกคาม → ประเมินลักษณะงานที่เพิ่มความเสี่ยง → ประเมินระดับการสัมผัส → ประเมินมาตรการควบคุม → และประเมินการใช้ PPE**\n\nทำโดยการเดินสำรวจ (Walkthrough survey) และการตรวจวัดสิ่งคุกคาม (Environmental monitoring) — ส่วนการประเมินสุขภาพจิตรายบุคคลเป็น health surveillance"}, {"topic": "Health Surveillance", "q": "In the occupational health surveillance sequence, what follows interpretation of the measurements?", "choices": ["Confirmation of the abnormal result", "Assessment of workplace hazards", "Selection of the screening test", "Recording in the medical file", "Definition of the group to be screened"], "ans": 0, "exp": "ลำดับขั้นตอน Occupational Health Surveillance ช่วงหลัง: **(7) ทำการตรวจวัด → (8) แปลผลการตรวจวัด → (9) ยืนยันการตรวจ (confirmation) → (10) กำหนดสถานะการทำงาน (fitness for work) → (11) รายงานผล → (12) วินิจฉัยโรค → (13) ประเมินและควบคุมระดับการสัมผัส → (14) บันทึกเวชระเบียน**\n\nการยืนยันผลก่อนแจ้งสำคัญมาก เพราะผลบวกลวงอาจทำให้คนงานเสียงานโดยไม่จำเป็น"}, {"topic": "Health Surveillance", "q": "What is the purpose of determining 'fitness for work' during health surveillance?", "choices": ["To calculate the compensation the worker is entitled to receive", "To match the worker's health status with the demands of the job", "To rank workers by productivity for promotion decisions", "To determine the premium the employer pays for group insurance", "To establish the legal liability of the establishment"], "ans": 1, "exp": "**Fitness for work** คือการประเมินว่าสภาพร่างกายและจิตใจของผู้ปฏิบัติงาน **เหมาะสมกับความต้องการของงานนั้น** หรือไม่ — เป็นขั้นตอนที่ 10 ในกระบวนการ surveillance (กำหนดสถานะการทำงาน)\n\nประเมินครั้งแรกใน **pre-placement examination** และประเมินซ้ำเมื่อ return to work หรือเมื่อสถานะสุขภาพเปลี่ยน — ไม่ใช่เครื่องมือคัดคนออกจากงาน แต่เพื่อจัดงานให้เหมาะกับคน"}, {"topic": "Health Surveillance", "q": "Which statement about environmental monitoring standards is CORRECT?", "choices": ["International standards are universally applicable without adjustment", "Thai standards are always stricter than international equivalents", "Foreign standards may not suit Thai body size and physiology", "Standards apply only to chemical and not to physical hazards", "Standards are legally binding only in export-oriented industries"], "ans": 2, "exp": "ข้อควรระวังที่อาจารย์เน้นไว้ 2 ข้อ:\n1. **มาตรฐานต่างประเทศอาจไม่เหมาะกับสรีระคนไทย** — ค่ามาตรฐานหลายตัวพัฒนาจากประชากรตะวันตกที่มีขนาดร่างกายและอาจมีพันธุกรรมต่างกัน\n2. **ค่าที่ต่ำกว่ามาตรฐานไม่ได้การันตีว่าทุกคนจะไม่เป็นโรค** เพราะยังมี susceptible individuals\n\nจึงต้องใช้มาตรฐานเป็นแนวทาง ไม่ใช่คำตอบสุดท้าย และทำ health surveillance ควบคู่เสมอ"}, {"topic": "Health Surveillance", "q": "A pre-placement examination serves which two purposes?", "choices": ["Determining compensation eligibility and assigning a disability grade", "Screening for illicit drug use and verifying identity documents", "Certifying vaccination status and issuing a food-handler licence", "Assessing fitness for work and establishing baseline health data", "Measuring productivity potential and setting the starting salary"], "ans": 3, "exp": "**การตรวจสุขภาพก่อนเข้าทำงาน (Pre-placement Examination)** มี 2 วัตถุประสงค์:\n1. **ประเมินความเหมาะสมของร่างกายและจิตใจกับงาน (Fitness for work)**\n2. **เป็นข้อมูลพื้นฐาน (baseline data)** สำหรับเปรียบเทียบในการตรวจครั้งต่อๆ ไป\n\nข้อ 2 สำคัญมากในทางกฎหมาย — ถ้าไม่มี baseline จะพิสูจน์ไม่ได้ว่าความผิดปกติที่พบภายหลังเกิดจากงานนี้หรือมีมาก่อนแล้ว"}, {"topic": "Confined Space", "q": "According to Thai ministerial regulation, oxygen concentration below which level constitutes a hazardous atmosphere?", "choices": ["16.0 percent by volume", "18.0 percent by volume", "20.9 percent by volume", "23.5 percent by volume", "19.5 percent by volume"], "ans": 4, "exp": "**บรรยากาศอันตราย** ข้อ 1 ตามกฎกระทรวงฯ: **มีออกซิเจนต่ำกว่าร้อยละ 19.5 หรือมากกว่าร้อยละ 23.5 โดยปริมาตร**\n\n• **< 19.5% → เสี่ยง HYPOXIA** (ขาดออกซิเจน)\n• **> 23.5% → เสี่ยงเกิด FLAME/ไฟไหม้** (ออกซิเจนมากทำให้ติดไฟง่าย)\n\nค่า 20.9% คือความเข้มข้นปกติในบรรยากาศ"}, {"topic": "Confined Space", "q": "An oxygen concentration ABOVE 23.5% in a confined space is hazardous because it:", "choices": ["Increases the risk of fire and explosion", "Causes immediate oxygen toxicity seizures", "Displaces nitrogen and causes decompression sickness", "Produces methaemoglobinaemia on inhalation", "Triggers hypoventilation by suppressing the respiratory drive"], "ans": 0, "exp": "ออกซิเจน **> 23.5%** ทำให้ **เสี่ยงเกิดไฟไหม้และการระเบิด** เพราะออกซิเจนเป็นตัวช่วยการเผาไหม้ (oxidizer) — วัสดุที่ปกติติดไฟยากจะติดไฟง่ายและลุกลามรุนแรงในบรรยากาศ oxygen-enriched\n\nส่วน **< 19.5%** เสี่ยง hypoxia — ทั้งสองด้านล้วนเป็นบรรยากาศอันตรายตามกฎหมาย"}, {"topic": "Confined Space", "q": "A flammable gas concentration exceeding what percentage of the LEL constitutes a hazardous atmosphere?", "choices": ["50 percent of the lower explosive limit", "10 percent of the lower explosive limit", "75 percent of the lower explosive limit", "100 percent of the lower explosive limit", "25 percent of the lower explosive limit"], "ans": 1, "exp": "**บรรยากาศอันตราย** ข้อ 2: มีก๊าซ ไอ หรือละอองที่ติดไฟหรือระเบิดได้ **เกินร้อยละ 10 ของค่าความเข้มข้นขั้นต่ำของสารเคมีแต่ละชนิดในอากาศที่อาจติดไฟหรือระเบิดได้** — คือ **10% ของ LEL/LFL (lower explosive/flammable limit)**\n\nเกณฑ์ตั้งไว้ที่ 10% เท่านั้น (ไม่ใช่ 100%) เพื่อเป็น safety margin ที่กว้างมาก เพราะการระเบิดในที่อับอากาศมักถึงตายทันที"}, {"topic": "Confined Space", "q": "Which three elements must ALL be present for a space to be legally defined as a confined space?", "choices": ["Underground location, poor lighting, and absence of mobile phone signal", "Small floor area, high ceiling, and presence of stored chemicals", "Limited access, not designed for continuous occupancy, and hazardous conditions or atmosphere", "Locked entry, single exit, and continuous mechanical ventilation", "High temperature, high humidity, and elevated noise level"], "ans": 2, "exp": "**นิยาม 'ที่อับอากาศ' (กฎกระทรวงฯ พ.ศ. 2562)** ต้องครบ 3 องค์ประกอบ:\n1. **ทางเข้าออกจำกัด**\n2. **ไม่ได้ออกแบบไว้สำหรับเป็นสถานที่ทำงานอย่างต่อเนื่องเป็นประจำ**\n3. **มีสภาพอันตราย หรือมีบรรยากาศอันตราย**\n\nตัวอย่าง: อุโมงค์ ถ้ำ บ่อ หลุม ห้องใต้ดิน ห้องนิรภัย ถังน้ำมัน ถังหมัก ถัง ไซโล ท่อ เตา ภาชนะ"}, {"topic": "Confined Space", "q": "Under Thai law, an employer must NOT permit entry into a confined space by a worker known to have:", "choices": ["Colour vision deficiency", "Well-controlled type 2 diabetes", "A history of allergic rhinitis", "Respiratory or cardiac disease", "Mild refractive error corrected by spectacles"], "ans": 3, "exp": "**ข้อ 5 (กฎกระทรวงฯ พ.ศ. 2547)**: 'ห้ามนายจ้างอนุญาตให้ลูกจ้างหรือบุคคลใดเข้าไปในที่อับอากาศ หากนายจ้างรู้หรือควรรู้ว่าลูกจ้างหรือบุคคลนั้นเป็น **โรคเกี่ยวกับทางเดินหายใจ โรคหัวใจ หรือโรคอื่นซึ่งแพทย์เห็นว่าการเข้าไปในที่อับอากาศอาจเป็นอันตราย**ต่อบุคคลดังกล่าว'\n\nจำ 3 กลุ่มโรคที่ห้าม: **โรคทางเดินหายใจ · โรคหัวใจ · โรคอื่นที่แพทย์เห็นว่าอันตราย**"}, {"topic": "Confined Space", "q": "What is the minimum age for a worker to undergo practical confined space training under Thai regulation?", "choices": ["15 years", "16 years", "20 years", "21 years", "18 years"], "ans": 4, "exp": "**ข้อ 7/1 (ประกาศกรมสวัสดิการฯ ฉบับที่ 2 พ.ศ. 2551)** — คุณสมบัติผู้เข้ารับการฝึกอบรมภาคปฏิบัติ:\n1. **มีอายุไม่ต่ำกว่า 18 ปีบริบูรณ์**\n2. **มีสุขภาพสมบูรณ์ ร่างกายแข็งแรง ไม่เป็นโรคเกี่ยวกับทางเดินหายใจ โรคหัวใจ หรือโรคอื่น**ซึ่งแพทย์เห็นว่าการเข้าไปในที่อับอากาศอาจเป็นอันตรายต่อผู้เข้ารับการฝึกอบรม"}, {"topic": "Confined Space", "q": "If a hazardous atmosphere is detected during confined space work, what must be done FIRST?", "choices": ["Remove all persons from the confined space immediately", "Start mechanical ventilation while work continues", "Investigate the source of the hazardous atmosphere", "Issue supplied-air respirators to the workers inside", "Record the measurement and notify the labour inspector"], "ans": 0, "exp": "**ข้อ 6** กำหนดว่าถ้าตรวจพบบรรยากาศอันตราย ให้ดำเนินการ **ตามลำดับ** 3 ขั้น:\n1. **นำลูกจ้างและบุคคลที่อยู่ในที่อับอากาศออกจากบริเวณนั้นทันที** ← ทำก่อน\n2. ประเมินและค้นหาว่าบรรยากาศอันตรายเกิดจากสาเหตุใด\n3. ดำเนินการเพื่อทำให้สภาพอากาศไม่มีบรรยากาศอันตราย เช่น การระบายอากาศ\n\nชีวิตคนมาก่อนเสมอ — ห้ามให้ทำงานต่อขณะระบายอากาศ"}, {"topic": "Confined Space", "q": "When must atmospheric testing of a confined space be performed?", "choices": ["Only once before the first entry of the working day", "Both before entry and continuously during the work", "Only if workers report symptoms such as dizziness", "Only after the work has been completed and the space vacated", "Only when the space has been closed for more than one month"], "ans": 1, "exp": "**ข้อ 6**: 'ให้นายจ้างจัดให้มีการตรวจวัด บันทึกผลการตรวจวัด และประเมินสภาพอากาศในที่อับอากาศว่ามีบรรยากาศอันตรายหรือไม่ โดยให้ดำเนินการ **ทั้งก่อนให้ลูกจ้างเข้าไปทำงาน และในระหว่างที่ลูกจ้างทำงาน**ในที่อับอากาศ'\n\nการตรวจครั้งเดียวไม่พอ เพราะบรรยากาศเปลี่ยนได้ระหว่างทำงาน (เช่น การเชื่อมสร้างก๊าซ หรือตะกอนถูกกวนขึ้นมาปล่อย H₂S)"}, {"topic": "Confined Space", "q": "Which gas is heavier than air and therefore accumulates at the BOTTOM of a confined space?", "choices": ["Methane", "Helium", "Hydrogen sulfide", "Hydrogen", "Ammonia"], "ans": 2, "exp": "ก๊าซอันตรายในที่อับอากาศเรียงตามความหนาแน่น:\n• **CH₄ (มีเทน)** — **ชั้นบน** (เบากว่าอากาศ) ไวไฟ/ระเบิด\n• **CO (คาร์บอนมอนอกไซด์)** — ชั้นกลาง (ใกล้เคียงอากาศ) พิษ ไม่มีสี ไม่มีกลิ่น\n• **H₂S (ไฮโดรเจนซัลไฟด์)** — **ชั้นล่าง** (หนักกว่าอากาศ) กลิ่นไข่เน่า\n\n⚠️ H₂S ที่ความเข้มข้นสูงทำให้ **ดมไม่ได้กลิ่น (olfactory fatigue)** — จึงอันตรายมาก เพราะคนงานคิดว่าปลอดภัยแล้ว"}, {"topic": "Confined Space", "q": "Why is a simple filtering facepiece respirator inadequate for oxygen-deficient confined space entry?", "choices": ["It cannot be fitted to workers with facial hair", "It becomes saturated after fifteen minutes of use", "It is prohibited by law in all industrial settings", "It filters contaminants but cannot supply oxygen", "It interferes with communication between workers"], "ans": 3, "exp": "หน้ากากกรองอากาศ (filtering respirator) ทำงานโดย **กรองสิ่งปนเปื้อนออกจากอากาศรอบตัว** — ถ้าอากาศนั้น **ขาดออกซิเจน** อยู่แล้ว การกรองก็ไม่ช่วยอะไร ผู้สวมยังคงขาดออกซิเจน\n\nในที่อับอากาศที่ oxygen-deficient ต้องใช้ **SCBA (Self-Contained Breathing Apparatus)** หรือ **Supplied-air respirator** ที่ **จ่ายอากาศจากแหล่งภายนอก** เท่านั้น\n\n⚠️ นี่คือสาเหตุการเสียชีวิตของ 'ผู้เข้าไปช่วยเหลือ' ที่ไม่ได้เตรียมอุปกรณ์"}, {"topic": "Confined Space", "q": "Which role is responsible for remaining OUTSIDE the confined space throughout the operation?", "choices": ["The entrant", "The safety engineer", "The occupational physician", "The plant manager", "The attendant"], "ans": 4, "exp": "บทบาทผู้ปฏิบัติงานในที่อับอากาศมี 3 ตำแหน่ง:\n1. **ผู้ทำงานในที่อับอากาศ (Entrant)** — ผู้เข้าไปปฏิบัติงานภายใน\n2. **ผู้ช่วยเหลือ (Attendant)** — **เฝ้าอยู่ด้านนอกตลอดเวลา** พร้อมช่วยเหลือกรณีฉุกเฉิน\n3. **ผู้ควบคุมงาน (Supervisor)** — ควบคุม กำกับ และอนุญาตการเข้าทำงาน\n\nAttendant ห้ามเข้าไปช่วยด้วยตัวเองโดยไม่มี SCBA เด็ดขาด ต้องเรียกทีมกู้ภัยแทน"}, {"topic": "Emergency Preparedness", "q": "Which is the CORRECT sequence of the disaster management cycle?", "choices": ["Prevention, mitigation, preparedness, response, recovery", "Response, prevention, recovery, mitigation, preparedness", "Preparedness, recovery, response, prevention, mitigation", "Mitigation, response, prevention, recovery, preparedness", "Recovery, preparedness, mitigation, response, prevention"], "ans": 0, "exp": "**วัฏจักรการจัดการภัยพิบัติ (Disaster Cycle)**:\n**การป้องกัน (Prevention) → การลดความเสี่ยง (Mitigation) → การเตรียมรับ (Preparedness) → การรับมือเหตุการณ์ (Response) → การฟื้นฟูหลังเกิดเหตุการณ์ (Recovery) → วนกลับสู่การป้องกัน**\n\nเป็นวงจรต่อเนื่อง — บทเรียนจากการฟื้นฟูจะนำไปปรับปรุงการป้องกันในรอบถัดไป"}, {"topic": "Emergency Preparedness", "q": "Under the Incident Command System, a responder should receive orders from:", "choices": ["Any officer of higher rank present at the scene", "One supervisor only", "The most senior clinician regardless of assigned role", "Both their functional chief and the safety officer", "Whichever command post contacts them first"], "ans": 1, "exp": "**Unity of Command** — ความรับผิดชอบของผู้ปฏิบัติงานใน ICS มี 3 ข้อ:\n1. **รายงานตัวเมื่อเข้ามาปฏิบัติภารกิจ (check-in)**\n2. **ปฏิบัติงานตามแผนปฏิบัติการ**\n3. **รับฟังคำสั่งจากผู้บังคับบัญชาเพียงคนเดียว** ← Unity of Command\n\nหลักนี้ป้องกันคำสั่งขัดแย้งกันในสถานการณ์ฉุกเฉิน ซึ่งเป็นสาเหตุความล้มเหลวและอันตรายต่อผู้ปฏิบัติงาน"}, {"topic": "Emergency Preparedness", "q": "Which four sections constitute the General Staff of the Incident Command System?", "choices": ["Safety, Information, Liaison and Operations", "Command, Control, Communication and Intelligence", "Operations, Planning, Logistics and Finance", "Triage, Treatment, Transport and Tracking", "Prevention, Mitigation, Response and Recovery"], "ans": 2, "exp": "โครงสร้าง ICS:\n• **ผู้บัญชาการเหตุการณ์ (Incident Commander)** 1 คน\n• **Command Staff 3 ฝ่าย** — ฝ่ายความปลอดภัย (Safety Officer), ฝ่ายข้อมูลข่าวสาร (Public Information Officer), ฝ่ายประสานงาน (Liaison Officer)\n• **General Staff 4 ฝ่าย** — **ฝ่ายปฏิบัติการ (Operations), ฝ่ายแผน (Planning), ฝ่ายสนับสนุน (Logistics), ฝ่ายการเงิน (Finance/Admin)**\n\nสรุปจำ: **1 + 3 + 4**"}, {"topic": "Palliative Concept", "q": "According to the WHO definition, when should palliative care begin?", "choices": ["Only after all curative treatment options have been exhausted", "When the estimated prognosis falls below six months", "At the moment the patient is transferred to a hospice facility", "From the early stage of the illness until death", "Once the patient loses the capacity to make decisions"], "ans": 3, "exp": "นิยาม WHO: การดูแลผู้ที่มีภาวะจำกัดการมีชีวิต (Life-limiting) หรือคุกคามต่อชีวิต (Life-threatening) โดยมีจุดประสงค์ **เพื่อเพิ่มคุณภาพชีวิต** บำบัด เยียวยา และบรรเทาทุกข์ทางกาย จิต สังคม และจิตวิญญาณ **ตั้งแต่ระยะเริ่มต้นของการเจ็บป่วยจนกระทั่งเสียชีวิต** โดย **ครอบคลุมถึงครอบครัว**\n\nจุดที่ออกสอบ: palliative care **เริ่มควบคู่ไปกับ curative care ตั้งแต่ต้น** ไม่ใช่รอจนหมดหนทางรักษา"}, {"topic": "Palliative Concept", "q": "Which principle of palliative care is CORRECT?", "choices": ["It actively shortens suffering by hastening the dying process", "It prolongs life by every available technological means", "It withdraws all medical treatment once the goal changes", "It focuses exclusively on the patient, excluding the family", "It neither hastens nor postpones death"], "ans": 4, "exp": "หลักการข้อ 3: **ไม่เจตนาเร่งหรือยื้อความตาย** — เป็นจุดที่แยก palliative care ออกจากทั้ง euthanasia (เร่ง) และ futile aggressive treatment (ยื้อ)\n\nหลักการอื่น: บรรเทาความปวดและอาการทุกข์ทรมาน, เห็นคุณค่าการมีชีวิตและมองการเสียชีวิตเป็นธรรมชาติ, ผสมผสานการดูแลจิตใจและจิตวิญญาณ, สนับสนุนให้มีชีวิตอย่างมีคุณค่าจนเสียชีวิต, **สนับสนุนครอบครัว**, และให้คำปรึกษาเรื่อง bereavement"}, {"topic": "Palliative Concept", "q": "In palliative care, how is death conceptualised?", "choices": ["As an inevitable part of the process", "As a failure of medical management", "As an event to be postponed at any cost", "As a matter irrelevant to the care plan", "As a decision belonging solely to the physician"], "ans": 0, "exp": "ตารางเปรียบเทียบที่ออกสอบแน่นอน:\n\n| | **Curative Care** | **Palliative Care** |\n|---|---|---|\n| **Goal** | รักษาโรค/ยื้อชีวิต | สร้างคุณภาพชีวิตที่ดี จัดการอาการ |\n| **Focuses on** | **ตัวโรค** | **ผู้ป่วยและครอบครัว** |\n| **Key information** | การตรวจเพื่อวินิจฉัย (Lab, X-ray) | **อาการรบกวน (symptoms)** |\n| **Treatment** | ควบคุมหรือรักษาให้หาย | **การจัดการอาการ** |\n| **Death** | **การตายถือเป็นความล้มเหลว** | **ความตายเป็นสิ่งที่หลีกเลี่ยงไม่ได้** |"}, {"topic": "Palliative Concept", "q": "Curative care focuses on the disease. What is the focus of palliative care?", "choices": ["The disease and its staging", "The patient and the family", "The laboratory and imaging results", "The institution's length-of-stay targets", "The insurance reimbursement category"], "ans": 1, "exp": "**Palliative care focuses on ผู้ป่วยและครอบครัว** ในขณะที่ **curative care focuses on ตัวโรค**\n\nนี่เป็นเหตุผลที่ palliative care ประเมิน **caregiver burden** (ด้วย Zarit Burden Interview) และให้ **bereavement support** แก่ครอบครัวหลังผู้ป่วยเสียชีวิตด้วย — เพราะครอบครัวเป็นหน่วยของการดูแล ไม่ใช่แค่ผู้เยี่ยม"}, {"topic": "Palliative Concept", "q": "What proportion of people who need palliative care worldwide actually receive it?", "choices": ["About 40 percent", "About 60 percent", "About 14 percent", "About 75 percent", "About 90 percent"], "ans": 2, "exp": "ตัวเลขความสำคัญที่ควรจำ:\n• **40 ล้านคนทั่วโลกต้องการ palliative care ต่อปี แต่มีเพียง ~14% ที่ได้รับ**\n• **ประเทศไทย: 18.7% ของผู้ป่วยที่นอนโรงพยาบาลเป็นผู้ป่วย palliative care แต่มีเพียง 17.3% ที่ได้รับการปรึกษาผู้เชี่ยวชาญ**\n\nตัวเลขเหล่านี้สะท้อนช่องว่างของการเข้าถึงบริการ (access gap) ที่กว้างมาก"}, {"topic": "Palliative Concept", "q": "Which is a documented benefit of palliative care with respect to healthcare cost?", "choices": ["Elimination of the need for any prescription medication", "Transfer of all costs from the hospital to the family", "Reduction in the number of nursing staff required per ward", "Reduction of hospitalisations and unnecessary treatments", "Complete avoidance of any diagnostic investigation"], "ans": 3, "exp": "ประโยชน์ของ palliative care 3 มิติ:\n• **ผู้ป่วย** — improve quality of life, symptom management, advance care planning\n• **ครอบครัว** — support in making decisions that align with patient's goal, support for family members\n• **ค่าใช้จ่าย** — **avoiding unnecessary treatments** และ **reducing hospitalizations**\n\nประเด็นสำคัญคือ palliative care ลดค่าใช้จ่ายโดย **ไม่ลดคุณภาพการดูแล** เพราะตัดเฉพาะการรักษาที่ไม่ตรงกับเป้าหมายของผู้ป่วย"}, {"topic": "Palliative Concept", "q": "What is considered the GOLD STANDARD in symptom assessment for palliative patients?", "choices": ["The physician ranks symptoms by physiological severity", "The primary caregiver lists the symptoms observed at home", "The nurse records vital signs at four-hourly intervals", "Laboratory values are used to grade each symptom objectively", "The patient reports which symptoms are troubling them"], "ans": 4, "exp": "**ให้ผู้ป่วยเป็นผู้บอกว่าอาการอะไรที่รบกวนผู้ป่วย = GOLD STANDARD**\n\nหลักการเดียวกันนี้ใช้กับ **pain measurement (self report is gold standard)** และ **dyspnea assessment (self report is gold standard)** — เพราะอาการเหล่านี้เป็นประสบการณ์ส่วนบุคคล (subjective experience) ที่ไม่มีเครื่องมือใดวัดแทนได้\n\n'Pain is what a person says it hurts'"}, {"topic": "Palliative Concept", "q": "Which tool is used to assess CAREGIVER burden and burnout?", "choices": ["Zarit Burden Interview", "Edmonton Symptom Assessment Scale", "Palliative Performance Scale", "Confusion Assessment Method", "FLACC Scale"], "ans": 0, "exp": "**Zarit Burden Interview** ใช้ประเมิน **ผู้ดูแล** เพื่อประเมินภาวะเหนื่อยล้าและหมดไฟในการดูแล (Caregiver burden & Burnout) — **ให้ประเมินผู้ดูแลทุกคน**\n\nการแปลผลคะแนนรวม: **no to mild (0–10) · mild to moderate (11–20) · severe burden (> 20)**\n\nเครื่องมืออื่นใช้กับตัวผู้ป่วย: ESAS = ประเมินอาการ, PPS = ประเมินสมรรถนะและพยากรณ์โรค"}, {"topic": "Palliative Concept", "q": "A Zarit Burden Interview score greater than 20 indicates:", "choices": ["No to mild burden", "Severe caregiver burden", "Mild to moderate burden", "Normal caregiving adjustment", "Invalid or incomplete responses"], "ans": 1, "exp": "การแปลผล **Zarit Burden Interview**:\n• **no to mild = 0–10**\n• **mild to moderate = 11–20**\n• **severe burden = > 20** ← คะแนนเกิน 20\n\nเมื่อพบ severe burden ต้องจัดการเชิงรุก เช่น จัดหา respite care เพิ่มผู้ช่วยดูแล หรือประเมินภาวะซึมเศร้าของผู้ดูแลเอง เพราะผู้ดูแลที่หมดไฟจะดูแลผู้ป่วยได้ไม่ดีและตัวเองก็ป่วยตาม"}, {"topic": "Palliative Concept", "q": "On the ESAS, which items should be left BLANK when a proxy completes the form on the patient's behalf?", "choices": ["Pain, nausea and drowsiness", "Appetite, fatigue and shortness of breath", "Depression, anxiety and wellbeing", "All items must be completed regardless of respondent", "Only the free-text 'other problem' item"], "ans": 2, "exp": "หลักการใช้ **ESAS**: ในข้อที่เป็น **ความเห็นของผู้ป่วยโดยตรง ได้แก่ ซึมเศร้า กังวล และภาวะสุขสบายกายและใจ** — **หากมีผู้ทำแบบสอบถามแทนผู้ป่วย ให้เว้นการตอบไว้**\n\nเหตุผล: อาการเหล่านี้เป็น internal emotional state ที่คนอื่นประเมินแทนไม่ได้ ต่างจากอาการที่สังเกตได้จากภายนอก เช่น อาเจียน หรือง่วงซึม\n\nและต้อง **บันทึกวัน-เวลาที่ประเมินทุกครั้ง** เพื่อใช้ติดตามการรักษา"}, {"topic": "Palliative Concept", "q": "When reading the PPS table, which rule applies?", "choices": ["Read from right to left; the rightmost column determines the final score", "Average the scores obtained across all five columns", "Take the highest score achieved in any single column", "Read from left to right; the leftmost column caps the achievable score", "Assign intermediate values such as 45 percent when between levels"], "ans": 3, "exp": "กติกาการอ่านตาราง **PPS**:\n• **ให้อ่านจากซ้ายไปขวา** เริ่มจากคอลัมน์การเคลื่อนไหว\n• **คอลัมน์ซ้ายสุดเป็นตัวกำหนดว่าไม่สามารถให้คะแนนในคอลัมน์ที่สูงกว่านั้นได้** — เช่น ถ้าคะแนนการเคลื่อนไหว 40 แต่ช่องถัดมาได้เกิน 40 → ให้คะแนนสูงสุดคือ 40\n• **ไม่สามารถให้คะแนนระหว่างกลาง เช่น 45%** — ต้องเลือก 40% หรือ 50% ตามที่ใกล้เคียงความสามารถจริงที่สุด\n\n5 คอลัมน์: การเคลื่อนไหว, การปฏิบัติกิจกรรมและขอบเขตของโรค, การทำกิจวัตรประจำวัน, การรับประทานอาหาร, ระดับความรู้สึกตัว"}, {"topic": "Palliative Concept", "q": "A cancer patient has a PPS of 20 percent. What is the approximate median survival?", "choices": ["About 6 weeks", "About 6 months", "About 18 days", "About 95 days", "About 6 days"], "ans": 4, "exp": "ตาราง **PPS กับ Median Survival Time** ในผู้ป่วยมะเร็ง:\n\n| PPS (%) | Cancer patients (days) |\n|:---:|:---:|\n| 10 | **2** |\n| **20** | **6** |\n| 30 | 13 |\n| 40–60 | 39 |\n| 70–80 | 95 |\n| **Total** | **18** |\n\nแนวโน้มที่ต้องจำ: **PPS ยิ่งต่ำ → survival time ยิ่งสั้น** และ PPS ทำนายได้ดีในผู้ป่วยมะเร็งมากกว่าผู้ป่วยที่ไม่ใช่มะเร็ง"}, {"topic": "Palliative Concept", "q": "What is the 'Surprise Question' used in the Gold Standards Framework?", "choices": ["Would you be surprised if this patient died within the next 6 to 12 months?", "Would the patient be surprised to learn the true diagnosis today?", "Would the family be surprised by a transfer to hospice care?", "Would you be surprised if this patient recovered fully within one year?", "Would the patient be surprised by the estimated treatment cost?"], "ans": 0, "exp": "**Step 1 ของ SPICT/Gold Standards Framework — Surprise Question**:\n> *'Would you be surprised if the patient were to die in the next year, months, weeks, days?'*\n> **'ท่านประหลาดใจหรือไม่ ถ้าผู้ป่วยจะเสียชีวิตในอีก 6–12 เดือนข้างหน้า'**\n\n• คำตอบ **'ไม่ประหลาดใจ' → ควรเริ่มวางแผนการดูแลแบบประคับประคอง**\n• คำตอบ **'ประหลาดใจ หรือไม่แน่ใจ' → ควรมองหาข้อบ่งชี้ทั่วไป (Step 2)**"}, {"topic": "Palliative Concept", "q": "Which trajectory describes the typical functional decline in advanced CANCER?", "choices": ["Stepwise decline with acute exacerbations and incomplete recovery", "Preserved function for a long period, then a short rapid decline", "Low baseline function with a very gradual prolonged dwindling", "Rapid initial decline followed by a stable prolonged plateau", "Fluctuating function that returns fully to baseline after each episode"], "ans": 1, "exp": "**Illness Trajectories 3 เส้นทาง**:\n• **Trajectory 1 — Cancer**: **function สูงคงที่นาน แล้วลดลงอย่างรวดเร็วในช่วงท้าย (short decline)**\n• **Trajectory 2 — Organ failure** (หัวใจล้มเหลว, COPD): ลดลงเป็นขั้นบันได มี acute exacerbation เป็นระยะแล้วฟื้นไม่เต็มที่ (intermediate with acute episodes)\n• **Trajectory 3 — Dementia and frailty**: function ต่ำตั้งแต่ต้นและค่อยๆ ลดลงอย่างช้าๆ ยาวนาน (gradual dwindling)"}, {"topic": "Palliative Concept", "q": "Which trajectory features stepwise decline with acute exacerbations and incomplete recovery?", "choices": ["Cancer trajectory", "Dementia and frailty trajectory", "Organ failure trajectory", "Acute traumatic trajectory", "Sudden death trajectory"], "ans": 2, "exp": "**Organ failure trajectory** (Trajectory 2) — พบใน **heart failure และ COPD** ผู้ป่วยจะทรุดเป็นขั้นบันได มี acute exacerbation ที่ต้องนอนโรงพยาบาล แล้วฟื้นกลับมาแต่ไม่ถึงระดับเดิม ทำซ้ำเรื่อยๆ จนเสียชีวิต\n\nลักษณะนี้ทำให้พยากรณ์โรคยากกว่ามะเร็ง เพราะแต่ละครั้งที่ทรุดอาจเป็นครั้งสุดท้ายหรือไม่ก็ได้"}, {"topic": "Palliative Concept", "q": "Which SPICT clinical indicator applies to advanced kidney disease?", "choices": ["Serum creatinine above 1.5 milligrams per decilitre on one occasion", "Any degree of proteinuria detected on routine urinalysis", "A single episode of acute kidney injury during hospitalisation", "Stage 4 or 5 chronic kidney disease with deteriorating health", "Blood pressure requiring two antihypertensive agents"], "ans": 3, "exp": "**SPICT — Kidney disease indicators**: **Stage 4 or 5 chronic kidney disease (eGFR < 30 ml/min) with deteriorating health**, kidney failure complicating other life-shortening conditions or treatments, **stopping or not starting dialysis**\n\nจุดสำคัญคือไม่ใช่แค่ค่า eGFR ต่ำอย่างเดียว แต่ต้องมี **deteriorating health** ร่วมด้วย หรือมีการตัดสินใจหยุด/ไม่เริ่ม dialysis"}, {"topic": "Palliative Concept", "q": "Which finding is a SPICT indicator of decline in dementia or frailty?", "choices": ["Occasional forgetfulness of recent conversations", "Difficulty managing household finances independently", "Need for spectacles for close reading", "Requiring a walking stick for outdoor mobility", "Recurrent aspiration pneumonia"], "ans": 4, "exp": "**SPICT — Dementia/Frailty indicators**: unable to dress, walk or eat without help; eating and drinking less with difficulty swallowing; urinary and faecal incontinence; not able to communicate by speaking, little social interaction; **frequent falls; fractured femur**; recurrent febrile illnesses or infections; **aspiration pneumonia**\n\nตัวเลือกอื่นเป็นความเสื่อมระดับเบา ยังไม่เข้าเกณฑ์ life-shortening condition"}, {"topic": "Palliative Concept", "q": "Which are the three goals of palliative care?", "choices": ["Symptom control, disease management, psychosocial and spiritual care", "Cure, rehabilitation, and vocational reintegration", "Diagnosis, staging, and definitive oncological treatment", "Prevention, screening, and early detection of complications", "Documentation, coding, and reimbursement optimisation"], "ans": 0, "exp": "**Goals of Palliative Care 3 เป้าหมายหลัก**:\n1. **Symptom control** — assess symptoms by using tools + periodic symptom reassessment\n2. **Disease management** — treat reversible conditions + symptom management of incurable conditions\n3. **Psychosocial & Spiritual care** — psychological care (need assessment, practical care, emotional support) + spiritual care (meaning of life/death, unfinished business, values & hopes, love/forgiveness, belief/religion)"}, {"topic": "Palliative Concept", "q": "Palliative radiotherapy is appropriately used for which indication?", "choices": ["Complete eradication of the primary tumour", "Pain control from bone metastasis", "Prevention of new metastatic deposits", "Reversal of established paraplegia after one week", "Improvement of nutritional status in cachexia"], "ans": 1, "exp": "**Palliative RT** ใช้เพื่อ: **control of bleeding, pain control จาก bone metastasis, shrinkage of tumor mass (brain metastasis)**\n\nส่วน **Palliative Surgery**: debulking surgery, immobilize Fx, bowel obstruction (resection, bypass, stent, ostomy), spinal decompression & stabilization\n**Palliative CMT**: slow down progression of disease\n\nทั้งหมดเป็น **disease management เพื่อบรรเทาอาการ ไม่ใช่เพื่อรักษาให้หาย**"}, {"topic": "Palliative Concept", "q": "Which item belongs to the SPIRITUAL domain of holistic assessment?", "choices": ["Nausea and appetite", "Financial burden", "Meaning of life", "Anxiety and depression", "Sleep and rest"], "ans": 2, "exp": "**Holistic Care 4 มิติ**:\n• **PHYSICAL** — functional ability, strength/weakness, sleep & rest, nausea, appetite, pain\n• **PSYCHOLOGICAL** — anxiety, depression, enjoyment/relaxation, pain distress, happiness, fear\n• **SOCIAL** — financial burden, **care giver burden**, roles & relationship, affection/sexual function, appearance\n• **SPIRITUAL** — hope, suffering, **meaning of life**, religiosity, transcendence"}, {"topic": "Palliative Concept", "q": "Which component belongs to SPIRITUAL care rather than psychological care?", "choices": ["Conducting a needs assessment", "Providing practical care arrangements", "Offering emotional support", "Addressing unfinished business", "Screening for depressive symptoms"], "ans": 3, "exp": "**Psychological care** = need assessment, practical care, emotional support\n**Spiritual care** = **meaning of life/death, unfinished business, values & hopes, love & forgiveness, belief & religion**\n\n'Unfinished business' (สิ่งที่ค้างคาใจ เช่น การขอโทษ การคืนดี การจัดการเรื่องที่ยังไม่เสร็จ) เป็นประเด็นทางจิตวิญญาณโดยตรง และเป็นเหตุผลสำคัญที่การบอกความจริงกับผู้ป่วยมีคุณค่า"}, {"topic": "Palliative Concept", "q": "How is a 'good death' defined in palliative care?", "choices": ["Death occurring at home surrounded by all immediate family members", "Death occurring without any medication having been administered", "Death occurring in hospital under full monitoring and resuscitation", "Death occurring only after every treatment option has been attempted", "Death free from physical, psychological, social and spiritual suffering, with the patient's wishes respected"], "ans": 4, "exp": "**A GOOD DEATH** — *'A \"Good\" death or \"the least bad\" death possible'*\n\nคือ **การตาย โดยผู้ป่วยได้รับรู้ว่าความต้องการของเขาได้รับการดูแล ให้ปลอดจากความทุกข์ทรมานทางร่างกาย จิตใจ สังคม และจิตวิญญาณ ตั้งแต่ก่อนเข้าถึงช่วงใกล้ตาย สมาชิกในครอบครัวและทีมสุขภาพมีความเคารพ และยอมรับความต้องการของผู้ป่วย**\n\nสังเกตว่านิยามไม่ได้ผูกกับสถานที่ตายหรือการมีหรือไม่มีการรักษา แต่ผูกกับ **การเคารพความต้องการของผู้ป่วย**"}, {"topic": "Palliative Communication", "q": "In the NURSE mnemonic for empathic response, what does the letter N represent?", "choices": ["Name the emotion", "Normalise the reaction", "Negotiate the care plan", "Notify the family members", "Note the findings in the record"], "ans": 0, "exp": "**NURSE — Empathic Response**:\n• **N = Name of emotion** (วิเคราะห์อารมณ์ความรู้สึก) — 'หมอสังเกตได้ว่าคุณดูวิตกกังวล?'\n• **U = Understand** (แสดงความเห็นว่าคุณเข้าใจ) — 'ดูเหมือนจะเป็นช่วงเวลาที่ลำบากมากสำหรับคุณ'\n• **R = Respect** (ให้เกียรติผู้ป่วย) — 'ที่ผ่านมาคุณทำได้ดีมากแล้ว'\n• **S = Support** (ให้การสนับสนุน) — 'เราจะให้การดูแลคุณให้ผ่านช่วงนี้ไปได้'\n• **E = Explore** (ค้นหา) — 'สิ่งที่ยากลำบากที่สุดสำหรับคุณคืออะไร?'"}, {"topic": "Palliative Communication", "q": "Which statement is an example of the SUPPORT component of the NURSE framework?", "choices": ["I notice that you appear quite anxious about this", "We will take care of you through this period", "It sounds as though this has been a very difficult time", "You have coped remarkably well up to this point", "What has been the hardest part of this for you?"], "ans": 1, "exp": "**S = Support** — ให้การสนับสนุน เช่น 'เราจะให้การดูแลคุณให้ผ่านช่วงนี้ไปได้' หรือ 'ส่วนใหญ่จะรู้สึกเหมือนถูกทิ้งหากการรักษาไปต่อไม่ได้แล้ว'\n\n⚠️ **ข้อควรระวัง: อย่าให้สัญญาในสิ่งที่เป็นไปไม่ได้** เช่น อย่าพูดว่า 'หมอจะทำให้คุณหายแน่นอน'\n\nตัวเลือกอื่นตรงกับ N (name), U (understand), R (respect), E (explore) ตามลำดับ"}, {"topic": "Palliative Communication", "q": "In the SPIKES protocol for breaking bad news, what does the letter P represent?", "choices": ["Preparation — arranging the room and reviewing the records", "Prognosis — stating the expected survival time", "Perception — assessing what the patient already understands", "Planning — outlining the proposed treatment schedule", "Privacy — ensuring confidentiality of the discussion"], "ans": 2, "exp": "**SPIKES Protocol**:\n• **S = Setting up** (จัดสถานที่, ใครควรอยู่ด้วย, แนะนำตัว, SOLER)\n• **P = Perception** (ประเมินการรับรู้ของผู้ป่วย — *'Before you tell, ask'*)\n• **I = Invitation** (ถามความต้องการรับข้อมูลว่าอยากทราบระดับใด)\n• **K = Knowledge** (ให้ข้อมูล/บอกวินิจฉัย — ใช้ warning shot ก่อน)\n• **E = Emotions & Empathy** (ใช้ NURSE)\n• **S = Strategy & Summary**"}, {"topic": "Palliative Communication", "q": "What is the purpose of the 'warning shot' in the KNOWLEDGE step of SPIKES?", "choices": ["To confirm the diagnosis with a second physician before disclosure", "To warn the family so they can leave the room beforehand", "To document that consent for disclosure has been obtained", "To prepare the patient emotionally just before bad news is delivered", "To indicate that the consultation time is nearly finished"], "ans": 3, "exp": "**Warning shot** คือการยิงสัญญาณเตือนก่อนแจ้งข่าวร้าย เพื่อให้ผู้ป่วยเตรียมใจ:\n• 'อย่างที่ทราบคุณได้ทำ CT scan/Lab **ผลนั้นทำให้หมอค่อนข้างกังวลใจ**'\n• 'หมอเกรงว่าผลการตรวจของคุณจะไม่เป็นตามที่หวัง'\n\nจากนั้น **เว้นจังหวะ** สังเกตอารมณ์และปฏิกิริยา → **แจ้งผลด้วยภาษาที่เข้าใจง่าย** → **เว้นจังหวะอีกครั้ง ใช้ silence technique**\n\nการบอกข่าวร้ายกะทันหันโดยไม่มี warning shot ทำให้ผู้ป่วยตกใจจนไม่ได้ยินข้อมูลที่ตามมา"}, {"topic": "Palliative Communication", "q": "In the SOLER framework for non-verbal communication, what does E represent?", "choices": ["Empathy", "Explore", "Explain", "Encourage", "Eye contact"], "ans": 4, "exp": "**SOLER** — ลักษณะทางกายที่แสดงถึงความใส่ใจ:\n• **S = Squarely** (นั่งหันหน้าตรงเข้าหาผู้ป่วย)\n• **O = Open** (ท่าทางเปิด ไม่กอดอก)\n• **L = Lean** (โน้มตัวเข้าหาเล็กน้อย)\n• **E = Eye contact** (สบตา)\n• **R = Relax** (ผ่อนคลาย)\n\nใช้ในขั้น **Setting up** ของ SPIKES"}, {"topic": "Palliative Communication", "q": "During a difficult conversation, when should the physician AVOID maintaining eye contact?", "choices": ["When the patient is angry or crying", "When the patient is describing their symptoms", "When the patient asks about the prognosis", "When the family is present in the room", "When an interpreter is translating the conversation"], "ans": 0, "exp": "หลักการใน **CLASS — C (Physical Context)**: **Eye contact — ประสานสายตาเมื่อผู้ป่วยพูด ยกเว้นเมื่อผู้ป่วยโกรธหรือร้องไห้**\n\nเหตุผล: การจ้องมองขณะผู้ป่วยโกรธอาจถูกตีความว่าท้าทาย และขณะร้องไห้อาจทำให้ผู้ป่วยรู้สึกอับอายและถูกจับจ้อง — การละสายตาชั่วขณะเป็นการให้พื้นที่ส่วนตัว\n\nองค์ประกอบอื่นของ C: สถานที่เป็นส่วนตัว **นั่งระดับสายตา ห่าง 2–3 ฟุต**, body language ผ่อนคลายไม่รีบร้อน, touch (optional), introductions"}, {"topic": "Palliative Communication", "q": "How should silence be used when a patient is crying?", "choices": ["Fill the silence quickly with reassurance to reduce the distress", "Allow the silence, as it conveys that the emotion is being acknowledged", "Leave the room until the patient has fully regained composure", "Redirect the conversation to practical treatment planning", "Ask the patient to explain the reason for the tears immediately"], "ans": 1, "exp": "หลักการเรื่อง **การเงียบ (Silence)** ใน CLASS — L (Listening skills):\n• โดยทั่วไป การเงียบอาจเป็นช่วงที่ผู้ป่วยกำลังครุ่นคิด อาจกระตุ้นด้วย 'ที่คุณเงียบไป บอกหมอได้หรือไม่ว่ากำลังคิดอะไรอยู่'\n• **แต่ขณะที่ผู้ป่วยร้องไห้ ความเงียบเป็นสิ่งที่ช่วยให้ผู้ป่วยรับรู้ว่าเรากำลังรับรู้อารมณ์เขา** ← ไม่ต้องรีบพูด\n\nการรีบปลอบหรือเปลี่ยนเรื่องเป็นการปิดกั้นการแสดงอารมณ์ ซึ่งสวนทางกับเป้าหมายของ empathic response"}, {"topic": "Palliative Communication", "q": "In the ABCDEF approach to conspiracy of silence, what does A represent?", "choices": ["Advise the family that withholding information is unlawful", "Arrange a family meeting with the full multidisciplinary team", "Acknowledge that the family's wish arises from love and concern", "Assess the patient's decision-making capacity formally", "Ask the family to sign a written refusal of disclosure"], "ans": 2, "exp": "**ABCDEF — Dealing with Conspiracy of Silence**:\n• **A = Acknowledge** — **สะท้อนความรู้สึกว่าการที่ญาติไม่อยากบอกผู้ป่วย เป็นเพราะรักและห่วงใย** เช่น 'หมอเข้าใจว่าคุณเป็นห่วงว่าอาการของผู้ป่วยจะแย่ลง หากบอกอาการ'\n• **B = Build up information / Benefit vs Harm**\n• **C = Comparison** (ให้ญาติเปรียบเทียบว่าถ้าเป็นตัวเองจะอยากรู้ไหม)\n• **D = Deal with patient**\n• **E = Encounter** (สนับสนุนการบอกความจริง)\n• **F = Follow up** (นัดติดตาม)\n\nการเริ่มด้วยการตำหนิญาติจะทำให้เสียความร่วมมือทันที"}, {"topic": "Palliative Communication", "q": "A family insists the patient must not be told the diagnosis. What is the physician's CORRECT position?", "choices": ["Disclose the diagnosis immediately regardless of the family's wishes", "Agree fully with the family and withhold the information indefinitely", "Refer the case to the hospital ethics committee before any conversation", "Answer truthfully if the patient asks, but not force information on an unwilling patient", "Ask the family to obtain written consent from the patient's employer"], "ans": 3, "exp": "หลักการใน **E = Encounter** ของ ABCDEF:\n> **'หมอต้องตอบความจริงถ้าผู้ป่วยถาม แต่จะไม่บีบบังคับให้ข้อมูลถ้าผู้ป่วยไม่ต้องการทราบ'**\n\nนี่คือจุดสมดุลระหว่าง **สิทธิของผู้ป่วยที่จะทราบความจริง** กับ **สิทธิที่จะไม่รับรู้ (right not to know)** — และเป็นเหตุผลว่าทำไม SPIKES จึงมีขั้น **Invitation** เพื่อถามก่อนว่าผู้ป่วยอยากทราบข้อมูลระดับใด"}, {"topic": "Palliative Communication", "q": "Which technique is recommended for checking understanding during a family meeting?", "choices": ["Closed-ended questioning throughout", "Delivering all information before inviting any questions", "Written handout without verbal discussion", "Having the most junior team member repeat the summary", "Ask-Tell-Ask"], "ans": 4, "exp": "ในขั้น **Discussing** ของ family meeting: **แพทย์ควรสื่อสารให้ช้า ให้ชัด อาจหยุดเพื่อถามความเข้าใจผู้ป่วยเป็นระยะ (Ask-Tell-Ask)**\n\nวิธีการ: **Ask** (ถามว่าเข้าใจอะไรอยู่แล้ว) → **Tell** (ให้ข้อมูลทีละส่วนสั้นๆ) → **Ask** (ถามกลับว่าเข้าใจอย่างไร) แล้ววนซ้ำ\n\nดีกว่าการพูดยาวรวดเดียวแล้วค่อยถาม เพราะผู้ป่วยและญาติในภาวะเครียดจะจำข้อมูลได้จำกัดมาก"}, {"topic": "Palliative Communication", "q": "What is the difference between an Advance Care Plan and Advance Directives?", "choices": ["Advance Directives must be written and signed, whereas an ACP may be verbal or written", "An ACP is legally binding, whereas Advance Directives are only advisory", "Advance Directives may be made by the family, whereas an ACP requires the patient", "An ACP applies only to cancer patients, whereas Advance Directives apply to all", "Advance Directives are completed by the physician, whereas an ACP is completed by nursing staff"], "ans": 0, "exp": "| | **Advance Care Plan (ACP)** | **Advance Directives (AD)** |\n|---|---|---|\n| **นิยาม** | ผลลัพธ์ของการวางแผนการดูแลล่วงหน้า ที่บอกถึงความปรารถนาของผู้ป่วย | เขียนแผนการดูแลรักษาล่วงหน้าเป็นลายลักษณ์อักษร และมีการลงลายมือชื่อของผู้ป่วย |\n| **รูปแบบ** | **โดยเป็นการบอกกล่าว หรือเขียนก็ได้** | **ต้องเป็นลายลักษณ์อักษร + ลงลายมือชื่อ** |\n| **เนื้อหา** | ความปรารถนาโดยรวม | มีรายละเอียดการยินยอมหรือปฏิเสธการรักษาในวาระสุดท้าย |"}, {"topic": "Palliative Communication", "q": "Which topic is one of the KEY TOPICS to explore when creating an advance care plan?", "choices": ["The patient's total accumulated medical expenses to date", "Which physical states the patient would find unacceptable", "The patient's compliance with previous outpatient appointments", "The number of relatives available to provide daily care", "The distance from the patient's home to the nearest hospital"], "ans": 1, "exp": "**Step 4 — Explore Key Topics** ของ ACP มี 6 หัวข้อ:\n1. **Goals** — 'อะไรคือเป้าหมายในชีวิตที่สำคัญสำหรับคุณ'\n2. **Fears & worries** — 'อะไรคือสิ่งที่คุณกังวลหรือกลัว'\n3. **Sources of strength** — 'อะไรทำให้ชีวิตของคุณมีความหมาย'\n4. **Critical abilities** — **'สภาวะร่างกายแบบไหนที่คุณยอมรับไม่ได้'** ← ข้อนี้\n5. **Trade-offs** — 'คุณคิดอย่างไรกับการรักษาพยุงชีพ'\n6. **Surrogate decision maker** — 'คุณจะให้ใครเป็นผู้ตัดสินใจแทน'"}, {"topic": "Palliative Communication", "q": "Which approach helps a patient prepare for an outcome that may not match their hopes?", "choices": ["Correct the unrealistic expectation directly and state the statistics", "Avoid the topic entirely until the deterioration actually occurs", "Acknowledge the hope while voicing the worry, then plan for both", "Ask the family to inform the patient on the physician's behalf", "Defer the discussion to the next scheduled outpatient visit"], "ans": 2, "exp": "หลักการ **'Hope for the best, prepare for the worst'** ใน Step 3 (Share prognosis) ของ ACP:\n> 'หมอรับรู้ว่าคุณคาดหวังว่า...... **แต่หมอเองก็กังวลใจว่า** ...... หากเป็นอย่างนั้น คุณคิดอย่างไร?'\n> 'เรามาลองวางแผนสำรอง หากสิ่งที่คุณต้องการไม่เป็นไปตามที่คุณหวัง'\n\nรูปแบบ **'I hope... and I worry...'** ยอมรับความหวังของผู้ป่วยโดยไม่หักล้าง แล้วเปิดพื้นที่พูดถึงความเป็นไปได้อื่นควบคู่กัน"}, {"topic": "Palliative Communication", "q": "Which statement about a living will under Section 12 of the Thai National Health Act is CORRECT?", "choices": ["It permits a physician to administer a lethal dose at the patient's request", "It takes effect as soon as the patient is admitted to hospital", "It requires the approval of two independent physicians to be valid", "A health professional who follows it is exempt from all legal liability", "It may be executed only by patients already diagnosed with terminal cancer"], "ans": 3, "exp": "**มาตรา 12 พ.ร.บ.สุขภาพแห่งชาติ พ.ศ. 2550**:\n> 'บุคคลมีสิทธิทำหนังสือแสดงเจตนาไม่ประสงค์จะรับบริการสาธารณสุขที่เป็นไปเพียงเพื่อยืดการตาย ในวาระสุดท้ายของชีวิต หรือเพื่อยุติการทรมานจากการเจ็บป่วยได้ ... **เมื่อผู้ประกอบวิชาชีพด้านสาธารณสุขได้ปฏิบัติตามเจตนาของบุคคลตามวรรคหนึ่งแล้ว มิให้ถือว่าการกระทำนั้นเป็นความผิดและให้พ้นจากความรับผิดทั้งปวง**'\n\n⚠️ **Living will ≠ Euthanasia** — ไม่เร่งให้ตาย ไม่ยื้อความตาย และไม่ทอดทิ้งผู้ป่วยโดยไม่รักษา"}, {"topic": "Palliative Communication", "q": "What is the minimum age at which a person may independently execute a living will in Thailand?", "choices": ["15 years", "20 years", "21 years", "25 years", "18 years"], "ans": 4, "exp": "คุณสมบัติผู้ทำ Living Will: **ผู้ที่มีอายุตั้งแต่ 18 ปีขึ้นไป และมีสติสัมปชัญญะดีพอที่จะสื่อสารได้ตามปกติ สามารถทำหนังสือแสดงเจตนาได้ด้วยตนเอง**\n\n**ผู้ที่อายุต่ำกว่า 18 ปี สามารถทำได้ หากได้รับความยินยอมจากบิดา มารดา ผู้ปกครอง หรือผู้อุปการะเลี้ยงดู**\n\nและ **สามารถทำ ณ สถานที่ใดก็ได้** ไม่จำเป็นต้องทำที่โรงพยาบาล"}, {"topic": "Palliative Communication", "q": "If a patient has executed several living wills, which version is legally effective?", "choices": ["The most recent one submitted to the treating team", "The first one ever executed by the patient", "The one witnessed by the greatest number of people", "The one held by the designated surrogate decision maker", "The one notarised by a licensed legal practitioner"], "ans": 0, "exp": "การยกเลิก/แก้ไข Living Will: ผู้ทำหนังสือแสดงเจตนา **อาจยกเลิกหรือเปลี่ยนแปลงเมื่อใดก็ได้** โดยขีดฆ่าหรือเพิ่มเติมข้อความใหม่แล้วลงลายมือชื่อ ระบุวันที่แก้ไข และควรแจ้งแก่ผู้แสดงเจตนาแทน พยาน คนใกล้ชิด และทีมผู้รักษาให้ทราบทุกครั้ง\n\n**ฉบับที่มีผลบังคับใช้ คือ ฉบับที่ทำหลังสุดที่ยื่นต่อทีมผู้รักษา**\n\nหมายเหตุ: **พยานไม่จำเป็นต้องมีก็ได้** แม้จะแนะนำให้มีเพื่อยืนยันความถูกต้อง"}, {"topic": "Palliative Symptom Mx", "q": "In the SOCRATES mnemonic for pain history, what does the letter C represent?", "choices": ["Cause", "Character", "Chronicity", "Comorbidity", "Consciousness"], "ans": 1, "exp": "**SOCRATES** — การซักประวัติความปวด:\n• **S = Site** ตำแหน่ง\n• **O = Onset** เริ่มเมื่อไหร่\n• **C = Character** ลักษณะปวด\n• **R = Radiation** ร้าวไปไหน\n• **A = Association factors** อาการร่วม\n• **T = Timing** ช่วงเวลา\n• **E = Exacerbating/relieving factors** ปัจจัยกระตุ้น/บรรเทา\n• **S = Severity** ความรุนแรง"}, {"topic": "Palliative Symptom Mx", "q": "Which pain scale is designed for children aged 2 months to 7 years?", "choices": ["Numeric rating scale", "Wong-Baker FACES scale", "FLACC scale", "Visual analogue scale", "Brief Pain Inventory"], "ans": 2, "exp": "**FLACC Scale** ใช้กับ **ผู้ป่วยเด็กอายุ 2 เดือน – 7 ปี และผู้ป่วยเด็กที่มีความผิดปกติทางสมอง** — เป็น behavioral observation scale สำหรับผู้ที่สื่อสารเองไม่ได้\n\n5 หมวด: **F**ace (ใบหน้า) · **L**egs (ขา) · **A**ctivity (การเคลื่อนไหว) · **C**ry (ร้องไห้) · **C**onsolability (การตอบสนองต่อการปลอบโยน) — คะแนน 0–2 ต่อหมวด รวม 0–10\n\nแปลผล: 0 = relaxed, 1–3 = mild, 4–6 = moderate, 7–10 = severe และ **≥ 4 ต้องมี intervention**"}, {"topic": "Palliative Symptom Mx", "q": "Pain occurring spontaneously without a trigger, on top of controlled background pain, is termed:", "choices": ["Incident pain", "End-of-dose failure", "Neuropathic pain", "Breakthrough pain", "Referred pain"], "ans": 3, "exp": "**Pain Pattern**:\n• **Background pain** — 'Around the clock' ปวดตลอดเวลา\n• **Episodic pain** แบ่ง 3 แบบ:\n  – **End-of-dose failure** — **ปวดก่อนถึงเวลาให้ยาครั้งถัดไป** → แก้โดยเพิ่มขนาดยาหรือลดช่วงห่าง\n  – **Breakthrough pain (BTP)** — **ปวดขึ้นอย่างเฉียบพลันแม้ไม่มีสิ่งกระตุ้น** → ให้ยา **prn**\n  – **Incident pain** — **ปวดเฉียบพลันที่มีสิ่งกระตุ้น** → ให้ยา **before activity**"}, {"topic": "Palliative Symptom Mx", "q": "Which of the WHO analgesic ladder principles means giving analgesia on a fixed schedule rather than waiting for pain?", "choices": ["By mouth", "For the individual", "Attention to detail", "By the ladder", "By the clock"], "ans": 4, "exp": "**หลักการใช้ยา 4 ข้อของ WHO**:\n• **By mouth** — oral administration preferred over parenteral route\n• **By the clock** — **around the clock dosing to prevent pain** ← ให้ตามเวลา ไม่รอให้ปวดก่อน\n• **For the individual** — tailor pain relief to individual needs and circumstances\n• **Attention to detail** — explore all sources of pain and adverse effects of treatment\n\nการให้ตามเวลาป้องกันไม่ให้ระดับยาตกลงจนปวดกลับมา ซึ่งควบคุมยากกว่าการป้องกันไว้แต่แรก"}, {"topic": "Palliative Symptom Mx", "q": "A patient on oral morphine 60 mg per day is switched to intravenous morphine. What is the appropriate daily IV dose?", "choices": ["20 mg", "60 mg", "180 mg", "30 mg", "120 mg"], "ans": 0, "exp": "**Conversion ratio: Morphine Oral : Morphine IV/SC = 3 : 1**\n\nดังนั้น oral 60 mg/day ÷ 3 = **IV 20 mg/day**\n\nตัวอย่างการสั่ง: **Morphine 20 mg + NSS up to 100 ml IV drip 4 ml/hr** และ **+ Morphine 2 mg IV prn q 2 hr (10% ของ BGP)**\n\nตารางที่ต้องจำ: Tramadol PO : Morphine PO = 5:1, Codeine PO : Morphine PO = 10:1, Morphine IV : Fentanyl IV = 100:1"}, {"topic": "Palliative Symptom Mx", "q": "How is the breakthrough pain dose calculated relative to the total daily opioid dose?", "choices": ["50 percent of the total daily dose", "10 to 20 percent of the total daily dose", "Equal to one scheduled dose regardless of total", "1 to 2 percent of the total daily dose", "A fixed 5 mg dose irrespective of the total"], "ans": 1, "exp": "**Breakthrough pain dose = 10–20% ของ total daily dose**\n\nตัวอย่าง: ผู้ป่วยได้ background pain (BGP) 60 mg/day → BTP = 10–20% ของ 60 = **6–12 mg** (ปัดใช้ 10 mg)\n\nสูตรคำนวณ maintenance: total 24 hr → split around the clock q 4 hr → BTP = 10–20% ของ total daily dose → ให้ prn q 2 hr"}, {"topic": "Palliative Symptom Mx", "q": "Which opioid side effect does NOT develop tolerance and requires laxatives throughout treatment?", "choices": ["Nausea and vomiting", "Sedation", "Constipation", "Pruritus", "Respiratory depression"], "ans": 2, "exp": "**Constipation ไม่เกิด tolerance จึงต้องให้ยาระบายตลอดเวลาที่ใช้ Opioids** ← จุดที่ออกสอบบ่อยที่สุด\n\nเปรียบเทียบ side effects ของ opioids:\n• **Nausea/Vomiting** — มักพบช่วงแรก อาจให้ยาแก้อาเจียนใน **3–4 วันแรก** (tolerance เกิดได้)\n• **Constipation** — **เป็นตลอดระยะที่รับประทานยา** (ไม่มี tolerance)\n• **Sedation** — พบช่วงแรก มักปรับตัวได้ภายใน **2–3 วัน**\n• ปากแห้ง ปัสสาวะลำบาก สับสน — พบได้น้อย"}, {"topic": "Palliative Symptom Mx", "q": "For constipation prophylaxis in a patient starting opioids, which agent is recommended?", "choices": ["Psyllium bulk-forming fibre", "Loperamide", "Oral rehydration solution", "Senna", "Dietary fibre modification alone"], "ans": 3, "exp": "**Constipation prophylaxis >> Senna** (stimulant laxative)\n\nหลักการจัดการ opioid-induced constipation:\n• ควรให้ยากลุ่ม **Stimulants / Softeners** — Senna, Bisacodyl, Lactulose\n• **Constipated with hard feces >> Softeners +/− enema**\n• **การดูแลเรื่องอาหารอย่างเดียวมักไม่ช่วยให้ดีขึ้น**\n• ⚠️ **หลีกเลี่ยง bulk-forming agents** (เช่น psyllium) เพราะจะทำให้ **impact มากขึ้น** ในลำไส้ที่ peristalsis ลดลงจาก opioid"}, {"topic": "Palliative Symptom Mx", "q": "After opioid rotation, by how much should the calculated equianalgesic dose be reduced?", "choices": ["It should be increased by 25 to 50 percent to ensure efficacy", "No adjustment is required if the conversion ratio is applied", "It should be reduced by 75 to 90 percent as a safety margin", "It should be halved only if the patient has renal impairment", "25 to 50 percent, due to incomplete cross tolerance"], "ans": 4, "exp": "**After opioid rotation >> DECREASE 25–50% due to INCOMPLETE CROSS TOLERANCE**\n\nเหตุผล: ผู้ป่วยที่ทน (tolerant) ต่อ opioid ตัวเดิม จะ **ไม่ได้ทนต่อ opioid ตัวใหม่ในระดับเดียวกัน** เพราะแต่ละตัวจับ receptor subtype ต่างกัน — ถ้าให้ตามสูตร conversion เต็มขนาดอาจเกิด overdose\n\n**Indication ของ opioid rotation** 3 ข้อ: (1) cannot tolerate side effect (2) tolerance (3) high dose opioid but cannot control pain"}, {"topic": "Palliative Symptom Mx", "q": "Which opioid is SAFEST in a patient with severe renal impairment?", "choices": ["Fentanyl", "Morphine", "Oxycodone", "Codeine", "Hydromorphone"], "ans": 0, "exp": "ตาราง opioid dosing ใน renal impairment (GFR < 10):\n• **Morphine — Not recommended** ⚠️ (metabolite สะสม)\n• **Oxycodone — Not recommended**\n• Hydromorphone — 25%\n• **Methadone — 50–75%**\n• **Fentanyl — 50%** ✅\n\n**Fentanyl ใช้ได้ในผู้ป่วยไตวาย (available in renal disease)** เพราะไม่มี active metabolite ที่ขับทางไต — สรุปจำ: **ไตวายรุนแรง → หลีกเลี่ยง Morphine และ Oxycodone; ใช้ Fentanyl หรือ Methadone ได้**"}, {"topic": "Palliative Symptom Mx", "q": "In a morphine-naive patient with dyspnea, what is the recommended starting dose of oral morphine?", "choices": ["10 to 15 mg prn every 4 to 6 hours", "2.5 to 5 mg prn every 4 to 6 hours", "20 to 30 mg prn every 4 to 6 hours", "30 to 60 mg prn every 4 to 6 hours", "Morphine is contraindicated in dyspnea"], "ans": 1, "exp": "**Opioids for Breathlessness**:\n• **ผู้ป่วย morphine naive — เริ่มด้วย 2.5–5 mg PO prn q 4–6 hr** ปรับตามการตอบสนอง\n• ถ้าใช้ morphine > 2 ครั้ง/วัน >> เปลี่ยนเป็น **regular long acting morphine**\n• **ผู้ป่วยที่ใช้ Morphine อยู่แล้ว — เพิ่มขนาดที่ใช้อยู่ขึ้นอีก 30%**\n\nกลไก: opioids ลด ventilatory response ต่อ hypercapnia/hypoxia และลด respiratory effort — **ใช้ขนาดน้อย ไม่มีผลกดการหายใจ**"}, {"topic": "Palliative Symptom Mx", "q": "Which non-pharmacological measure is specifically recommended for breathlessness?", "choices": ["Strict bed rest with minimal positional change", "Fluid restriction to less than 500 ml daily", "Directing airflow at the face with a handheld fan", "Chest physiotherapy with vigorous percussion", "Continuous high-flow oxygen regardless of saturation"], "ans": 2, "exp": "**Non-pharmacological management ของ dyspnea**: positioning, exercise, relaxation techniques (distraction, imaginary, meditation), **ambient airflow — handheld fan**, patient & family education & follow up\n\nกลไกของพัดลม: กระแสลมกระตุ้น **trigeminal nerve receptors** บริเวณใบหน้า ซึ่งส่งสัญญาณลดการรับรู้ความรู้สึกหายใจลำบากที่ระดับสมอง — ได้ผลจริงและไม่มีผลข้างเคียง\n\n⚠️ ให้ **supplemental oxygen เฉพาะเมื่อ hypoxemic** ไม่ใช่ให้ทุกราย"}, {"topic": "Palliative Emergency", "q": "In malignant spinal cord compression, which spinal level is MOST commonly affected?", "choices": ["Cervical", "Lumbar", "Sacral", "Thoracic", "Coccygeal"], "ans": 3, "exp": "**The most common level = THORACIC (70%)** ← ออกสอบบ่อยที่สุด\n\nข้อมูลอื่นที่ต้องจำ: พบ **3–15% ในผู้ป่วย metastatic cancer**, common primaries คือ **Breast, Prostate, Lung, Thyroid, Cancer & Multiple myeloma**\n\nพยาธิสภาพ: compression → edema, venous congestion & demyelination (**reversible**) แต่ prolonged compression → vascular injury, cord necrosis & permanent damage (**irreversible**)"}, {"topic": "Palliative Emergency", "q": "In suspected malignant spinal cord compression, when should dexamethasone be given?", "choices": ["Only after MRI has confirmed the diagnosis", "Only after a tissue diagnosis has been obtained", "Only if the patient has already lost the ability to walk", "Only when radiotherapy cannot be arranged within a week", "Immediately, without waiting for imaging results"], "ans": 4, "exp": "**DO NOT DELAY WHILE AWAITING IMAGING RESULTS** — ให้ steroid ก่อน ไม่ต้องรอผล imaging เพราะทุกชั่วโมงที่ล่าช้าเพิ่มโอกาส irreversible cord damage\n\n**Dosing: Start Dexamethasone 16 mg IV/PO (loading dose) then 16 mg daily (8 mg × 2 doses IV/PO)**\n\n⚠️ **Contraindication: Suspicious of hematological malignancy (Lymphoma/Myeloma)** เพราะ steroid จะทำให้ biopsy และ histologic confirmation ยากขึ้น"}, {"topic": "Palliative Emergency", "q": "Which imaging modality is the gold standard for malignant spinal cord compression?", "choices": ["MRI whole spine", "Plain radiograph of the spine", "Bone scintigraphy", "CT without contrast", "Positron emission tomography"], "ans": 0, "exp": "**MRI whole spine = GOLD STANDARD (Sensitivity 93%, Specificity 97%)**\n\n• **CT myelography** — ใช้เมื่อ MRI มีข้อห้าม\n• **X-ray — inadequately sensitive for metastatic disease** ⚠️ ไม่ควรใช้ตัดสินใจ\n\nต้องถ่าย **whole spine** เพราะ metastasis มักมีหลายระดับ (multilevel) และการฉายรังสีต้องครอบคลุมทุกจุด"}, {"topic": "Palliative Emergency", "q": "Which is the MOST common cause of superior vena cava obstruction?", "choices": ["Aortic aneurysm", "Malignant mediastinal tumour", "Tuberculous mediastinitis", "Thymoma", "Cystic hygroma"], "ans": 1, "exp": "**Malignant mediastinal tumors ทำให้เกิด SVCO ถึง 80%**:\n• **Non-small cell lung cancer 43–59%**\n• **Small-cell lung cancer 7–39%**\n• **Lymphoma 1–25%**\n• Metastatic cancers 1–15%\n\nจำ: **CA lung, Lymphoma, CA metastasis**\n\nสาเหตุ non-malignant: vascular disease, infections (histoplasmosis, TB, syphilis), benign mediastinal tumors, และ **catheter-related thrombosis** (สำคัญขึ้นเรื่อยๆ)"}, {"topic": "Palliative Emergency", "q": "Which supportive measure is appropriate in superior vena cava obstruction?", "choices": ["Placing the patient flat to improve cerebral perfusion", "Rapid intravenous fluid loading via an upper limb cannula", "Elevating the patient's head to decrease venous pressure", "Applying compression bandages to the upper extremities", "Positioning the patient in steep head-down tilt"], "ans": 2, "exp": "**Supportive treatment ของ SVCO**:\n• **Elevating the patient's head to decrease venous pressure** ← ลดแรงดันในระบบหลอดเลือดดำส่วนบน\n• **Oxygen supplement** (ถ้ามี hypoxia)\n• **Glucocorticoid: 16 mg/day PO/IV × 5 days**\n\nการให้นอนราบหรือศีรษะต่ำจะยิ่งเพิ่ม venous congestion และ cerebral edema — และควรหลีกเลี่ยงการให้สารน้ำทางแขนซึ่งอยู่เหนือจุดอุดตัน"}, {"topic": "Palliative Emergency", "q": "Which formula is used to calculate corrected calcium?", "choices": ["0.8 x (serum albumin - 4.0) + serum calcium", "serum calcium / (0.8 x serum albumin)", "(serum calcium x 4.0) - 0.8 x serum albumin", "0.8 x (4.0 - serum albumin) + serum calcium", "serum calcium + (serum albumin / 0.8)"], "ans": 3, "exp": "**Corrected Calcium = 0.8 × (4.0 − serum Albumin) + serum Calcium**\n\nเหตุผล: แคลเซียมประมาณครึ่งหนึ่งจับกับ albumin — ถ้า albumin ต่ำ ค่า total calcium จะดูต่ำกว่าความเป็นจริงทั้งที่ ionized calcium อาจปกติหรือสูง\n\nค่าอ้างอิง: **Normal Calcium = 8–10 mg/dL** และ severity: **Mild 10.5–11.9 · Moderate 12–13.9 · Severe > 14 mg/dL**"}, {"topic": "Palliative Emergency", "q": "Which measure is recommended during terminal bleeding in a palliative patient?", "choices": ["Leave the patient alone briefly to summon the full team", "Position the patient supine and flat to maintain perfusion", "Administer intravenous tranexamic acid over thirty minutes", "Begin rapid crystalloid resuscitation through two large cannulae", "Cover the bleeding with dark-coloured towels"], "ans": 4, "exp": "**Non-Pharmacologic Management in Terminal Bleeding**:\n1. **Stay calm & call for help**\n2. **Ensure that a healthcare professional stays with the patient at all time** ⚠️ ห้ามทิ้งผู้ป่วยไว้คนเดียว\n3. **Lie patient in RECOVERY POSITION to keep airway clear** (ไม่ใช่นอนหงายราบ)\n4. **COVER BLEEDING WITH DARK TOWELS** ← ผ้าสีเข้มลดความหวาดกลัวจากการเห็นเลือด\n5. Apply pressure with hemostatic dressings/gauze or adrenaline soaks\n\nพร้อมให้ **sedative (Midazolam 5–10 mg IV/SC/IM)** เพื่อลด anxiety — ไม่ใช่การกู้ชีพ"}];
const KEY = "commed_mcq_200";
let state = JSON.parse(localStorage.getItem(KEY) || "{}");
const wrap = document.getElementById('wrap');
const LAB = ["A","B","C","D","E"];

function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function render(){
  const f = document.getElementById('filter').value;
  wrap.innerHTML = "";
  let shown = 0;
  DATA.forEach((q,i)=>{
    if(f!=="__ALL__" && q.topic!==f) return;
    shown++;
    const card = document.createElement('div'); card.className='q';
    const chosen = state[i];
    card.innerHTML = `<div class="qhead"><span class="qnum">ข้อ ${i+1}</span><span class="badge">${q.topic}</span></div>
      <div class="stem">${q.q}</div>${q.img?`<img class="qimg" src="${q.img}" alt="รูปประกอบข้อสอบ" loading="lazy">`:''}`;
    q.choices.forEach((c,j)=>{
      const b=document.createElement('button'); b.className='opt';
      b.innerHTML=`<span class="lab">${LAB[j]}.</span>${c}`;
      if(chosen!==undefined){
        b.disabled=true;
        if(j===q.ans) b.classList.add('correct');
        if(j===chosen && chosen!==q.ans) b.classList.add('wrong');
      } else {
        b.onclick=()=>{ state[i]=j; save(); render(); };
      }
      card.appendChild(b);
    });
    const exp=document.createElement('div'); exp.className='exp'+(chosen!==undefined?' show':'');
    if(chosen!==undefined){
      const ok = chosen===q.ans;
      exp.innerHTML=`<div class="res ${ok?'ok':'bad'}">${ok?'✔ ถูกต้อง':'✘ ยังไม่ถูก'} — คำตอบที่ถูกคือ ${LAB[q.ans]}</div>
        <div><span class="tag">เฉลย:</span>${q.exp}</div>`;
    }
    card.appendChild(exp);
    wrap.appendChild(card);
  });
  if(shown===0){ wrap.innerHTML='<div class="empty">ไม่มีข้อในหมวดนี้</div>'; }
  const done=Object.keys(state).length;
  let correct=0; for(const k in state){ if(state[k]===DATA[k].ans) correct++; }
  document.getElementById('progress').textContent=`ทำแล้ว ${done}/200`;
  document.getElementById('score').textContent=`คะแนน ${correct}/${done||0}`;
}
document.getElementById('filter').onchange=render;
document.getElementById('resetBtn').onclick=()=>{ if(confirm('ล้างคำตอบทั้งหมด?')){ state={}; save(); render(); } };
render();
</script>

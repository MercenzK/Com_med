# PART A — อาชีวเวชศาสตร์

## 1. หลักการอาชีวเวชศาสตร์ (Lect 1.1)

### นิยาม
- **อาชีวอนามัย (Occupational health)** — งานสาธารณสุขที่ส่งเสริมและธำรงรักษาสุขภาพกาย จิต สังคม ของคนทำงานในทุกอาชีพให้อยู่ในระดับสูงสุด (ILO/WHO)
- **อาชีวเวชศาสตร์ (Occupational medicine)** — วิชาชีพย่อยในอาชีวอนามัย เน้น **ป้องกัน วินิจฉัย รักษา** อุบัติเหตุ/เจ็บป่วยจากการทำงาน

### สิ่งคุกคามสุขภาพ (Health hazards) — 5 กลุ่ม ⭐ออกสอบบ่อย
| # | ชนิด | ตัวอย่าง |
|---|------|---------|
| 1 | **Physical** กายภาพ | เสียง ความร้อน ความเย็น ความกดอากาศ รังสี ความสั่นสะเทือน |
| 2 | **Chemical** เคมี | ตัวทำละลาย โลหะหนัก ฝุ่น ก๊าซ ไอระเหย |
| 3 | **Biological** ชีวภาพ | เชื้อโรค เลือด สัตว์ทดลอง |
| 4 | **Ergonomic** การยศาสตร์ | ท่าทาง ยกของหนัก งานซ้ำซาก |
| 5 | **Psychosocial** จิตวิทยาสังคม | ความเครียด ความรุนแรงในที่ทำงาน |

> บางตำราเพิ่ม **อุบัติเหตุ (Accident)** เป็นกลุ่มที่ 6

### สมการการเกิดโรค
```
exposure → (incubation/latency period) → at risk + other factors → disease
```

### จำแนกโรค
- **โรคทั่วไป (General diseases)**
- **โรคเกี่ยวเนื่องจากงาน (Work-related diseases)** — งานเป็นปัจจัยร่วมหนึ่ง (multifactorial)
- **โรคจากการทำงาน (Occupational diseases)** — งานเป็นสาเหตุหลัก/จำเป็น

---

### 🔑 การป้องกันโรคจากการทำงาน 3 ระดับ (ออกสอบแน่นอน)

#### 1. Primary Prevention — กำจัด/ลดการสัมผัส
แบ่งตามหลัก **Occupational Hygiene 3 ระดับ** (เรียงตามประสิทธิภาพสูง→ต่ำ)

**1.1 ควบคุมที่แหล่งกำเนิด (Source) — ดีที่สุด เลือกเป็นลำดับแรก**
- **Substitution** เปลี่ยนวัตถุดิบ (เช่น เลิกใช้ crystalline silica ในงานพ่นทราย)
- **Process change** เปลี่ยนกระบวนการผลิต → ระบบปิด/อัตโนมัติ
- **Enclosure** ปิดครอบกระบวนการ
- **Local Exhaust Ventilation (LEV)** ดูดอากาศเฉพาะที่ ใกล้แหล่งกำเนิดที่สุด
- **Wet methods** ใช้น้ำลดฝุ่น

**1.2 ควบคุมที่ทางผ่าน (Path)**
- ทำความสะอาดสถานที่ทำงาน
- **General/Dilution Ventilation** ระบายอากาศทั่วไป เจือจางความเข้มข้น
- **Isolation** แยกกระบวนการอันตรายออกจากคนงาน หรือทำนอกเวลาปกติ
- **Environmental monitoring** ตรวจวัดในบรรยากาศ
  - ⚠️ ข้อควรระวัง: มาตรฐานต่างประเทศอาจไม่เหมาะกับสรีระคนไทย และ **ค่าต่ำกว่ามาตรฐานไม่การันตีว่าจะไม่เป็นโรค**

**1.3 ควบคุมที่ตัวคนงาน (Receiver) — มาตรการสุดท้าย**
- **PPE** (หน้ากาก ที่อุดหู แว่นตา ถุงมือ)
  - ข้อเสีย: ไม่ได้ลดปริมาณสารในงานจริง + ปัญหาความร่วมมือในการสวมใส่
- **Job rotation** สับเปลี่ยนคนงาน ลดระยะเวลาสัมผัส
- ห้องควบคุมมิดชิด แยกคนงานออกจากสิ่งคุกคาม

> **Hierarchy of Controls (NIOSH):** Elimination > Substitution > Engineering controls > Administrative controls > PPE

#### 2. Secondary Prevention — ตรวจค้นหาโรคระยะเริ่มแรก (4 ประเภท)
| ประเภท | เมื่อไหร่ | วัตถุประสงค์ |
|--------|----------|-------------|
| **Pre-placement** | ก่อนเข้าทำงาน | ประเมิน Fitness for work + เก็บ baseline data |
| **Periodic** | ระหว่างทำงาน | ตรวจตามความเสี่ยงและระยะฟักตัวของโรค |
| **Return-to-work** | ก่อนกลับเข้างาน | หลังเจ็บป่วย/หยุดงานนาน ป้องกันการเป็นซ้ำ |
| **Exit** | ก่อนออกจากงาน | เก็บข้อมูลเปรียบเทียบผลที่อาจเกิดในอนาคต |

#### 3. Tertiary Prevention
- วินิจฉัยและรักษาผู้ป่วยที่เป็นโรคแล้ว
- **Rehabilitation** ฟื้นฟูสมรรถภาพร่างกาย + ฟื้นฟูฝึกอาชีพ → กลับมาทำงานได้

---

### การเฝ้าระวังโรคจากการทำงาน (Occupational Disease Surveillance)

**A. Health surveillance (เฝ้าระวังสุขภาพ)**
- **ทางตรง** — จากการตรวจสุขภาพ
- **ทางอ้อม** — จากสถิติการเจ็บป่วย (เก็บรวบรวม วิเคราะห์ แปลผล)

**B. Hazard/Environmental surveillance (เฝ้าระวังสิ่งแวดล้อม)**
- ทำโดย **Walkthrough survey** + **Environmental monitoring**
- ขอบเขต: ค้นหา/ประเมินสิ่งคุกคาม → ประเมินลักษณะงานที่เพิ่มความเสี่ยง → ประเมินระดับการสัมผัส → ประเมินมาตรการควบคุม → ประเมินการใช้ PPE

### ICD-10 External causes ที่ควรจำ
| รหัส | ความหมาย |
|------|----------|
| **Y96** | Work-related condition |
| **Y97** | Environmental-pollution-related condition |
| **Z58.1** | Exposure to air pollution |

### ทีมสหวิชาชีพ
แพทย์อาชีวเวชศาสตร์, พยาบาลอาชีวอนามัย, นักสุขศาสตร์อุตสาหกรรม, นักการยศาสตร์, วิศวกรความปลอดภัย, นักพิษวิทยา, นักจิตวิทยา, นักกายภาพบำบัด, นักจุลชีววิทยา, นักเคมี, นักชีวสถิติ, นักสุขศึกษา

## 2. การซักประวัติและการวินิจฉัยทางอาชีวเวชศาสตร์ (Lect 1.2)

### วัตถุประสงค์การซักประวัติ
1. แยกโรคจากการทำงานออกจากโรคทั่วไป
2. ประเมินความเสี่ยงจากสิ่งแวดล้อมในการทำงาน
3. วางแผนการป้องกันและดูแลสุขภาพ
4. ค้นหาสาเหตุของโรค

### โครงสร้างการซักประวัติ (4 ส่วนหลัก)

**1. Current Job History**
- ชื่องานและหน้าที่หลัก (ทำอะไรในแต่ละวัน)
- **Process** — เกี่ยวข้องกับขั้นตอนใดในโรงงาน
- ชั่วโมงการทำงาน / OT / รูปแบบกะ
- ระยะเวลาที่ทำหน้าที่นี้

**2. Hazard Exposure History**
- **สารเคมี** — ชนิด (ระบุชื่อสารถ้าทราบ), รูปแบบ (ไอระเหย/ฝุ่น/ของเหลว)
- **กายภาพ** — เสียงดัง ความร้อน สั่นสะเทือน รังสี
- **ชีวภาพ** — เชื้อโรค เลือด สัตว์ทดลอง
- **Ergonomics** — ท่าทาง ยกของหนัก นั่ง/ยืนนาน งานซ้ำซาก
- **PPE** — มี/ใช้สม่ำเสมอหรือไม่
- ระบบระบายอากาศ
- **สุขอนามัยส่วนบุคคล** — กินอาหาร/สูบบุหรี่ที่ไหน ล้างมือ อาบน้ำหลังเลิกงาน

**3. Past Occupational History** ⭐สำคัญสำหรับโรคที่ latency ยาว
- ไล่เรียงงานในอดีตทั้งหมดตามลำดับเวลา + สถานที่ + ระยะเวลา
- การสัมผัสสารที่มีผลระยะยาว เช่น **Asbestos, Silica**

**4. Work-Relatedness of Illness**
- **Time relationship** ⭐ — อาการแย่ลงเมื่อไปทำงาน? ดีขึ้น/หายเมื่อหยุดงาน (วันหยุดสุดสัปดาห์/ลาพักร้อน)?
- อาการคล้ายกันในเพื่อนร่วมงานที่ทำแผนก/หน้าที่เดียวกัน?
- การขาดงาน, ผลตรวจก่อนเข้างานและตรวจประจำปี

### 🔑 คำถามคัดกรอง 4 ข้อ (ออกสอบบ่อยมาก)
1. ท่านคิดว่าการเจ็บป่วยของท่านเกี่ยวข้องกับการทำงานหรือไม่?
2. มีความแตกต่างของอาการขณะทำงานและขณะอยู่บ้านหรือไม่?
3. เพื่อนร่วมงานมีอาการคล้ายกันหรือไม่?
4. อาการเป็นมากขึ้นเวลามาทำงานหรือไม่?

### ประวัติสิ่งแวดล้อม
สภาพแวดล้อมที่บ้าน, โรงงานใกล้เคียง, **งานอดิเรก**, **อาชีพของคู่สมรส**, พฤติกรรม/สุขภาพของสัตว์เลี้ยง

### การตรวจเพิ่มเติม
ตรวจร่างกาย · Lab รวม **biomarkers** (สารเคมีในเลือด/ปัสสาวะ) · **Spirometry** สมรรถภาพปอด · **Audiometry** สมรรถภาพการได้ยิน · สมรรถภาพการมองเห็น

---

### 🔑 NSODD — Nine Steps in Occupational Diseases Diagnosis (ท่องให้ได้)
1. **มีโรคเกิดขึ้นจริง**
2. **มีสารเคมี/กระบวนการที่ทำให้เกิดโรคอยู่ในสถานที่ทำงานนั้น**
3. **มีการสัมผัสสิ่งคุกคามนั้น** (จากการซักประวัติ, เก็บตัวอย่างสิ่งแวดล้อม, ประวัติใช้ PPE)
4. **มีลำดับก่อนหลัง** — สัมผัสก่อน จึงมีอาการ (temporal relationship)
5. **การสัมผัสนานพอ/เข้มข้นพอ** ที่จะทำให้เกิดโรค (ดูจากข้อมูลระบาดวิทยา, biomarkers)
6. **มีข้อมูลทางวิทยาการระบาดสนับสนุน**
7. **ได้วินิจฉัยแยกโรคจากสาเหตุอื่นแล้ว** (differential diagnosis)
8. **ได้พิจารณาปัจจัยสนับสนุน**
9. **นำปัจจัยทั้งหมดมาพิจารณาเพื่อวินิจฉัย**

### หลักการวินิจฉัย 6 ขั้น
1. วินิจฉัยโรคให้ชัดเจนก่อน (เป็นโรคอะไร)
2. ประเมินความสัมพันธ์โรค-การทำงาน (**causal relationship**)
3. วิเคราะห์ปัจจัยเสี่ยงในที่ทำงาน (ลักษณะงาน, ระยะเวลาสัมผัส, ความเข้มข้น, PPE, มาตรการป้องกัน)
4. ใช้ทฤษฎีสาเหตุของโรค
   - **Single cause** — โรคติดเชื้อ, Silicosis
   - **Multiple causes** — มะเร็ง, เบาหวาน
5. เปรียบเทียบข้อมูลระบาดวิทยา (อัตราการเกิดโรคในกลุ่มอาชีพเดียวกัน)
6. พิจารณาแนวทาง/มาตรฐาน — **ILO** และมาตรฐานการวินิจฉัยโรคจากการทำงานของประเทศไทย

### 🔑 เกณฑ์วินิจฉัย Silicosis ของไทย — ใช้ 2 ใน 3 ข้อ
1. มีประวัติทำงานอาชีพเสี่ยงสัมผัสฝุ่นหิน **อย่างน้อย 2 ปี**
2. ภาพรังสีทรวงอกผิดปกติตั้งแต่ **profusion 1/1 ขึ้นไป** ตามเกณฑ์ **ILO Classification of Radiographs of Pneumoconioses 2000**
3. มีลักษณะทางพยาธิวิทยาของเนื้อปอดเข้าได้กับโรค **หรือ** มีข้อมูลระบาดวิทยาสนับสนุน

### การจัดการหลังวินิจฉัย ⭐
1. **ค้นหาโรคเดียวกันในเพื่อนร่วมงาน** (และคนใกล้ชิด)
2. **ส่งเสริมให้ผู้ป่วยเข้าสู่ระบบค่าชดเชย** — สิทธิประกันสังคม ยื่นเรื่องต่อ**กองทุนเงินทดแทน**
3. แนะนำมาตรการป้องกัน + ให้ใช้ PPE อย่างเคร่งครัด

## 3. กลไกการเกิดโรคและการบาดเจ็บจากการทำงาน (Lect 1.3)

### A. กลไกการเกิดโรค (Chronic exposure — ปริมาณต่ำแต่ยาวนาน)

**1. Toxicokinetic & Organ Toxicity**
- **Biotransformation** — สารบางชนิดเข้าตับแล้วถูกเปลี่ยนเป็น**อนุมูลอิสระที่อันตรายกว่าเดิม**
  - ตัวอย่าง: **Carbon tetrachloride → chlorine free radical** → ทำลายเยื่อหุ้มเซลล์ → ตับอักเสบ/เนื้อตาย
- **Target Organ Deposition** — ฝุ่นอนินทรีย์ **< 5 ไมครอน** (silica, asbestos) หลุดถึงถุงลม กำจัดไม่ได้ → macrophage กินแต่ทำลายไม่ได้ → หลั่ง **cytokines** → **Fibrosis**

**2. Immunological / Hypersensitivity**
| Type | กลไก | ตัวอย่าง | โรค |
|------|------|---------|-----|
| **Type I** (IgE-mediated) | เร็ว, หลั่ง histamine → หลอดลมหดตัวฉับพลัน | แป้งสาลี (คนทำเบเกอรี่), **isocyanates** (สีพ่นรถยนต์) | **Occupational Asthma** |
| **Type IV** (Cell-mediated, delayed) | T-cell ไวต่อสารเคมี, ปฏิกิริยาช้า **24–48 ชม.** | **นิกเกิล, โครเมียม** (ในปูนซีเมนต์) | **Allergic Contact Dermatitis** |

**3. Carcinogenic Mechanisms**
- **Genotoxic** — ทำลาย DNA โดยตรง → mutation
  - **Benzene** → **AML** (มะเร็งเม็ดเลือดขาว)
  - **Ionizing radiation** → มะเร็ง
- **Non-genotoxic / Chronic inflammation** — ไม่ทำลาย DNA โดยตรง แต่ระคายเคือง/อักเสบเรื้อรัง
  - **Asbestos** ทิ่มแทงเยื่อหุ้มปอด → **Mesothelioma**

### B. กลไกการบาดเจ็บ (ทันทีทันใด — พลังงานเกินกว่าเนื้อเยื่อจะทนได้)

**1. Acute Mechanical Energy Transfer**
- ตกจากที่สูง, เครื่องจักรหนีบมือ → **Fracture, Laceration**, อวัยวะภายในฉีกขาด

**2. Cumulative Micro-trauma (Ergonomic)**
- **Repetitive strain** + **awkward posture** → เนื้อเยื่อขาดเลือด (ischemia) → ฉีกขาดระดับโมเลกุลซ้ำๆ ซ่อมไม่ทัน
- → **Tendonitis, Trigger Finger, Carpal Tunnel Syndrome**

**3. Thermal / Chemical / Electrical**
| ชนิดพลังงาน | กลไก | ผลลัพธ์ |
|------------|------|--------|
| **ความร้อน** | Protein denaturation | Thermal burns |
| **กรดรุนแรง** | **Coagulative necrosis** — เนื้อเยื่อจับตัวเป็นก้อนแข็ง จำกัดการซึม | แผลตื้นกว่า |
| **ด่างรุนแรง** ⚠️ | **Liquefactive necrosis** — เนื้อเยื่อละลายเปื่อย | **ซึมลึกและรุนแรงกว่ากรด** |
| **ไฟฟ้า** | เปลี่ยนเป็นความร้อนตามเส้นทางที่ไฟผ่าน + รบกวนไฟฟ้าหัวใจ | **Ventricular Fibrillation** → เสียชีวิต |

### 🔑 ตารางเปรียบเทียบ Disease vs Injury (ออกสอบบ่อย)
| | **โรคจากการทำงาน (Disease)** | **การบาดเจ็บจากการทำงาน (Injury)** |
|---|---|---|
| **เวลา** | ค่อยเป็นค่อยไป สะสมเป็นสัปดาห์/ปี (**latency period** ยาวนาน) | เกิดทันทีทันใด (**acute event**) |
| **กลไกหลัก** | การสะสมทางพิษวิทยา, กระตุ้นภูมิคุ้มกัน, การกลายพันธุ์ของเซลล์ | การถ่ายเทพลังงาน (กล/ความร้อน/ไฟฟ้า) เกินขีดจำกัดเนื้อเยื่อ |
| **การพิสูจน์ความเชื่อมโยง** | **ยาก** ต้องอาศัยประวัติการทำงาน + lab | **ง่าย ชัดเจน** มีประวัติอุบัติเหตุ + สถานที่เกิดเหตุชัดเจน |

## 4. Walkthrough Survey (Lect 2.1–2.2)

### นิยาม
การเดินสำรวจบริเวณกระบวนการผลิต **ขณะกำลังดำเนินการผลิต** และ **มีผู้ปฏิบัติงานทำงานอยู่จริง**

### ประโยชน์ 6 ข้อ
1. ช่วยวินิจฉัยโรคจากการทำงาน
2. ประเมินความสำเร็จในการควบคุมสิ่งคุกคาม
3. เป็นข้อมูลพื้นฐานในการดำเนินงานควบคุมสิ่งคุกคาม
4. วิเคราะห์หาสาเหตุของโรค/อุบัติเหตุ
5. ใช้บริหารจัดการความเสี่ยง
6. ตรวจสอบการปฏิบัติตามกฎหมาย

### วัตถุประสงค์
1. เข้าใจ **วัตถุดิบ → กระบวนการผลิต → วิธีปฏิบัติงาน**
2. **ค้นหาและประเมินสิ่งคุกคามสุขภาพ**
3. นำเสนอแนวทางแก้ไขป้องกัน

### สำรวจทุกแผนก vs เฉพาะจุด ⭐
| สถานการณ์ | ทุกแผนก | เฉพาะจุด |
|-----------|:-------:|:--------:|
| เข้าประจำสถานประกอบการนั้น (ครั้งแรก) | ✓ | |
| สถานประกอบการเปิดใหม่ | ✓ | |
| ออกแบบการตรวจสุขภาพ | ✓ | |
| เครื่องจักรใหม่ / เปลี่ยนกระบวนการผลิต | | ✓ |
| เกิดการเจ็บป่วย/บาดเจ็บ (สอบสวนโรค/อุบัติเหตุ) | | ✓ |
| ประเมินความพร้อมก่อนกลับเข้างาน (return to work) | | ✓ |

### การเตรียมความพร้อม 6 ขั้น
1. กำหนดวัตถุประสงค์ 2. จัดหาทีมงาน/ผู้เชี่ยวชาญ 3. วางแผนการทำงานและการเดินทาง 4. ประสานงานผู้เกี่ยวข้อง 5. เตรียมอุปกรณ์และตรวจสอบการใช้งาน 6. เตรียมผู้เข้าสำรวจ

### เตรียมตัวก่อนเข้าสถานประกอบการ
- ศึกษาข้อมูลพื้นฐาน (สถานประกอบการ + กระบวนการผลิต)
- เตรียมร่างกายและจิตใจ
- **แต่งกายรัดกุม รวบมัดผม, งดเครื่องประดับ (รวมนาฬิกา), ใส่รองเท้าหุ้มส้น ไม่ใส่ส้นสูง**

### ขั้นตอน 3 ระยะ
1. **ประชุมก่อนเดินสำรวจ** (opening meeting)
2. **เดินสำรวจ**
3. **ประชุมปิดการเดินสำรวจ** (closing meeting)

### ข้อควรปฏิบัติ ⭐
- **ขออนุญาตก่อนถ่ายรูป/วิดีโอ หรือซักถามคนงาน**
- แสดงทัศนคติที่ดี — **ไม่วิพากษ์/ตำหนิติเตียน**
- สำรวมกิริยาวาจา ไม่พูดคุยหยอกล้อหรือรวมกลุ่มคุยกันเอง
- ถามเหตุผลและให้ความเห็นเชิงวิชาการ
- **กรณีไม่แน่ใจ ต้องไม่รีบด่วนสรุป** → ซักถามเพิ่มเติม / ขอตรวจวัดโดยละเอียด

### ความปลอดภัยขณะเข้าเขตเสี่ยง
- ปฏิบัติตามกฎความปลอดภัยเคร่งครัด
- รับฟังขั้นตอนปฏิบัติเมื่อมีเหตุฉุกเฉิน
- สังเกตป้าย: **เครื่องหมายห้าม / เตือน / บังคับ / สารนิเทศเกี่ยวกับความปลอดภัย**
- **รวมกลุ่มเดินตามตัวแทนสถานประกอบการ ไม่แยกออกจากกลุ่ม**

### กระบวนการ Health Risk Assessment 4 ขั้น
1. **Hazard identification** — บ่งชี้สิ่งคุกคาม
2. **Exposure assessment** — ประเมินการสัมผัส
3. **Dose-response assessment** — ประเมินขนาดสัมผัสกับผลกระทบ
4. **Risk characterisation** — อธิบายลักษณะความเสี่ยง

## 5. Risk Assessment & Health Surveillance (Lect 2.3)

### สมการพื้นฐาน
```
Hazard + Host + Working environment → (incubation period) → Harm
                                        (physical injury / damage to health)
```

### 🔑 กระบวนการ Risk Assessment 3 ขั้น
1. **Hazard identification** — ค้นหาสิ่งคุกคามและปัจจัยเสี่ยงที่ทำให้เกิดอันตราย
2. **Risk analysis & risk evaluation** — วิเคราะห์และประเมินความเสี่ยง
3. **Risk control** — หาแนวทางกำจัดสิ่งคุกคาม หรือควบคุมความเสี่ยงกรณีตัดสิ่งคุกคามออกไม่ได้

### 🔑 ความเสี่ยงต่อสุขภาพขึ้นกับ 2 ปัจจัย (ออกสอบ)
> **ความเสี่ยง = (1) Hazard [อันตรายเพียงใด] × (2) Exposure [โอกาสเกิดมากน้อยเพียงใด]**

### ระดับความรุนแรง (Severity) — มอก.18001
| ระดับ | คะแนน | รายละเอียด |
|-------|:-----:|-----------|
| **เล็กน้อย** | 1 | ไม่มีการบาดเจ็บ / บาดเจ็บที่ต้องการเพียงปฐมพยาบาล (แผลมีดบาดเล็กน้อย, แผลถลอก, ระคายเคือง, เคล็ดขัดยอก) · สิ่งรบกวนที่ทำให้รำคาญ (ปวดศีรษะ) · เจ็บป่วยไม่สบายกายชั่วคราว |
| **ปานกลาง** | 2 | บาดเจ็บที่ต้องรักษา / เจ็บป่วยทำให้อวัยวะบางส่วนทำหน้าที่ได้ไม่เหมือนเดิม, พิการเล็กน้อย (บาดแผลฉีกขาด, แผลไฟไหม้, กระดูกร้าวเล็กน้อย, ข้อเคล็ดรุนแรง) · **การอักเสบ หูหนวก โรคหืด อาการผิดปกติของมือและแขน** |
| **มาก** | 3 | **สูญเสียอวัยวะ กระดูกแตกหัก เสียชีวิต บาดเจ็บรุนแรง** · ได้รับพิษ/เกิดโรคที่ทำให้อายุสั้นลง (รวม**มะเร็งจากการทำงาน**, โรคร้ายแรงที่ทำให้เสียชีวิตเฉียบพลัน) |

### เกณฑ์ประเมินโอกาสเกิด (Exposure/Likelihood) — 8 หัวข้อ มอก.18001
คะแนน 3 = แย่สุด, 1 = ดีสุด

| # | หัวข้อ | 3 คะแนน | 2 คะแนน | 1 คะแนน |
|---|--------|---------|---------|---------|
| 1 | **จำนวนคนที่สัมผัส** | > 10 คน | 6–10 คน | 1–5 คน |
| 2 | **ความถี่/ระยะเวลาสัมผัส** | > 48 ชม./สัปดาห์ | 30–48 ชม./สัปดาห์ | < 30 ชม./สัปดาห์ |
| 3 | **การสัมผัสกับสิ่งอันตราย** | อันตรายทันที | อันตรายเรื้อรัง | อันตรายเฉพาะเครื่องมือ |
| 4 | **มีขั้นตอน/กฎระเบียบมาตรฐาน** | ไม่มีเป็นลายลักษณ์อักษร | มีแต่ไม่เหมาะกับความเสี่ยง | มีและเหมาะสม |
| 5 | **การฝึกอบรม** | ไม่มีการฝึกอบรม | มีแต่ไม่กำหนดความต้องการ | กำหนดความต้องการ + มีการฝึกอบรม |
| 6 | **การตรวจสอบ/สังเกตการปฏิบัติ** | ไม่มีการตรวจสอบ | ตรวจสอบไม่ต่อเนื่อง หรือปฏิบัติไม่ถูกต้อง | ปฏิบัติถูกต้อง/ตรวจสอบต่อเนื่อง |
| 7 | **PPE หรืออัตราการใช้** | ไม่มี / ใช้ไม่เหมาะสม / มีแต่ไม่ใช้ | — | มีเหมาะสมและใช้งาน (1) |
| 8 | **อุปกรณ์ความปลอดภัยของเครื่องจักร/อาคาร** | ไม่มี / มีแต่ไม่เหมาะสม / มีแต่ไม่ใช้ | — | ออกแบบให้มีและใช้อย่างเหมาะสม (1) |

### 🔑 Risk Matrix (มอก.18001)
| โอกาสเกิดอันตราย (A) ↓ \ ระดับความเป็นอันตราย (B) → | **มาก (3)** | **ปานกลาง (2)** | **น้อย (1)** |
|---|---|---|---|
| **มีโอกาสเกิด (มาก) = 3** | **ความเสี่ยงที่ไม่อาจยอมรับได้ (9)** | ความเสี่ยงสูง (6) | ความเสี่ยงปานกลาง (3) |
| **เกิดขึ้นได้ยาก (ปานกลาง) = 2** | ความเสี่ยงสูง (6) | ความเสี่ยงปานกลาง (4) | ความเสี่ยงที่ยอมรับได้ (2) |
| **ไม่น่าจะเกิด (น้อย) = 1** | ความเสี่ยงปานกลาง (3) | ความเสี่ยงที่ยอมรับได้ (2) | ความเสี่ยงเล็กน้อย (1) |

### วงจรการจัดการความเสี่ยงอย่างเป็นระบบ (PDCA)
```
Identify hazards (วางแผน)
      ↓
Assess the risks (ลงมือทำ)
      ↓
Control the risks
      ↓
Record your findings (ตรวจสอบ)
      ↓
Review the controls (ปรับปรุง) → วนกลับ
```
- **Hazard surveillance** — เน้นที่ Identify hazards / Assess risks
- **Health surveillance** — เน้นที่ Record findings / Review controls

### หลักฐานเชื่อมโยงโรคกับงาน (3 เสา)
1. **โรค** (สอดคล้องและวินิจฉัยว่าเป็นโรค)
2. **ระบาดวิทยา** (แสดงความเชื่อมโยงระหว่างสิ่งคุกคามกับการเกิดโรค)
3. **สิ่งคุกคามในงาน** (สิ่งคุกคามปรากฏในงาน + ผู้ป่วยสัมผัสในระยะเวลาที่ก่อโรคได้)

→ พิจารณา **ความน่าเชื่อถือ** + **ปัจจัยที่เกี่ยวข้อง** → ประเมินและสรุปผล

## 6. โรคจากสิ่งคุกคามทางกายภาพ (Lect 3.1) ⭐บทใหญ่

**5 สิ่งคุกคามทางกายภาพ:** 1) เสียง 2) อุณหภูมิ 3) ความกดอากาศ 4) รังสีและคลื่น 5) ความสั่นสะเทือน

---

### 6.1 เสียง — Noise-Induced Hearing Loss (NIHL)

**แหล่งที่พบ:** งานภาคสนามบิน, ก่อสร้าง, โรงงานที่ใช้เครื่องจักรขนาดใหญ่โดยไม่มีการป้องกัน

**พยาธิสภาพ:**
- สัมผัสเสียงดังเกิน **85 dB** เป็นเวลานาน → ทำลาย**เซลล์ขนในหูชั้นใน (Organ of Corti)**
- เป็น **Sensorineural hearing loss** (ไม่ใช่ conductive)

**🔑 Audiogram:** พบ **notch ที่ความถี่ 4000 Hz ทั้งสองข้าง** (ออกสอบแน่)

### ตรวจการได้ยินทางอาชีวเวชกรรม เมื่อไหร่บ้าง
1. **ก่อนเข้างาน** — เป็น baseline (ลูกจ้างใหม่ที่จะทำงานในบริเวณเสียงดัง **≥ 85 dB(A)**)
2. **ตรวจเฝ้าระวัง/ติดตาม/ประจำปี**
3. **ก่อนลาออกหรือเปลี่ยนงาน**

### 🔑 การเตรียมผู้รับการตรวจ Audiometry
- **งดการสัมผัสเสียงดังทุกชนิด อย่างน้อย 12 ชั่วโมง** ⭐
- ควรตรวจสภาพหูด้วย **Otoscope** ก่อนทดสอบ โดยเฉพาะรายที่ซักประวัติแล้วมีอาการผิดปกติของหู

### กฎหมายที่เกี่ยวข้อง
- **ประกาศกรมสวัสดิการและคุ้มครองแรงงาน พ.ศ.2561** — หลักเกณฑ์และวิธีการจัดทำ**มาตรการอนุรักษ์การได้ยิน**
  - บังคับใช้เมื่อระดับเสียงเฉลี่ยตลอด 8 ชั่วโมง **≥ 85 dB(A)**
- **ประกาศฯ พ.ศ.2560** — มาตรฐานระดับเสียงที่ยอมให้ลูกจ้างได้รับเฉลี่ยตลอดระยะเวลาทำงานในแต่ละวัน

### วงจรโครงการอนุรักษ์การได้ยิน (Hearing Conservation Program)
```
ประเมินความเสี่ยงจากเสียง → ลดความเสี่ยง/มีการควบคุม → จัดการป้องกันเสียง
→ ให้ความรู้และฝึกผู้ปฏิบัติงาน → เฝ้าระวังโดยการตรวจการได้ยิน
→ ทบทวนมาตรการและประเมินความเสี่ยง → วนกลับ
```

### หลักการควบคุมเสียง 3 ทาง
1. **ระยะห่าง** (distance)
2. **ระดับความดัง** (intensity)
3. **ระยะเวลาสัมผัส** (duration)

### 🔑 วิธีใส่ปลั๊กอุดหูชนิดโฟม (3 ขั้น)
1. **ปั้น** ให้เรียวเล็ก
2. **ดึงใบหู** (ขึ้นและไปด้านหลัง เพื่อยืดช่องหู)
3. **นับรอ 1–30** ให้โฟมขยายตัว

### ปัจจัยส่งเสริมการเกิด NIHL ⭐
- **การสูบบุหรี่**
- **การทำงานสัมผัสแรงสั่นสะเทือน**
- **ตัวทำละลายที่มีพิษต่อหู (Ototoxic solvents):**
  Styrene · Methylstyrene · **Toluene** · **Xylene** · Carbon disulfide · Ethylbenzene · n-Propyl benzene · **n-Hexane** · Trichloroethylene

### 6.2 อุณหภูมิ

#### A. HEAT — กลไกรักษาอุณหภูมิแกนกลาง 37°C
1. **Cutaneous vasodilation** ขยายหลอดเลือดที่ผิวหนัง
2. **Sweating** ขับเหงื่อ
3. **Evaporation** การระเหยของเหงื่อ

#### 🔑 Heat-Related Illness — ตารางแยกโรค (ออกสอบแน่นอน)
| ภาวะ | อุณหภูมิแกนกลาง | เหงื่อ | ความรู้สึกตัว |
|------|----------------|:------:|--------------|
| **Heat Rash** | ปกติ | + | ปกติ |
| **Heat Cramps** | ปกติ | + | ปกติ |
| **Heat Syncope** | ปกติ | + | **หมดสติชั่วคราว** |
| **Heat Exhaustion** | **< 40–40.5°C** | + | ปกติ |
| **Heat Stroke** ⚠️ | **> 40°C** | **+/−** | **สับสน ชัก หมดสติ** |

> จุดแยก Heat Exhaustion vs Heat Stroke = **อุณหภูมิ > 40°C + ความรู้สึกตัวผิดปกติ (CNS dysfunction)**

#### Field Management
1. **นำออกจากสิ่งแวดล้อมที่ร้อนทันที (ASAP)**
2. ถอดเสื้อผ้า
3. **ทำให้เย็นลง (cool down)**
4. Monitor core body temperature
5. Rehydration

#### 🔑 Hospital Management
- **ABC** (Airway, Breathing, Circulation)
- **ลดอุณหภูมิทันที**
  - **Cold water immersion — ดีที่สุดสำหรับ Exertional Heat Stroke** ⭐
  - **Evaporative cooling**
  - **Ice packs บริเวณคอ รักแร้ ขาหนีบ** (บริเวณหลอดเลือดใหญ่)
  - Whole-body rotating ice-wet towel
- ให้สารน้ำ
- ตรวจและรักษาภาวะแทรกซ้อน

#### ภาวะแทรกซ้อนของ Heat Stroke
Brain edema · Seizure · **Acute kidney injury** · **Rhabdomyolysis** · Liver failure · **DIC** · Arrhythmia · Acute lung injury · **Multi-organ failure**

#### Risk Factors
**A. Environmental — ร้อน + ความชื้นสูง**
- **WBGT (Wet Bulb Globe Temperature)** ประกอบด้วย 4 องค์ประกอบ:
  1. **Air temperature** 2. **Humidity** 3. **Air velocity** 4. **Radiation**
- ใช้ร่วมกับ **WBGT Work-Rest chart** (งานออกแรงหนัก → ต้องพักมากขึ้น)

**B. Non-environmental**
- **Poor acclimatization** (ยังไม่ปรับตัวกับความร้อน)
- **Dehydration**
- **Physical barrier to heat loss** — ชุดป้องกันที่ไม่ระบายความร้อน, **BMI สูง**
- **Unfitness** — สมรรถภาพร่างกายต่ำ, อดนอน, มีไข้/ติดเชื้อ, **แอลกอฮอล์**, สารเสพติด (**cocaine, amphetamine**)
- **Medical history** — เคยเป็น heat-related illness, **malignant hyperthermia**
- **Concurrent illness** — โรคหัวใจ เบาหวาน โรคระบบประสาท โรคผิวหนัง
- **🔑 ยา (จำให้ได้):** **diuretics · antihistamines · anticholinergic antidepressants · beta-blockers · calcium channel blockers**

#### แนวทางการบริหารจัดการ
- **ตารางการปรับตัว — heat acclimatization 10–14 วัน** ⭐
- ตารางเวลาพัก
- สวัสดิการน้ำดื่ม
- การให้ความรู้
- **การติดตามเฝ้าระวังอาการ — buddy system + supervisor**
- แผนฉุกเฉิน

#### B. COLD ENVIRONMENT — Hypothermia และผลกระทบ
- **Respiratory:** asthma, COPD, infections
- **Cardiovascular:** coronary/heart disease, MI, cerebrovascular accidents
- **Peripheral circulation:** **Raynaud's phenomenon**, **hand–arm vibration syndrome**
- **Musculoskeletal:** carpal tunnel syndrome, tension neck syndrome, tenosynovitis, peritendinitis
- **Dermatological:** **cold urticaria**, **pernio (chilblains)**, psoriasis, atopic dermatitis
- **Injuries:** **frostbite, trench foot, hypothermia**, falls

### 6.3 ความกดอากาศ

#### A. COMPRESSION (Hyperbaric injury) — Decompression Sickness (DCS)
- พบใน**นักดำน้ำ** (เช่น นักดำน้ำหาของเก่า) และ **caisson workers**
- **กลไก:** ที่ความลึก ไนโตรเจนละลายในเลือด/เนื้อเยื่อมากขึ้น → เมื่อขึ้นสู่ผิวน้ำเร็วเกินไป ความดันลดลง → **ไนโตรเจนกลายเป็นฟองก๊าซ (bubble formation)** → อุดหลอดเลือด/กดเนื้อเยื่อ
- **Boyle's law:** ปริมาตรของก๊าซในโพรงอากาศ **ขยายตัวเมื่อขึ้นสู่ผิวน้ำ (ascent)**
- **Caisson disease** — ประวัติศาสตร์: การสร้าง Eads Bridge ที่ St. Louis มีคนงานบาดเจ็บ **42 คน**
- **🔑 การรักษา: Hyperbaric chamber (recompression therapy)**

#### B. ALTITUDE (Hypobaric injury)
**ความดันบรรยากาศ**
- **760 mmHg ที่ระดับน้ำทะเล**
- **ลดลง 1 mmHg ทุกความสูง 11 เมตร**
- **Acclimatization จำเป็นที่ระดับ 2,500 เมตรขึ้นไป** ⭐

**🔑 Health effects 3 โรค**

| โรค | อาการเด่น | การรักษา |
|-----|----------|---------|
| **Acute Mountain Sickness (AMS)** | **ปวดศีรษะ = cardinal symptom** เกิด **2–12 ชม.** หลังขึ้นที่สูง (มักระหว่าง/หลังคืนแรก) + อ่อนเพลีย เบื่ออาหาร คลื่นไส้ อาเจียนบางครั้ง · **หายเองใน 12–48 ชม.** เมื่อ acclimatize | พัก/ยา |
| **High Altitude Cerebral Edema (HACE)** | **Lethargy, drowsiness, confusion, ataxia (tandem gait test)** | **ต้องลงจากที่สูงทันที (immediate descent)** ⚠️ |
| **High Altitude Pulmonary Edema (HAPE)** | **Breathlessness, weakness, cough** (อาจมี/ไม่มี HACE ร่วม) | **Oxygen + descend** |

**Management โดยรวม**
- **Descent** (สำคัญที่สุด)
- ยา (อาจใช้ prophylaxis): **paracetamol, anti-motion sickness, dexamethasone, acetazolamide**
- **Hyperbaric chamber**

### 6.4 รังสีและคลื่น (Radiation)

#### 🔑 แบ่ง 2 ชนิด (ออกสอบ)
| | **Ionizing Radiation (ก่อประจุ)** | **Non-Ionizing Radiation (ไม่ก่อประจุ)** |
|---|---|---|
| **ตัวอย่าง** | เอกซเรย์, แกมมา, **แก๊สเรดอน** | **แสง UV** |
| **อาชีพเสี่ยง** | บุคลากรทางการแพทย์แผนกรังสี, **เหมืองแร่ยูเรเนียม** | เกษตรกร, **ไลฟ์การ์ด**, **ช่างเชื่อมโลหะ** |
| **กลไก/ผล** | **ทำลาย DNA โดยตรง** → **ต้อกระจก (cataract)**, ผิวหนังตาย, **มะเร็งเม็ดเลือดขาว, มะเร็งปอด** | **UV-B ทำลายผิวหนัง → มะเร็งผิวหนัง** |

**Photokeratitis (Welder's flash)** — กระจกตาอักเสบจาก UV ในช่างเชื่อม

#### หลักลดปริมาณรังสี (Radiation protection)
1. **Time** — ลดเวลาสัมผัส
2. **Distance** — **Inverse Square Law** (ความเข้มลดลงเป็นกำลังสองของระยะทาง) ⭐
3. **Shielding** — ใช้ฉากกำบัง
- ระวัง **Scatter radiation** (รังสีกระเจิง) และ**ตำแหน่งที่ยืนทำงาน**
- **การวัดปริมาณสัมผัส** — ใช้ personal dosimeter (film badge/TLD)
- **รังสีกับการตั้งครรภ์** — ต้องเฝ้าระวังเป็นพิเศษ
- มีกฎหมายความปลอดภัยด้านรังสี ครอบคลุมทั้ง**ความปลอดภัยของผู้ปฏิบัติงาน**และ**ผู้รับบริการ**

---

### 6.5 ความสั่นสะเทือน (Vibration)

**🔑 Hand-Arm Vibration Syndrome (HAVS) / Vibration White Finger**
- **แหล่งที่พบ:** คนงานใช้**เครื่องเจาะถนน (Jackhammer)**, **เลื่อยยนต์ (chainsaw)**, **เครื่องเจียรผิวโลหะ** เป็นประจำ
- **กลไก:** ความสั่นสะเทือนสะสมทำลาย**เส้นเลือดและเส้นประสาทที่นิ้วมือ** → หลอดเลือดยืดหดตัวผิดปกติ (คล้าย **Raynaud's phenomenon**)
- **อาการ:** **นิ้วมือซีดขาว ซ่า และปวดเมื่อเจออากาศเย็น**

> **จำ:** vibration ยังเป็น**ปัจจัยส่งเสริม NIHL** ด้วย

## 7. Ergonomics — การยศาสตร์ (Lect 3.3)

### นิยาม
- **Ergon** (work) + **nomos** (laws) = ศาสตร์ว่าด้วยการทำงาน
- การเรียนรู้ **ความสามารถและข้อจำกัดของมนุษย์** เพื่อออกแบบลักษณะและวิธีการทำงาน รวมถึงเครื่องมือ เครื่องจักร อาคาร ผลิตภัณฑ์ สภาพแวดล้อม ให้เหมาะสมกับมนุษย์ทั้งกายและใจ → เพื่อให้ทำงาน **ดีขึ้น เร็วขึ้น และปลอดภัยมากขึ้น**
- อีกชื่อ: **Human Factor Engineering**

### สาเหตุของ Musculoskeletal Disorders (MSDs) — 2 กลุ่ม
1. **Work-related (ergonomic) risk factors**
2. **Individual-related risk factors**

### Biomechanics
> "ใช้กฎฟิสิกส์และหลักวิศวกรรมอธิบายการเคลื่อนไหวของส่วนต่างๆ ของร่างกายและแรงที่กระทำต่อส่วนนั้นระหว่างกิจวัตรประจำวัน" — Frankel and Nordin

### 🔑 Biomechanical Risk Factors 3 ข้อ (ท่องให้ได้)
1. **Force** — แรงที่ใช้
2. **Posture** — ท่าทาง (awkward posture)
3. **Repetition** — ความถี่/การทำซ้ำ

> เพิ่มเติมที่มักถูกกล่าวถึง: Duration, Vibration, Contact stress, Static loading

### ตัวอย่าง Ergonomic Assessment Tools
- **RULA** (Rapid Upper Limb Assessment)
- **REBA** (Rapid Entire Body Assessment)
- **NIOSH Lifting Equation**
- **OWAS**
- **Strain Index**

> หลักการเลือกเครื่องมือ: ต้องเลือกให้เหมาะกับลักษณะงาน (เปรียบเหมือนเลือกไขควงให้ตรงกับสกรู)

### หลักการทางการยศาสตร์พื้นฐาน
- ทำงานในท่าที่เป็นกลาง (neutral posture)
- ลดแรงที่มากเกินไป
- ให้ของอยู่ในระยะเอื้อมถึงสะดวก
- ทำงานที่ระดับความสูงที่เหมาะสม
- ลดการเคลื่อนไหวซ้ำซาก
- ลดการกดทับโดยตรง (contact stress)
- จัดที่ว่างให้เพียงพอ
- ให้เคลื่อนไหว/ยืดเหยียด/พักเป็นระยะ
- จัดสภาพแวดล้อมให้เหมาะ (แสง/เสียง/อุณหภูมิ)
- ใช้อุปกรณ์ช่วย เช่น **handcarts** (การเข็นดีกว่าการดึง)

## 8. Occupational Skin Diseases (Lect 3.4)

### 🔑 เกณฑ์วินิจฉัย Occupational Dermatoses (Mathias' criteria) — ออกสอบบ่อย
1. อาการแสดงเข้าได้กับ **contact dermatitis**
2. มีประวัติสัมผัส**สารก่อภูมิแพ้หรือสารระคายเคือง**ผิวหนังระหว่างทำงาน
3. **ผื่นเกิดที่ตำแหน่งที่สัมผัสสาร**
4. ผื่นเกิดภายหลังเริ่มทำงานใน**ระยะเวลาที่เหมาะสม**
5. **ไม่พบสาเหตุอื่นนอกเหนือจากการทำงาน**
6. **อาการดีขึ้นเมื่อหยุดงาน**หรือไม่ได้สัมผัสสาร
7. **Patch test หรือ provocative test ให้ผลบวก**

### สารก่อภูมิแพ้จากการทำงานที่พบบ่อย (Common occupational allergens)
| สาร | แหล่งที่พบ |
|-----|-----------|
| **Thiurams** | ผลิตภัณฑ์ยาง (rubber) |
| **Chromate** | **ปูนซีเมนต์**, ฟอกหนัง |
| **Epoxy resin** | สารเคลือบผิว, กาว |
| **Para-phenylenediamine (PPD)** | **ยาย้อมผม** |
| **Ammonium persulfate** | ยาฟอกสีผม |
| **Nickel** | เครื่องประดับ, วัตถุโลหะ, ชุบโลหะ (electroplating) |
| **Glyceryl monothioglycolate** | น้ำยาดัดผม |
| **Fragrance** | น้ำหอม |
| **Coconut diethanolamide** | แชมพู สบู่เหลว น้ำมันตัดกลึง |
| **Colophonium/rosin** | กาว เทป ไม้ เครื่องสำอาง |
| **Formalin** | เสื้อผ้า สารกันเสีย น้ำหล่อเย็น |
| **Mercaptobenzothiazole** | ผลิตภัณฑ์ยาง |
| **Cobalt** | เครื่องประดับ |
| **Diazolidinylurea** | สารกันเสียปล่อย formalin ในครีม โลชั่น แชมพู |
| **Hydroxyethyl methacrylate** | กาว |

### 🔑 การทดสอบทางผิวหนัง 4 แบบ (ตารางเปรียบเทียบ — ออกสอบแน่)

| Test | ใช้วินิจฉัย | วิธีทำ | อ่านผล | ผลบวก |
|------|-------------|--------|--------|-------|
| **Patch test** | **Allergic contact dermatitis** (Type IV) | แปะ standard allergens + allergen ที่สงสัย ที่**ด้านหลัง** นาน **48 ชม.** | **48 และ 72 ชม.** | **erythematous papule, vesicle, bullae** |
| **Skin prick test** | **Contact urticaria** และ **protein contact dermatitis** (Type I) | หยด allergen ที่**ท้องแขน**, NSS = negative control, **histamine = positive control**, สะกิดด้วย lancet | **15–20 นาที** | **wheal** ขนาดใกล้เคียงหรือใหญ่กว่า positive control |
| **Use test** | Allergic contact dermatitis (กรณีสารระคายเคืองสูง เช่น แชมพู สบู่เหลว) | ทาที่**ท้องแขน วันละ 2–3 ครั้ง ติดต่อกัน 1–2 สัปดาห์** ผู้ป่วยทำเองได้ | มีผื่นคัน = แพ้ (อ่าน immediate-type ที่ 15–20 นาทีได้ด้วย) | ผื่นคัน |
| **RAST** (Radioallergosorbent test) | **Immediate-type hypersensitivity — ปลอดภัยที่สุด** นิยมใน **latex allergy** | เอา **serum** ไปตรวจหา **specific IgE** | — | มี specific IgE |

⚠️ **ข้อควรระวัง Skin prick test:** immediate-type hypersensitivity ทำให้เกิด **anaphylaxis** ได้ → ต้องมียาและอุปกรณ์ช่วยชีวิตพร้อมใช้ทันที และ**ไม่ทำ prick test ในรายที่เคยมีอาการ systemic มาก่อน**

⚠️ **ข้อเสีย RAST:** **ความไวต่ำ** — หากให้ผลลบแต่ประวัติบ่งชี้ ควรทำ use test และ prick test ต่อ

### กลุ่มโรคผิวหนังจากการทำงาน

**A. Allergic reactions**
- Allergic contact dermatitis
- **Contact urticaria**
- **Photosensitivity**

**B. Irritation**
- Irritant contact dermatitis
- **Onychodystrophy** — เล็บผิดรูปจาก contact dermatitis จากการระคายเคืองเรื้อรัง
- **Dyshidrosis**

**C. 🔑 Acne, Folliculitis และ Chloracne** (ออกสอบ)

| | **Oil acne / Acne mechanica** | **Chloracne** |
|---|---|---|
| **สาเหตุ** | สัมผัส**น้ำมัน chlorinated hydrocarbon**; ทำงานที่ร้อน + mechanical trauma | สัมผัส **halogenated hydrocarbon** ใน**ยาฆ่าแมลง**และน้ำยาฆ่าเชื้อบางชนิด |
| **ลักษณะเฉพาะ** | สิวบริเวณที่สัมผัสน้ำมัน | 1) ประวัติสัมผัสสาร **2–8 สัปดาห์** ก่อนมีอาการ<br>2) **ไม่มี inflammation รอบผื่น**<br>3) **lesion บริเวณหางตา หลังหู รักแร้ ลูกอัณฑะ**<br>4) เกิดในทุกกลุ่มอายุ<br>5) **Meibomian gland involvement**, comedone ขนาดใหญ่, **straw-color cyst** |

> **ตัวอย่างประวัติศาสตร์:** อดีตประธานาธิบดียูเครน **Viktor Yushchenko** เชื่อว่าเกิด chloracne หลังถูกวางยาพิษในอาหาร

**D. Metal exposure (Chronic exposure to metals)**
- **Chronic arsenic toxicity** — hyperpigmentation, hyperkeratosis, **Bowen's disease**, skin cancer
- **Chronic lead toxicity**

**E. Occupational skin infections** ⭐จับคู่โรค-อาชีพ
| เชื้อ/โรค | อาชีพ |
|-----------|-------|
| **Anthrax** | เกี่ยวกับ**ปศุสัตว์** |
| **Atypical mycobacterium** | **เลี้ยงสัตว์น้ำ** |
| **Sporotrichosis** | **ทำสวน** |
| **Candida infection** | อาชีพที่ต้องอยู่ในที่**ชื้น** |

**F. โรคผิวหนังจากปัจจัยทางกายภาพ**
- **Heat** — miliaria, burns
- **Friction / mechanical trauma** — **Calluses at pressure points**
- **Vibration** — vibration white finger
- **Sunlight exposure** — photodermatoses

**G. 🔑 Occupational Skin Cancer**
- **คนผิวขาวที่ทำงานกลางแจ้ง ถูกแดดนาน** → เสี่ยงต่อ **Basal cell carcinoma (BCC)** และ **Squamous cell carcinoma (SCC)**
- **สารเคมีก่อมะเร็งผิวหนัง:** **coal tar, arsenic**
- **Bowen's disease** = SCC in situ (พบใน arsenic exposure)

## 9. Occupational Lung Diseases (Lect 3.5) ⭐บทใหญ่

### นิยาม
กลุ่มโรคระบบทางเดินหายใจที่เกิดขึ้นหรือสัมพันธ์กับการสัมผัสสิ่งคุกคามในที่ทำงาน — ฝุ่นอนินทรีย์ ฝุ่นอินทรีย์ เส้นใยแร่ สารเคมี ก๊าซ ไอระเหย **ควันโลหะ** และสารก่อภูมิแพ้

ส่งผลต่อ: ทางเดินหายใจ · เนื้อปอด · เยื่อหุ้มปอด · หลอดเลือดปอด → **การอักเสบ พังผืด อุดกั้นทางเดินหายใจ หรือมะเร็งปอด**

### 🔑 ปัจจัยกำหนดการเกิดโรค 4 อย่าง
**ชนิด (type) · ขนาด (size) · ปริมาณ (dose) · ระยะเวลา (duration)**

### ขนาดอนุภาคกับการตกในระบบทางเดินหายใจ ⭐
| ขนาด (µm) | ตำแหน่งที่ตก |
|-----------|-------------|
| ≥ 10 | ทางเดินหายใจส่วนบน (จมูก/คอหอย) |
| 5.8–10 | หลอดลมใหญ่ |
| 4.7–5.8 | หลอดลมขนาดกลาง |
| 3.3–4.7 | หลอดลมเล็ก |
| 2.1–3.3 | หลอดลมฝอย |
| 1.1–2.1 | terminal bronchiole |
| 0.43–1.1 | **ถุงลม (alveoli)** |

> **จำหลัก: ฝุ่นขนาด < 5 µm (respirable fraction) จึงจะลงถึงถุงลมและก่อ pneumoconiosis**

---

### 🔑 กลุ่มโรคปอดจากการทำงาน 5 กลุ่มใหญ่ (โครงสร้างของบทนี้)
1. **Pneumoconiosis**
2. **Work-related asthma**
3. **Hypersensitivity pneumonitis**
4. **Irritant lung reactions**
5. **Occupational lung cancer**
   *(+ Infections)*

---

### 9.1 PNEUMOCONIOSIS

**นิยาม (Parkes):** ปฏิกิริยา **non-neoplastic** ของปอดต่อ**ฝุ่นแร่หรือฝุ่นอินทรีย์ที่สูดเข้าไป** และการเปลี่ยนแปลงโครงสร้างที่ตามมา **ไม่รวม asthma, bronchitis และ emphysema**

**รากศัพท์:** pneumos (lung) + konios (dust) + osis (state of) — ตั้งโดย **Zenker** (พยาธิแพทย์)

**ลักษณะสำคัญ:** ดำเนินโรคช้า และ**เมื่อเกิดพังผืดแล้วมักไม่กลับคืนสู่สภาพปกติ (irreversible)**

**ชนิดของ Pneumoconiosis**
| โรค | สาเหตุ |
|-----|--------|
| **Silicosis** | ผลึก **crystalline silica** |
| **Asbestosis** | **แร่ใยหิน (asbestos)** |
| **Coal Workers' Pneumoconiosis (CWP)** | ฝุ่นถ่านหิน |
| **Chronic Beryllium Disease** | เบริลเลียม |
| อื่นๆ | **Talcosis, Siderosis, Baritosis, Stannosis** |

---

#### A. SILICOSIS
**อาชีพเสี่ยง:** ตัดหินบนเขา · ตีหินบนเขา · ตัดหินที่หล่อด้วยน้ำ · ต็อกหิน · **แกะสลักหินด้วยเลื่อยวงเดือน** · แกะสลักหินด้วยค้อนและสิ่ว · **งานพ่นทราย (sandblasting)** · เหมืองหิน

**Simple silicosis**
- **Upper-zone predominant, well-defined nodules** (nodule ขนาดเล็ก)
- CXR: nodular infiltration บริเวณปอดส่วนบนทั้งสองข้าง

**Complicated silicosis (PMF — Progressive Massive Fibrosis)**
- **Large opacities ≥ 1 cm** ในบริเวณ mid-lung zones
- มี **architectural distortion** ร่วมด้วย
- **Paracicatricial emphysema** รอบๆ large opacities
- บาง nodule มี **calcification**

**⚠️ ภาวะแทรกซ้อนสำคัญของ Silicosis (ออกสอบ)**
1. **การติดเชื้อ — TB (silicotuberculosis) และ Nontuberculous mycobacteria (NTM)**
   - **Cavitation ใน large opacities** → ต้องสงสัย**การติดเชื้อหรือมะเร็ง** (แม้ PMF เองก็ cavitate ได้)
   - ตัวอย่าง: culture ขึ้น ***M. avium* complex**
2. **Lung cancer** — mass ที่**เกิดกลางเนื้อปอด (ไม่ใช่ peripheral)** และ**ไม่มี architectural distortion** → ควรสงสัยมะเร็ง (PMF มักเกิด**ที่ขอบปอด peripheral** และมี distortion)

---

#### B. COAL WORKER'S PNEUMOCONIOSIS (CWP)
- **Upper-zone predominant nodules** — **centrilobular และ perilymphatic nodules**
- Nodule ของ CWP บรรยายว่า **less well-defined** เมื่อเทียบกับ simple silicosis
- **⚠️ แต่ในทางภาพรังสี แยกจาก simple silicosis ไม่ได้ (radiographically indistinguishable)**

---

#### C. ASBESTOS-RELATED LUNG DISEASES

**ชนิดของเส้นใยแร่ใยหิน (ดูด้วย transmission electron microscopy)**
a) **Chrysotile** (serpentine — ขดเป็นเกลียว)
b) **Crocidolite** c) **Amosite** d) **Anthophyllite** (amphibole — เป็นเส้นตรง)
- พบ **Asbestos bodies** (ferruginous bodies) ในเนื้อปอด

**โรคที่เกิดได้**
| โรค | ลักษณะ |
|-----|--------|
| **Pleural plaques & pleural thickening** | เป็น marker ของการสัมผัส (มักไม่มีอาการ), อาจ calcified |
| **Asbestosis** | **Basilar (lower zone) predominant reticulation** — ตรงข้ามกับ silicosis/CWP ที่เป็น upper zone ⭐<br>CT: **peripheral subpleural reticulation + architectural distortion + traction bronchiectasis**<br>**Honeycombing พบเป็นส่วนน้อยของ cases** |
| **Lung cancer** | **spiculated mass** — พบตามมาได้หลายปี (เช่น non-small cell lung carcinoma) |
| **Mesothelioma** | มะเร็งเยื่อหุ้มปอด — จากกลไก chronic inflammation |

> **🔑 จำการกระจาย:** **Silicosis/CWP = Upper zone** vs **Asbestosis = Lower zone (basilar)**

---

#### 🔑 ILO Classification of Radiographs of Pneumoconioses
- ใช้ **ILO Reading Sheet** มาตรฐาน
- แบ่งเป็น **Small opacities** และ **Large opacities**
- ใช้ระบบ **profusion** (ความหนาแน่นของ opacity) — เกณฑ์วินิจฉัยไทยใช้ **≥ 1/1**

---

### 9.2 WORK-RELATED ASTHMA

**🔑 การจำแนก (ผังต้องจำได้)**
```
                        Asthma
                          │
        ┌─────────────────┴─────────────────┐
   Work-related                      Non–work-related
      asthma                              asthma
        │
   ┌────┴─────────────────┐
Occupational          Work-exacerbated
   asthma                 asthma
   (OA)                    (WEA)
   │
   ├── Sensitizer-induced OA
   └── Irritant-induced OA
```

**ลักษณะสำคัญ**
- **โรคทางเดินหายใจจากการทำงานที่พบบ่อยที่สุดในประเทศอุตสาหกรรม** ⭐
- สาเหตุ: สัมผัสสารก่อภูมิแพ้/สารระคายเคือง — **isocyanates, latex, แป้งสาลี, ฝุ่นไม้, เอนไซม์อุตสาหกรรม, สัตว์ทดลอง**
- **🔑 ลักษณะเด่น: อาการดีขึ้นในวันหยุด/เมื่อหยุดงาน และกำเริบเมื่อกลับเข้าสู่สภาพแวดล้อมเดิม**

**การวินิจฉัย/คัดกรอง**
- **Surveillance และ early detection สำคัญมาก — การนำออกจากการสัมผัสตั้งแต่เนิ่นๆ สามารถทำให้โรคหายได้ (reversible)** ⭐
- **Spirometry** ใช้ทั้ง diagnosis และ screening
- **Imaging ไม่จำเพาะ** — อาจพบ **bronchial wall thickening, mosaic attenuation, expiratory air trapping**

---

### 9.3 HYPERSENSITIVITY PNEUMONITIS (Extrinsic Allergic Alveolitis)

**นิยาม:** เกิดจากการ**สูดดม antigen ในผู้ที่ถูก sensitize แล้ว**

**สาเหตุ**
- **Organic antigens — พบบ่อยที่สุด**: **แบคทีเรีย ยีสต์ เชื้อรา และโปรตีนจากนก**
- **Low molecular weight chemicals**: **zinc, inks, dyes, isocyanates**

> ตัวอย่างคลาสสิก: Farmer's lung, Bird fancier's lung, Humidifier lung, Bagassosis

---

### 9.4 IRRITANT LUNG REACTIONS

#### A. Acute Toxic Inhalation Injury
การได้รับสารเคมี**เข้มข้นในระยะเวลาสั้น** → อักเสบฉับพลันของ **respiratory mucosa** หรือ **lung parenchyma** → เกิดได้:
- **Chemical pneumonitis**
- **Pulmonary edema**
- **ARDS (Acute Respiratory Distress Syndrome)**

**🔑 สารก่อเหตุ (agents):** ก๊าซ (gases), ฟูม (fumes), ละอองลอย (aerosols)
> **Ammonia · Cadmium oxide · Hydrogen chloride · Hydrogen fluoride · Sulfur dioxide · Chlorine · Oxides of nitrogen · Ozone · Phosgene · Vanadium pentoxide**

#### B. 🔑 Inhalation Fever Syndromes (ออกสอบ)
1. **Metal fume fever** (จากงานเชื่อมโลหะ — zinc oxide)
2. **Polymer fume fever** (จาก PTFE/Teflon)
3. **Organic dust toxic syndrome (ODTS)**

- **อาการ: ไข้ หนาวสั่น ปวดกล้ามเนื้อ และไอ**
- **🔑 มักหายเองภายใน 24–48 ชั่วโมงหลังหยุดสัมผัส** (self-limited)

---

### 9.5 OCCUPATIONAL LUNG CANCER

**🔑 สารก่อมะเร็งปอดที่สำคัญ (ท่องให้ได้)**
- **Asbestos**
- **Crystalline silica**
- **Arsenic**
- **Hexavalent chromium, Cr(VI)**
- **Nickel**
- **ควันไอเสียเครื่องยนต์ดีเซล (Diesel exhaust)**
- **รังสี Radon**

> **⭐ การสูบบุหรี่ร่วมกับการสัมผัสสารก่อมะเร็งจากการทำงาน เพิ่มความเสี่ยงแบบ SYNERGISTIC EFFECT (เสริมฤทธิ์ ไม่ใช่แค่บวกกัน)** — ข้อนี้ออกสอบบ่อยมาก โดยเฉพาะ asbestos + smoking

## 10. Mental Health in Workplace (Lect 3.6)

### ปัจจัยทางจิตวิทยาที่มีผลต่ออาการทางกาย (แยกให้ออก)
| กลุ่ม | ลักษณะ |
|-------|--------|
| **Psychological disorders** | โรคทางจิตเวชจริง |
| **Somatoform disorders** | อาการทางกายโดยไม่มีพยาธิสภาพ **ผู้ป่วยไม่ได้แกล้ง** |
| **Factitious disorder** | **แกล้งป่วยโดยเจตนา แต่ไม่มีผลประโยชน์ภายนอก** (ต้องการบทบาทผู้ป่วย) |
| **Malingering** | **แกล้งป่วยเพื่อผลประโยชน์ภายนอก** (เงินชดเชย, ลางาน) ⭐สำคัญในงานอาชีวเวชศาสตร์ |

### โรคทางจิตเวชที่พบบ่อยในที่ทำงาน
- **Major depressive disorder**
- **Bipolar disorder**
- **Generalized anxiety disorder (GAD)**
- **Post-traumatic stress disorder (PTSD)**

> **ผลกระทบ:** ยา (drugs) → ผลข้างเคียง (side effects) → **ลดประสิทธิภาพการทำงาน (performance)**

### 🔑 Karasek's Job Strain Model (1979) — ออกสอบ
แบ่งตาม 2 แกน: **Job Demand (ความต้องการของงาน)** × **Job Control/Decision Latitude (อำนาจควบคุมงาน)**

| | **Control ต่ำ** | **Control สูง** |
|---|---|---|
| **Demand สูง** | **High Strain Job** ⚠️ (เครียดที่สุด เสี่ยงโรคหัวใจ/ซึมเศร้า) | **Active Job** (ท้าทาย เรียนรู้ได้ดี) |
| **Demand ต่ำ** | **Passive Job** (เฉื่อยชา ทักษะถดถอย) | **Low Strain Job** (สบาย) |

> การสนับสนุนทางสังคม (social support) เป็นตัวแปรที่ 3 ที่ช่วยลด strain — **Iso-strain** = high demand + low control + low support

### จิตวิทยาในที่ทำงาน (Psychology in workplace) — วงจร
**Recruitment → Training → Motivation & Productivity → Compensation → Performance appraisal**

- มี **EAP (Employee Assistance Program)** เป็นระบบช่วยเหลือพนักงาน

---

### 🔑 ความรุนแรงในที่ทำงาน (Workplace Violence)

**แหล่งที่มา 2 กลุ่ม**
1. **ภายในหน่วยงาน (Internal)** — เพื่อนร่วมงาน หัวหน้า
2. **บุคคลภายนอก (External)** — **ผู้รับบริการ**, **โจร/ผู้ก่อการร้าย**, สื่อ/สังคม

**Internal Workplace Violence — ปัจจัย 3 ข้อ**
1. **Personal factors**
2. **The work environment**
3. **Ineffective management in an organization**

**🔑 External Workplace Violence — Risk Factors (OSHA) ออกสอบ**
- **Contact with the public** / ติดต่อลูกค้าบ่อย
- **Exchange of money / Cash handling** (มีการรับ-จ่ายเงินสด)
- **Delivery of passengers, goods, or services**
- **Having a mobile workplace** — เช่น **แท็กซี่, รถตำรวจ**
- **Working with unstable or volatile persons** — งานสาธารณสุข สังคมสงเคราะห์ กระบวนการยุติธรรม
- **Working alone or in small numbers** — ทำงานคนเดียว
- **Working late at night or during early morning hours** — กะดึก
- **Working in high-crime areas** — พื้นที่อาชญากรรมสูง
- **Guarding valuable property or possessions** — เช่น **รปภ.**
- **Working in community-based settings** / working outside office

---

## 11. Toxicology & Health Surveillance (Lect 3.7)

### 🔑 คำคมที่ต้องรู้
> "**All things are poison and nothing is without poison. Solely, the dose determines that a thing is not a poison.**"
> — **Paracelsus (1493–1541)** — บิดาแห่งพิษวิทยา
>
> ใจความ: **ขนาด (dose) เป็นตัวกำหนดความเป็นพิษ**

### ระบบสัญลักษณ์อันตราย
- **GHS** (Globally Harmonized System) — สัญลักษณ์รูปข้าวหลามตัดขอบแดง
- **NFPA 704** — เพชร 4 สี (แดง=ไวไฟ, น้ำเงิน=สุขภาพ, เหลือง=ความไวปฏิกิริยา, ขาว=พิเศษ)

---

### 🔑 ลำดับขั้นของการเกิดโรคทางพิษวิทยา (แกนหลักของบทนี้)
```
สัมผัสสาร  →  เข้าสู่ร่างกาย  →  การเปลี่ยนแปลงในร่างกาย  →  เจ็บป่วย
(Exposure)     (Uptake)          (Internal change)          (Disease)
```

### Toxicokinetics (สิ่งที่ร่างกายทำกับสาร) — ADME
1. **Absorption** การดูดซึม
2. **Distribution** การกระจาย
3. **Biotransformation** การเปลี่ยนโครงสร้างทางเคมี
4. **Elimination** การกำจัด

### Routes of Exposure — ทางที่สารเข้าสู่ร่างกาย 4 ทาง
1. **ผิวหนัง (dermal)**
2. **การหายใจ (inhalation)** ← สำคัญที่สุดในงานอาชีวอนามัย
3. **การรับประทาน (ingestion)**
4. **การเข้าสู่เลือดโดยตรง (injection/parenteral)**

### Toxicodynamics (สิ่งที่สารทำกับร่างกาย)
- **การทำลาย** (damage)
- **การซ่อมแซม** (repair)
- **การตอบสนอง** (response)

---

### Dose-Response Relationship
- **Toxicity rating** — ลำดับความเป็นพิษจากผลการทดลอง
- **LD50 (Lethal Dose 50)** — ขนาดที่ทำให้สัตว์ทดลองตาย 50%
  - **LD50 ยิ่งต่ำ = ยิ่งเป็นพิษมาก**

### 🔑 Response to Carcinogen — สำคัญมาก
> **สารก่อมะเร็ง (genotoxic carcinogen) ไม่มี threshold**
> → **มีความเสี่ยงในทุกระดับการสัมผัส (no safe level)**

ต่างจากสารพิษทั่วไปที่มี threshold (NOAEL/LOAEL)

---

### 🔑 BIOMARKERS

**นิยาม (IPCS/WHO 2001):**
> "สาร โครงสร้าง หรือกระบวนการทางชีวภาพใดๆ ที่**สามารถวัดได้จากร่างกายหรือผลิตภัณฑ์ของร่างกาย** และมีแนวโน้มหรือ**ทำนายอุบัติการณ์ของเหตุการณ์หรือโรค**ได้"

**ชนิดของ Biomarker 3 ชนิด (map กับลำดับขั้นการเกิดโรค)**
| ชนิด | ตำแหน่งในลำดับขั้น | ความหมาย |
|------|------------------|----------|
| **Biomarker of Exposure** | สัมผัสสาร → **เข้าสู่ร่างกาย** | วัดสารหรือ metabolite ที่เข้าสู่ร่างกายแล้ว |
| **Biomarker of Effect** | **การเปลี่ยนแปลงในร่างกาย** → เจ็บป่วย | วัดการเปลี่ยนแปลงทางชีวเคมี/สรีรวิทยาที่เกิดขึ้น |
| **Biomarker of Susceptibility** | ครอบทุกขั้น | บ่งชี้ความไวต่อการเกิดโรคที่**ต่างกันไปในแต่ละบุคคล** (เช่น พันธุกรรม) |

**ตัวอย่าง: Lead (ตะกั่ว)**
- Biomarker of exposure: **blood lead level**
- Biomarker of effect: **ZPP (zinc protoporphyrin)**, ALA ในปัสสาวะ, hemoglobin

**ตัวอย่างชนิดสิ่งส่งตรวจ**
| **เก็บง่าย ไม่ซับซ้อน** | **เก็บยาก/เจ็บ** |
|---|---|
| ลมหายใจ · **ปัสสาวะ** · อุจจาระ · การป้ายจมูก · การป้ายกระพุ้งแก้ม · น้ำลาย · เสมหะ · น้ำนม · อสุจิ · **ผม** · **เล็บ** | **เลือด** · เนื้อปอด · เนื้อตับ · เนื้อเยื่อไขมัน · กระดูก · ไขกระดูก · น้ำคร่ำ · น้ำล้างปอด (BAL) |

**🔑 ปัจจัยที่ควรคำนึงในการใช้ Biomarkers (Mayeux, NeuroRx 2004)**
1. **ความคลาดเคลื่อนของการวัด** (measurement error)
2. **อคติ** (bias)
3. **ปัจจัยที่รบกวนผลตรวจ** (confounders)
4. **ค่าใช้จ่าย** (cost)
5. **การยอมรับจากผู้รับการตรวจ** (acceptability)

---

### 🔑 ขั้นตอน Occupational Health Surveillance — 14 ขั้น (ออกสอบ)
1. **ประเมินสิ่งคุกคามสุขภาพในที่ทำงาน**
2. **บันทึก/รวมรายการอวัยวะที่ได้รับผลกระทบ**จากสิ่งคุกคามแต่ละชนิด
3. **เลือกการทดสอบ**ที่สามารถคัดกรองผลของสิ่งคุกคามต่ออวัยวะนั้น
4. **สร้างข้อกำหนดเลือกกลุ่มผู้ที่ต้องมารับการคัดกรอง**
5. **เลือกการเก็บข้อมูลแบบมีมาตรฐาน**
6. ทำการตรวจ/ใช้เครื่องมือวัดหรือคัดกรอง
7. ทำการตรวจวัด
8. **แปลผลการตรวจวัด**
9. **ยืนยันการตรวจ** (confirmation)
10. **กำหนดสถานะการทำงาน** (fitness for work)
11. **รายงานผล**
12. **วินิจฉัยโรค**
13. **ประเมินและควบคุมระดับการสัมผัส**
14. **บันทึกเวชระเบียน**

## 12. Confined Space — ที่อับอากาศ (Lect 8)

### 🔑🔑 นิยาม "ที่อับอากาศ" (กฎกระทรวงฯ พ.ศ. 2562) — ตามตัวบท
> **"ที่อับอากาศ" (Confined Space) หมายความว่า ที่ซึ่งมีทางเข้าออกจำกัด และไม่ได้ออกแบบไว้สำหรับเป็นสถานที่ทำงานอย่างต่อเนื่องเป็นประจำ และมีสภาพอันตรายหรือมีบรรยากาศอันตราย เช่น อุโมงค์ ถ้ำ บ่อ หลุม ห้องใต้ดิน ห้องนิรภัย ถังน้ำมัน ถังหมัก ถัง ไซโล ท่อ เตา ภาชนะ หรือสิ่งอื่นที่มีลักษณะคล้ายกัน**

**🔑 องค์ประกอบ 3 ข้อของ "ที่อับอากาศ" (ต้องครบ):**
1. **ทางเข้าออกจำกัด**
2. **ไม่ได้ออกแบบไว้สำหรับเป็นสถานที่ทำงานอย่างต่อเนื่องเป็นประจำ**
3. **มีสภาพอันตราย หรือมีบรรยากาศอันตราย**

---

### 🔑🔑 "สภาพอันตราย" — 4 ข้อ (ตามกฎกระทรวง)
> **หมายความว่า สภาพหรือสภาวะที่อาจทำให้ลูกจ้างได้รับอันตรายจากการทำงานอย่างหนึ่งอย่างใด ดังต่อไปนี้**

1. **มีวัตถุหรือวัสดุที่อาจก่อให้เกิดการจมลงของลูกจ้างหรือถมทับลูกจ้างที่เข้าไปทำงาน**
2. **มีสภาพที่อาจทำให้ลูกจ้างตก ถูกกัก หรือติดอยู่ภายใน**
3. **มีสภาวะที่ลูกจ้างมีความเสี่ยงที่จะได้รับอันตรายจากบรรยากาศอันตราย**
4. **สภาพอื่นใดที่อาจเป็นอันตรายต่อร่างกายหรือชีวิตตามที่อธิบดีประกาศกำหนด**

---

### 🔑🔑 "บรรยากาศอันตราย" — 5 ข้อ (ออกสอบแน่นอน — ตัวเลขต้องจำ)
> **หมายความว่า สภาพอากาศที่อาจทำให้ลูกจ้างได้รับอันตรายจากสภาวะอย่างหนึ่งอย่างใด ดังต่อไปนี้**

| # | เกณฑ์ | หมายเหตุ |
|:-:|-------|---------|
| **1** | **⭐ มีออกซิเจนต่ำกว่าร้อยละ 19.5 หรือมากกว่าร้อยละ 23.5 โดยปริมาตร** | **< 19.5% → เสี่ยง HYPOXIA**<br>**> 23.5% → เสี่ยงเกิด FLAME/ไฟไหม้** |
| **2** | **⭐ มีก๊าซ ไอ หรือละอองที่ติดไฟหรือระเบิดได้ เกินร้อยละ 10 ของค่าความเข้มข้นขั้นต่ำของสารเคมีแต่ละชนิดในอากาศที่อาจติดไฟหรือระเบิดได้** | **= 10% ของ LFL (lower flammable limit) หรือ LEL (lower explosive limit)** |
| **3** | **มีฝุ่นที่ติดไฟหรือระเบิดได้ ซึ่งมีค่าความเข้มข้นเท่ากับหรือมากกว่าค่าความเข้มข้นขั้นต่ำสุดของฝุ่นที่ติดไฟหรือระเบิดได้แต่ละชนิด** | **= MEC (minimum explosible concentration)** |
| **4** | **มีค่าความเข้มข้นของสารเคมีแต่ละชนิดเกินมาตรฐาน**ที่กำหนดตามกฎกระทรวงว่าด้วยการกำหนดมาตรฐานในการบริหาร จัดการ และดำเนินการด้านความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงานเกี่ยวกับสารเคมีอันตราย | |
| **5** | **สภาวะอื่นใดที่อาจเป็นอันตรายต่อร่างกายหรือชีวิตตามที่อธิบดีประกาศกำหนด** | |

---

### ตัวอย่างสถานที่อับอากาศ (จากสไลด์)
**Tunnels · Wells · Manholes · Cold storage · Ship Holds · Subcellars · Tanks · Culverts · Silos · Vaults · Open Ditch**
+ ท่อ · ถังหมัก · ถังน้ำมัน · ห้องใต้ดิน · ห้องนิรภัย · เตา · ถ้ำ · บ่อ · หลุม

---

### 🔑🔑 ข้อปฏิบัติด้านสุขภาพ (สำคัญมาก — ออกสอบ)

**🔑 ข้อ 5 (กฎกระทรวงฯ พ.ศ. 2547)**
> **"ห้ามนายจ้างอนุญาตให้ลูกจ้างหรือบุคคลใดเข้าไปในที่อับอากาศ หากนายจ้างรู้หรือควรรู้ว่าลูกจ้างหรือบุคคลนั้นเป็นโรคเกี่ยวกับทางเดินหายใจ โรคหัวใจ หรือโรคอื่นซึ่งแพทย์เห็นว่าการเข้าไปในที่อับอากาศอาจเป็นอันตรายต่อบุคคลดังกล่าว"** ⭐⭐

> **จำ: 3 กลุ่มโรคที่ห้ามเข้าที่อับอากาศ = โรคทางเดินหายใจ · โรคหัวใจ · โรคอื่นที่แพทย์เห็นว่าอันตราย**

**🔑 ข้อ 7/1 (ประกาศกรมสวัสดิการฯ ฉบับที่ 2 พ.ศ. 2551) — คุณสมบัติผู้เข้ารับการฝึกอบรมภาคปฏิบัติ**
1. **มีอายุไม่ต่ำกว่า 18 ปีบริบูรณ์**
2. **มีสุขภาพสมบูรณ์ ร่างกายแข็งแรง ไม่เป็นโรคเกี่ยวกับทางเดินหายใจ โรคหัวใจ หรือโรคอื่นซึ่งแพทย์เห็นว่าการเข้าไปในที่อับอากาศอาจเป็นอันตรายต่อผู้เข้ารับการฝึกอบรม**

---

### 🔑🔑 ข้อบังคับการปฏิบัติงานในที่อับอากาศ — ข้อ 6 (การตรวจวัดบรรยากาศ) ออกสอบ

> **"ให้นายจ้างจัดให้มีการตรวจวัด บันทึกผลการตรวจวัด และประเมินสภาพอากาศในที่อับอากาศว่ามีบรรยากาศอันตรายหรือไม่ โดยให้ดำเนินการทั้ง (1) ก่อนให้ลูกจ้างเข้าไปทำงาน และ (2) ในระหว่างที่ลูกจ้างทำงานในที่อับอากาศ"** ⭐

**🔑 ถ้าตรวจพบบรรยากาศอันตราย ให้นายจ้างดำเนินการ 3 ขั้น (ตามลำดับ):**
1. **นำลูกจ้างและบุคคลที่อยู่ในที่อับอากาศออกจากบริเวณนั้นทันที** ⚠️
2. **ประเมินและค้นหาว่าบรรยากาศอันตรายเกิดจากสาเหตุใด**
3. **ดำเนินการเพื่อทำให้สภาพอากาศในที่อับอากาศนั้นไม่มีบรรยากาศอันตราย เช่น การระบายอากาศ หรือการปฏิบัติตามมาตรการอื่น**

> **หากดำเนินการตามวรรคสองแล้ว ที่อับอากาศนั้นยังมีบรรยากาศอันตรายอยู่ แต่นายจ้างมีความจำเป็นที่จะต้องให้ลูกจ้างเข้าไป → ให้นายจ้างจัดให้ลูกจ้างสวมใส่หรือใช้อุปกรณ์คุ้มครองความปลอดภัยส่วนบุคคลชนิดที่ทำให้บุคคลดังกล่าวทำงานในที่อับอากาศนั้นได้โดยปลอดภัย**

> **ให้นายจ้างเก็บบันทึกผลการตรวจวัด การประเมินสภาพอากาศ และการดำเนินการ ไว้พร้อมที่จะให้พนักงานตรวจแรงงานตรวจสอบได้**

---

### 🔑🔑 บทบาทผู้ปฏิบัติงาน 3 ตำแหน่ง (ออกสอบ)
| บทบาท | หน้าที่ |
|-------|---------|
| **1. ผู้ทำงานในที่อับอากาศ** | ผู้เข้าไปปฏิบัติงานภายใน |
| **2. ผู้ช่วยเหลือ (Attendant)** | **เฝ้าอยู่ด้านนอกตลอดเวลา** พร้อมช่วยเหลือกรณีฉุกเฉิน |
| **3. ผู้ควบคุมงาน (Supervisor)** | ควบคุม กำกับ อนุญาตการเข้าทำงาน |

---

### 🔑🔑 หลักปฏิบัติการทำงานในสถานที่อับอากาศ (ตามสไลด์ 6 ข้อ)
1. **ตรวจสอบสภาพบรรยากาศในที่อับอากาศ** (อ้างอิงกับกฎหมายความปลอดภัยในการทำงานในสถานที่อับอากาศ)
   - **กำหนดแนวปฏิบัติ "การให้อนุญาตเข้าทำงานในที่อับอากาศ" (Permit-to-Work)**
2. **สวมใส่อุปกรณ์ความปลอดภัยในการทำงานให้เหมาะสมตลอดระยะเวลาการทำงาน**
3. **จัดเตรียมอุปกรณ์ความปลอดภัยในการทำงานที่เหมาะสมเพื่อสวมใส่ระหว่างปฏิบัติงาน** (เช่น **หน้ากากส่งอากาศ/SCBA + พัดลมระบายอากาศ**)
4. **มีผู้ช่วยเหลือกรณีเกิดเหตุฉุกเฉิน + จัดเตรียมอุปกรณ์ช่วยเหลือที่เหมาะสมกรณีเกิดเหตุฉุกเฉิน** (**Tripod + Winch + Harness + Lifeline**)
5. **ตรวจเพื่อระวังบรรยากาศในที่อับอากาศ "ต้องไม่เกินมาตรฐาน"** (อ้างอิงกับกฎหมายความปลอดภัยฯ)
6. **กั้นบริเวณ/ติดป้ายเตือน** (กรวยจราจร แผงกั้น)

### 🔑🔑 ก๊าซอันตรายในที่อับอากาศ — เรียงตามชั้น (ออกสอบ)
> **บรรยากาศอันตรายอาจเกิดจากการมีก๊าซอันตราย เช่น**

| ก๊าซ | ชื่อ | ตำแหน่งในบ่อ (ตามความหนาแน่น) |
|------|------|------------------------------|
| **CH₄** | **มีเทน (Methane)** | **ชั้นบน** (เบากว่าอากาศ) — ไวไฟ/ระเบิด |
| **CO** | **คาร์บอนมอนอกไซด์ (Carbon monoxide)** | **ชั้นกลาง** (ใกล้เคียงอากาศ) — พิษ ไม่มีสี ไม่มีกลิ่น |
| **H₂S** | **ไฮโดรเจนซัลไฟด์ (Hydrogen sulfide)** | **ชั้นล่าง** (หนักกว่าอากาศ) — กลิ่นไข่เน่า, ความเข้มข้นสูงทำให้ดมไม่ได้กลิ่น (olfactory fatigue) ⚠️ |

---

### 🔑 สิ่งคุกคามในที่อับอากาศ 7 ข้อ (ออกสอบ)
1. **ก๊าซ** (ขาดออกซิเจน, ก๊าซพิษ เช่น H₂S, CO, ก๊าซไวไฟ)
2. **เครื่องจักร**
3. **ไฟฟ้า**
4. **สารเคมี**
5. **ความลื่น**
6. **การตก** (fall)
7. **การดูดฝัง** (engulfment — จมในวัสดุเช่นเมล็ดพืช ทราย)

### หลักปฏิบัติการทำงานในที่อับอากาศ
1. **ขออนุญาตทำงาน (Permit-to-Work / Entry Permit)** ⚠️ ห้ามเข้าโดยไม่มีใบอนุญาต
2. **ตรวจวัดบรรยากาศก่อนเข้า** (O₂, ก๊าซไวไฟ, ก๊าซพิษ) และตรวจวัดต่อเนื่อง
3. **ระบายอากาศ (ventilation)** ให้เพียงพอก่อนและระหว่างทำงาน
4. **Lockout/Tagout** ตัดแยกพลังงาน/สารเคมีที่อาจไหลเข้ามา
5. **มีผู้ควบคุมงาน / ผู้ช่วยเหลือ (attendant) เฝ้าอยู่ด้านนอกตลอดเวลา**
6. **มีระบบสื่อสารตลอดเวลา**
7. **มีแผนและอุปกรณ์ช่วยเหลือกรณีฉุกเฉิน (rescue plan)**
8. **ผู้ปฏิบัติงานต้องผ่านการฝึกอบรม**

### อุปกรณ์ความปลอดภัย
- **เครื่องตรวจวัดก๊าซ (gas detector)**
- **อุปกรณ์ช่วยหายใจ — SCBA / Supplied-air respirator** ⚠️ (ห้ามใช้หน้ากากกรองอากาศธรรมดาในภาวะขาดออกซิเจน)
- **สายกู้ภัย (lifeline) + Full-body harness + Tripod/Winch**
- พัดลมระบายอากาศ, ไฟฉายชนิดกันระเบิด, อุปกรณ์สื่อสาร

### กฎหมาย/แนวทางอ้างอิง
- **กฎกระทรวง กำหนดมาตรฐานในการบริหารและการจัดการด้านความปลอดภัย อาชีวอนามัย และสภาพแวดล้อมในการทำงานในที่อับอากาศ พ.ศ. 2547 และ พ.ศ. 2562**
- **ประกาศกรมสวัสดิการและคุ้มครองแรงงาน** เรื่อง หลักเกณฑ์ วิธีการ และหลักสูตรฝึกอบรมความปลอดภัยในการทำงานในที่อับอากาศ ฉบับที่ 2 พ.ศ. 2551
- **แนวทางการตรวจสุขภาพคนทำงานในที่อับอากาศ** — สมาคมโรคจากการประกอบอาชีพและสิ่งแวดล้อมแห่งประเทศไทย, 2557

> ⚠️ **ข้อเท็จจริงสำคัญ: ผู้เสียชีวิตในที่อับอากาศส่วนใหญ่คือ "ผู้เข้าไปช่วยเหลือ" ที่ไม่ได้เตรียมอุปกรณ์ → ห้ามเข้าไปช่วยโดยไม่มี SCBA เด็ดขาด**

## 13. Emergency Preparedness & Incident Command System (Lect 9.1–9.2)

### 13.1 Emergency Preparedness — แผนตอบโต้ภาวะฉุกเฉิน

**องค์ประกอบการเตรียมรับมือ**
1. **แผนและการฝึกซ้อม** (plan + drill) — ร่วมกับหน่วยเผชิญเหตุแรก (first responders)
2. **แผนผังและป้ายสัญลักษณ์** (evacuation map, signage)
3. **อุปกรณ์พร้อมใช้** (equipment readiness)
4. **ระบบบัญชาการภาวะฉุกเฉิน (Incident Command System)**

---

### 13.2 🔑 วัฏจักรการจัดการภัยพิบัติ (Disaster Cycle) — ออกสอบ
```
        การป้องกัน (Prevention)
              ↓
        การลดความเสี่ยง (Mitigation)
              ↓
        การเตรียมรับ (Preparedness)
              ↓
        การรับมือเหตุการณ์ (Response)
              ↓
        การฟื้นฟูหลังเกิดเหตุการณ์ (Recovery)
              ↓
        → วนกลับสู่การป้องกัน
```

---

### 13.3 ICS — Incident Command System (ระบบบัญชาการเหตุฉุกเฉิน)

**หลักการปฏิบัติการ**
- **กำหนดวัตถุประสงค์ของการปฏิบัติการ**
- **คำนึงถึงความปลอดภัยของผู้ปฏิบัติงานเป็นหลัก** ⭐
- มีการประเมินสถานการณ์และปฏิบัติตามแผน
- **ต้องเป็นคำสั่งจากผู้บัญชาการเหตุการณ์หรือผู้ได้รับมอบอำนาจ**

**🔑 ความรับผิดชอบของผู้ปฏิบัติงาน 3 ข้อ**
1. **รายงานตัวเมื่อเข้ามาปฏิบัติภารกิจ** (check-in)
2. **ปฏิบัติงานตามแผนปฏิบัติการ**
3. **รับฟังคำสั่งจากผู้บังคับบัญชาเพียงคนเดียว** ← **Unity of Command** ⭐ (สำคัญมาก)

---

### 🔑 โครงสร้างพื้นฐาน ICS (ต้องวาดได้)
```
                    ผู้บัญชาการเหตุการณ์
                    (Incident Commander)
                            │
        ┌───────────────────┼───────────────────┐
   ฝ่ายความปลอดภัย    ฝ่ายข้อมูลข่าวสาร    ฝ่ายประสานงาน
   (Safety Officer)  (Public Information  (Liaison Officer)
                          Officer)
                            │  ← Command Staff
        ┌───────────┬───────┴───────┬───────────────┐
  ฝ่ายปฏิบัติการ  ฝ่ายแผน      ฝ่ายสนับสนุน    ฝ่ายการเงิน
  (Operations)   (Planning)   (Logistics)   (Finance/Admin)
                          ← General Staff (4 ฝ่าย)
```

**สรุปจำ: ผู้บัญชาการ 1 + Command Staff 3 (ความปลอดภัย, ข้อมูลข่าวสาร, ประสานงาน) + General Staff 4 (ปฏิบัติการ, แผน, สนับสนุน, การเงิน)**

---

### 🔑 การถ่ายโอนอำนาจการบัญชาการ (Transfer of Command) — ทำเมื่อไหร่ 4 กรณี
1. **มีผู้บัญชาการที่มีความเหมาะสมมากกว่าเข้ามาปฏิบัติงานแทน**
2. **สถานการณ์มีการเปลี่ยนแปลง**
3. **สถานการณ์ยืดเยื้อ** (ต้องผลัดเปลี่ยน)
4. **สิ้นสุดภารกิจ**

---

### 🔑 IAP — Incident Action Plan (แผนปฏิบัติการ)
1. **การวางแผนปฏิบัติหากเกิดเหตุการณ์**
2. **การฝึกซ้อม** (drill/exercise)
3. **การทบทวนปรับปรุง — After Action Review (AAR)** ⭐

# PART B — PALLIATIVE CARE

## 14. Concept of Palliative Care (Lect 4.1–4.2)

### 🔑 นิยาม (WHO)
> **การดูแลแบบประคับประคอง** คือ การดูแลผู้ที่มี**ภาวะจำกัดการมีชีวิต (Life-limiting conditions)** หรือมี**ภาวะคุกคามต่อชีวิต (Life-threatening conditions)** โดยมีจุดประสงค์**เพื่อเพิ่มคุณภาพชีวิต** บำบัด เยียวยา และบรรเทาทุกข์ทางกาย จิต สังคม และจิตวิญญาณ **ตั้งแต่ระยะเริ่มต้นของการเจ็บป่วยจนกระทั่งเสียชีวิต** โดย**ครอบคลุมถึงครอบครัวและผู้ที่มีความสัมพันธ์กับผู้นั้นด้วย**

**จุดสำคัญที่ออกสอบ:** เริ่มตั้งแต่**ระยะเริ่มต้น**ของโรค ไม่ใช่แค่ระยะท้าย · ครอบคลุม**ครอบครัว**ด้วย

---

### 🔑 หลักการของ Palliative Care (Principles) — 7 ข้อ
1. **บรรเทาความปวดและอาการทุกข์ทรมานอื่นๆ**
2. **เห็นคุณค่าการมีชีวิตและมองกระบวนการเสียชีวิตเป็นธรรมชาติ**
3. **ไม่เจตนาเร่งหรือยื้อความตาย** ⚠️ (ไม่ใช่ euthanasia และไม่ใช่การยื้อชีวิต)
4. **ผสมผสานการดูแลทางจิตใจ และจิตวิญญาณในการดูแลผู้ป่วย**
5. **สนับสนุนช่วยเหลือผู้ป่วยให้มีชีวิตอย่างมีคุณค่าจนเสียชีวิต**
6. **สนับสนุนช่วยเหลือครอบครัวผู้ป่วยในการปรับตัวในความเจ็บป่วยของผู้ป่วย**
7. **ประเมินความต้องการของผู้ป่วยและครอบครัว รวมถึงการให้คำปรึกษาเกี่ยวกับประสบการณ์สูญเสียบุคคลอันเป็นที่รัก (bereavement)**

---

### 🔑 Curative Care vs Palliative Care (ตารางออกสอบแน่นอน)
| | **CURATIVE CARE** | **PALLIATIVE CARE** |
|---|---|---|
| **Goal** | รักษาโรค หรือยื้อชีวิตผู้ป่วย | **สร้างคุณภาพชีวิตที่ดี, การจัดการอาการ และช่วยเหลือด้านต่างๆ** |
| **Focuses on** | **ตัวโรค** | **ผู้ป่วยและครอบครัว** |
| **Key information** | การตรวจเพื่อการวินิจฉัย (Lab, X-ray, etc.) | **อาการรบกวนต่างๆ (symptoms)** |
| **Treatment** | ควบคุมหรือรักษาโรคให้หาย | **การจัดการอาการ (symptom management)** |
| **Death** | **การตายถือเป็นความล้มเหลว (failure)** | **ความตายเป็นสิ่งที่หลีกเลี่ยงไม่ได้ (inevitable)** |

---

### 🔑 The Concept / Timeline of Palliative Care
```
   Curative Care ────────────────────────╲
                    ╱──────────────────────╲  Palliative Care
                   ╱                        ╲     ↑
  PREVENTION → SYMPTOM MANAGEMENT → HOSPICE/END OF LIFE CARE → BEREAVEMENT
                                                          (DEATH)
  ├─────────────────── PALLIATIVE CARE ─────────────────────────┤
```
- Palliative care **เริ่มควบคู่ไปกับ curative care ตั้งแต่ต้น** และค่อยๆ เพิ่มสัดส่วน
- ครอบคลุม **prevention → symptom management → hospice/end-of-life → bereavement (หลังผู้ป่วยเสียชีวิต)**

---

### 🔑 ความสำคัญ (Importance) — ตัวเลขที่ควรจำ
- **40 ล้านคนทั่วโลกต้องการ palliative care ต่อปี แต่มีเพียง ~14% ที่ได้รับ**
- **ประเทศไทย: 18.7% ของผู้ป่วยที่นอนโรงพยาบาลเป็นผู้ป่วย palliative care แต่มีเพียง 17.3% ที่ได้รับการปรึกษาผู้เชี่ยวชาญ palliative care**

---

### 🔑 ประโยชน์ (Benefits) — 3 มิติ
| ต่อ **ผู้ป่วย (Patients)** | ต่อ **ครอบครัว (Family)** | ต่อ **ค่าใช้จ่าย (Cost)** |
|---|---|---|
| • Improve quality of life<br>• Symptom management<br>• Advance Care Planning | • Support in making decisions that align with patient's goal<br>• Support for family members | • Avoiding unnecessary treatments<br>• Reducing hospitalizations |

---

## 14.2 Initial Assessment & Management

### วัตถุประสงค์ของการประเมิน (Objective of Assessment)
1. **ประเมินทั้งด้านกาย จิต สังคม และจิตวิญญาณ**
2. **ให้การประเมินอย่างต่อเนื่อง และเพิ่มคุณภาพชีวิตของผู้ป่วย**
3. **เป็นผู้นำในการพูดคุยเกี่ยวกับการพยากรณ์โรค แนวทางการรักษา และเป้าหมายในการรักษา**
4. **ช่วยวางแผนสำหรับการกำหนดแผนการดูแลรักษาล่วงหน้า (ACP) และการตัดสินใจในช่วงวาระสุดท้ายของชีวิต**

### Symptom Assessment
- ผู้ป่วยประคับประคองมักมีอาการรบกวนต่างๆ มากมาย
- **🔑 ให้ผู้ป่วยเป็นผู้บอกว่าอาการอะไรที่รบกวนผู้ป่วย = GOLD STANDARD** ⭐
- หารือวางแผนการจัดการอาการรบกวนต่างๆ ของผู้ป่วยแก่ผู้ดูแล
- หาสาเหตุของอาการรบกวน: โรคประจำตัว, ผลข้างเคียงการรักษา, อาการทางอารมณ์ความรู้สึก

### 🔑 Dimensions of Symptom Assessment (มิติที่ต้องซัก)
**Onset · Location · Duration · Characteristics · Aggravating-Relieving · Timing · Severity · Level of interference with activities / Level of distress associated with the symptom**

> วิธีจำแบบย่อ: **OLD CART** (Onset, Location, Duration, Characteristics, Aggravating/Alleviating, Radiation, Timing)

### 🔑 The Most Common Symptoms (10 อาการ)
| | |
|---|---|
| • **Pain** | • **Breathlessness** |
| • **Depression** | • **Insomnia** |
| • **Anxiety** | • **Nausea** |
| • **Confusion** | • **Constipation** |
| • **Fatigue** | • **Anorexia** |

---

### 🔑 Assessment Tools in Palliative Care — 3 เครื่องมือหลัก (ออกสอบ)

#### 1. ESAS — Edmonton Symptom Assessment Scale
**วิธีใช้:**
- ให้**ผู้ป่วยหรือผู้ดูแลหลักเป็นผู้ประเมิน** (ในกรณีผู้ป่วยทำเองไม่ได้)
- ให้ประเมินคะแนน **ณ เวลาที่ทำการประเมินเป็นหลัก**
- **ในข้อที่เป็นความเห็นของผู้ป่วยโดยตรง ได้แก่ ซึมเศร้า กังวล ภาวะสุขสบายกายและใจ — หากมีผู้ทำแบบสอบถามแทนผู้ป่วย ให้เว้นการตอบไว้** ⭐
- ควรถามรายละเอียดของอาการควบคู่กันไปด้วย
- **บันทึกวัน-เวลาที่ทำการประเมินทุกครั้ง** เพื่อใช้ในการติดตามการรักษา

**คะแนน 0–10 ในแต่ละอาการ:** ปวด · อ่อนเพลีย/อ่อนหลัก · คลื่นไส้ · ซึมเศร้า · วิตกกังวล · ง่วงซึม/สะลึมสะลือ · เบื่ออาหาร · สุขสบายกายและใจ · หายใจเหนื่อย · ปัญหาอื่นๆ

#### 2. PPS — Palliative Performance Scale
- **แบบประเมินระดับสมรรถนะในผู้ป่วยระยะท้าย**
- **มีตั้งแต่ 0 – 100%** (ลดทีละ 10)
- **สื่อสารให้เห็นสมรรถนะของผู้ป่วยและการพยากรณ์ระยะเวลาที่เหลืออยู่ (โดยเฉพาะผู้ป่วยมะเร็ง)** ⭐

**5 คอลัมน์ที่ต้องประเมิน:**
1. **การเคลื่อนไหว (Ambulation)**
2. **การปฏิบัติกิจกรรมและขอบเขตของโรค (Activity & Extent of disease)**
3. **การทำกิจวัตรประจำวัน (Self-care)**
4. **การรับประทานอาหาร (Intake)**
5. **ระดับความรู้สึกตัว (Conscious level)**

**🔑 การอ่านตาราง PPS (กติกาสำคัญ — ออกสอบ)**
- **ให้อ่านจากซ้ายไปขวา**
- **เริ่มอ่านจากคอลัมน์การเคลื่อนไหว แล้วค่อยๆ อ่านคอลัมน์ถัดไป**
- **คอลัมน์ซ้ายสุดจะเป็นตัวกำหนดว่าไม่สามารถให้คะแนนในคอลัมน์ที่สูงกว่านั้นได้** — เช่น ถ้าผู้ป่วยคะแนนการเคลื่อนไหว 40 แต่ช่องถัดมาได้เกิน 40 → **ให้คะแนนผู้ป่วยสูงสุดคือ 40**
- **ไม่สามารถให้คะแนนระหว่างกลาง เช่น 45% ได้** — ผู้ประเมินต้องเลือกว่าจะให้ 40% หรือ 50% ขึ้นกับว่าคะแนนใดใกล้เคียงกับความสามารถของผู้ป่วยในเวลาประเมินมากที่สุด

**🔑 PPS กับ Median Survival Time (ตารางที่ควรจำแนวโน้ม)**
| PPS (%) | Cancer patients (days) | Non-cancer patients (days) |
|:-------:|:----------------------:|:--------------------------:|
| 10 | **2** [1, 4] | 8 [3, 105] |
| 20 | **6** [3, 19] | 6 [3, 14] |
| 30 | **13** [7, 31] | 24 [8, 176] |
| 40–60 | **39** [12, 106] | — |
| 70–80 | **95** [35, ] | — |
| **Total** | **18** [5, 58] | 16 [5, 176] |

> **แนวโน้มที่ต้องจำ: PPS ยิ่งต่ำ → survival time ยิ่งสั้น** และในผู้ป่วยมะเร็ง PPS ทำนายได้ดีกว่าผู้ป่วยที่ไม่ใช่มะเร็ง

**ตัวอย่างการให้คะแนน**
- **ตัวอย่างที่ 1:** ผู้ป่วย CA Prostate with bone metastasis — ใช้เวลาส่วนใหญ่นั่งๆ นอนๆ บนเตียงเนื่องจากอ่อนเพลีย, ต้องประคองเวลาเดิน, ล้างหน้าแปรงฟันได้เอง, พูดคุยสื่อสารได้, รับประทานอาหารได้ปกติ
- **ตัวอย่างที่ 2:** ผู้ป่วย Advanced stage HCC — นอนติดเตียง, ทำกิจกรรมใดๆ ไม่ได้, รับประทานอาหารได้น้อยลง, ต้องการความช่วยเหลือในการทำกิจกรรม (เช็ดตัว อาบน้ำ ขับถ่ายบนเตียง), บางครั้งมีเพ้อสับสน

#### 3. Zarit Burden Interview
- **ใช้ประเมินผู้ดูแล** เพื่อประเมินภาวะเหนื่อยล้าและหมดไฟในการดูแล (**Caregiver burden & Burnout**) ⭐
- **ให้ประเมินผู้ดูแลทุกคน**
- **การแปลผลคะแนนรวม:**
  - **no to mild (0–10)**
  - **mild to moderate (11–20)**
  - **severe burden (> 20)**

## 14.3 🔑 Who are Palliative Care Patients?

### The Gold Standards Framework (GSF) — SPICT
**Supportive and Palliative Care Indicators Tool** — RCGP (Royal College of General Practitioners)

**3 ขั้นตอน:**

#### **Step 1: Ask the Surprise Question** ⭐⭐ (ออกสอบบ่อยที่สุด)
> **"Would you be surprised if the patient were to die in the next year, months, weeks, days?"**
> **"ท่านประหลาดใจหรือไม่ ถ้าผู้ป่วยจะเสียชีวิตในอีก 6–12 เดือนข้างหน้า"**

- **คำตอบคือ "ไม่ประหลาดใจ" → ควรเริ่มดำเนินการวางแผนการดูแลแบบประคับประคอง**
- **คำตอบคือ "ประหลาดใจ หรือไม่แน่ใจ" → ควรมองหาข้อบ่งชี้ทั่วไป (Step 2)**

#### **Step 2: Do they have General Indicators of Decline?**
- ถ้า YES → Begin GSF Process
- ถ้า NO → Reassess regularly

#### **Step 3: Do they have Specific Clinical Indicators?** (เกณฑ์เฉพาะรายโรค)
**Look for clinical indicators of life-shortening conditions:**

| โรค | ข้อบ่งชี้ |
|-----|----------|
| **Cancer** | Functional ability deteriorating due to progressive cancer; too frail for cancer treatment or treatment is for symptoms |
| **Dementia / Frailty** | Unable to dress, walk or eat without help; eating and drinking less, difficulty with swallowing; urinary and faecal incontinence; not able to communicate by speaking, little social interaction; **frequent falls; fractured femur**; recurrent febrile illnesses or infections; **aspiration pneumonia** |
| **Heart or vascular disease** | Heart failure or extensive, untreatable coronary artery disease; **breathlessness or chest pain at rest or on minimal effort**; severe, inoperable peripheral vascular disease |
| **Respiratory disease** | Severe, long term lung disease; **breathlessness at rest** or on minimal effort between exacerbations; persistent hypoxia needing **long term oxygen therapy**; has needed ventilation for respiratory failure or ventilation is contraindicated |
| **Kidney disease** | **Stage 4 or 5 chronic kidney disease (eGFR < 30 ml/min)** with deteriorating health; kidney failure complicating other life shortening conditions or treatments; **stopping or not starting dialysis** |
| **Liver disease** | **Cirrhosis with one or more complications in the past year:** diuretic resistant ascites, hepatic encephalopathy, hepatorenal syndrome, bacterial peritonitis, recurrent variceal bleeds; **liver transplant is not possible** |
| **Neurological disease** | Progressive deterioration in physical and/or cognitive function despite optimal therapy; speech problems with increasing difficulty communicating and/or progressive difficulty with swallowing; **recurrent aspiration pneumonia**; breathless or respiratory failure |
| **Other conditions** | Deteriorating with physical or mental illnesses, multiple conditions and/or complications that are not reversible; best available treatment has poor outcome |

**Review current care and care planning:**
- Review current treatments and medication; **minimise polypharmacy**
- Shared decision making about treatment and care
- Review holistic care — symptoms; emotional, social, financial, spiritual needs. Support families and carers
- Ask for specialist advice or a review if symptoms or other problems are difficult to manage
- **Agree a current and future care plan with the person/family. Discuss future decision making (e.g. Power of Attorney)**
- **Record, share, and review care plans**

---

### 🔑 Illness Trajectories — 3 เส้นทาง (ออกสอบ วาดกราฟได้)
| Trajectory | โรค | ลักษณะการเสื่อมของ Function |
|-----------|-----|---------------------------|
| **Trajectory 1: Cancer trajectory** | **มะเร็ง** | **Function สูงคงที่นาน แล้วลดลงอย่างรวดเร็วในช่วงท้าย (Short decline)** |
| **Trajectory 2: Organ failure trajectory** | **หัวใจล้มเหลว, COPD** | **ลดลงเป็นขั้นบันได มี acute exacerbation เป็นระยะแล้วฟื้นไม่เต็มที่ (Intermediate with acute episodes)** |
| **Trajectory 3: Dementia and frailty trajectory** | **สมองเสื่อม, ผู้สูงอายุเปราะบาง** | **Function ต่ำตั้งแต่ต้นและค่อยๆ ลดลงอย่างช้าๆ ยาวนาน (Gradual dwindling)** |

**ระยะการดูแลตามแกนเวลา:**
`Progressive chronic disease management → Palliative approach +/− active treatment for advanced disease → End-of-life care → Terminal care (including death) → Bereavement support`

## 14.4 🔑 Goals of Palliative Care — 3 เป้าหมายหลัก
```
        Symptom control ─────┐
                             ├──→ Disease Management
        Psychosocial & ──────┘
        Spiritual care
```

### 1. Symptom Control
- **Assess symptoms by using tools** (ESAS, PPS)
- **Periodic symptom reassessment** → เพื่อ:
  - identifying or modifying treatment goals
  - monitoring the response to specific symptomatic interventions
  - communicating between members of the health care team & with care givers

### 2. Disease Management
> **Treat reversible conditions + Symptom management of incurable conditions**

| การรักษา | รายละเอียด |
|---------|-----------|
| **Palliative Surgery** | **debulking surgery, immobilize Fx, bowel obstruction (resection, bypass, stent, ostomy), spinal decompression & stabilization** |
| **Palliative RT** (Radiotherapy) | **control of bleeding, pain control: bone metastasis, shrinkage of tumor mass (brain metastasis)** |
| **Palliative CMT** (Chemotherapy) | **slow down progression of disease** |

### 3. Psychological & Spiritual Care
| **PSYCHOLOGICAL CARE** | **SPIRITUAL CARE** |
|---|---|
| • **Need assessment**<br>• **Practical care**<br>• **Emotional support** | • **Meaning of life/death**<br>• **Unfinished business**<br>• **Values & Hopes**<br>• **Love, Forgiveness**<br>• **Belief, Religion** |

---

### 🔑 Holistic Care for Palliative Care Patients — 4 มิติ (ตารางออกสอบ)
| **PHYSICAL** | **PSYCHOLOGICAL** |
|---|---|
| Functional ability<br>Strength/Weakness<br>Sleep & Rest<br>Nausea<br>Appetite<br>**Pain** | Anxiety<br>Depression<br>Enjoyment/Relaxation<br>Pain distress<br>Happiness<br>Fear |

| **SOCIAL** | **SPIRITUAL** |
|---|---|
| Financial burden<br>**Care giver burden**<br>Roles & Relationship<br>Affection/Sexual function<br>Appearance | Hope<br>Suffering<br>**Meaning of life**<br>Religiosity<br>Transcendence |

---

### 🔑 A GOOD DEATH
> **A "Good" death or "the least bad" death possible**
>
> คือ **การตาย โดยผู้ป่วยได้รับรู้ว่าความต้องการของเขาได้รับการดูแล ให้ปลอดจากความทุกข์ทรมานทางร่างกาย จิตใจ สังคม และจิตวิญญาณ ตั้งแต่ก่อนเข้าถึงช่วงใกล้ตาย สมาชิกในครอบครัวและทีมสุขภาพมีความเคารพ และยอมรับความจ้องการของผู้ป่วย**

## 15. Communication Skills in Palliative Care (Lect 5) ⭐บทใหญ่ ออกสอบเยอะ

### 🔑 Goals of Communication (6 ข้อ)
1. **ช่วยให้ผู้ป่วยและครอบครัวเข้าใจตัวโรค พยากรณ์โรค การดำเนินโรค และทางเลือกของการรักษา**
2. **เข้าใจคุณค่าและเข้าใจเกี่ยวกับคุณภาพชีวิตที่ผู้ป่วยให้ความสำคัญ**
3. **ช่วยกำหนดความคาดหวังที่เป็นจริงเกี่ยวกับโรค**
4. **กำหนดเป้าหมายและการดูแลรักษาในแนวทางที่ผู้ป่วยต้องการ**
5. **ตอบสนองความต้องการทางอารมณ์และจิตใจ**
6. **ดูแลและสนับสนุนครอบครัว**

### 🔑 Communication Issues — 7 ประเด็นสำคัญ
1. **ให้ข้อมูลเกี่ยวกับการดูแลแบบประคับประคอง**
2. **การบอกข่าวร้าย (Breaking bad news)**
3. **เมื่อครอบครัวขอให้ปกปิดความจริง (Conspiracy of silence)**
4. **สื่อสารเรื่องพยากรณ์โรค (Prognosis) การบอกระยะเวลามีชีวิตที่เหลืออยู่ (Survival time)**
5. **การวางแผนการดูแลล่วงหน้า (Advance Care Planning)**
6. **การพูดคุยเรื่องการยุติการรักษาตัวโรคและการยุติการรักษาพยุงชีพ**
7. **พูดคุยเรื่องการดูแลผู้ป่วยในระยะท้าย (End-of-life care) และเมื่อเผชิญกับความขัดแย้ง**

### 🔑 Appropriate Timing for Communication — คุยเมื่อไหร่ (5 ข้อ)
1. **แพทย์ไม่ประหลาดใจถ้าผู้ป่วยจะเสียชีวิตใน 6–12 เดือนข้างหน้า (Surprise Question)** ⭐
2. **เมื่อมีสภาวะการณ์เปลี่ยนแปลง**
3. **เมื่อต้องมีการตัดสินใจรักษาภาวะแทรกซ้อนต่างๆ**
4. **เมื่อพบว่าความคาดหวังของผู้ป่วยและครอบครัวไม่อยู่ในความเป็นจริง**
5. **เมื่อการรักษาตัวโรคไม่ได้ผล หรือมีภาวะแทรกซ้อนที่จำกัดผลการรักษา**

## 15.1 🔑🔑 CLASS Protocol — A Practical Protocol for Effective Communication

| **C** | **L** | **A** | **S** | **S** |
|---|---|---|---|---|
| **Physical CONTEXT** or setting | **LISTENING skills** | **ACKNOWLEDGE EMOTIONS** and explore them | **Management STRATEGY** | **SUMMARY and closure** |

### **C — Physical Context / Setting**
- **Arrangement:** สถานที่เป็นส่วนตัว, **นั่งระดับสายตา ห่าง 2–3 ฟุต**
- **Body language:** ผ่อนคลาย ไม่รีบร้อน
- **Eye contact:** ประสานสายตาเมื่อผู้ป่วยพูด **ยกเว้นเมื่อผู้ป่วยโกรธหรือร้องไห้** ⭐
- **Touch (Optional):** แตะมือหรือแขน
- **Introductions:** แนะนำตัวว่าเป็นใคร จะมาทำอะไร

### **L — Listening Skills**
- **Open-ended questions:** ใช้คำถามปลายเปิด เช่น "คุณรู้สึกอย่างไรบ้าง"
- **Facilitating:**
  - รับฟังผู้ป่วยอย่างตั้งใจ **ไม่พูดแทรกหรือตัดบทเมื่อผู้ป่วยพูด**
  - แสดงท่าทีว่าได้ยินสิ่งที่ผู้ป่วยพูด เช่น **พยักหน้าเป็นระยะ**
  - **🔑 การเงียบ (Silence):** อาจเป็นช่วงที่กำลังครุ่นคิด อาจกระตุ้นให้ผู้ป่วยบอกสิ่งที่วิตกกังวล "ที่คุณเงียบไป บอกหมอได้หรือไม่ว่ากำลังคิดอะไรอยู่" **แต่ขณะที่ผู้ป่วยร้องไห้ ความเงียบเป็นสิ่งที่ช่วยให้ผู้ป่วยรับรู้ว่าเรากำลังรับรู้อารมณ์เขา** ⭐
- **Clarify:** ถามให้กระจ่างเมื่อมีข้อสงสัย เช่น "คุณหมายความว่าอย่างไร เมื่อคุณบอกว่า..."
- **Handling time and interruptions**

### **A — Acknowledge Emotions and Explore Them → ใช้ "NURSE"**

### 🔑🔑 NURSE — Empathic Response (ท่องให้ได้ ออกสอบแน่นอน)

| ตัวอักษร | ความหมาย | ตัวอย่างประโยค |
|:---:|---|---|
| **N** | **Name of emotion**<br>(วิเคราะห์อารมณ์ความรู้สึก) | "หมอสังเกตได้ว่าคุณดูวิตกกังวล?"<br>"ฟังดูเหมือนคุณไม่ค่อยพอใจญาติ" |
| **U** | **Understand**<br>(แสดงความเห็นว่าคุณเข้าใจ) | "ดูเหมือนจะเป็นช่วงเวลาที่ลำบากมากสำหรับคุณ"<br>"หมอรับรู้ได้ว่ามันเป็นเรื่องยากที่จะพูด" |
| **R** | **Respect**<br>(ให้เกียรติผู้ป่วย) | "ที่ผ่านมาคุณทำได้ดีมากแล้ว"<br>"ผมประทับใจในความตั้งใจของคุณ" |
| **S** | **Support**<br>(ให้การสนับสนุน) | "ส่วนใหญ่จะรู้สึกเหมือนถูกทิ้งหากการรักษาไปต่อไม่ได้แล้ว"<br>"เราจะให้การดูแลคุณให้ผ่านช่วงนี้ไปได้"<br>⚠️ **(อย่าให้สัญญาในสิ่งที่เป็นไปไม่ได้)** |
| **E** | **Explore**<br>(ค้นหา) | "สิ่งที่ยากลำบากที่สุดสำหรับคุณคืออะไร?"<br>"ลองเล่ารายละเอียดให้ฟังหน่อย" |

### **S — Management Strategy**
- **ประเมินความคาดหวังของผู้ป่วยเกี่ยวกับตัวโรค การรักษา และผลลัพธ์**
- **เสนอแนวทางการดูแล**
- **ประเมินการตอบสนองของผู้ป่วย >> ตอบรับแผนการดูแล?**

### **S — Summary and Closure**
- **สรุปผลการพูดคุยในเรื่องสำคัญ**
- **สอบถามเพิ่มเติมถึงสิ่งที่ผู้ป่วยและครอบครัวต้องการถาม**

## 15.2 🔑🔑 SPIKES Protocol — Breaking Bad News

### นิยาม Bad News
> **ข้อมูลข่าวสารใดๆ ที่จะเปลี่ยนมุมมองต่ออนาคตของบุคคลนั้นๆ ไปในทางลบ**

> **หลักการสำคัญ: ความจริงจะไม่ทำให้ความหวังลดลง** โดยการให้ผู้ป่วยยังสามารถ**กำกับดูแลตนเองได้ (sense of control)** และ**ให้มีความพร้อมสำหรับอนาคต [Autonomy]**

### ตาราง SPIKES
| **S** | **P** | **I** | **K** | **E** | **S** |
|---|---|---|---|---|---|
| **Setting up** | **Perception** | **Invitation** | **Knowledge** | **Emotions & Empathy** | **Strategy & Summary** |

---

### **S — SETTING UP (Prepare to Listen)**
- **Setting up:** สถานที่เป็นสัดส่วน, ส่วนตัว, สงบ, **วางแผนว่าจะคุยเรื่องอะไร**
- **Other people:** ผู้ป่วยต้องการให้ผู้อื่นอยู่ด้วยหรือไม่
- **การแนะนำตัว:** สวัสดี แนะนำตัวเอง เรียกชื่อผู้ป่วย สรรพนามที่ใช้, เริ่มบทสนทนา (**Small talk**)
- **🔑 ลักษณะทางกายที่แสดงถึงความใส่ใจ (Non-verbal Communication) = SOLER** ⭐
  - **S** = **Squarely** (นั่งหันหน้าตรงเข้าหาผู้ป่วย)
  - **O** = **Open** (ท่าทางเปิด ไม่กอดอก)
  - **L** = **Lean** (โน้มตัวเข้าหาเล็กน้อย)
  - **E** = **Eye contact** (สบตา)
  - **R** = **Relax** (ผ่อนคลาย)

---

### **P — PERCEPTION (ประเมินการรับรู้ของผู้ป่วย)**
> หลักการ: **"Before you tell, ask"**

- **ใช้คำถามปลายเปิด:** "อาการของคุณเป็นอย่างไรบ้าง", "แพทย์ให้ข้อมูลเบื้องต้นว่าอย่างไร"
- **⚠️ เลี่ยงการใช้คำว่า "ทำไม" และเลี่ยงการถามนำ**
- **เริ่มจากเรื่องกว้างๆ ไปสู่เรื่องที่เฉพาะ**
- **ถามโดยการคาดคะเนเอา:** "จากที่คุณถามมา หมอสังเกตว่า..."
- **ถามโดยอ้างอิงถึงผู้คนทั่วไป:** "หมอเคยดูแลคนไข้คนอื่นที่อาการคล้ายคุณ หลายคนกังวล คุณรู้สึกอย่างไร"
- **ถามถึงเหตุการณ์อย่างเป็นรูปธรรม:**
  - "คุณเข้าใจสถานการณ์โรคของคุณขณะนี้อย่างไร คุณคาดว่าจะเป็นอย่างไรต่อจากนี้"
  - "อาการเจ็บป่วยที่เกิดกับคุณ ส่งผลกระทบต่อคุณอย่างไร"
  - "คุณคิดอย่างไรกับสิ่งที่เกิดจากอาการเจ็บป่วยที่เกิดขึ้น จนทำให้คุณต้องเข้าโรงพยาบาล คุณคาดหวังต่อการรักษาอย่างไร"

---

### **I — INVITATION (ขออนุญาต/ถามความต้องการรับข้อมูล)**
> **เป็นการนำเข้าสู่ข้อมูลก่อนการแจ้งข่าวร้าย — ถามความต้องการของผู้ป่วยว่าต้องการทราบข้อมูลระดับใด**

ตัวอย่างประโยค:
- "เกี่ยวกับอาการเจ็บป่วยที่เกิด คุณต้องการทราบเรื่องอะไรเพิ่มเติม หรือมีข้อสงสัยอะไร"
- "คุณต้องการให้หมอบอกรายละเอียดของโรคและการรักษาอย่างละเอียดในขณะนี้ หรือต้องการทราบผลเบื้องต้นก่อน"
- "ผู้ป่วยบางคนต้องการทราบข้อมูลเรื่องโรคอย่างตรงที่สุด คุณต้องการเช่นนั้นหรือไม่"
- "ผู้ป่วยในสถานการณ์แบบคุณมักมีคำถามที่ต้องการรับรู้ หมอยินดีตอบทุกคำถาม"
- "จากอาการเจ็บป่วยของคุณ คุณกังวลหรือกลัวว่าจะเป็นโรคอะไรเป็นพิเศษหรือไม่"
- "ก่อนที่หมอจะบอกการวินิจฉัยโรคและรายละเอียดต่างๆ คุณมีคำถามหรือข้อสงสัยอะไรหรือไม่"

---

### **K — KNOWLEDGE (การให้ข้อมูล/บอกการวินิจฉัย)**
> **บอกวินิจฉัยโรค ตรง ภาษาเข้าใจง่าย**

**ขั้นตอน:**
1. **🔑 Warning shot (ยิงสัญญาณเตือน)** ⭐
   - "อย่างที่ทราบคุณได้ทำ CT scan/Lab **ผลนั้นทำให้หมอค่อนข้างกังวลใจ**" + non-verbal
   - "หมอเกรงว่าผลการตรวจของคุณจะไม่เป็นตามที่หวัง", "ดูเหมือนว่าผลตรวจไม่ใช่แบบที่เราคิด"
2. **เว้นจังหวะ** เพื่อสังเกตอารมณ์และปฏิกิริยาที่เกิดขึ้นก่อนแจ้งผล
3. **แจ้งผลด้วยภาษาที่เข้าใจง่าย**
   - "หมอเสียใจที่ต้องแจ้งว่าผลตรวจพบว่าคุณเป็นมะเร็ง..."
4. **เว้นจังหวะ ใช้ silence technique** เพื่อสังเกตอารมณ์และปฏิกิริยาของผู้ป่วย
5. ผู้ป่วยอาจมีคำถาม เช่น "มันเกิดได้อย่างไร", "ฉันต้องทำอย่างไรต่อ"

---

### **E — EMOTIONS & EMPATHY → ใช้ "NURSE"**
(ดูตาราง NURSE ด้านบน)

---

### **S — STRATEGY & SUMMARY**
- **บอกแผนการรักษา**
- **ค้นหาความต้องการของผู้ป่วย/ครอบครัว**
- **🔑 มุ่งเน้นไปที่ผลลัพธ์การดูแลและเป้าหมาย มากกว่าพูดคุยเรื่องวิธีการรักษา** ⭐
  - "คุณคาดหวังหรือตั้งเป้าหมายไว้อย่างไร"
  - "สิ่งที่คุณรู้สึกกังวลในอนาคตเกี่ยวกับอะไร เล่ารายละเอียดให้หมอฟังได้มั้ย"
  - "สิ่งสำคัญที่สุดสำหรับคุณคืออะไร ช่วยเล่าให้หมอฟังหน่อย"
  - "หากการรักษาไม่เป็นไปตามที่หวัง คุณรู้สึกอย่างไร"
- **ให้การประคับประคองจิตใจ และติดตามดูแล**
- **วางแผนร่วมกับผู้ป่วยและครอบครัว — "Shared decision making for ACP"**
- **ตรวจสอบความเข้าใจและเปิดโอกาสให้ซักถาม**
  - "จากที่เราได้คุยกันมา หมออยากให้คุณทบทวนความเข้าใจ มีข้อสงสัยหรือไม่แน่ใจในประเด็นไหนหรือไม่"
- **ทบทวนสิ่งสำคัญและให้กำลังใจ**
  - "ไม่ว่าในอนาคตจะเป็นอย่างไร หมอและทีมเป็นกำลังใจให้คุณและครอบครัว ถ้าคุณต้องการคำปรึกษาเพิ่มเติมสามารถติดต่อทีมหมอได้ที่..."

## 15.3 🔑🔑 ABCDEF — Dealing with Conspiracy of Silence

> **สถานการณ์:** ญาติบอกว่า *"อย่าบอกแม่ดิฉันว่าเป็นมะเร็งปอดนะหมอ ดิฉันกลัวอาการแม่จะทรุดไม่มากกว่าเดิม ถ้ารู้ว่าเป็นมะเร็ง"*

| **A** | **B** | **C** | **D** | **E** | **F** |
|---|---|---|---|---|---|
| **Acknowledge**<br>of love & care | **Build up information**<br>**Benefit vs Harm** | **Comparison** | **Deal with patient** | **Encounter** | **Follow up** |

### **A — ACKNOWLEDGE (สะท้อนความรู้สึก)**
> **สะท้อนความรู้สึกว่าการที่ญาติไม่อยากบอกผู้ป่วย เป็นเพราะรักและห่วงใยผู้ป่วย**
- "ดูเหมือนคุณกังวลที่หมอจะบอกผู้ป่วยว่าเกิดอะไรขึ้น"
- "หมอเข้าใจว่าคุณเป็นห่วงว่าอาการของผู้ป่วยจะแย่ลง หากบอกอาการ"

### **B — BUILD UP INFORMATION / BENEFIT vs HARM**
- **ถามความสัมพันธ์ของญาติกับผู้ป่วย** สนิทผู้ป่วยแค่ไหน
- **สาเหตุที่ไม่อยากให้บอกผู้ป่วย**
- **ลักษณะนิสัยผู้ป่วยเป็นอย่างไร** หากทราบแล้วจะเป็นอย่างไร ทำไมถึงคิดเช่นนั้น
- **บอก/ถามถึงข้อดีและข้อเสียของการบอกความจริงกับผู้ป่วย**
  - "ทำไมคุณถึงไม่อยากให้บอก"
  - "คุณคิดว่าจะเกิดอะไรขึ้นกับผู้ป่วยถ้าเราพูดคุยกันเรื่องนี้"
  - "คุณคิดว่าจะเป็นอย่างไรถ้าผู้ป่วยต้องการทราบแต่เราไม่บอกผู้ป่วยว่าเกิดอะไรขึ้น"
  - **"การบอกความจริงจะช่วยให้เขาได้เตรียมตัวและทำในสิ่งที่เขาอยากทำในเวลาที่เหลือ"** ⭐

### **C — COMPARISON (ให้ญาติเปรียบเทียบ)**
> **ลองให้ญาติเปรียบเทียบว่า ถ้าเป็นผู้ป่วย จะอยากรู้ความจริงหรือไม่**
- "หากคุณเป็นผู้ป่วยเองจะอยากรู้หรือไม่"
- "ถ้าเราลองคิดว่าเราอยู่ในสถานการณ์เดียวกันกับผู้ป่วย เราอยากให้แพทย์สื่อสารกับเราอย่างไร"

### **D — DEAL WITH PATIENT (ตกลงวิธีสื่อสารกับผู้ป่วย)**
> **ญาติอยากให้บอกผู้ป่วยอย่างไร เพื่อไม่ให้เป็นการโกหกผู้ป่วย**
- "หมออาจถามว่าเขาคิดว่าอะไรเกิดขึ้นกับเขา **เขาอาจรู้ความจริงแล้วก็ได้**"
- "ญาติอยากให้หมอสื่อสารกับผู้ป่วยอย่างไร ที่จะไม่โกหกผู้ป่วย"

### **E — ENCOUNTER (สนับสนุนการบอกความจริง)**
- **อาการผู้ป่วยจะแย่ลงเรื่อยๆ สุดท้ายก็จะทราบเอง แต่การบอกผู้ป่วยก่อน จะได้มีเวลาในการทำสิ่งที่ค้างคา**
- **🔑 เป็นสิทธิของผู้ป่วยที่จะทราบความจริง**
  - **"หมอต้องตอบความจริงถ้าผู้ป่วยถาม แต่จะไม่บีบบังคับให้ข้อมูลถ้าผู้ป่วยไม่ต้องการทราบ"** ⭐⭐ (หลักการสำคัญ)

### **F — FOLLOW UP (นัดติดตาม)**
- **นัดติดตามเพื่อพูดคุยอีกครั้ง ไม่ว่าจะคุยสำเร็จหรือไม่สำเร็จ**
- **นัดติดตามญาติเหมือนผู้ป่วยอีกคนหนึ่ง**
- **แจ้งว่าถ้าหากผู้ป่วยไม่ถาม ก็จะยังไม่แจ้งให้ผู้ป่วยทราบ**
  - "หมออยากให้ครอบครัวลองนำข้อมูลต่างๆ ที่พูดคุยกันในวันนี้ไปลองทบทวน **หมอเคารพการตัดสินใจของครอบครัว** ไว้เรานัดคุยกันอีกครั้ง"

---

## 15.4 Family Meeting (การประชุมครอบครัว)

### 🔑 วัตถุประสงค์ 4 ข้อ
1. **ให้ข้อมูลเกี่ยวกับตัวโรค การรักษา และการพยากรณ์โรค**
2. **ทำความเข้าใจถึงคุณค่า และเป้าหมายของผู้ป่วยและผู้ดูแล**
3. **เตรียมสมาชิกครอบครัวให้พร้อมที่จะเป็นผู้ดูแลผู้ป่วย**
4. **ให้ความสำคัญกับคุณค่าของการตัดสินใจในการรักษาให้พ้องกันระหว่างผู้ป่วยและครอบครัว**

### 🔑 5 ขั้นตอน
```
Preparation → Opening the meeting → Discussing → Summary → Document & Discuss
```

#### **1. PREPARATION**
- **เตรียมข้อมูล:** ประวัติการเจ็บป่วยปัจจุบัน, แนวทางการรักษา, การพยากรณ์โรค
- **Advance care plan ที่เคยทำ (หากมี)**
- **ตั้งเป้าหมายในการพูดคุย** เช่น เพื่อทำ ACP, เพื่อตัดสินใจเลือกแผนการรักษา
- **ตั้งผู้นำการประชุมญาติ**
- **ผู้มีส่วนร่วม:** ผู้ป่วย สมาชิกครอบครัว แพทย์ และพยาบาล
- **ให้ญาติและผู้ป่วยเตรียมคำถามก่อนการประชุม**
- **สถานที่:** เงียบสงบ เป็นส่วนตัว หรือข้างเตียงผู้ป่วย

#### **2. OPENING THE MEETING**
- **แนะนำตัวแพทย์ พยาบาล และสมาชิกครอบครัวทุกคน**
- **อธิบายวัตถุประสงค์การประชุมญาติ**
- **ให้โอกาสทุกคนเสนอความคิดเห็น**

#### **3. DISCUSSING**
**a) ประเมินความเข้าใจของครอบครัวเกี่ยวกับการเจ็บป่วยของผู้ป่วย**
- **🔑 แพทย์ควรสื่อสารให้ช้า ให้ชัด อาจหยุดเพื่อถามความเข้าใจผู้ป่วยเป็นระยะ (Ask-Tell-Ask)** ⭐
- ทบทวนเป้าหมายในการรักษาของผู้ป่วยและครอบครัว

**b) ทบทวนโรค และความเจ็บป่วยของผู้ป่วย**
- ให้ข้อมูลโดยตรงเกี่ยวกับ**การดำเนินโรค ผลข้างเคียง และแนวทางการรักษา**
- ให้โอกาสผู้ป่วยและญาติได้แสดงความเข้าใจ หรือตอบสนองต่อข้อมูลที่ได้รับ
- **Empathic response: NURSE**

**c) หารือเพื่อสร้างเป้าหมายการดูแล (Goal of care setting)**
- ทบทวนเป้าหมายในการดูแลของผู้ป่วยและครอบครัว
- **ตั้งเป้าหมายการดูแล:** ยอมรับการรักษาอื่นสำหรับตัวโรค, **เปลี่ยนแนวทางการรักษาเป็นแบบประคับประคอง**
- แนะนำข้อมูลทางการแพทย์เกี่ยวกับข้อดี ข้อเสียของการรักษา หรือคำแนะนำของแพทย์
- **สนใจในความมุ่งหมายของผู้ป่วย (patient's wishes)**

**d) พัฒนาแนวทางการรักษาโดยคำนึงถึงเป้าหมายการดูแล**
- **เน้นการจัดการอาการ, รักษาแบบยื้อชีวิต?, แผนสำหรับอาการฉุกเฉิน, อื่นๆ**

#### **4. SUMMARY**
- **สรุป: เป้าหมายการดูแล, ตัวเลือกการรักษา และแผนการรักษา**
- **หากครอบครัวยังไม่สามารถบรรลุถึงบทสรุปการดูแลได้ จำเป็นต้องติดตามผู้ป่วย**

#### **5. DOCUMENT & DISCUSS**
- **บันทึกสรุปผลการประชุมครอบครัว**
- **ใช้เพื่อสื่อสารระหว่างทีมรักษาเพื่อประโยชน์สูงสุดในการจัดการ และดำเนินการตามแผนการดูแล**

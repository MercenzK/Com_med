## 15.5 🔑 Advance Care Planning (ACP) — การวางแผนการดูแลล่วงหน้า

### นิยาม
> **กระบวนการวางแผนการดูแลสุขภาพที่ทำไว้ก่อนที่ผู้ป่วยจะหมดความสามารถในการตัดสินใจ หรือเข้าสู่ระยะท้ายของชีวิต** อาจเป็นทางการหรือไม่เป็นทางการ โดยอาจใช้กระบวนการสนทนาปรึกษาร่วมกันระหว่างผู้ป่วย ครอบครัว และทีมบุคลากรสุขภาพ หรือผู้ป่วยอาจทำได้ด้วยตนเอง

### 🔑 ACP vs Advance Directives (ต่างกันอย่างไร — ออกสอบ)
| | **Advance Care Plan (ACP)** | **Advance Directives (AD)** |
|---|---|---|
| **นิยาม** | **ผลลัพธ์ของการวางแผนการดูแลล่วงหน้า ที่บอกถึงความปรารถนาของผู้ป่วย** | **เขียนแผนการดูแลรักษาล่วงหน้าเป็นลายลักษณ์อักษร และมีการลงลายมือชื่อของผู้ป่วย** |
| **รูปแบบ** | **โดยเป็นการบอกกล่าว หรือเขียนก็ได้** | **ต้องเป็นลายลักษณ์อักษร + ลงลายมือชื่อ** |
| **เนื้อหา** | ความปรารถนาโดยรวม | **มีรายละเอียดการยินยอมหรือปฏิเสธการรักษาในวาระสุดท้าย** |

---

### 🔑🔑 STEPS FOR CREATING ACP — 5 ขั้นตอน
```
1. Set up the conversation
2. Assess the patient's illness understanding and information preferences
3. Share prognosis
4. Explore key topics
5. Close and document the conversation
```

#### **STEP 1 — SET UP**
**a) เริ่มต้นสนทนาและสอบถามความสมัครใจของผู้ป่วยในการสนทนา**
- "หมอหวังว่าจะได้พูดคุยเกี่ยวกับสถานการณ์สุขภาพของคุณและสิ่งที่จะเกิดขึ้นในอนาคต **คุณอยากคุยเรื่องนี้หรือไม่**"
- "จะเป็นไปได้หรือไม่ หากหมอจะชวนคุณคุยเกี่ยวกับอาการเจ็บป่วยที่อาจเกิดขึ้นได้ในอนาคต"

**b) ประเมินความเข้าใจเกี่ยวกับการวางแผนการดูแลล่วงหน้า**
- "คุณเข้าใจเกี่ยวกับการวางแผนการดูแลล่วงหน้าอย่างไร"

**c) ให้ข้อมูลเกี่ยวกับการวางแผนการดูแลล่วงหน้า**
- "การวางแผนการดูแลล่วงหน้า คือการคิดทบทวนเกี่ยวกับแนวทางการดูแลสุขภาพในอนาคตของคุณ เป็นการสื่อสารให้คนอื่นรู้ว่าอะไรสำคัญสำหรับตัวคุณ และแนวทางการรักษาแบบใดเป็นสิ่งที่คุณต้องการ เผื่อกรณีที่คุณอยู่ในสภาพที่ไม่สามารถรับรู้หรือสามารถสื่อสารด้วยตัวคุณเองได้"

#### **STEP 2 — UNDERSTANDING & INFORMATION PREFERENCES**
- **ค้นหาความเข้าใจสภาวะสุขภาพของตนเอง** โรคที่เป็น การวินิจฉัย พยากรณ์โรค
  - "คุณเข้าใจเกี่ยวกับโรคที่คุณเป็นอย่างไรบ้าง"
- **สอบถามความต้องการทราบข้อมูล**
  - "คุณอยากจะรู้ข้อมูลอะไรบ้างเกี่ยวกับอาการเจ็บป่วยที่อาจจะเกิดขึ้นในอนาคต"
- **สอบถามความคาดหวังต่ออาการเจ็บป่วย**
  - "คุณคาดหวังกับอาการเจ็บป่วยรวมถึงการดูแลรักษาอย่างไรบ้าง"
  - "ครอบครัวของคุณทราบเกี่ยวกับความเจ็บป่วยของคุณและแนวทางการดูแลที่คุณต้องการหรือไม่ อย่างไร"

#### **STEP 3 — SHARE PROGNOSIS**
- **ให้ข้อมูลเรื่องโรคที่เหมาะสม** โดยสรุปจากความเข้าใจที่ถูกต้องของผู้ป่วย
  - "จะเป็นอะไรมั้ย หากเราจะพูดคุยรายละเอียดมากขึ้นเกี่ยวกับอาการเจ็บป่วยที่อาจเกิดขึ้นได้ในอนาคต"
- **🔑 ให้ข้อมูลให้ผู้ป่วยตระหนักว่าหากไม่เป็นดังหวัง ผู้ป่วยคิดอย่างไร และชวนผู้ป่วยคิดวางแผนสำรอง** (Hope for the best, prepare for the worst) ⭐
  - "หมอรับรู้ว่าคุณคาดหวังว่า...... **แต่หมอเองก็กังวลใจว่า** ...... หากเป็นอย่างนั้น คุณคิดอย่างไร?"
  - "เรามาลองวางแผนสำรอง หากสิ่งที่คุณต้องการไม่เป็นไปตามที่คุณหวัง"

#### **STEP 4 — 🔑 EXPLORE KEY TOPICS (6 หัวข้อสำคัญ — ออกสอบ)**
| หัวข้อ | คำถามตัวอย่าง |
|--------|--------------|
| **1. Goals (เป้าหมายของชีวิต)** | "อะไรคือ**เป้าหมายในชีวิตที่สำคัญ**สำหรับคุณ" |
| **2. Fears & worries (ความวิตกกังวล ความกลัว)** | "อะไรคือสิ่งที่คุณ**กังวลหรือกลัว**เกี่ยวกับสุขภาพของคุณในอนาคต" |
| **3. Sources of strength (กำลังใจ)** | "อะไรทำให้**ชีวิตของคุณมีความหมาย** อะไรที่มีความสำคัญสำหรับคุณ"<br>"สิ่งไหนที่**สร้างกำลังใจ**ให้กับคุณให้ผ่านอุปสรรคต่างๆ มาได้" |
| **4. Critical abilities (ผลลัพธ์ที่ไม่ต้องการ)** | "**สภาวะร่างกายแบบไหนที่คุณยอมรับไม่ได้**" |
| **5. Trade-offs (ขอบเขตของการใช้เครื่องพยุงชีพ)** | "หากคุณเจ็บป่วยวิกฤติอย่างหนัก คุณคิดอย่างไรกับ**การรักษาพยุงชีพ** มีสิ่งใดที่คุณไม่ต้องการหรือไม่" |
| **6. Surrogate decision maker (ผู้ตัดสินใจแทน)** | "ครอบครัวของคุณรับทราบเกี่ยวกับความต้องการของคุณมากน้อยแค่ไหน"<br>"หากคุณอยู่ในสภาวะที่ไม่สามารถตัดสินใจได้ **คุณจะให้ใครเป็นผู้ตัดสินใจแทน**" |

**🔑 นิยามที่ต้องจำ (สำนักงานสุขภาพแห่งชาติ)**
- **ผู้ตัดสินใจแทน (Surrogate decision maker):** บุคคลที่ได้รับการมอบหมายจากผู้ป่วย ให้ทำหน้าที่ตัดสินใจเลือกการรักษาที่เป็นไปตามความต้องการของผู้ป่วยขณะยังมีสติสัมปชัญญะ หมายรวมถึง**ผู้แสดงเจตนาแทน** หรือบุคคลที่มีหน้าที่อธิบายความประสงค์ที่แท้จริงของผู้ทำหนังสือแสดงเจตนา โดยจะทำหน้าที่เมื่อผู้ป่วยหมดความสามารถในการตัดสินใจแล้ว **สำหรับกรณีที่ไม่มีการมอบหมายไว้ ญาติหรือผู้ดูแลใกล้ชิด และทีมสหสาขาวิชาชีพจะร่วมกันพิจารณาอย่างรอบคอบ**
- **🔑 การรักษาพยุงชีพ (Life-sustaining treatment):** การรักษาทางการแพทย์เพื่อใช้ประคับประคองหรือทดแทนการทำงานของอวัยวะสำคัญต่อการมีชีวิต ได้แก่ **การนวดหัวใจผายปอดกู้ชีพ (CPR) · การใส่ท่อช่วยหายใจ · การใช้เครื่องช่วยหายใจ · การให้ยากระตุ้นหัวใจและความดันโลหิต · การให้สารอาหารหรือสารน้ำทางหลอดเลือดดำ · การล้างไต · การให้เลือด · การให้ยาปฏิชีวนะ และอื่นๆ**

#### **STEP 5 — CLOSE & DOCUMENT THE CONVERSATION**
- **สรุปสิ่งที่ได้พูดคุยมาให้ผู้ป่วยฟัง**
  - "เท่าที่ฟังมาทั้งหมด ดูเหมือนกับว่า......เป็นสิ่งที่สำคัญสำหรับคุณ"
- **ให้ข้อแนะนำหรือเสนอทางเลือกในการวางแผนการดูแลล่วงหน้า**
  - "จากที่เราพูดคุยกันมา หมอคิดว่าการทำแผนการดูแลล่วงหน้า น่าจะมีประโยชน์กับคุณในการวางแผนการดูแลสถานการณ์เจ็บป่วยต่างๆ คุณคิดอย่างไร"
- **ให้การยืนยัน/ทำให้ผู้ป่วยมั่นใจในการดูแล ให้ช่องทางการติดต่อและนัดติดตาม**
  - "ไม่ว่าอย่างไรก็ตาม **หมอพร้อมที่จะดูแลและให้ข้อแนะนำ** เพื่อให้การดูแลตรงตามที่คุณต้องการมากที่สุด"

> **มาตรฐาน: มาตรฐานการวางแผนการดูแลล่วงหน้าสำหรับประเทศไทย (Thai Standards for Advance Care Planning) พ.ศ. 2565**

## 15.6 🔑🔑 LIVING WILL — หนังสือแสดงเจตนาไม่ประสงค์จะรับบริการสาธารณสุข

### นิยาม
> **หนังสือซึ่งบุคคลแสดงเจตนาไว้ล่วงหน้าว่าไม่ประสงค์จะรับบริการสาธารณสุขที่เป็นไปเพียงเพื่อยืดการตายในวาระสุดท้ายของชีวิต หรือเพื่อยุติการทรมานจากการเจ็บป่วย**

### 🔑🔑 มาตรา 12 พ.ร.บ.สุขภาพแห่งชาติ พ.ศ. 2550 (ออกสอบแน่นอน)
> **"บุคคลมีสิทธิทำหนังสือแสดงเจตนาไม่ประสงค์จะรับบริการสาธารณสุขที่เป็นไปเพียงเพื่อยืดการตาย ในวาระสุดท้ายของชีวิต หรือเพื่อยุติการทรมานจากการเจ็บป่วยได้**
>
> การดำเนินการตามหนังสือแสดงเจตนาตามวรรคหนึ่ง ให้เป็นไปตามหลักเกณฑ์และวิธีการที่กำหนดในกฎกระทรวง **เมื่อผู้ประกอบวิชาชีพด้านสาธารณสุขได้ปฏิบัติตามเจตนาของบุคคลตามวรรคหนึ่งแล้ว มิให้ถือว่าการกระทำนั้นเป็นความผิดและให้พ้นจากความรับผิดทั้งปวง"** ⭐

> **วาระสุดท้ายของชีวิต** หมายถึง **การบาดเจ็บหรือโรคที่รักษาไม่หาย และทำให้เสียชีวิตในระยะเวลาอันใกล้ รวมถึงสภาพผักถาวร (persistent vegetative state)**

### 🔑 ความสำคัญของ Living Will (4 ข้อ — ออกสอบ)
1. **จะใช้เฉพาะกรณีที่ผู้ป่วยอยู่ในวาระสุดท้ายของชีวิตเท่านั้น**
2. **เมื่อถึงวาระสุดท้าย ผู้ป่วยส่วนใหญ่จะไม่สามารถสื่อสารได้ตามปกติ การทำหนังสือแสดงเจตนาไว้ล่วงหน้าตั้งแต่ผู้ป่วยยังรู้สึกตัวปกติ จึงเป็นสิ่งสำคัญ**
3. **Living will ไม่ใช่การเร่งให้ตายเร็วขึ้น แต่ก็ไม่ได้ยื้อความตายออกไปเรื่อยๆ และก็ไม่ได้ทอดทิ้งผู้ป่วยโดยไม่ทำการรักษาแต่อย่างใด**
4. **⚠️⚠️ Living will ≠ Euthanasia** (ข้อนี้ออกสอบบ่อยมาก)

### 🔑 คุณสมบัติผู้ทำ Living Will
- **ผู้ที่มีอายุตั้งแต่ 18 ปีขึ้นไป และมีสติสัมปชัญญะดีพอที่จะสื่อสารได้ตามปกติ สามารถทำหนังสือแสดงเจตนาได้ด้วยตนเอง**
- **ผู้ที่อายุต่ำกว่า 18 ปี สามารถทำได้ หากได้รับความยินยอมจากบิดา มารดา ผู้ปกครอง หรือผู้อุปการะเลี้ยงดู**
- **สามารถทำ ณ สถานที่ใดก็ได้**
- **🔑 พยาน: ควรมีพยานรู้เห็นด้วย เพื่อประโยชน์ในการยืนยันเนื้อหากรณีที่มีข้อสงสัยเรื่องความถูกต้อง โดยพยานจะเป็นใครก็ได้ อย่างไรก็ตาม การทำหนังสือแสดงเจตนาไม่จำเป็นต้องมีพยานก็ได้** ⭐

### 🔑 ข้อมูลที่ต้องระบุในหนังสือแสดงเจตนา
1. **ชื่อ-สกุล อายุ หมายเลขบัตรประชาชน และหมายเลขโทรศัพท์**ของผู้ทำหนังสือแสดงเจตนา
2. **วัน เดือน ปี ที่ทำหนังสือแสดงเจตนา**
3. **ประเภทของบริการสาธารณสุขที่ไม่ต้องการจะได้รับ** เช่น **การปั๊มหัวใจ ใส่ท่อช่วยหายใจ**
4. **ชื่อ-สกุล อายุ หมายเลขบัตรประชาชนของพยาน และความเกี่ยวข้อง**กับผู้ทำหนังสือแสดงเจตนา
5. **อาจระบุชื่อบุคคลเพื่อทำหน้าที่อธิบายความประสงค์ที่แท้จริง** — บุคคลผู้ถูกระบุชื่อต้องลงลายมือชื่อและหมายเลขบัตรประชาชนไว้ในหนังสือด้วย
6. **อาจระบุรายละเอียดอื่นๆ** เช่น **ความประสงค์ในการเสียชีวิต ณ สถานที่ใด, ความประสงค์ที่จะได้รับการเยียวยาทางจิตใจ, และการปฏิบัติตามประเพณี ความเชื่อทางศาสนา**

### 🔑 การจัดเก็บ
- **เก็บฉบับจริงไว้กับตนเอง หรือญาติที่ได้รับมอบหมาย**
- **มอบสำเนาที่เซ็นรับรองสำเนาถูกต้องแล้วให้แก่: ผู้แสดงเจตนาแทน, พยาน, คนใกล้ชิด และทีมผู้รักษา**
- **เมื่อผู้ป่วยเข้ารักษาตัวที่สถานพยาบาล ควรมอบเอกสารดังกล่าวให้ทีมรักษาโดยเร็ว**

### 🔑 การยกเลิก/แก้ไข
- **ผู้ทำหนังสือแสดงเจตนาอาจยกเลิกหรือเปลี่ยนแปลงเมื่อใดก็ได้** โดย**ขีดฆ่าหรือเพิ่มเติมข้อความใหม่แล้วลงลายมือชื่อ ระบุวันที่แก้ไข**
- **ควรแจ้งแก่ผู้แสดงเจตนาแทน พยาน คนใกล้ชิด และทีมผู้รักษาให้ทราบทุกครั้ง** หากมีสำเนาเก็บไว้ที่สถานพยาบาลควรแจ้งสถานพยาบาลนั้นรับทราบด้วย
- **⭐ ฉบับที่มีผลบังคับใช้ คือ ฉบับที่ทำหลังสุดที่ยื่นต่อทีมผู้รักษา**

## 16. Symptomatology & Management (Lect 6) ⭐บทใหญ่ที่สุด

**5 หัวข้อ:** 1) Pain evaluation & Management 2) Dyspnea management 3) Nausea & Vomiting 4) Constipation 5) Wound care

---

# 16.1 PAIN EVALUATION & MANAGEMENT

### 🔑 Definition of Pain (IASP)
> **"An unpleasant sensory & emotional experience associated with actual or potential tissue damage"**
> — International Association for the Study of Pain (IASP)

### 🔑 Pain Classification — 4 มิติ
| มิติ | การแบ่ง |
|------|---------|
| **Duration** | **Acute (< 3 months)** vs **Chronic (> 3 months)** |
| **Location** | Abdomen, Lower legs, etc. |
| **Severity** | Mild, Moderate, Severe |
| **Pathophysiology** | **Nociceptive** (→ **Visceral pain** / **Somatic pain**), **Neuropathic**, **Mixed pain** |

### Pain Assessment — 2 ด้าน
1. **Physical** — History & physical examination + Investigation (for treatable cause & management)
2. **Psycho-social-spiritual evaluation**

### 🔑 Pain History — SOCRATES (ท่องให้ได้)
| ตัวอักษร | ความหมาย |
|:---:|---|
| **S** | **Site** ตำแหน่ง |
| **O** | **Onset** เริ่มเมื่อไหร่ |
| **C** | **Character** ลักษณะปวด |
| **R** | **Radiation** ร้าวไปไหน |
| **A** | **Association factors** อาการร่วม |
| **T** | **Timing** ช่วงเวลา |
| **E** | **Exacerbating/relieving factors** ปัจจัยกระตุ้น/บรรเทา |
| **S** | **Severity** ความรุนแรง |

**+ Cause of pain:** disease, treatment-related, others

**Physical examination:**
- **Head to toe examination** (complete examination)
- **Observation:** non-verbal, wound, abnormality

---

### 🔑🔑 TOTAL PAIN Concept (ออกสอบแน่นอน)
> **"Pain is what a person says 'it hurts'"**

**4 มิติของ Total Pain:**
| **PHYSICAL** | **PSYCHOLOGICAL** |
|---|---|
| Cancer<br>Co-morbidity: **DM, RA**<br>Bedridden<br>Joint stiffness | **Anxiety, Panic**<br>Disappoint, Coping<br>Hopeless |

| **SOCIAL** | **SPIRITUAL** |
|---|---|
| **Finance**<br>Family<br>**Isolation** | **Meaning**<br>Yearning<br>**Suffering** |

---

### 🔑 Pain Measurement
- **🔑 Self report — GOLD STANDARD** ⭐
- Behavioral observation
- Physiologic measures

**เครื่องมือวัด:**
| เครื่องมือ | ใช้กับใคร |
|-----------|----------|
| **NRS (Numeric Rating Scale)** 0–10 | ผู้ใหญ่ที่สื่อสารได้ |
| **Wong-Baker FACES Pain Rating Scale** (0, 2, 4, 6, 8, 10) | เด็กโต / ผู้ที่สื่อสารตัวเลขยาก |
| **FLACC Scale** | **ผู้ป่วยเด็กอายุ 2 เดือน – 7 ปี และผู้ป่วยเด็กที่มีความผิดปกติทางสมอง** ⭐ |

### 🔑 FLACC Scale (คะแนน 0–2 ในแต่ละหมวด, รวม 0–10)
**5 หมวด:** **F**ace (ใบหน้า) · **L**egs (ขา) · **A**ctivity (การเคลื่อนไหว) · **C**ry (ร้องไห้) · **C**onsolability (การตอบสนองต่อการปลอบโยน)

**การแปลผล:**
| Score | ความหมาย |
|:-----:|----------|
| **0** | Relaxed |
| **1–3** | Mild discomfort |
| **4–6** | Moderate pain/discomfort |
| **7–10** | Severe pain/discomfort |
| **≥ 4** | **ต้องมี intervention** ⭐ |

### 🔑 Acute vs Chronic Pain
| **Acute Pain** | **Chronic Pain** |
|---|---|
| • เกิดอย่างเฉียบพลัน ไม่นานก็หาย<br>• เกิดจากการทำลายเนื้อเยื่อ<br>• **ระยะเวลาน้อยกว่า 3 เดือน** | • เป็นๆ หายๆ หรืออาจเป็นตลอดแม้เนื้อเยื่อที่ถูกทำลายหายดีแล้ว<br>• บอกสาเหตุและกลไกการเกิดได้ไม่แน่นอน อาการปวดขึ้นเองแม้ไม่มีสิ่งกระตุ้น<br>• **ระยะเวลามากกว่า 3 เดือน**<br>• เช่น **cancer pain** |

**🔑 Cancer pain — ลักษณะพิเศษ**
- **recurrent acute pain**
- **ปวดแบบ chronic pain ได้**
- **สามารถปวดได้แบบ nociceptive และ neuropathic pain**

---

### 🔑 Quality of Pain — Nociceptive vs Neuropathic (ออกสอบ)
| **NOCICEPTIVE PAIN** | **NEUROPATHIC PAIN** |
|---|---|
| **Somatic pain** — บอกตำแหน่งได้ชัดเจน เกิดจาก **tissue injury**<br>**Visceral pain** — บอกตำแหน่งได้ไม่ชัดเจน เช่น **bowel obstruction, liver capsule distention** | **เกิดจากการบาดเจ็บของเส้นประสาท**<br>• **Neuralgia:** ปวดเหมือนเข็มทิ่ม แสบร้อน<br>• **Dysesthesia:** การรับรู้ผิดปกติจากปกติเดิม<br>&nbsp;&nbsp;– **Hyperalgesia:** ปวดมากกว่าปกติ<br>&nbsp;&nbsp;– **Allodynia:** **ปวดเมื่อได้รับสิ่งกระตุ้นที่ไม่ปวด** ⭐ |

### 🔑🔑 PAIN PATTERN (ออกสอบบ่อยมาก)
| ชนิด | นิยาม |
|------|-------|
| **Background pain** | **"Around the clock"** — ปวดตลอดเวลา |
| **Episodic pain** | ปวดเป็นครั้งคราว แบ่งเป็น 3 แบบ: |
| ↳ **End-of-dose failure** | **ปวดก่อนถึงเวลาให้ยาครั้งถัดไป** → แก้โดย**เพิ่มขนาดยาหรือลดช่วงห่างการให้ยา** |
| ↳ **Breakthrough pain (BTP)** | **ปวดขึ้นอย่างเฉียบพลันแม้ไม่มีสิ่งกระตุ้น → ให้ยา "prn"** |
| ↳ **Incident pain** | **ปวดเฉียบพลันที่มีสิ่งกระตุ้น → ให้ยา "Before activity"** |

### 🔑🔑 WHO ANALGESIC LADDER (ออกสอบแน่นอน)

```
                              ┌─────────────────────────────┐
                              │ Step 3: SEVERE PAIN         │
                              │ Strong-Opioid analgesic     │
                              │ +/− Non-Opioid, Adjuvants   │
                      ┌───────┴─────────────────────────────┘
                      │ Step 2: MODERATE PAIN
                      │ Weak-Opioid analgesic
                      │ +/− Non-Opioid, Adjuvants
              ┌───────┴──────────────────────────
              │ Step 1: MILD PAIN
              │ Non-opioid analgesic +/− Adjuvants
              └──────────────────────────────────
```

| Step | ยา |
|------|-----|
| **Step 1 (Mild)** | **NSAIDs, Acetaminophen** |
| **Step 2 (Moderate)** | **Tramadol, Codeine** |
| **Step 3 (Severe)** | **Strong opioids: Morphine, Fentanyl, Oxycodone, Methadone** |
| **Adjuvants (ทุกขั้น)** | **Anticonvulsants, Antidepressants, Corticosteroids, Anxiolytics** |

### 🔑 หลักการใช้ยา 4 ข้อ (WHO Principles — ท่องให้ได้)
| หลักการ | ความหมาย |
|---------|----------|
| **1. By mouth** | **Oral administration preferred over parenteral route** |
| **2. By the clock** | **Around the clock dosing to prevent pain** (ไม่ใช่รอปวดแล้วค่อยให้) |
| **3. For the individual** | **Tailor pain relief to individual needs and circumstances** |
| **4. Attention to detail** | **Explore all sources of pain and adverse effects of treatment** |

### 🔑 NON-OPIOID ANALGESICS

**1. Acetaminophen (Paracetamol)**
- **Dose: 500–1000 mg q 6 hr (10–15 mg/kg/dose), max 8 gm/day**
- **⚠️ Acetaminophen overdose: 150 mg/kg >> Hepatic necrosis**

**2. NSAIDs**
- **ข้อบ่งใช้: bone pain, inflammatory pain, liver pain** ⭐
- **S/E: GI irritation, platelet dysfunction**
- ขนาดยา:
  - **Ibuprofen (400) bid, tid pc**
  - **Diclofenac (50) bid, tid pc**
  - **Celecoxib (200–400) OD, bid**

---

### 🔑 WEAK OPIOID ANALGESICS

**1. Codeine**
- **Derivative of Morphine**
- **Potency 1/10 of Morphine** ⭐
- **Dosage: 30–60 mg q 4–6 hr (Max 240 mg/day)**

**2. Tramadol**
- **μ agonist + serotonin & NE reuptake inhibitor**
- **Potency 1/20 – 1/5 of Morphine**
- **Adverse effect: N/V, constipation**
- **Less respiratory depression** ⭐
- **Dosage: 50–100 mg q 6–8 hr (max dose 400 mg/day)**

---

### 🔑 STRONG OPIOID ANALGESICS

**1. Morphine (Full μ agonist)**
- **Standard opioid which others are compared** (ยามาตรฐานเปรียบเทียบ)
- **Metabolized by hepatic conjugation, excreted via the kidney** ⚠️

**2. Fentanyl (μ agonist)**
- **Potency 100x of Morphine** ⭐
- **Rapid onset, short duration of action**
- **✅ Available in renal disease** (ใช้ได้ในผู้ป่วยไตวาย)

**3. Meperidine (Pethidine)**
- **⚠️ ไม่ควรใช้ long term >> neurotoxicity**
- **High euphoria**

**4. Methadone**

### 🔑 MORPHINE — รายละเอียด
- **ผู้ป่วยแต่ละรายต้องการยาขนาดต่างกัน ขึ้นกับความรุนแรงของความปวดและการตอบสนองต่อยา**
- **🔑 NO CEILING EFFECT** (ไม่มีขนาดสูงสุด — เพิ่มได้เรื่อยๆ ตราบใดที่คุมอาการปวดได้และไม่มี side effect) ⭐⭐
- **ผู้ป่วย renal impairment ควรหลีกเลี่ยงหรือลดขนาดยา**

### 🔑 Opioid Dosing in Renal Impairment (ตารางสำคัญ)
| GFR (mL/min) | **Morphine** | **Hydromorphone** | **Oxycodone** | **Methadone** | **Fentanyl** |
|:---:|---|---|---|---|---|
| **> 50** | 100% | 50–100% | 100% | 100% | 100% |
| **10–50** | **50–75%** | 50% | 50% | **100%** | 75–100% |
| **< 10** | **⚠️ Not recommended** | 25% | **⚠️ Not recommended** | **50–75%** | **50%** |

> **สรุปจำ: ไตวายรุนแรง → หลีกเลี่ยง Morphine และ Oxycodone; ใช้ Fentanyl หรือ Methadone ได้**

| รูปแบบ | ชื่อ/ขนาด | ความถี่ |
|--------|----------|--------|
| **Immediate-release (IR)** | **Morphine IR (10 mg)**<br>**Morphine solution (2 mg/ml)** | q 4 hr |
| **Sustained-release (SR)** | **MST (10, 30, 60, 90 mg)** | **q 8–12 hr** |
| | **Kapanol (20, 50, 100 mg)** | **q 12–24 hr** |
| **IV injection** | **10 mg/ml** | — |

| **Oral Morphine — Solution** | **30 minutes** | **4–6 hours** |

| **Kapanol** | **4–6 hours** | **12–24 hours** |

### 🔑🔑 STARTING MORPHINE FOR PATIENTS (สำคัญมาก — คำนวณได้)
1. **Opioid Naive >> ควรเริ่มขนาดน้อย** แล้วค่อยๆ **titrate** ขึ้นจนกว่าจะคุมปวดได้ดี (**ใช้เวลา titrate ยาทุก 2–3 วัน**)
2. **ควรเริ่มด้วย Morphine ออกฤทธิ์สั้น** โดยให้ยาควบคุม **background pain q 4 hr + prn q 2 hr**
   หรือ **start 20–30 mg/day**
3. **ให้ปรับขนาดยาตาม background + BTP ใน 24 ชั่วโมงที่ผ่านมา**
4. **หากอาการยังไม่ดีขึ้น อาจปรับยาขึ้น 30–100%**

**ตัวอย่าง:**
- **MST (10) 1 tab PO q 8 hr (30 mg/day)**
- **Morphine IR (10) ½ tab PO q 4 hr**
- **+ Breakthrough pain (10–20% ของ 2 hr background pain)**
- **+ Morphine IR ½ tab PO prn q 2 hr**

---

### 🔑🔑 TITRATION OF MORPHINE FOR PAIN CONTROL (โจทย์คำนวณ — ต้องทำได้)

**ตั้งต้น:** Morphine IR (10) ½ tab PO q 4 hr + Morphine IR (10) ½ tab PO prn q 2 hr

#### **วิธีที่ 1 — ปรับโดยคำนวณยาที่ได้ใน 24 hr (BGP + BTP)**
> ตัวอย่าง: ผู้ป่วยได้ prn 6 ครั้ง
> - ขนาดยาที่รับใหม่ = **BGP 30 mg + BTP 30 mg = 60 mg/day**
> - **BTP ใหม่ = 60/6 = 10 mg**
> - **ยาที่ปรับใหม่ = Morphine IR (10) 1 tab PO q 4 hr + Morphine IR 1 tab PO prn q 2 hr**

#### **วิธีที่ 2 — ปรับโดยเพิ่ม 30–100%**
> ตัวอย่าง: ผู้ป่วยมีอาการปวดเพิ่ม → เพิ่ม 100%
> - ขนาดยาที่รับใหม่ = **BGP 30 mg + 30 mg (100%) = 60 mg**
> - **BTP ใหม่ = 10–20% ของ 60 mg = 10 mg (6–12 mg)**
> - **ยาที่ปรับใหม่ = Morphine IR (10) 1 tab PO q 4 hr + Morphine IR 1 tab PO prn q 2 hr**

---

### 🔑🔑 SWITCHING MORPHINE ORAL TO IV (โจทย์คำนวณ)
**ตั้งต้น:** Morphine IR (10) 1 tab PO q 4 hr + Morphine IR (10) 1 tab PO prn q 2 hr
→ **Total oral = 60 mg/day**

**เปลี่ยนจาก Route Oral >> IV (หาร 3):**
- **Morphine IV = 60/3 = 20 mg/day**
- **Morphine 20 mg + NSS up to 100 ml IV drip 4 ml/hr**
- **+ Morphine 2 mg IV prn q 2 hr (10% ของ BGP)**

### 🔑 FENTANYL

**Fentanyl IV**
- **Duration: a few minutes to an hour**
- **ข้อบ่งใช้: Procedural pain control, Post-operative pain control**
- **✅ Safe in renal failure**
- **Dosing:**
  - **ขนาดในผู้ใหญ่: 20 mcg IV q 1 hr**
  - **ขนาดในเด็ก 2–12 ปี: 0.5–1 mcg/kg IV q 1 hr**

**🔑 Fentanyl Transdermal Patch**
- **ใช้ในผู้ป่วยที่คุมความปวดได้ดีแล้ว หรือผู้ป่วยที่รับประทานยาไม่ได้** ⭐
- **Peak onset: หลังจากแปะ ระดับยาจะค่อยๆ เพิ่มขึ้น คงที่หลัง 12–24 hr** ⚠️
- **Dosing interval: 72 hr (เปลี่ยนทุก 72 hr)**
- **Preparation: 12.5, 25, 50 mcg/hr**
- **Dosing:** แนะนำให้เปลี่ยนจากการใช้ยาชนิดอื่น โดยเปรียบเทียบจาก conversion ratio
- **⚠️ เมื่อเปลี่ยน fentanyl TD >> Morphine ใน 6–12 hr แรก ควรให้ยาขนาดครึ่งเดียวก่อน**

**🔑 Fentanyl Sublingual**
- **สำหรับ INCIDENT PAIN** ⭐
- **Fentanyl citrate 50 mcg = 1 ml**
- **Sublingual for 5–10 min**
- **Onset 5–15 min**
- **Duration 45 min**
- **Repeat in 5–10 min**
- **Titrate 25 >> 50 >> 100 mcg**

# 16.2 DYSPNEA MANAGEMENT

### 🔑 Dyspnea — นิยาม
- **Clinical term: Breathlessness, shortness of breath — NOT tachypnea** ⚠️ (แยกให้ออก)
- **ประสบการณ์ที่หายใจลำบาก ไม่สุขสบาย ก่อให้เกิดความกลัว**
- **การรับรู้เฉพาะบุคคลต่ออาการหายใจที่ผิดปกติ**
- **🔑 อาการหายใจเหนื่อย หายใจไม่อิ่ม เป็นตัวทำนาย Survival ที่สำคัญ รองลงมาจาก performance** ⭐

### 🔑 General Approach to Breathlessness (กราฟที่ต้องเข้าใจ)
```
                 Non-drug            Symptomatic drug
                treatment                treatment
        ─────────────────────────────────────────────
              Correct the correctable
        ─────────────────────────────────────────────
        On exertion        At rest         Terminal
    Prognosis =        Prognosis =      Prognosis =
    Months–years       Weeks–months      Days–weeks
```
> **แนวคิด: ยิ่งพยากรณ์โรคสั้นลง (on exertion → at rest → terminal) สัดส่วนการ "correct the correctable" ยิ่งลดลง และ symptomatic drug treatment ยิ่งเพิ่มขึ้น**

### Assessment ของ Dyspnea
- **ประเมินจากการบอกเล่าและบรรยายของผู้ป่วย**
- **🔑 Self report is gold standard** ⭐
- **ประเมิน severity ใช้ dyspnea score 0–10**
- **แยกระหว่าง dyspnea / fatigue**
- ลักษณะอาการหายใจลำบาก อะไรทำให้แย่ลง/ดีขึ้น ดีขึ้นขณะให้ **O₂** หรือไม่
- อาการเป็นขณะมีกิจกรรม/นั่งพัก ท่าใดเป็นท่าที่สบายที่สุด
- เคยรักษาอย่างไรมาก่อน ใช้ยาอะไร
- รบกวนการใช้ชีวิต/การนอนหรือไม่ อย่างไร

### 🔑 Vicious Cycle of Anxiety, Panic, Dyspnea (วงจรที่ต้องวาดได้)
```
    หายใจไม่อิ่ม → หายใจเร็วตื้น → กล้ามเนื้อหายใจอ่อนล้า ขาดพลังงาน
         ↑                                      ↓
    หวาดกลัวมากขึ้น                      กังวล หวาดกลัว
         ↑                                      ↓
    จำกัดการมีกิจกรรม ← หายใจไม่อิ่มมากขึ้น ←──┘
```

### 🔑🔑 CORRECTABLE CAUSE OF BREATHLESSNESS (ตารางออกสอบแน่นอน)
| **สาเหตุ** | **การรักษา** |
|---|---|
| **Infection** | **Antibiotics, PT** |
| **COPD/asthma** | **Bronchodilators, steroids, PT** |
| **Obstruction of trachea/bronchus/SVT** | **Steroids, radiotherapy, laser therapy, stenting, chemotherapy** |
| **Lymphangitis carcinomatosis** | **Steroids, diuretics, bronchodilators** |
| **Pleural effusion** | **Drainage +/− Pleurodesis** |
| **Pericardial effusion** | **Paracentesis, steroids** |
| **Ascites** | **Diuretics, paracentesis** |
| **Anemia** | **Blood transfusion** |
| **Pulmonary embolism** | **Anticoagulation** |
| **Heart failure** | **Diuretics, ACE inhibitors, opioids** |

### 🔑 Symptom Control — Dyspnea
| **Pharmacological** | **Non-Pharmacological** |
|---|---|
| • **Opioids**<br>• **Benzodiazepines**<br>• **Corticosteroids**<br>• **Bronchodilators**<br>• **Mucolytics or NSS nebulizer** | • **Positioning**<br>• **Exercise**<br>• **Relaxation techniques** (Distraction, Imaginary, Meditation)<br>• **Ambient airflow: handheld fan** ⭐<br>• **Patient & family education & follow up** |

### 🔑🔑 OPIOIDS FOR BREATHLESSNESS (สำคัญมาก)
**กลไก:**
- **Opioids ช่วยลด ventilatory response ต่อ hypercapnia, hypoxia, exercise**
- **ลด respiratory effort และอาการหายใจลำบาก**
- **Opioids ได้ผลดีในผู้ป่วยที่มีอาการหายใจลำบากในขณะไม่มีกิจกรรม (dyspnea at rest)**
- **⭐ ใช้ opioids ขนาดน้อย ไม่มีผลกดการหายใจ** (ข้อนี้ออกสอบบ่อย)

**ขนาดยา:**
| กลุ่มผู้ป่วย | Dose |
|-------------|------|
| **ผู้ป่วย morphine naive** | **เริ่มด้วย 2.5–5 mg PO prn q 4–6 hr** ปรับยาตามการตอบสนอง<br>**ถ้าใช้ morphine > 2 ครั้ง/วัน >> Regular long acting morphine** |
| **ผู้ป่วยที่ใช้ Morphine อยู่แล้ว** | **เพิ่ม Morphine ที่ใช้อยู่ขึ้นอีก 30%** ⭐ |
| **การ titrate** | **ให้ prn เหมือนจัดการความปวด** |

### 🔑 BENZODIAZEPINES (สำหรับ dyspnea ร่วมกับ anxiety)
**Action: decrease anxiety, act as muscle relaxants, reduce anxiety & panic attacks**

| Medication | Dose |
|-----------|------|
| **Diazepam** | **2–5 mg PO up to TDS** |
| **Lorazepam** | **0.5–1 mg PO/SL prn q 8 hr** |
| **Midazolam** | **2.5–5 mg SC q 4 hr** |

### 🔑 Goal Therapy of Breathlessness (ตามความรุนแรง)
| Severity | แนวทาง |
|----------|--------|
| **Mild (NRS 1–3)** | Ongoing assessment and treatment of psychosocial, spiritual, and emotional distress · **Fan** · **Repositioning and medical air** · Supplemental oxygen if hypoxemic |
| **Moderate (NRS 4–6)** | + **Short acting prn opioids** |
| **Severe (NRS 7–10)** | + **Long acting scheduled opioids** |
| **Refractory** | + **Goals of care discussion and consideration of palliative sedation** ⭐ |

# 16.3 NAUSEA & VOMITING

### 🔑 Definition (แยกให้ออก)
| | นิยาม |
|---|---|
| **Nausea** | **Unpleasant SUBJECTIVE sensation >> may or may not result in vomiting** |
| **Vomiting** | **OBJECTIVE patient experiences involving forceful elimination of contents in stomach** |

### 🔑🔑 MECHANISM — Neurotransmitter & Pathway (สำคัญมาก)
**3 Neurotransmitters หลัก:**
1. **Dopamine**
2. **Serotonin**
3. **Histamine**

**Receptors:** **H1 receptor · D2 receptor · 5-HT receptor · Muscarinic receptor**

**เส้นทางที่กระตุ้น Vomiting Center:**
```
Higher Cortical Centers ──┐    (Emotional factors, Pain, Smell,
                          │     Repulsive sight, IICP)
Vestibular nuclei ────────┤    (Motion sickness)
                          ├──→ VOMITING CENTER ──→ EMETIC REFLEX
CTZ ──────────────────────┤    (Metabolic/Chemical cause)
                          │
Peripheral pathway ───────┘    (Vagal afferents, Enterochromaffin
(Cytotoxic Chemotherapy,        cells)
 Cell Damage, Inflammation,
 Necrosis)
```

### 🔑 Assessment ของ N/V
- มีอาการคลื่นไส้หรืออาเจียน หรือมีทั้ง 2 อาการ
- **ลักษณะการอาเจียน** (ความถี่, ปริมาณ, **ความสัมพันธ์กับการรับประทานอาหาร**)
- **มีท้องผูกร่วมด้วยหรือไม่**
- **มีท้องอืดร่วมด้วยหรือไม่**
- **มีอาการหรือลักษณะเฉพาะหรือไม่ >> Gut obstruction, IICP** ⭐
- **Hypercalcemia**
- **ได้รับยาที่อาจทำให้มีผลข้างเคียง**
- **มีอาการเครียด หรือวิตกกังวลหรือไม่**

### 🔑🔑 DRUG TREATMENT FOR N/V — ตามตำแหน่งที่ออกฤทธิ์ (ตารางออกสอบแน่นอน)
| **ตำแหน่ง** | **ยา** |
|---|---|
| **Chemoreceptor trigger zone (CTZ)** | **Haloperidol · Ondansetron · Metoclopramide** |

| **Vestibular apparatus** | **Diphenhydramine** |
| **Cerebral cortex** | **Dexamethasone, Lorazepam** |

# 16.4 CONSTIPATION

### 🔑 Definition (NIH)
> **A condition in which you may have:**
> - **fewer than 3 bowel movements/week**
> - **Stools that are hard, dry, or lumpy**
> - **Stools that are difficult or painful to pass or a feeling that not all stool has passed**

### 🔑 Bristol Stool Chart (ต้องจำ)
| Type | ลักษณะ | แปลผล |
|:----:|--------|-------|
| **Type 1** | Separate hard lumps, like nuts (hard to pass) | **Constipation** |
| **Type 2** | Sausage shaped but lumpy | **Constipation** |
| **Type 3** | Sausage shaped with cracks on the surface | **Normal** |
| **Type 4** | Sausage shaped smooth and soft | **Normal** |
| **Type 5** | Soft blobs with clear-cut edges (passed easily) | **Diarrhea** |
| **Type 6** | Fluffy pieces with ragged edges (a mushy stool) | **Diarrhea** |
| **Type 7** | Watery with no solid pieces (entirely liquid) | **Diarrhea** |

### 🔑 Prevalence (ตัวเลขที่ควรจำ)
- **30% of general population**
- **30–100% in palliative care population** ⭐
- **40–70% ของผู้ป่วยที่ได้รับ laxatives ยังคงมีอาการท้องผูก**
- **Negative impact on their quality of life**

### 🔑🔑 CLASSIFICATION OF CONSTIPATION (ออกสอบ)
| **PRIMARY (Functional causes)** | **SECONDARY** |
|---|---|
| • **Diet:** poor appetite, low fiber diet, poor fluid intake<br>• **Environmental:** **lack of privacy**<br>• **Other factors:** advanced age ↑, inactivity, depression, sedation | • **Cancer:** GI, pelvic, ovarian, cervical<br>• **Structural:** painful anorectal conditions (**hemorrhoids, anal fissure, perianal abscess**)<br>• **Metabolic disturbance:** **hyperCa, hypoK**, Hypothyroidism, Uremia, Dehydration<br>• **Neurological disorders:** **spinal cord compression**, autonomic failure (Parkinson disease, Multiple sclerosis)<br>• **Malignant ascites**<br>• **Partial intestinal obstruction** |

### 🔑 Assessment — History
- **Frequency, onset**
- **Previous bowel pattern**
- **Stool character (hard, blood, mucus)**
- **Medication, food**
- **Staging of disease**
- **Need to strain** (ต้องเบ่ง)
- **Painful defecation**
- **Nausea or vomiting**
- **Neurological symptoms**
- **Sensation of defecation (Complete?)**
- **Impact on patient**

### 🔑 Assessment — Physical Examination
- **Inspection:** Abdominal distention, **visible peristalsis**
- **Auscultation:** Bowel sound
- **Palpation:** tenderness, mass
- **Percussion**
- **🔑 Per-rectal examination:** **Feces, mass, Enlarged dilated rectum** ⭐ (ห้ามลืม PR)

### 🔑🔑 FECAL IMPACTION WITH OVERFLOW DIARRHEA (ออกสอบ — กับดักคลาสสิก)
> **ผู้ป่วยที่มีถ่ายเหลว ถ่ายกระปริดกระปรอย ต้องระวังว่าเป็น overflow diarrhea ซึ่งเกิดจาก STOOL IMPACTION** ⚠️

**ลักษณะ:**
| **Severe constipation (overflow)** | **Normal** |
|---|---|
| • **Distended rectum**<br>• **Abnormal sensation**<br>• **Overflow diarrhoea** (overflow of liquid stool) | • Empty rectum<br>• Rectum filling → sensation for defecation |

**🔑 แนวทางจัดการ:**
```
PR → Stool impaction >> ให้ stool softeners
   → Soft stool >> ให้ Senna, Bisacodyl
   → Empty rectum >> Plain film R/O gut obstruction
```

### 🔑 Investigation
- **Supine and upright abdominal film**

### 🔑🔑 CONSTIPATION SCORE (คำนวณจากฟิล์ม — ออกสอบ)
**วิธี:** ลากเส้นทแยงมุมแบ่งช่องท้องเป็น **4 ส่วน (quadrants)** แล้วให้คะแนนแต่ละส่วน

| Score | ความหมาย |
|:-----:|----------|
| **0** | **No feces** |
| **1** | **Stool occupy < 50% of lumen** |
| **2** | **Stool occupy > 50% of lumen** |
| **3** | **Stool completely occupy the lumen** |

**คะแนนรวม 0–12**

> **🔑 Constipation score > 7 >> aggressive treatment** ⭐
> - **Evacuate ถ้ามี impact feces**
> - **ให้ metoclopramide, ทำ abdominal massage, SSE, unison enema**
> - **Laxative + Stool softener**

### 🔑🔑 DRUG USED IN CONSTIPATION (ตารางออกสอบ)
| **กลุ่ม** | **ยา** |
|---|---|
| **Stimulants** | **Senna (Senokot), Bisacodyl (Dulcolax), Castor oil** |
| **Softeners** | **Lactulose, Magnesium salts** |
| **Suppositories & Enemas** | **Glycerin/Bisacodyl, Unison enema, SSE** |
| **Fiber** | **Psyllium (Metamucil)** ⚠️ *ต้องกินน้ำเยอะ ถ้าน้ำไม่พอจะ impact กว่าเดิม* |
| **Lubricant** | **Mineral oil, Castor oil** |

### 🔑 Non-Pharmacologic for Constipation
- **ให้ข้อมูล สาเหตุ อาการ แผนการดูแลที่จะได้รับ**
- **ดูแลให้อาหารที่มีกากใยและกระตุ้นการขับถ่าย** เช่น ขี้เหล็ก มะขาม ลูกพรุน เม็ดแมงลัก
- **ดูแลให้ได้รับน้ำอย่างน้อย 1,500 ml/day** ⭐
- **ดูแลให้ได้รับยาระบายตามแผนการรักษา**
- **กระตุ้นให้มีการเคลื่อนไหวร่างกาย**
- **ฝึกการขับถ่ายเป็นเวลา**
- **จัดสถานที่มิดชิด ส่วนตัว มีม่านกั้น**
- **พิจารณา manual evacuation ตามเหมาะสม**

### 🔑🔑 CONSTIPATION FROM OPIOIDS (สำคัญมาก ออกสอบบ่อย)
1. **เป็นผลข้างเคียงของการใช้ Opioids**
2. **Opioids ลด Peristalsis ของลำไส้**
3. **⚠️⚠️ ไม่พบ Tolerance จึงต้องให้ยาระบายตลอดเวลาที่ใช้ Opioids** ⭐⭐ (จุดที่ออกสอบที่สุด)
4. **ควรให้ยากลุ่ม Stimulants / Softeners** — **Senna, Bisacodyl, Lactulose**
5. **Constipation prophylaxis >> Senna**
6. **Constipated with hard feces >> Softeners +/− enema**
7. **การดูแลเรื่องอาหารอย่างเดียวมักไม่ช่วยให้ดีขึ้น**
8. **⚠️ หลีกเลี่ยงยา/เพิ่มภาคอาหาร bulk-forming agents** (เพราะจะทำให้ impact มากขึ้นในลำไส้ที่ peristalsis ลดลง)

# 16.5 WOUND CARE — FUNGATING WOUND

### 🔑 Definition
- **Related term:** tumor necrosis, ulcerative malignant wounds, malignant cutaneous wounds
- **นิยาม: การกระจายลุกลามของก้อนมะเร็งไปทำลายโครงสร้างของผิวหนังที่อยู่ใกล้เคียง แตกทะลุจนเป็นแผลขึ้น**

### 🔑 Prevalence (ตัวเลขออกสอบ)
- **พบได้ 5% ของผู้ป่วยมะเร็ง และ 10% ของผู้ป่วยมะเร็งระยะลุกลาม**
- **⭐ มักพบในช่วง 3–6 เดือนสุดท้ายก่อนเสียชีวิต**
- **⭐ พบใน breast cancer บ่อยที่สุด**

### 🔑 Impact to Quality of Life — 6 ด้าน
```
                    Pain (มาก)
                        ↑
      Bleeding ← Fungating wound → Itching
                        ↓
    Bad smell → Care giver distress ← Psychosocial
```
> **หมายเหตุ: กลิ่นเหม็นเป็นสาเหตุสำคัญที่ทำให้ผู้ดูแลเกิด distress**

### 🔑🔑 MANAGEMENT OF FUNGATING WOUND — 7 เป้าหมาย (ท่องให้ได้)
1. **การจัดการอาการปวด** (Pain control)
2. **ควบคุมภาวะเลือดออก** (Bleeding control)
3. **ป้องกันการติดเชื้อของแผล** (Infection control)
4. **ควบคุมกลิ่นที่ไม่พึงปรารถนา** (Odor control)
5. **ควบคุมปริมาณสิ่งคัดหลั่งที่ออกมาจากแผล** (Exudate control)
6. **ดูแลปัญหาจิตสังคมและภาพลักษณ์** (Psychosocial & body image)
7. **การให้ข้อมูล/ความรู้ (Health education) ผู้ป่วยและผู้ดูแล**

---

### 🔑 1. PAIN CONTROL
- **ให้ยาลดปวดก่อนทำแผล**
  - **Morphine oral solution 2 ml (หรือเท่ากับ Breakthrough pain dose) PO ก่อนทำแผล 15–30 นาที** ⭐
- **Superficial pain:**
  - **Ice pack ประคบก่อนและหลังทำแผล**
  - **Topical lidocaine ให้ก่อนทำแผล**
- **🔑 Topical analgesia (Opioid) — โดยไปจับกับ Peripheral opioid receptor (off-label)** ⭐
  - **Morphine IR บดผสม KY-gel ใส่ที่แผล**
  - **Morphine injection 5 mg ผสม KY-gel 5 ml**

### 🔑 2. BLEEDING CONTROL
- **⭐ Direct compression (ทำก่อนเป็นอันดับแรก)**
- **Adrenaline ชุบก๊อซ กดตรงจุด bleeding นาน 5–10 นาที**
- **Sucralfate (Ulsanic) 1 gm ผสม water 1 ml + KY gel 1 หยด → ทาบริเวณที่เลือดออก**
- **ใช้ Sofra-tulle หรือ Vaseline gauze ปิดแผล**
- **Dressing strategies:**
  - **Calcium alginate**
  - **Gelatin gel foam, sponge, hemostatic foam**

### 🔑 3. INFECTION CONTROL
- **Dressing ด้วย NSS**
- **สามารถอาบน้ำได้ตามปกติ เป็นผลดีต่อจิตใจ ทำให้ผู้ป่วยรู้สึกว่าร่างกายสะอาดกว่า** ⭐
- **Debridement necrotic tissue:**
  - **สำลีชุบ NSS จนชุ่ม ขัดถู (Scrubbing) เนื้อตายออกอย่างนุ่มนวล**
  - **ใช้ syringe ขนาด 20 ml ดูด NSS ใช้เข็มเบอร์ 18 ฉีดสวนล้างแผลด้วย low pressure**
  - **Autolytic โดยการใช้ผลิตภัณฑ์ Hydrogel**

### 🔑 4. ODOR CONTROL (⭐ ออกสอบบ่อย)
- **บดยา metronidazole ให้ละเอียด โรยบนแผล** ⭐
- **ใช้ gauze ชุบ metronidazole injection จนชุ่ม แล้วนำไปปิด หรือ pack เข้าไปภายในโพรงแผล — สามารถลดกลิ่นได้ภายใน 2–7 วัน** ⭐
- **⚠️ ระวังอย่าให้แผลแห้ง มะเนั้น gauze จะติดแผล ระวังขณะลอกออกจะส่งผลให้ปวดและเลือดออกได้**

### 🔑 5. EXUDATE CONTROL
- **เปลี่ยนวัสดุชั้นแรกวันละครั้ง**
- **ใช้ Vaseline gauze ปิดแผลชั้นแรก**
- **Top gauze ชั้นที่ 2**
- **เปลี่ยนแผลชั้นนอก วันละ 2–3 ครั้ง ถ้าสารคัดหลั่งปริมาณมาก**
- **ปกป้องผิวหนังรอบๆ แผลจากสารคัดหลั่งโดยใช้ skin barriers**
- **วัสดุกลุ่ม Hydrofiber:** เหมาะสมกับแผลที่และมีการติดเชื้อ
- **วัสดุกลุ่ม Calcium alginate:** ดูดซับ exudate มีลักษณะนุ่ม ปิดแผลได้ดี

**7 ภาวะฉุกเฉิน:**
1. **Severe pain**
2. **Spinal cord compression**

# 17.1 SEVERE PAIN

### 🔑 Severe Pain as an Emergency
- **Severe pain is an emergency**
- **Pain with even mild movement** (ขยับนิดเดียวก็ปวดมาก):
  - **Fracture of a long bone**
  - **Vertebral collapse**
- **🔑 Rescue medication (ใช้ IV เป็นหลัก เวลา severe มาก):**
  - **Intravenous Morphine**
  - **Intravenous Fentanyl**
  - **Sublingual Ketamine**

### 🔑🔑 INITIAL DOSING ALGORITHMS — "Rapid Titration Method"
> **Morphine is the first-line drug used**

#### **Step 1 — Starting dose**
| กลุ่ม | ขนาดยา |
|-------|--------|
| **Opioid Naive** | **Morphine 1–2.5 mg IV** (เริ่มน้อยๆ titrate ขึ้น) |
| **Already Opioid use** | **10–20% of the total opioid requirement in the 24 hours** (around the clock/scheduled doses plus as-needed doses) |

#### **Step 2 — Re-assess in 5–15 minutes** (ระยะเวลาที่ยาออกฤทธิ์ full effect)
| Pain response | Action |
|---------------|--------|
| **Pain unchanged or higher** | **→ re-dose & increase by 50–100% per dose** |
| **Pain score decreased 4–6** | **→ repeat same dose** (ให้ dose เดิม) |
| **Pain score 0–3** | **→ continue at current effective dose** |

> **\*\*Assess unwanted side effects: somnolence, nausea, confusion**

#### **Step 3 — คำนวณ Maintenance Dose**
```
Dosing being used assumed = ____ mg in 4 hours
    → total 24 hrs = ____ mg/day
    → split to around the clock = ____ mg q 4 hr
    → Breakthrough pain dose = 10–20% of total daily dose
    → ____ mg prn for BTP
```

### 🔑🔑 CASE SCENARIO (ตัวอย่างโจทย์คำนวณ — ออกสอบ)
> **ผู้ป่วยหญิงไทย อายุ 45 ปี U/D: CA Cervix with bone metastasis**
> - Admit Palliative care ward due to pain
> - Current medication: **Morphine 2 mg IV prn q 2–4 hr**
> - Patient has severe pain, cannot rest after get Morphine 2 mg IV prn x 2 dose

**การ titrate:**
| ครั้งที่ | ยา | ผล |
|:---:|---|---|
| 1 | **Morphine 2 mg IV x 2 doses in 15 min** | **Pain score 9/10** |
| 2 | **Morphine 3 mg** → re-assess 15 min | **Pain score 5/10** |
| 3 | **Morphine 3 mg** → re-assess 15 min | **Pain score 3/10** |

**คำนวณ:**
- **Total prn dose = 10 mg in 4 hr → 60 mg/24 hr**
- **→ Morphine 10 mg IV q 4 hr**
- **→ Morphine 10 mg IV prn for pain q 2 hr**

### 🔑🔑 MONITORING ระหว่าง Rapid Titration (ออกสอบ)
| Parameter | เป้าหมาย |
|-----------|---------|
| **RASS score** | **0 to −1** (ตื่นดี/หลับ ปลุกตื่นง่าย) |
| **RR** | **> 10/min** |
| **SpO₂** | **> 90%** |
| **Acceptable pain score** | **< 4/10** |
| **Vital sign** | **q 15 minutes during titration** |
| **⚠️ ยาแก้พิษ** | **Prepare NALOXONE for Opioid overdose** ⭐ |

# 17.2 SPINAL CORD COMPRESSION (MSCC)

### 🔑 นิยาม & ความสำคัญ
- **Malignant spinal cord compression is caused by a tumor pressing on the spinal cord or cauda equina**
- **Spinal tumors can be primary, or secondary to metastatic disease**
- **Leads to significant morbidity, and sensory loss and autonomic dysfunction**
- **⚠️ Urgent diagnosis and treatment is essential to prevent irreversible spinal cord injury and disability**

### 🔑🔑 Epidemiology & Pathophysiology (ตัวเลขออกสอบ)
- **พบ 3–15% ในผู้ป่วย metastatic cancer**
- **🔑 Common primaries: Breast, Prostate, Lung, Thyroid, Cancer & Multiple myeloma**
- **⭐⭐ The most common level = THORACIC (70%)** (ออกสอบบ่อยที่สุด)
- **Compression >> edema, venous congestion & demyelination (REVERSIBLE)**
- **⚠️ Prolonged compression >> vascular injury, cord necrosis & permanent damage (IRREVERSIBLE)**

### 🔑🔑 CLINICAL FEATURES (ตารางออกสอบแน่นอน)
| **Clinical Symptoms** | **Incidence** | **Features** |
|---|:---:|---|
| **Back pain** | **80–95%** | • **Localized or Radicular**<br>• Unilateral or Bilateral<br>• Constant, Aching pain<br>• **⭐ Classically WORSE AT NIGHT, and with VALSALVA MANEUVER** (i.e. coughing, sneezing) |
| **Motor deficits** | **35–75%** | • Often described as **"Heaviness or clumsiness"** (ไม่ใช่แค่อ่อนแรง)<br>• Can involve upper or lower motor neuron depending on level involved |
| **Sensory deficits** | **50–70%** | • **Change/Loss of sensation typically begins DISTALLY & ASCENDS** as the disease advances |
| **Autonomic dysfunction** | **50–60%** | • **Bowel or Bladder symptoms** (Urinary retention, Overflow urinary incontinence, Fecal incontinence) |

### 🔑🔑 IMAGING
| Modality | รายละเอียด |
|----------|-----------|
| **⭐ MRI whole spine** | **GOLD STANDARD (Sensitivity 93%, Specificity 97%)** |
| **CT myelography** | **When MRI is contraindicated** |
| **X-ray** | **⚠️ Inadequately sensitive for metastatic disease** |

### 🔑🔑 TREATMENT OPTIONS
| **General management** | **Definite management** |
|---|---|
| • **Glucocorticoid** (ลดบวม ลด pain)<br>&nbsp;&nbsp;○ Improve analgesia & neurologic function<br>• **Analgesia (pain control)** — opioid<br>• **Rehabilitation**<br>&nbsp;&nbsp;○ Avoidance of complications | • **Radiotherapy**<br>&nbsp;&nbsp;○ Suitable: **spinal stability without neurologic deficits**<br>&nbsp;&nbsp;○ **Radiosensitive tumors**<br>• **Surgery**<br>&nbsp;&nbsp;○ Suitable: **vertebral body collapse, unstable fracture, tissue diagnosis**<br>• **Chemotherapy**<br>&nbsp;&nbsp;○ **Chemo-responsive tumors** |

### 🔑🔑 GLUCOCORTICOIDS (สำคัญมาก ออกสอบ)
- **⭐ Dosing: Start Dexamethasone 16 mg IV/PO (loading dose) then 16 mg daily (8 mg × 2 doses IV/PO)**
- **⚠️ Contraindication: Suspicious of hematological malignancy (Lymphoma/Myeloma)** — making biopsy & histologic confirmation more difficult
- **⭐⭐ DO NOT DELAY WHILE AWAITING IMAGING RESULTS** (ให้ steroid ก่อน ไม่ต้องรอผล imaging)

### 🔑 RADIOTHERAPY
| กลุ่มผู้ป่วย | แนวทาง |
|-------------|--------|
| **Patients with GOOD prognosis** (ambulant or with immobility for < 24 hr) | **⭐ Urgent treatment is indicated within 24 hr of diagnosis**<br>**Regimens:**<br>• **20 Gy in 5 daily fractions**<br>• **30 Gy in 10 daily fractions** |
| **Patients with POOR prognosis** (< 6 months life expectancy, poor performance status, established paraplegia for > 24 hr) | **Indicated only for pain relief**<br>**Regimen: single dose of 8 Gy** |

### 🔑 SURGERY
- **Goals: Stabilization & decompression to preserve or recover neurological function**
- **⭐ Timing: EARLY SURGERY BEFORE ESTABLISHED NEUROLOGICAL DEFICIT >> best outcome**
- **Patient selection (based on estimated patient survival):**
  - **The Revised Tokuhashi Scoring System**
  - **Tomita score**

**🔑 The Revised Tokuhashi Scoring System**
| **Total Score** | **Survival** | **Strategy** |
|:---:|---|---|
| **0–8 points** | **6 months** | **→ Conservative Treatment** |
| **9–11 points** | **6–12 months** | **→ Palliative Surgery** (หรือ Excisional Surgery ถ้า single lesion; without metastases in important internal organs) |
| **12–15 points** | **More than 12 months** | **→ Excisional Surgery** |

**องค์ประกอบที่ใช้ให้คะแนน (0–2 หรือ 0–5):** General condition (PS) · Number of extraspinal metastatic foci · Number of metastases in vertebral body · Metastases to other internal organs · **Primary site of malignancy** · Palsy (Frankel grade)

> **Primary site scoring:** Lung, osteosarcoma, stomach, bladder, esophagus, pancreas = **0** | Liver, gallbladder, unidentified = **1** | Others = **2** | Kidney, uterus = **3** | **Thyroid, breast, prostate, carcinoid = 5** (พยากรณ์โรคดีที่สุด)

### 🔑 CHEMOTHERAPY — Chemo-responsive tumors
- **Lymphoma**
- **Germ cell tumor**
- **Small cell lung cancer**

# 17.3 SUPERIOR VENA CAVA OBSTRUCTION (SVCO)

### 🔑 นิยาม
- **Partial or complete obstruction of blood flow through the SVC**
- **Most common causes: Thrombus formation or tumor infiltration**

### 🔑🔑 ETIOLOGY (ตัวเลขออกสอบ)
**Malignant mediastinal tumors (80%)**
| สาเหตุ | % |
|--------|:--:|
| **Non-small cell lung cancer** | **43–59%** |
| **Small-cell lung cancer** | **7–39%** |
| **Lymphoma** | **1–25%** |
| **Metastatic cancers** | **1–15%** |

> **จำ: CA lung, Lymphoma, CA metastasis**

**Non-malignant conditions**
- **Vascular disease** (aortic aneurysm, vasculitis)
- **Infections** (histoplasmosis, TB, syphilis)
- **Benign mediastinal tumors** (teratoma, cystic hygroma, thymoma)
- **⭐ Catheter-related thrombosis** (สำคัญขึ้นเรื่อยๆ)

### 🔑🔑 SIGNS & SYMPTOMS (ออกสอบ)
- **Face or neck swelling** (บวมที่หน้าและคอ)
- **Upper extremities swelling**
- **⭐ Dyspnea, orthopnea**
- **Dysphagia** (กด esophagus)
- **⭐ Dilated chest vein collaterals**
- **⚠️ Severe: Cerebral edema & Upper respiratory compromise**

### 🔑 EVALUATION
| Modality | รายละเอียด |
|----------|-----------|
| **Ultrasound** | **Identify a thrombus within the vessel lumen** |
| **X-ray** | • **Widened mediastinum**<br>• **Mass in the Rt side of the chest**<br>• **Pleural effusion (Rt side)** |
| **⭐ CT chest** | **Sensitivity 96%, Specificity 92%**<br>**More accurate information on the location/cause of the obstruction** |

### 🔑🔑 MANAGEMENT
**A. Supportive treatment**
- **⭐ Elevating the patient's head to decrease venous pressure**
- **Oxygen supplement** (ให้ O₂ ถ้ามี hypoxia)
- **⭐ Glucocorticoid: 16 mg/day PO/IV × 5 days**

**B. Chemotherapy**
- **Chemo-sensitive tumors: small-cell lung cancer, lymphoma, and mediastinal germ cell tumors**

**C. Radiotherapy**
- **Radio-sensitive tumors: non-small cell lung cancer, lymphoma**
- **⭐ Initial treatment if a histologic diagnosis cannot be established**

**D. Thrombolytics / Anticoagulants**
- **Thrombolytics (e.g. streptokinase) หรือ anticoagulants (e.g. heparin or oral anticoagulants)**
- **สำหรับ SVCs due to thrombus**

**E. Stenting**
- **⭐ A useful procedure for patient with severe symptoms (e.g. stridor)**

# 17.4 MALIGNANT AIRWAY OBSTRUCTION

### 🔑 นิยาม
- **Occlusion or narrowing of the airways leading to compromise in ventilation** — can be partial or complete obstruction
- **⚠️ Deaths are often painful because of slow asphyxiation**
- **Rapid, accurate diagnosis and treatment may prove to be a challenging and life-saving task; most therapies do not lead to a cure**

### 🔑 ประเภทของการอุดกั้น (3 แบบ)
| **A. Intrinsic (Endoluminal)** | **B. Extrinsic (Extraluminal)** | **C. Mixed** |
|---|---|---|
| ก้อนในโพรงหลอดลม | **ก้อนกดจากภายนอก** | **ก้อนนอกหลอดลม invade เข้าในหลอดลม** |

### 🔑 ETIOLOGY — Malignant tumors
- **⭐ Lung cancer (most common)**
- **Head and neck cancer** (tongue, floor of the mouth, tonsils, posterior pharynx, larynx, thyroid gland)
- **Mediastinal tumors** (lymphomas, thymic lesions, germ cell tumors)

### 🔑🔑 CLINICAL MANIFESTATION
- **Depend on the severity & location of the obstruction**
- **Location:**
  | ตำแหน่ง | อาการ |
  |---------|-------|
  | **Proximal (Trachea syndrome)** | **cough, wheezing, dyspnea, stridor** |
  | **Distal** | **dyspnea, stridor, drooling, cough, wheezing, obstructive pneumonitis** |
- **Other symptoms: hemoptysis (can be massive hemoptysis)**
- **⭐⭐ Cardinal feature: WORSEN IN THE SUPINE POSITION** (นอนราบแล้วแย่ลง) — ออกสอบ

### 🔑 DIAGNOSIS
| Modality | ที่พบ |
|----------|------|
| **Plain chest X-ray** | **Tracheal deviation, lobar atelectasis, or complete lung collapse** |
| **CT chest** | **Determine the type of obstructive lesion (intraluminal, extrinsic, or mixed)** |
| **⭐ Bronchoscopy** | **Location and morphology of the lesion, pathologic diagnosis** |

### 🔑🔑 MANAGEMENT (แยกตามสถานการณ์ — ออกสอบ)
> **Mostly dependent on the INITIAL PRESENTATION** (ดูสภาพผู้ป่วย + ความต้องการของผู้ป่วย)

**A. Severe respiratory distress**
- **>> Secure the airway & relieve the obstruction**
- **(require endotracheal intubation or urgent rigid bronchoscopy)**

**B. ⭐ In advanced stage & patients request comfort care**
- **>> Focused primarily on SYMPTOM PALLIATION & QUALITY OF LIFE IMPROVEMENT**
- **Support for decreased anxiety or agitation:**
  - **Purse lip breathing exercise, Fan therapy**
  - **+/− Oxygen**
  - **Opioids** (ใช้ถ้าผู้ป่วย agitate)
  - **+/− Sedatives: Benzodiazepines (Lorazepam, Midazolam)**

# 17.5 HYPERCALCEMIA

### 🔑 Epidemiology
- **Occur in up to 30% of patients who have a malignancy, especially later-stage malignancies**
- **⭐ Most common: lung (SCC), multiple myeloma, renal cell carcinoma, breast, colorectal cancer**

### 🔑🔑 PATHOPHYSIOLOGY (2 กลไกหลัก)
| **A. Humoral Hypercalcemia of Malignancy (HHM)** | **B. Local Osteolytic Hypercalcemia (LOH)** |
|---|---|
| **Solid tumors (lung, head and neck, endometrium, breast, parathyroid) + some lymphomas**<br>→ **Systemic secretion ของ PTHrP** ⭐<br>→ ↑ Intestinal calcium absorption<br>→ ↑ Bone resorption<br>→ ↓ Fractional urinary calcium excretion<br>→ **Serum hypercalcemia** | **Solid tumor bone metastases + Multiple myeloma**<br>→ **Release of DKK1** (multiple myeloma) ⭐<br>→ ↑ **Osteoclast activation** (RANKL)<br>→ ↓ Osteoblast suppression<br>→ ↑ Bone resorption<br>→ **Serum hypercalcemia** |

> **จำ: Solid tumor → PTHrP (systemic); Multiple myeloma → DKK1 → osteoclast ↑**

### 🔑🔑 INVESTIGATION (สูตรที่ต้องจำ)
- **Normal Calcium = 8–10 mg/dL**
- **⭐⭐ Corrected Calcium = 0.8 × (4.0 − serum Albumin) + serum Calcium** (ออกสอบแน่นอน)

**🔑 Severity of hypercalcemia (total calcium)**
| ระดับ | ค่า |
|-------|-----|
| **Mild** | **10.5–11.9 mg/dL** |
| **Moderate** | **12–13.9 mg/dL** |
| **Severe** | **> 14 mg/dL** |

### 🔑🔑 SIGNS AND SYMPTOMS (ตารางออกสอบ)
> **ขึ้นกับทั้งระดับ serum Calcium และ RATE OF CHANGE ของ serum Calcium** ⭐

| **Organ system** | **Clinical features** |
|---|---|
| **1. Neurologic** | **Fatigue**<br>**Altered mental status (confusion to coma)** |
| **2. Gastrointestinal** | **Nausea & vomiting**<br>**Constipation**<br>**Peptic ulcer disease** |
| **3. Cardiovascular** | **ECG: short QT interval, ST-T change (MI mimic)**<br>**Malignant ventricular arrhythmia**<br>**Hypertension** |
| **4. Renal** | **Nephrogenic diabetes insipidus**<br>**Acute kidney injury (AKI)** |

> **วิธีจำแบบคลาสสิก: "Stones, Bones, Abdominal groans, Psychic moans"**

### 🔑 DIAGNOSTIC ALGORITHM
```
                    Hypercalcemia
                          ↓
                   Measure iPTH
              ┌───────────┴────────────┐
           HIGH                       LOW
              ↓                        ↓
   Measure urine Ca/Cr      Measure PTHrP and vitamin D levels
    ┌─────────┴────────┐      ┌──────┬──────┬──────┬─────────┐
High ratio      Low ratio  Elevated Elevated Elevated  Normal
 > 0.03          < 0.02     PTHrP  1,25(OH)₂D 25(OH)D  vit D,
    ↓               ↓          ↓        ↓        ↓      PTHrP
Primary hyper-  Possible  Malignancy Lymphoma Vitamin D   ↓
parathyroidism    FHH      likely    Sarcoid   intake  Myeloma
    ↓                                Granulo-          Vitamin A
 Negative                            matous            Thyrotropin
    ↓                                disorders
Consider genetic testing for CaSR
Review family history
```
> **หมายเหตุ: ในมะเร็ง iPTH จะ LOW (negative feedback จาก Ca สูง) → ต้องวัด PTHrP ต่อ**

### 🔑🔑 MANAGEMENT (ตาม severity — ออกสอบ)
```
                    Hypercalcemia management
        ┌─────────────────┬──────────────────┬──────────────────┐
      MILD            MODERATE              SEVERE
   Ca 10–12 mg/dL    Ca 12–14 mg/dL       Ca > 14 mg/dL
        ↓                 ↓                     ↓
  Usually        ┌────────┴────────┐    Rehydrate + Bisphosphonates
  asymptomatic  Asymptomatic  Symptomatic
        ↓                          ↓
   No medical Mx        • Rehydrate: IV NSS 2-3 L/d
   Avoid:                 +/− Furosemide
   • Thiazide           • Bisphosphonates:
   • Lithium              Pamidronate 60–90 mg in 4 hr
   • High calcium diet    Zoledronate 4 mg in 30 min
   • Volume depletion
   • Prolonged inactivity
```

**ยาที่ใช้:** **IV NSS · Bisphosphonates · (+) Calcitonin · (+) Corticosteroids**

> **⭐⭐ หมายเหตุสำคัญ (สไลด์เน้น): "Treatment depends on the patient's condition. If the patient is near-dying, they have a few days/weeks. Treatment should only be with medication to manage the discomfort"** — คือถ้าผู้ป่วยใกล้เสียชีวิตแล้ว ไม่ต้องรักษาแบบ aggressive ให้เน้นแค่จัดการอาการไม่สุขสบาย

# 17.6 ACUTE CONFUSION — DELIRIUM

### 🔑🔑 DEFINITION — DSM-5 Criteria (ต้องครบทุกข้อ)
1. **A disturbance in ATTENTION & AWARENESS**
2. **An ACUTE onset & FLUCTUATING course**
3. **An additional deficit in cognition**
4. **Impairment not better explained by dementia & do not occur in context of severely impaired level of consciousness or coma**
5. **Evidence of an underlying medical etiology or multiple etiologies**

### 🔑🔑 CAM — Confusion Assessment Method (ออกสอบแน่นอน)
> **The presence of delirium requires feature 1 & 2 & either 3 or 4**
> **สูตร: 1 + 2 + (3 or 4)**

| Feature | รายละเอียด |
|:---:|---|
| **1** | **The presence of ACUTE ONSET & FLUCTUATING course** |
| **2** | **INATTENTION** |
| **3** | **Disorganized thinking** |
| **4** | **Altered level of consciousness** |

> **⭐ Sensitivity 94–100%, Specificity 90–95%**

### 🔑 CLASSIFICATION OF DELIRIUM (3 ชนิด)
| ชนิด | ลักษณะ |
|------|--------|
| **Hypoactive** | **⚠️ พบบ่อยกว่าในผู้สูงอายุ (more common in older patients) และมักตรวจไม่พบ (detect ยาก)** ⭐ |
| **Hyperactive** | กระวนกระวาย เอะอะ |
| **Mixed** | ผสม |

### 🔑🔑 ETIOLOGY — Predisposing vs Precipitating (โมเดลที่ออกสอบ)
> **หลักการ: High vulnerability ต้องการ less noxious insult ก็เกิด delirium ได้**

| **Predisposing factors (Vulnerability)** | **Precipitating factors (Noxious Insult)** |
|---|---|
| **High Vulnerability →** | **← Noxious Insult** |
| • **Dementia**<br>• **History of delirium**<br>• **Advanced age (> 65 yr old)**<br>• **Functional impairment**<br>• **Comorbidity/Severity of illness**<br>• **Visual/Hearing impairment**<br>• **Alcohol abuse** | • **Major high-risk Surgery**<br>• **Severe sepsis / ICU admission**<br>• **Acute organ dysfunction**<br>• **Infection**<br>• **Metabolic disturbance**<br>• **Pain**<br>• **High risk medication**<br>• **Use of restrains / Foley's catheter** |

> อ้างอิง: Inouye SK, Charpentier PA. JAMA. 1996;275(11):852-7.

**Post-admission factors เพิ่มเติม:** Pain · Infection · **Invasive devices** · Immobility · Metabolic abnormalities · Prolonged ileus · Blood transfusion · **Opioids** · **Polypharmacy** · Sleep deprivation · **Physical restraints** · Poor sleep · **Psychoactive drugs** · **Benzodiazepines** · **Anticholinergic agents** · Fall risk · Longer duration of ventilation

### 🔑🔑 MNEMONIC "I WATCH DEATH" (ท่องให้ได้ — ออกสอบ)
| ตัวอักษร | Causes | Differential diagnosis |
|:---:|---|---|
| **I** | **Infection** | **Sepsis, Encephalitis, Meningitis, Syphilis, Urinary tract infection** |
| **W** | **Withdrawal** | **Alcohol, Barbiturates, Sedative-hypnotics (Benzodiazepines)** |
| **A** | **Acute Metabolic** | **Acidosis, Electrolyte disturbance, Hepatic/Renal failure, other metabolic disturbances (Glucose, Magnesium, Calcium)** |
| **T** | **Trauma** | **Head injury, Burns** |
| **C** | **CNS pathology** | **Hemorrhage, Cerebrovascular accident, Vasculitis, Seizure, Tumor** |
| **H** | **Hypoxia** | **Acute hypoxia, Chronic lung disease, Hypotension** |
| **D** | **Deficiencies** | **Vitamin B12, Hypovitaminosis, Niacin, Thiamine** |
| **E** | **Endocrinopathies** | **Hypo/Hyperthermia, Endocrinopathies, Diabetes, Adrenal, Thyroid** |
| **A** | **Acute vascular** | **Hypertensive emergency, Subarachnoid hemorrhage, Sagittal vein thrombosis** |
| **T** | **Toxin or drugs** | **Medications, Street drugs, Alcohols, Pesticides, Industrial poisons, Carbon monoxide, Cyanide, Solvents, etc.** |
| **H** | **Heavy metals** | **Lead, Mercury** |

### 🔑 EVALUATION — 3 ขั้นตอนหลัก
1. **Establishing the diagnosis of delirium** (ใช้ criteria)
2. **Determining the potential cause(s) & ruling out life-threatening contributors**
3. **Managing the symptoms while assuring patient safety**

#### **ขั้นที่ 1 — Establishing the Diagnosis**
```
Suspected Delirium?
       ↓
Establish BASELINE COGNITIVE FUNCTION and time course of any changes
and perform COGNITIVE ASSESSMENT
       ↓  (R/O dementia, depression, psychosis)
Delirium confirmed
```

**รายละเอียด:**
- **History taking:**
  - **Acuity of change from the patient's baseline cognitive state**
  - **History taking from a knowledgeable information** (ญาติ/ผู้ดูแล)
- **Cognitive assessment:**
  - **Degree of attention: a digit span (forward, backward), recitation of the months of the year backward**
  - **⭐ Inattention = inability to repeat 5 digits forward or 3 digits backward**
  - **Brief cognitive screening tests: UB-CAM assessment, 3D-CAM assessment, CAM-ICU**
  - **If patient has severely reduced level of consciousness = coma/stupor (End testing)**

**🔑 UB-CAM (Ultra-brief Confusion Assessment Method) — 2 ข้อคัดกรอง**
```
1. "Please tell me the day of the week"
   ✗ ผิด → Use 3D-CAM to continue assessing DISORGANIZED THINKING
           (e.g. what year is it? What type of place are we at?)
   ✓ ถูก ↓
2. "Please tell me months of the year BACKWARDS, say 'December' as your 1st month"
   ✗ ผิด → Use 3D-CAM to continue assessing ATTENTION
           (e.g. Please tell me days of the week backwards)
   ✓ ถูก ↓
   Patient is NOT delirious

⭐ One or both item wrong = Delirium (ต้องประเมินต่อ)
```

**🔑 3D-CAM (3-minute diagnostic interview for CAM-defined delirium)**
```
Feature 1: Acute Change/Fluctuating Course
  → Yes/No
Feature 2: Inattention
  → No → Delirium not present
  → Yes ↓
Feature 3: Disorganized Thinking
  → Yes → Delirium present (only if the first box, feature 1, is a yes)
  → No ↓
Feature 4: Altered Level of Consciousness
  → Yes → Delirium present
  → No → Delirium not present
```

### 🔑🔑 DIFFERENTIAL DIAGNOSIS (ตารางออกสอบแน่นอน)
| **CHARACTERISTIC** | **DELIRIUM** | **DEMENTIA** | **DEPRESSION** | **ACUTE PSYCHOSIS** |
|---|---|---|---|---|
| **Onset** | **Acute (hours to days)** | **Progressive, insidious (weeks to months)** | Either acute or insidious | Acute |
| **Course over time** | **Waxing and waning** | **Unrelenting** (คงที่/แย่ลงเรื่อยๆ) | Variable | Episodic |
| **Attention** | **⭐ IMPAIRED, a hallmark of delirium** | **Usually intact, until end-stage disease** | Decreased concentration and attention to detail | Variable |
| **Level of consciousness** | **⭐ ALTERED, from lethargic to hyperalert** | **Normal, until end-stage disease** | Normal | Normal |
| **Memory** | **Impaired commonly** | Prominent short- and/or long-term memory impairment | Normal, some short-term forgetfulness | Usually normal |
| **Orientation** | **Disoriented** | Normal, until end-stage disease | Usually normal | Usually normal |
| **Speech** | **Disorganized, incoherent, illogical** | Notable for parsimony, aphasia, anomia | Normal, but often slowing of speech (psychomotor retardation) | Variable, often disorganized |
| **Delusions** | **Common** | Common | Uncommon | **Common, often complex** |
| **Hallucinations** | **⭐ Usually VISUAL** | Sometimes | Rare | **⭐ Usually AUDITORY and more complex** |
| **Organic etiology** | **Yes** | **Yes** | **No** | **No** |

> **จุดแยกสำคัญ: Delirium = acute + fluctuating + inattention + visual hallucination | Dementia = insidious + unrelenting + attention intact**

#### **ขั้นที่ 2 — Identify and address all potential causes**
> **ใช้ mnemonic "I WATCH DEATH"**

**History**
- **Intercurrent illnesses**
- **Recent adjustments in medications**
- **The possibility of withdrawal from alcohol, other substances, or medications**
- **Pertinent environmental changes**

**Physical examination**
- **Vital sign assessment: Fever, Tachycardia, or decrease oxygen saturation**
- **Complete physical examination (**Neurological examination**)**
- **Lab: CBC, Chemistries, Glucose, Renal & Liver function tests, UA, Occult infection**
- **Thyroid function tests, B12 level, Cortisol level, Drug levels**
- **Imaging: X-ray, CT scan, MRI**

**Medication review including**
- **Prescription drugs**
- **As needed drugs**
- **Over the counter medication**
- **Herbal supplement**

**Additional evaluation directed by clinical history**
- **Labs: TFT, B12, drugs level, Toxicity screen**
- **Neuroimaging, LP, EEG**

### 🔑🔑 MANAGEMENT OF DELIRIUM (3 เสาหลัก)
```
1. Treat precipitating causes  →  2. Non-pharmacologic &  →  3. Prevention
   (แก้ที่สาเหตุ)                    Pharmacologic Management
```

### 🔑 NON-PHARMACOLOGIC MANAGEMENT (ต้องทำก่อนเสมอ)
- **⭐ Calendars, Clocks & the day's schedule** (ตั้งไว้ให้เห็นในบ้าน)
- **⭐ Familiar personal objects from the patient's home environment**
- **Increased supervision** (family members, use of sitters, transferring patient to a private room) — **กันคนใน family มาช่วย**
- **Personal contact & communication** (พูดคุยกับ pt. บ่อยๆ)
- **Reorientation & Behavioral intervention**
- **⭐ Correction of sensory impairments (e.g. vision & hearing)** — จัดเครื่องช่วยฟัง แว่นตา ทำ sensory ให้ปกติ
- **⚠️⚠️ AVOID PHYSICAL RESTRAINTS** (ยิ่งมัดยิ่งกระตุ้น)
- **Promote mobility and independence**
- **⭐ Low level of noise at night**

### 🔑🔑 PHARMACOLOGIC MANAGEMENT (ข้อความสำคัญ ออกสอบ)
> **⚠️⚠️ The US FDA has NOT APPROVED any medications for delirium.** (ไม่มียาที่เป็น standard)
>
> **However, guidelines recommend ANTIPSYCHOTIC medications as the FIRST-LINE drugs for patients in whom delirium symptoms would result in:**
> 1. **Interruption of needed medical therapies** (e.g. mechanical ventilation, central lines)
> 2. **May endanger the safety of the patient or other persons**

### 🔑 SELECTING & USING ANTIPSYCHOTICS
| **Typical Antipsychotic** | **Atypical Antipsychotic** |
|---|---|
| Chlorpromazine<br>Fluphenazine<br>**Haloperidol**<br>Loxapine<br>Perphenazine<br>Thioridazine<br>Thiothixene<br>Trifluoperazine | Aripiprazole<br>Asenapine<br>Clozapine<br>Lurasidone<br>Olanzapine<br>**Quetiapine**<br>**Risperidone**<br>Ziprasidone |

### 🔑🔑 ตารางยา Antipsychotics (ขนาดและผลข้างเคียง — ออกสอบ)
| **Medication** | **Dosage** | **Total daily dose** | **Price** | **EPS** | **QT prolong** | **Orthostatic hypotension** | **Sedation** |
|---|---|:---:|---|:---:|:---:|:---:|:---:|
| **⭐ Haloperidol** (Oral, IV, IM) | **0.25–1 mg q 4 hr prn** | **5 mg** | 0.5 mg (0.5฿)<br>5 mg IV (10฿) | **+++** | **+PO, IV**<br>**++IM** | + | + |
| **⭐ Risperidone** (Oral) | **0.25–1 mg q 4 hr prn** | **3 mg** | 1 mg (3.25฿) | **+++** | + | **+++** | ++ |
| **⭐ Quetiapine** (Oral) | **12.5–50 mg q 4 hr prn** | **100 mg** | 25 mg (6.5฿)<br>50 mg XR (45฿)<br>200 mg (18฿) | + | + | **+++** | **+++** (ตัวเป็นน้อยลง/ง่วงมาก) |
| **Olanzapine** (Oral) | **2.5–5 mg q 12 hr** | **20 mg** | 5 mg (104.25฿) | ++ | + | ++ | ++ |
| **Aripiprazole** (Oral) | **2 mg q 4–6 hr** | **15–30 mg** | 2 mg (33฿)<br>5 mg (35฿)<br>10, 15 mg (105฿) | ++ | − | ++ | ++ |

> **จำ: Haloperidol & Risperidone = EPS สูง (+++) | Quetiapine = Sedation + Orthostatic hypotension สูง (+++) แต่ EPS ต่ำ → เหมาะกับผู้ป่วย Parkinson**

### 🔑🔑 PREVENTION — Multicomponent Intervention Protocol (HELP Program) ออกสอบ
| **Risk factors** | **Intervention protocol** |
|---|---|
| **Cognitive impairment** | • **Orienting communication, including orientation board**<br>• Therapeutic activities program |
| **Immobilization** | • **Early mobilization** (e.g. ambulation, or bedside exercises)<br>• **Minimizing immobilization equipment** (e.g. restrains, bladder catheters) |
| **Psychoactive medications** | • **Restricted use of prn sleep & psychoactive medication** (e.g. sedative-hypnotics, narcotics, anticholinergic drug)<br>• Non-pharmacologic protocols for management of sleep & anxiety |
| **Sleep deprivation** | • **Noise-reduction strategies**<br>• **Scheduling of nighttime medications, procedures & nursing activities to allow uninterrupted period of sleep** |
| **Vision impairment** | • **Provision of vision aids** (e.g. magnifiers, special lighting)<br>• Provision of adaptive equipment (e.g. illuminated phone dials, large print books) |
| **Hearing impairment** | • **Provision of amplifying devices**; repair hearing aids; instruct staff in communication methods |
| **Dehydration** | • **Early recognition & volume repletion** |

# 17.7 BLEEDING IN PALLIATIVE CARE (Acute Hemorrhage)

### 🔑 GENERAL PRINCIPLES
- **⭐ Highly distressing symptom for patients, carers, and health professionals** (ทำให้ทั้ง pt. และ caregiver distress)
- **Various presentations: occult bleed, overt external bleeding** (bleed ในตัว internal vs external)
- **⭐ Common sites: Carotid, Femoral, and inter-pulmonary vessels**

### 🔑 IDENTIFICATION OF PATIENTS AT RISK OF HEMORRHAGE — 3 กลุ่มสาเหตุ
| **Local causes** | **Treatment-related causes** | **Systemic causes** |
|---|---|---|
| **Tumor progression, metastasis** | **CMT, RT** | **Liver disease, Coagulopathy, Drugs** |

> **หลักการ: หา cause → treat/ Mx cause**

### 🔑🔑 FACTORS ASSOCIATED WITH INCREASED BLEEDING RISK (ตารางออกสอบ)
| **General risk factors** | **Tumor related** |
|---|---|
| • **Thrombocytopenia** (Plt ต่ำ)<br>• **Coagulopathy**<br>• **Diabetes (DM)**<br>• **Age over 50 years** (> 50 yr)<br>• **10–50% loss of body weight** (BW ลด)<br>• **Anticoagulants** (ยา)<br>• **Previous bleeds** | • **Radiotherapy (RT)**<br>• **Tumor site close to major vessels**<br>• **Head & Neck tumors**<br>• **Larger tumor size** (size ใหญ่)<br>• **Hematological Malignancy**<br>• **Fungating tumors** (ก้อนแตกออกมา)<br>• **GI tumors with previous bleeding**<br>• **Fistulating tumors**<br>• **Surgical interventions** (complication) |

### 🔑🔑 WHAT TO DISCUSS WITH PATIENT & FAMILY (3 ข้อ — ออกสอบ)
1. **⭐ WARNING patients & families about the possibility of a bleed** (เตือนล่วงหน้า)
2. **⭐ GOAL OF CARE** — Available treatment modalities along with associated risks & benefits
3. **⭐ PLACE TO STAY** (home or hospital)

> **\*\* Record on medical record** (บันทึกในเวชระเบียน)

### 🔑🔑 MANAGEMENT — Local Intervention
| **วิธี** | **รายละเอียด** |
|---|---|
| **⭐ Direct compression** | ทำเป็นอันดับแรก |
| **Hemostatic & alginate dressing** | |
| **Gauze soaked in adrenaline (1:1000)** | **>> Vasoconstriction** |
| **⭐ 2–4% Formalin** | **Intractable RECTAL & BLADDER hemorrhaging** |
| **⭐ 1% Alum** | **Continuous BLADDER irrigation** |
| **⭐ Sucralfate** | **Controls cancer-related GI bleeding & cutaneous oozing** |
| **⭐ Tranexamic acid** | **Control bleeding when used LOCALLY or SYSTEMICALLY** |

### 🔑🔑 MANAGEMENT — Systemic Interventions
| **ยา** | **กลไก/ข้อบ่งใช้** |
|---|---|
| **⭐ Vitamin K** | **Factor II, VII, IX and X**<br>**Warfarin overdose**<br>**Oral/SC dose 2.5–10 mg** |
| **⭐ Vasopressin/Desmopressin** | **Upper GI bleeding from cancer** |
| **⭐ Somatostatin analogues (Octreotide)** | **Decreased splanchnic flow & pressure by causing venous dilatation** |
| **⭐ Antifibrinolytic agents** — **Tranexamic acid (TA), Epsilon-aminocaproic acid (EACA)** | **Inhibit plasminogen >> decreased fibrin clots** |

### 🔑🔑 TERMINAL BLEEDING (สำคัญมาก)

**นิยาม:**
> **A major hemorrhage which results in DEATH within a period of time that may be as short as MINUTES due to rapid internal or external loss of circulating blood volume**
> **e.g. ⭐ CAROTID BLOWOUT SYNDROME** (พบใน CA head & neck)

### 🔑🔑 NON-PHARMACOLOGIC MANAGEMENT IN TERMINAL BLEEDING (ท่องให้ได้ — ออกสอบ)
1. **⭐ Stay calm & call for help**
2. **⭐ Ensure that a healthcare professional STAYS WITH THE PATIENT AT ALL TIME** (ห้ามทิ้งผู้ป่วยไว้คนเดียว)
3. **⭐ Lie patient in RECOVERY POSITION to keep airway clear** (ป้องกันสำลัก/airway อุดตัน)
4. **⭐⭐ COVER BLEEDING WITH DARK TOWELS** (ใช้ผ้าสีเข้ม เพื่อลดความหวาดกลัวจากการเห็นเลือด) — ข้อนี้ออกสอบบ่อย
5. **⭐ Apply pressure to the area if bleeding from external wound with hemostatic dressings/gauze or adrenaline soaks if available**

### 🔑🔑 PHARMACOLOGIC MANAGEMENT IN TERMINAL BLEEDING
> **หลักการ: ให้ sedative เพื่อลด anxiety (ไม่ใช่เพื่อเร่งการตาย)**

- **⭐ Sedative medication(s) e.g. benzodiazepines, strong opioids and ketamine**
- **⭐ Given route with RAPID ABSORPTION (buccal, SC, IM, IV)** — ไม่ใช้ oral เพราะช้าเกินไป
- **🔑 Dose:**
  - **Midazolam 5–10 mg IV/SC/IM (deltoid muscle)**
  - **Midazolam 10 mg SL/buccal**
  - **Diazepam 5–20 mg IV**

## 18.3 🔑🔑 PRIORITY SETTING — 5 วิธี (บทนี้ออกสอบเยอะที่สุด)

> **มีหลายวิธี เลือกใช้ให้เหมาะสมกับสถานการณ์**

| # | วิธี |
|:-:|-----|
| **1** | **วิธีของ John J. Halon** |
| **2** | **วิธีขององค์การอนามัยโลก (WHO)** |
| **3** | **วิธีของ 5D** |
| **4** | **วิธีกระบวนการกลุ่ม (Nominal Group Process)** |
| **5** | **วิธีของคณะสาธารณสุขศาสตร์ มหาวิทยาลัยมหิดล** |

### 🔑 วิธีที่ 1 — John J. Halon (BPRS)
> ⚠️ **หมายเหตุ:** สไลด์กล่าวถึงเฉพาะ **ข้อดี/ข้อจำกัด** และอ้างถึงสูตร **O.P.R.** โดยไม่ได้แสดงสูตรเต็ม — สูตรด้านล่างอ้างอิงตำรามาตรฐาน (Hanlon method / BPRS) **ควรยืนยันกับอาจารย์**

**สูตร: Overall Priority Rating (O.P.R.) = (A + B) × C × D**
- **A** = **Size of problem** (ขนาดของปัญหา)
- **B** = **Seriousness of problem** (ความรุนแรง)
- **C** = **Effectiveness of intervention** (ประสิทธิผลของการแก้ไข)
- **D** = **PEARL factors** (Propriety, Economics, Acceptability, Resources, Legality)

| **ข้อดี** | **ข้อจำกัด** |
|---|---|
| 1) มีองค์ประกอบให้พิจารณาค่อนข้างละเอียด<br>2) เกณฑ์การให้คะแนนชัดเจนในแต่ละองค์ประกอบ<br>3) **เหมาะสำหรับการจัดลำดับความสำคัญของปัญหาในระดับนโยบาย** | 1) เป็นการให้คะแนนโดยใช้ความรู้สึกของเจ้าหน้าที่ ซึ่งอาจคลาดเคลื่อนจากปัญหาที่แท้จริงในชุมชน<br>2) **⚠️ ในองค์ประกอบ D ถ้าคะแนนเป็น 0 จะทำให้คะแนนขององค์ประกอบเป็น 0 และเมื่อแทนค่าในสูตรหา O.P.R. จะมีค่าเป็น 0 ทั้งหมด** ⭐ |

---

### 🔑🔑 วิธีที่ 2 — องค์การอนามัยโลก (WHO) — 3 ขั้นตอน

#### **ขั้นที่ 1: การประเมินความสำคัญของปัญหา** — พิจารณา 3 ปัจจัย
a. **อัตราอุบัติการณ์ของปัญหา** (incidence rate)
b. **อัตราตาย** (mortality rate)
c. **อัตราความพิการหรือไร้สมรรถภาพ** (disability rate)

**🔑 เกณฑ์การจัดระดับ (ออกสอบ)**
| ระดับ | เกณฑ์ |
|-------|-------|
| **สูง** | **ถ้าผลการประเมินของอย่างน้อย 2 ปัจจัย เป็นสูง** |
| **ปานกลาง** | **ถ้าผลการประเมินพบ 1 ปัจจัยเป็นสูง หรือ เป็นปานกลางทั้ง 3 ปัจจัย หรือ เป็นปานกลาง 2 ปัจจัยและต่ำ 1 ปัจจัย** |
| **ต่ำ** | **ถ้าผลการประเมินพบทั้ง 3 ปัจจัยเป็นต่ำ หรือ เป็นปานกลาง 1 ปัจจัยและต่ำ 2 ปัจจัย** |

#### **ขั้นที่ 2: การประเมินความเป็นไปได้ของมาตรการในการแก้ไขปัญหา** — 3 ปัจจัย
a. **ความเป็นไปได้ทางด้านเทคนิค**
b. **ความเป็นไปได้ทางด้านงบประมาณ**
c. **ความเป็นไปได้ด้านความร่วมมือของชุมชน**

> **วิธีการให้คะแนนใช้หลักเกณฑ์เดียวกันกับการประเมินความสำคัญของปัญหา**

#### **ขั้นที่ 3: การจัดระดับความสำคัญของปัญหา**
- **นำคะแนนของ (1) ความสำคัญของปัญหา และ (2) ความเป็นไปได้ มาพิจารณาร่วมกัน**
- **กรณีที่ทั้งสององค์ประกอบมีคะแนนเท่ากัน** → **สรุปความสำคัญของปัญหาได้ทันที**
- **กรณีที่ทั้งสององค์ประกอบมีคะแนนที่แตกต่างกัน** (เช่น ความสำคัญของปัญหาเป็นสูง แต่ความเป็นไปได้ของมาตรการเป็นปานกลาง) → **อาจพิจารณาปัจจัยอื่นประกอบเพิ่มเติม เช่น วิธีควบคุมโรคที่เหมาะสมที่สุด**

### 🔑 วิธีที่ 3 — วิธีของ 5D
**ใช้ระบุปัญหาและจัดลำดับความสำคัญโดยใช้หลักการทางระบาดวิทยา**
1. **Death** 2. **Disability** 3. **Disease** 4. **Discomfort** 5. **Dissatisfaction**

| **ข้อดี** | **ข้อจำกัด** |
|---|---|
| **มีองค์ประกอบที่ชัดเจนไม่ซับซ้อน ง่ายต่อการพิจารณาและทำความเข้าใจ** | **เป็นเกณฑ์ที่วัดยากในทางปฏิบัติจริง เนื่องจากเป็นความรู้สึกของเจ้าหน้าที่และประชาชน ซึ่งมีการรับรู้และให้ความสำคัญที่แตกต่างกัน** |

### 🔑🔑 วิธีที่ 4 — กระบวนการกลุ่ม (Nominal Group Process)
- **เป็นการใช้ประชาชนหรือกลุ่มตัวแทนตัดสิน**
- **สมาชิกในกลุ่มจะต้องมีความรู้ในปัญหาที่พบในชุมชนเป็นอย่างดี**
- **มักใช้ร่วมกับการจัดเวทีประชาคม (Focus group discussion / การทำประชาคม)**

**🔑 ประกอบด้วย 2 ขั้นตอน (ออกสอบ)**
| ขั้นตอน | รายละเอียด |
|---------|-----------|
| **1. Listing Technique** | **ประชาชนเสนอปัญหาต่างๆ ที่มีในชุมชน** |
| **2. Ranking Technique** | **ประชาชนลงคะแนน ตัดสินเลือกปัญหาโดยใช้หลักประชาธิปไตย — ปัญหาที่มีจำนวนผู้เลือกมากที่สุดถือเป็นปัญหาที่มีความสำคัญ** |

| **ข้อดี** | **ข้อจำกัด** |
|---|---|
| 1) **ประชาชนมีส่วนร่วมในการจัดลำดับความสำคัญของปัญหา**<br>2) **ประชาชนในชุมชนมีโอกาสแสดงความคิดความเห็นในปัญหาของชุมชน ส่งผลดีต่อความร่วมมือแก้ปัญหาในอนาคต** | **การเสนอปัญหาและการเลือกปัญหา ส่วนใหญ่ประชาชนมักใช้ความรู้สึกของตัวเองเป็นสำคัญ ซึ่งบางครั้งเสนอและถูกเลือกด้วยเสียงข้างมาก แต่ไม่สามารถแก้ไขได้หรือแก้ไขได้ยากมากในทางปฏิบัติ** |

---

### 🔑🔑🔑 วิธีที่ 5 — คณะสาธารณสุขศาสตร์ มหาวิทยาลัยมหิดล (นิยมที่สุดในปัจจุบัน — ออกสอบแน่นอน)

**🔑 4 องค์ประกอบ (A, B, C, D)**
| องค์ประกอบ | หลักในการพิจารณา |
|-----------|------------------|
| **A. ขนาดของปัญหา (Size of Problem)** | **พิจารณาจากจำนวนคนที่เกิดโรค คิดเป็นร้อยละ** |
| **B. ความรุนแรงของปัญหา (Severity of Problem)** | **พิจารณาจากผลของโรค/ปัญหา — ตาย/พิการ/สภาพเศรษฐกิจของบุคคล ครอบครัว ชุมชน** |
| **C. ความยากง่ายและความพร้อมในการแก้ไขปัญหา (Feasibility of Management)** | **พิจารณาจากความเป็นไปได้ด้านวิชาการ บริหาร ศีลธรรม ต้นทุนทางสังคม เวลา ทรัพยากร งบประมาณ เทคโนโลยี** |
| **D. ความวิตกกังวลต่อปัญหาของชุมชน (Community Concerns)** | **พิจารณาจากความเห็นของประชาชนว่าปัญหานั้นมีความสำคัญหรือไม่ ต้องการให้แก้ไขปัญหามากน้อยเพียงใด** |

**🔑🔑 เกณฑ์การให้คะแนน (ตารางออกสอบ)**

| **A. ขนาดของปัญหา** | คะแนน | ร้อยละ |
|---|:---:|---|
| | **0** | ไม่มีคนป่วย/ปัญหา |
| | **1** | **1–25** |
| | **2** | **26–50** |
| | **3** | **51–75** |
| | **4** | **76–100** |

| **B. ความรุนแรงของปัญหา** | คะแนน | ร้อยละ |
|---|:---:|---|
| | **0** | **ไม่มีผลกระทบ** |
| | **1** | **> 25 (น้อยมาก)** |
| | **2** | **26–50 (น้อย)** |
| | **3** | **51–75 (มาก)** |
| | **4** | **76–100 (มากที่สุด)** |

| **C. ความยาก-ง่ายในการแก้ปัญหา** | คะแนน | ร้อยละ |
|---|:---:|---|
| | **0** | **แก้ไขไม่ได้** |
| | **1** | **> 25 (ยากมาก)** |
| | **2** | **26–50 (ยาก)** |
| | **3** | **51–75 (ง่าย)** |
| | **4** | **76–100 (ง่ายมาก)** |

| **D. ความวิตกกังวลต่อปัญหาของชุมชน** | คะแนน | ร้อยละ |
|---|:---:|---|
| | **0** | **ไม่มีคนป่วย/ปัญหา** |
| | **1** | **> 25 (น้อยมาก)** |
| | **2** | **26–50 (น้อย)** |
| | **3** | **51–75 (มาก)** |
| | **4** | **76–100 (มากที่สุด)** |

**🔑 การจัดลำดับความสำคัญ — 2 วิธี**
| วิธี | สูตร |
|------|------|
| **1. วิธีบวก (Additive Method)** | **ความสำคัญของปัญหา = A + B + C + D** |
| **2. วิธีคูณ (Multiplicative Method)** | **ความสำคัญของปัญหา = A × B × C × D** |

| **ข้อดี** | **ข้อจำกัด** |
|---|---|
| **มีเกณฑ์ในการให้คะแนนในแต่ละองค์ประกอบที่ชัดเจน** | 1) **ในการจัดเวทีประชาคมโดยให้ประชาชนเลือกปัญหาและให้คะแนนในทุกองค์ประกอบ ซึ่งแต่ละองค์ประกอบมีคะแนน 4-3-2-1-0 มักเกิดความสับสนและต้องยกมือหลายครั้ง**<br>2) **ต้องแปลงข้อมูลปัญหาออกมาในรูปของอัตราหรือเปอร์เซ็นต์ ในบางครั้งปัญหาที่ได้จากการสำรวจและสัมภาษณ์คนในชุมชนที่ไม่ใช่โรค** |

### 🔑🔑 CRITERIA WEIGHTING METHOD (วิธีการให้น้ำหนักเกณฑ์)

**ระดับความสำคัญกับน้ำหนัก (W)**
| ความสำคัญ | น้ำหนัก (W) |
|-----------|:-----------:|
| **ต่ำ** | **1** |
| **ค่อนข้างต่ำ** | **2** |
| **ปานกลาง** | **3** |
| **ค่อนข้างสูง** | **4** |
| **สูง** | **5** |

**🔑🔑 น้ำหนักมาตรฐานที่นิยมใช้ (ออกสอบ)**
| องค์ประกอบ | **น้ำหนัก (W)** |
|-----------|:---------------:|
| **ขนาดของปัญหา** | **4** |
| **ความรุนแรง/เร่งด่วน** | **3** |
| **ความยากง่าย** | **5** |
| **ความร่วมมือของชุมชน** | **5** |

> **สูตร: คะแนนรวม = Σ (คะแนนแต่ละองค์ประกอบ × น้ำหนัก W)**

## 18.4 PLANNING — การวางแผนการดำเนินการเพื่อแก้ปัญหา

### นิยาม
- **กลุ่มคนเข้าร่วมกระบวนการตัดสินใจในการกำหนดสิ่งที่จะนำมาใช้ในการแก้ไขปัญหาอนามัยชุมชน โดยระบุวัตถุประสงค์ กิจกรรม ทรัพยากร ผู้รับผิดชอบ และการประเมินผล**
- **ระบุว่าจะให้ใครทำอะไร ที่ไหน อย่างไร เมื่อไหร่**
- **มีขั้นตอนดำเนินงานอย่างไร อะไรบ้าง มีการประสานงานอย่างไร และใช้ทรัพยากรอะไรบ้าง**

### 🔑🔑 องค์ประกอบของการเขียนโครงการ — 11 ข้อ (ท่องให้ได้)

| # | องค์ประกอบ | รายละเอียด |
|:-:|-----------|-----------|
| **1** | **ชื่อโครงการ** | กำหนดชื่อตามลักษณะกลุ่มเป้าหมายและหัวข้อหลัก |
| **2** | **ผู้รับผิดชอบโครงการ** | |
| **3** | **หลักการและเหตุผล (บทนำ)** | **4 ส่วน:**<br>• **ส่วนที่ 1 ระบุปัญหา**<br>• **ส่วนที่ 2 ระบุผลกระทบด้านลบของปัญหา มากน้อยเพียงใด**<br>• **ส่วนที่ 3 ระบุแนวทางในการแก้ปัญหา**<br>• **ส่วนที่ 4 ระบุผลกระทบด้านบวกหลังจากการดำเนินการแก้ไขปัญหาแล้ว**<br>**\*อ้างอิงแหล่งที่มา (Reference) ด้วย** |
| **4** | **วัตถุประสงค์และเป้าหมาย** | **ใช้หลัก SMART** (ดูด้านล่าง) |
| **5** | **กลุ่มเป้าหมาย** | |
| **6** | **วัน เวลา สถานที่ดำเนินการ** | ระบุให้ชัดเจน |
| **7** | **วิธีดำเนินการ** | • กำหนดกิจกรรม/ภารกิจที่ต้องปฏิบัติให้บรรลุวัตถุประสงค์<br>• **จำแนกเป็นกิจกรรมย่อยหลายกิจกรรมเป็นขั้นตอนอย่างชัดเจน — ทำอะไร ทำเมื่อใด ผู้ใดรับผิดชอบ และทำอย่างไร**<br>• **โดยปกติจะทำเป็น Gantt Chart ควบคู่กันไป** |
| **8** | **ระยะเวลา** | ระบุเวลาตั้งแต่เริ่มต้นจนสิ้นสุดโครงการ |
| **9** | **งบประมาณและทรัพยากร** | |
| **10** | **การประเมินผลโครงการ** | **ต้องระบุบุคคล/หน่วยงาน/เครื่องมือที่ใช้หรือวิธีไว้ด้วย ควรบอกระยะเวลาในการประเมินด้วย** |
| **11** | **ผลที่คาดว่าจะได้รับ** | ผลประโยชน์ที่พึงได้จากความสำเร็จของโครงการ |

### 🔑🔑 SMART Objectives (ท่องให้ได้ — ออกสอบ)
| ตัวอักษร | คำเต็ม | ความหมาย |
|:---:|---|---|
| **S** | **Sensible** | **มีความเป็นไปได้ในการดำเนินการ** |
| **M** | **Measurable** | **สามารถวัดและประเมินผลได้** |
| **A** | **Attainable** | **ระบุสิ่งที่ต้องการดำเนินงานอย่างชัดเจนและเฉพาะเจาะจง** |
| **R** | **Reasonable** | **มีความเป็นเหตุเป็นผลในการปฏิบัติงาน** |
| **T** | **Time** | **มีขอบเขตของเวลาที่แน่นอนในการปฏิบัติงาน** |

> *(บางตำราใช้ Specific, Measurable, Achievable, Relevant, Time-bound — แต่สไลด์ของอาจารย์ใช้แบบข้างบน)*

## 18.5 INTERVENTION & IMPLEMENTATION

### 🔑 1. ขั้นตอนการเตรียมงาน
**a) เตรียมผู้ปฏิบัติงาน**
- **ศึกษารายละเอียดของกิจกรรมให้เข้าใจทุกขั้นตอน**
- **แบ่งหน้าที่ความรับผิดชอบ ป้องกันการทำงานซ้ำซ้อน**
- **เตรียมทรัพยากร อุปกรณ์ บุคลากรที่เกี่ยวข้อง**

**b) เตรียมกลุ่มเป้าหมายหรือผู้รับบริการ**
- **ชี้แจงให้ทราบว่าจะเข้าไปทำกิจกรรม/บริการอะไรในชุมชน**

**c) ประสานกับผู้นำชุมชน** ให้การสนับสนุน กระตุ้น และมีส่วนร่วมในกิจกรรม
**d) คัดเลือกสมาชิกกลุ่ม/องค์กรในชุมชนที่มีส่วนเกี่ยวข้องกับปัญหา**
**e) การประชาสัมพันธ์** แจ้งให้ประชาชนในชุมชนทราบถึงวัน เวลา และวัตถุประสงค์ของการปฏิบัติงาน

### 🔑 2–5. ขั้นดำเนินการ
2. **ขั้นดำเนินการตามแผนโครงการ** — จัดทำกำหนดการปฏิบัติงานโดย **ตารางปฏิบัติงาน** และ **แผนภูมิแกนท์ (Gantt Chart)**
3. **กำหนดสื่อและทรัพยากรที่ใช้**
4. **แสดงผู้รับผิดชอบแต่ละกิจกรรม**
5. **การติดตามประเมินผล / การควบคุมตรวจสอบ / การรายงานความก้าวหน้าของกิจกรรมเป็นระยะ**

## 18.6 🔑🔑 EVALUATION — การประเมินผลการดำเนินงาน

> **การประเมินการดำเนินงานว่ากิจกรรมนั้นได้ดำเนินไปตามเป้าหมายหรือแผนงานหรือไม่**

### 🔑🔑 องค์ประกอบ 5 ประการ (ท่องให้ได้ — ออกสอบแน่นอน)
> **เพื่อต้องการทราบว่าโครงการนั้นสามารถแก้ปัญหาได้จริงหรือไม่**

| # | องค์ประกอบ | ความหมาย |
|:-:|-----------|----------|
| **1** | **ความเหมาะสม สอดคล้อง ถูกต้องตามปัญหาที่ต้องการแก้ไข (Relevance)** | โครงการตรงกับปัญหาจริงหรือไม่ |
| **2** | **ความก้าวหน้า (Progress) — Formative Evaluation** ⭐ | ประเมินระหว่างดำเนินงาน |
| **3** | **ประสิทธิภาพ (Efficiency)** | ใช้ทรัพยากรคุ้มค่าหรือไม่ (input vs output) |
| **4** | **ประสิทธิผล (Effectiveness)** | บรรลุวัตถุประสงค์หรือไม่ |
| **5** | **ผลกระทบ (Impact, Efficacy)** | ผลกระทบระยะยาวต่อชุมชน |

> **จำ: Relevance → Progress → Efficiency → Effectiveness → Impact**
> **Formative Evaluation = ประเมินระหว่างทาง (Progress) | Summative Evaluation = ประเมินตอนจบ (Effectiveness, Impact)**

## 18.7 เทคนิคการเข้าชุมชน (Lect 10.2)

### 🔑 เตรียมตัวก่อนไปศึกษาชุมชน
- **เตรียมตัวเตรียมใจ**
- **เตรียมของให้พร้อม**
- **วางแผนก่อนออกสำรวจ**
- **งานที่ต้องทำระหว่างศึกษาชุมชน: รายงานเยี่ยมบ้าน + Community project**

### 🔑 ความรู้เรื่องมนุษยสัมพันธ์
**หลักสำคัญในการสร้างมนุษยสัมพันธ์ที่ดี**
- **การรักผู้อื่น มีประโยชน์เกื้อกูลกัน เอาใจเขามาใส่ใจเรา การให้อภัยผู้อื่น**
- **เปิดใจกว้างเรียนรู้ หากเราทำผิดต้องแก้ไข ให้เกียรติซึ่งกันและกัน**

**การฝึกตนเองให้มีมนุษยสัมพันธ์ที่ดี**
- **ต้องยิ้มง่าย ทักทายคนอื่นด้วยไมตรี จริงใจ**

### 🔑🔑 การปฏิบัติตัวเมื่ออยู่ในชุมชน (ออกสอบ)
> **ต้องเรียนรู้เพื่อปรับตัวเข้ากับชุมชน**
- **ค่านิยมของชุมชน**
- **สิ่งต้องห้ามในชุมชน**
- **⭐ เป็นผู้เรียนรู้ — ไม่ทำตัวเป็นผู้รู้**
- **⭐ คงไว้ซึ่งความเป็นคนนอกชุมชน** (รักษาระยะห่างที่เหมาะสม)
- **เรียนรู้ภาษาถิ่น**
- **เรียนรู้วัฒนธรรมการกินอยู่ของชุมชน**
- **เรียนรู้การใช้ชีวิตในชุมชน**

### 🔑 การออกจากชุมชน
- **การเรียนรู้ชุมชนเป็นกระบวนการเรียนรู้ร่วมกันของผู้ศึกษาชุมชนและชุมชนเอง จากการทำงานร่วมกันและปัญหาที่เกิดขึ้นจริงในชุมชน**
- **ระหว่างที่ทำงานร่วมกันเกิดเป็นความสัมพันธ์**
- **⭐ การออกจากชุมชนจึงต้องมีวัฒนธรรม "ไปลามาไหว้" ทำให้ความสัมพันธ์ของผู้ศึกษาชุมชนและชุมชนไม่แยกจากกัน**

### 🔑 ความรู้เรื่องงาน
- **การศึกษาชุมชนต้องมองเป็นองค์รวม — ด้านเศรษฐกิจ สังคม การเมือง การศึกษา ภาวะสุขภาพ และวัฒนธรรม**
- **การตั้งวัตถุประสงค์ในการศึกษาชุมชนเป็นลักษณะคำถามข้อย่อยๆ จะช่วยให้เห็นแนวทางในการหาคำตอบ**
- **การหาคำตอบจะอาศัย:**
  - **การหาข้อมูลจาก Key informant และ Stakeholder**
  - **เครื่องมือในการเก็บข้อมูล** เช่น แบบสอบถาม แบบบันทึกการสังเกต แบบสัมภาษณ์
  - **การวิเคราะห์ข้อมูล**

### 🔑🔑 ขั้นตอนการทำงานร่วมกับชุมชน (4 ขั้น)
| # | ขั้นตอน | รายละเอียด |
|:-:|--------|-----------|
| **01** | **เตรียมการ (PREPARATION)** | **เตรียมชุมชน · เตรียมเจ้าหน้าที่ · เตรียมผู้ปฏิบัติงาน · เตรียมเครื่องมือที่ใช้เก็บรวบรวมข้อมูล** |
| **02** | **ประเมินภาวะอนามัยชุมชน (ASSESSMENT)** | **Data collection: Primary data, Secondary data**<br>**รวบรวมข้อมูลพื้นฐาน: ข้อมูลทั่วไปของชุมชน ด้านสังคม ประชากร คุณภาพชีวิต สภาวะอนามัยของชุมชน ด้านสิ่งแวดล้อม** |
| **03** | **วิเคราะห์ปัญหา (DATA ANALYSIS)** | **รวบรวมปัญหา, ลักษณะปัญหา · วิเคราะห์ปัญหาร่วมกับชุมชน** |
| **04** | **ลำดับความสำคัญของปัญหา (PRIORITY SETTING)** | **จัดทำเกณฑ์และวิเคราะห์ตามเกณฑ์**<br>**⭐ ชุมชนเป็นผู้เลือกปัญหา โดยเจ้าหน้าที่ไม่ชี้นำ** |

> **เครื่องมือสำคัญในขั้นตอนนี้: Focus Group Discussion (การทำประชาคม)**

## ⚠️ กับดักที่ออกสอบบ่อย (Common Pitfalls)

1. **Living will ≠ Euthanasia** — Living will ไม่เร่งตาย ไม่ยื้อ ไม่ทอดทิ้ง
2. **Morphine ไม่มี ceiling effect** — แต่ต้องระวังในไตวาย
3. **Opioid-induced constipation ไม่มี tolerance** — ต้องให้ยาระบายตลอด (ต่างจาก N/V และ sedation ที่ tolerance ได้ใน 2–4 วัน)
4. **Opioid ขนาดน้อยรักษา dyspnea ได้โดยไม่กดการหายใจ**
5. **MSCC: ให้ Dexamethasone ก่อน ไม่ต้องรอผล MRI** — ยกเว้นสงสัย lymphoma/myeloma
6. **Overflow diarrhea = ท้องผูก ไม่ใช่ท้องเสีย** — ต้อง PR ทุกราย
7. **Hypoactive delirium พบบ่อยในผู้สูงอายุ แต่มักตรวจไม่พบ**
8. **ห้ามใช้ physical restraint ใน delirium**
9. **Terminal bleeding: ใช้ผ้าสีเข้ม + อยู่กับผู้ป่วยตลอด**
10. **Asbestosis = lower zone** vs **Silicosis/CWP = upper zone**
11. **ด่างรุนแรงกว่ากรด** (liquefactive vs coagulative necrosis)
12. **สารก่อมะเร็งไม่มี threshold** — ไม่มีระดับที่ปลอดภัย
13. **Smoking + occupational carcinogen = synergistic** (ไม่ใช่ additive)
14. **PPE เป็นมาตรการลำดับสุดท้าย** — ควบคุมที่แหล่งกำเนิดดีที่สุด
15. **ค่าต่ำกว่ามาตรฐานไม่การันตีว่าจะไม่เป็นโรค**
16. **Halon method: ถ้า D = 0 → O.P.R. = 0 ทั้งหมด**
17. **ผู้เสียชีวิตในที่อับอากาศส่วนใหญ่คือผู้เข้าไปช่วยเหลือ**
18. **Unity of command** — รับคำสั่งจากผู้บังคับบัญชาเพียงคนเดียว (ICS)
